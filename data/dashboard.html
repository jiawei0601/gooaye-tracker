00、GB300）的龐大採購量與佈局。此外，針對 Apple 即將推出的新機 16e，他分析了其硬體配置、Apple Intelligence 的定位，以及 Apple 自研數據機晶片（C1）與 Wi-Fi 晶片對 Broadcom 和 Qualcomm 等供應鏈的長遠影響。", "topics": ["遠端紫微斗數算命體驗與人生風險管理哲學", "xAI 的 Grok-Free AI 模型體驗與高度評價", "xAI 伺服器建置與 GPU（H100、GB300）採購量分析", "Apple 新機 16e 的規格、定價與 Apple Intelligence 定位", "Apple 自研數據機晶片（C1）與 Wi-Fi 晶片對 Broadcom、Qualcomm 供應鏈的影響"], "market_view": "市場上的各種預測應該都會開始去上修 xAI 的採購量，其硬體需求不輸其他大型雲端服務商（CSP）。", "industries": [{"name": "AI 伺服器", "stance": "看多", "view": "xAI 在伺服器與 GPU 的投入持續加大，對硬體供應鏈帶來顯著貢獻。"}, {"name": "智慧型手機", "stance": "中性", "view": "Apple 16e 作為平價 AI 機款具備吸引力，但硬體規格有部分閹割。"}, {"name": "手機晶片供應鏈", "stance": "觀察", "view": "Apple 逐步走向自研數據機與 Wi-Fi 晶片，將對既有晶片供應商產生排擠效應。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "xAI 採購了大量的 H100 以及未來的 GB300 系列晶片。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "中性", "argument": "推出 16e 作為最便宜的 AI 機種，並首度採用自研數據機晶片 C1。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "Apple 未來將使用自研 Wi-Fi 晶片取代 Broadcom 的產品，對其營收有潛在影響。"}, {"symbol": "QCOM", "name": "Qualcomm", "market": "US", "stance": "觀察", "argument": "Apple 16e 採用自研 C1 數據機晶片，長遠來看將逐步取代 Qualcomm 的產品。"}], "quotes": ["真正的一個差別，去區別出你是一個強者還是一個弱者，其實就是我們都一定會遇到壞事，所有人都會遇到壞事，只是我們在每次的遇到壞事裡面怎麼樣去把它變成是一種轉機。", "Apple 16e 是一個最便宜的 AI 機，雖然硬體有閹割，但用兩萬出頭的價格就可以買到可以使用 AI 功能的機子，本身是非常非常有吸引力的。"], "ep_key": "EP534", "title": "EP534 |🍋", "pubdate": "2025-02-22", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了與台灣頂尖 Quant 及 AI 產業高管交流的收穫，探討 AI（如 DeepSeek、ChatGPT）對量化交易與產業的深遠影響，指出 AI 已能理解並推導交易策略，未來量化交易競爭將更激烈，中小型公司應善用雲端與開源模型進行微調。市場方面，台股中小型股轉強、類股輪動健康；美股則減碼中小型軟體股，轉向佈局下一輪機會。此外，觀察到顯示卡（如 RTX 50 系列）因換代需求與中國 Edge 端 AI 推理需求而出現囤貨與缺貨，看好顯卡產業與相關供應鏈後市。", "topics": ["與 Quant 及 AI 產業高管的交流心得", "AI（如 DeepSeek、ChatGPT）對量化交易策略與程式碼生成的影響", "中小型企業如何利用開源模型與 RAG 技術訓練專屬 AI 機器人", "台股中小型股轉強與健康類股輪動觀察", "美股中小型軟體股減碼與下一輪佈局策略", "顯示卡（RTX 50 系列）換代需求與中國 Edge 端推理需求分析", "NVIDIA GB10 的出貨與應用場景推測"], "market_view": "台股中小型股轉強、類股輪動健康，有利多頭格局維持；美股則減碼中小型軟體股，觀察中大型軟體股能否接棒拉抬指數。", "industries": [{"name": "量化交易 (Quant)", "stance": "觀察", "view": "AI 介入使策略開發與抄襲變快，競爭加劇將導致利潤空間 (Margin) 被擠壓。"}, {"name": "軟體股 (美股)", "stance": "中性", "view": "減碼中小型軟體股，並觀察中大型軟體股是否能重估估值 (Re-rate) 接棒上漲。"}, {"name": "顯示卡", "stance": "看多", "view": "RTX 50 系列換代需求強勁，加上中國 Edge 端推理需求，看好顯卡與相關供應鏈後市。"}, {"name": "記憶體", "stance": "看多", "view": "隨著 AI 推理 (Inference) 需求往 Edge 端移動，對記憶體容量要求提高，重新佈局記憶體類股。"}], "tickers": [{"symbol": "DeepSeek", "name": "DeepSeek", "market": "other", "stance": "觀察", "view": "其換方量化背景與開源模型（如 V3、R1）大幅降低 AI 成本，對量化交易與 AI 產業產生開創性影響。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "view": "看好其顯卡在電玩與 Edge 端 AI 推理的需求，且 GB10 出貨量大幅上修。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "持有中", "view": "作為硬體晶片龍頭之一，持續持有以參與 AI 基礎建設成長。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "持有中", "view": "硬體晶片相關標的，持續持有觀察其在 AI 供應鏈中的表現。"}], "quotes": ["你有 AI，別人也都有 AI。當你把頭栽進 AI 之後，其實就是面對下一輪的競爭而已，並不會因此平步青雲。", "投資是要讓自己盡量站在一個不容易受傷的地方，不管是讀什麼樣的故事，都先來一點（佈局），後面再仔細研究。"], "ep_key": "EP533", "title": "EP533 | 👾", "pubdate": "2025-02-19", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期因氣候變化導致身體過敏與脫皮的狀況，並感謝聽眾的關心。在投資方面，他對近期美股軟體持股的全面噴發感到滿意，但也提到部分標的如 Bill Holdings 財報後大跌的挫折。他觀察到散戶資金開始湧入軟體股，因此計劃進行部位調整，將資金轉向他認為有反彈跡象的 Tesla。此外，他深入探討了台積電與 Intel 合作的傳聞，認為在川普政府的壓力下，台積電可能不得不透過入股或合資方式協助 Intel，但關鍵的研發資源仍應保留在台灣。最後，他分析了 Apple 即將推出的 SE4、折疊機傳聞及 AI 發展前景。", "topics": ["主持人身體狀況與聽眾關心回饋", "美股軟體持股表現與散戶資金流向觀察", "Tesla 部位調整與加碼策略", "台積電與 Intel 合作傳聞及地緣政治影響", "Apple 新產品（SE4、折疊機）與 AI 發展前景", "聽眾 Q&A：包含 CPO 產業、Himax、婚姻與投資心態等討論"], "market_view": "美股表現非常非常好，台股表現稍微落後，但整體而言只要切到正確的族群，報酬率還是有拉出去。", "industries": [{"name": "軟體股", "stance": "觀察", "view": "軟體持股全面噴發，但觀察到散戶資金湧入，後續可能會出現震盪，因此計劃調出部分部位。"}, {"name": "半導體代工", "stance": "中性", "view": "台積電在美方壓力下可能不得不與 Intel 合作，雖是利空但為地緣政治下的妥協，關鍵研發仍需留台。"}, {"name": "折疊手機", "stance": "看多", "view": "蘋果若推出折疊機將為供應鏈注入新動能，市場熱度有望重新點燃。"}, {"name": "CPO (共同封裝光學)", "stance": "觀察", "view": "市場目前多在交易預期與情緒，實際產品尚未大量出線，屬於提早反應未來。"}], "tickers": [{"symbol": "BILL", "name": "Bill Holdings", "market": "US", "stance": "持有中", "argument": "先前表現不錯，但近期公布財報後股價重挫 30%，主持人有承受此跌幅。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "屬於表現極佳的軟體持股之一，買點不錯且持續獲利中。"}, {"symbol": "CFLT", "name": "Confluent", "market": "US", "stance": "持有中", "argument": "屬於表現極佳的軟體持股之一，買點不錯且持續獲利中。"}, {"symbol": "CRM", "name": "Salesforce", "market": "US", "stance": "持有中", "argument": "屬於表現極佳的軟體持股之一，買點不錯且持續獲利中。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "傳出台積電可能入股或合資協助其代工業務，短期內可能會有較多利多消息灌入。"}, {"symbol": "HIMX", "name": "Himax (奇景光電)", "market": "US", "stance": "觀察", "argument": "在 CPO 與 WLO 產業鏈中卡到不錯的位置，但其本業 DDI 發展力道相對較弱。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "argument": "近期看到反彈跡象，決定持續加碼，並認為馬斯克參與政治長遠來看對公司是利多。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "面臨美國政府要求協助 Intel 的地緣政治壓力，可能需透過合資或入股方式妥協。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "看多", "argument": "即將推出的 SE4 預期銷量極佳，且未來軟體 AI (Apple Intelligence) 的發展是股價往上噴的關鍵。"}], "quotes": ["男兒有淚不輕彈，男生有事情就要自己吞，不能夠講出去，講出去等於是懦弱的象徵。但我現在過得非常滿意，生活中的小挑戰都已經消化完了。", "市場要解決的問題就是供需，供需背後有基本面、題材面、籌碼面和技術面的變化。理解核心是供需，就不會過度仰賴單一指標。", "你可以選擇射偏啦。在美國的要求之下，台積電不得不配合，但千萬不能把研發資源，也就是在竹科、新竹的這些強大大腦與 know-how 移去美國。"], "ep_key": "EP532", "title": "EP532 | 😽", "pubdate": "2025-02-15", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了個人生活近況，包括對產檢的創傷反應，以及他參與的遊戲基金（Game Fund）在歷經半年多調整後順利啟動的過程。在市場分析方面，他指出資金已全面往軟體方向靠攏，並強調當某個族群正式啟動時，應順應市場偏好，將資金往主流標的堆疊。此外，他也探討了合夥生意的眉角、川普關稅政策對科技產業的潛在影響，並重申在市場熱度極高或極低時，應保持理性與彈性的交易心態。", "topics": ["萬憂枕贊助與個人生活近況分享", "遊戲基金（Game Fund）順利啟動與合夥生意心態轉變", "資金全面往軟體板塊靠攏與台美市場偏好差異", "主流族群啟動時的交易策略與太弱留強原則", "川普對等關稅政策對科技與軟體服務貿易的影響", "聽眾問答：工作選擇、MBTI、固態電池、猛男與猛女比例、個股看法"], "market_view": "資金已全面往軟體方向靠攏，當主流族群正式啟動時，應順應市場偏好並將資金往主流標的堆疊，而非硬要矯正市場。", "industries": [{"name": "軟體", "stance": "看多", "view": "資金全面往軟體靠攏，美股以純軟體為主，台股則偏向軟硬整合，已成為市場主流族群。"}, {"name": "硬體/半導體", "stance": "中性", "view": "雖然資金往軟體靠攏，但硬體並非不會動，只是要注意先前累積的怨魂與回檔風險。"}, {"name": "固態電池", "stance": "觀察", "view": "屬於未來潛在發展性的夢想題材，在市場修正時風險較高，不會一次配置太多這類標的。"}], "tickers": [{"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "view": "帳面上已經翻了約四倍，雖然可能面臨回檔，但仍是引領軟體族群的指標股之一。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "view": "近期出現回檔修正，但長期來看是個動能強勁的標的，會尋求在 290 到 300 美元附近逢低加碼的機會。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "持有中", "view": "雖然是持股之一，但因為承擔了龐大的資本支出（CapEx），在出現回檔時不會優先選擇加碼。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "看多", "view": "市場低估了 Apple Intelligence 的潛力，其擁有極強的定價權，是值得在回檔時買進的巨頭。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "view": "聽眾問答中提到，主持人對其未來發展保持觀察。"}, {"symbol": "3034", "name": "聯詠", "market": "TW", "stance": "觀察", "view": "聽眾問答中提到，主持人對其未來發展保持觀察。"}, {"symbol": "3045", "name": "台灣大", "market": "TW", "stance": "觀察", "view": "聽眾問答中提到，主持人對其未來發展保持觀察。"}, {"symbol": "2412", "name": "中華電", "market": "TW", "stance": "中性", "view": "屬於穩定配息、股價波動小的避險與定存股，適合追求穩定、不追求資本利得的投資人。"}], "quotes": ["你不被愛的才是小三。在市場上，你可以找到一堆基本面極佳、盈餘成長率極好的公司，但如果市場不喜歡，它的本益比就永遠上不去。", "當市場還沒看懂時，是拼你的認知能力與判斷力；但當資金已經全面湧入、市場已經看懂時，你就要去假設是市場不喜歡，而不是市場沒看懂。", "合夥生意要能成功，關鍵在於人要對，且股權結構一定要有人說了算。同時，合夥人必須完全理解自己在玩什麼遊戲，並願意共同承擔風險。"], "ep_key": "EP531", "title": "EP531 | 🪿", "pubdate": "2025-02-12", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期台股與美股市場資金流向軟體股的趨勢，並指出其個人台股部位已創歷史新高。他詳細探討了 DeepSeek 橫空出世對 AI 產業帶來的變革，特別是其透過 MoE 與 MLA 技術大幅降低 AI 模型成本，將加速 AI 模型商品化（commodity）的進程。此外，主持人也分析了邊緣運算（Edge Computing）與推理（Inference）端需求爆發對工業電腦（IPC）產業的潛在機會與挑戰，並提醒投資人需留意 NVIDIA 的 GB100 等競爭產品及消費級顯卡（如 5G/5090）在 AI 部署上的替代效應。最後，他分享了對科技巨頭資本支出（CapEx）的看法，並透露其後續將採取更積極的交易策略，搭配技術面與川普政策進行汰弱留強。", "topics": ["台股與美股軟體股資金流向與個人部位新高", "DeepSeek 對 AI 產業成本與模型商品化的衝擊", "邊緣運算（Edge Computing）與工業電腦（IPC）的發展機會與競爭", "NVIDIA 5090 顯卡與液態金屬散熱技術的觀察", "科技巨頭（Amazon, Google, Meta, Microsoft）資本支出與市場預期", "個人後續交易策略與川普政策的應對"], "market_view": "市場資金已明顯往軟體方向移動，邊緣運算與推理需求將加速，但需留意硬體股可能面臨市場預期已高及重估（re-rate）的修正風險。", "industries": [{"name": "軟體", "stance": "看多", "view": "資金已明顯流入軟體板塊，軟體股的潛在爆發力開始被市場認識，後續若有拉回仍會站在買方。"}, {"name": "工業電腦 (IPC)", "stance": "觀察", "view": "邊緣運算需求可能帶動 IPC 訂單，但 IPC 並非唯一受益者，需面臨 NVIDIA 整合方案與消費級顯卡的競爭。"}, {"name": "AI 伺服器硬體", "stance": "中性", "view": "科技巨頭資本支出依然強勁，但硬體股的市場預期已高，需留意 re-rate 修正風險，已設立移動止損（trailing stop）。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "argument": "收到老黃簽名版 5090 顯卡，看好其液態金屬散熱技術的後續應用，且其 GB100 方案將直接競爭邊緣運算市場。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "觀察", "argument": "其法說會指出 DeepSeek 證實了 AI 模型能更有效率，且看好 serverless 方案在推理端的需求爆發。"}, {"symbol": "AMZN", "name": "Amazon", "market": "US", "stance": "觀察", "argument": "資本支出高達 105 Billion，但需觀察市場是否對其 AI 變現能力產生懷疑，若股價疲軟會考慮減碼。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "argument": "資本支出達 80 Billion，但若股價走勢相對疲軟，會考慮將其部位移往更強勢的軟體或主流族群。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "觀察", "argument": "資本支出達 75 Billion，同樣需留意市場對其大量 CapEx 投入後短期變現能力的懷疑。"}, {"symbol": "META", "name": "Meta", "market": "US", "stance": "觀察", "argument": "資本支出達 65 Billion，但因有其他廣告等業務支撐，表現可能相對其他巨頭穩健。"}, {"symbol": "3013", "name": "晟銘電", "market": "TW", "stance": "觀察", "argument": "聽眾問及台股前三大持股，主持人僅就產業面分析散熱與伺服器機殼趨勢，未對個股股價做預測。"}, {"symbol": "3406", "name": "玉晶光", "market": "TW", "stance": "觀察", "argument": "聽眾問及台股前三大持股，主持人僅就產業面分析散熱與伺服器機殼趨勢，未對個股股價做預測。"}, {"symbol": "3017", "name": "奇鋐", "market": "TW", "stance": "觀察", "argument": "散熱片領域的頂級猛男，AVC 在伺服器領域能見度極高，但需注意散熱族群近期資金有流出跡象。"}, {"symbol": "2345", "name": "智邦", "market": "TW", "stance": "觀察", "argument": "交換器與 AI 伺服器領域實力強勁，預期後續營運將開出不錯的成績，表現可能比散熱族群更強。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "市場目前交易的重點不只是交車數據，更在於 FSD、Dojo 訓練及機器人（Robotics）的長期潛力。"}], "quotes": ["太舒服的時候，就是要提醒自己要好好的把握當下，因為很快那個舒服的感覺就不見了。", "DeepSeek 橫空出世，展示了兩大可以去降成本的做法，這會更加加速 AI 模型在後面變成 commodity（大宗商品）。", "不要跟太多人去講你在做什麼事情，因為家人、男朋友、老公、爸媽，他們不一定可以完全理解你。"], "ep_key": "EP530", "title": "EP530 | 🍪", "pubdate": "2025-02-08", "duration_s": 3081, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了對於近期大S過世新聞的震撼與對生命無常的感觸，並藉此提醒聽眾注意身體健康與流感疫苗的接種。在市場方面，他分析了新春期間因川普關稅言論導致台股開盤大跌後快速收復的「白包行情」，指出這與2018年貿易戰的「先喊後談」模式類似，並對供應鏈的彈性與台廠的產能調度能力表示信心。此外，他對近期軟體股（如 Palantir）的強勁表現進行了深入剖析，探討了 AI 軟體股的估值與本質，並提醒投資人注意軟體股高估值下的波動風險與週期循環。", "topics": ["大S過世的感觸與流感疫苗接種的思考", "新春台股「白包行情」與川普關稅言論的應對", "供應鏈產能調度與台美半導體合作的展望", "AI 軟體股（如 Palantir）的本質、估值與市場表現", "科技產業與半導體週期循環的風險提示"], "market_view": "新春開盤因關稅言論大跌後快速收復，符合 2018 年貿易戰「先喊後談」的震盪模式，跌下來反而是補人、做多的機會。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "面對關稅威脅，廠商能靈活調度墨西哥與亞洲/歐洲的產能，受關稅實質影響比想像中來得小。"}, {"name": "AI軟體", "stance": "觀察", "view": "軟體股近期全面起漲，但估值已處於極不正常的區間，需注意高估值下的波動與週期循環風險。"}, {"name": "半導體", "stance": "看多", "view": "長期來看技術含量與需求持續提高，但仍不可忽視週期性循環的修正風險。"}], "tickers": [{"symbol": "TSMC", "name": "台積電", "market": "TW", "stance": "看多", "argument": "雖然面臨關稅威脅，但台積電在美投資與其強大的產業地位，最終仍有望透過談判獲得妥協。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "商業軟體成長強勁，但目前股價已進入看不懂的夢幻高估值區間，會站在賣方而非加碼。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "屬於目前持股中同樣處於夢幻估值的標的之一。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "看多", "argument": "作為 AI 基礎建設與資本支出的核心，即便市場熱度極高仍是必須關注的重點。"}], "quotes": ["股票市場是一個唯一打折大家會不喜歡的地方。股票打折每個人都覺得很痛苦，但打折可能就是給你機會的可能性。", "千萬不要去期待說軟體爆炸前會重回硬體，軟體如果爆炸的話，硬體也要一起爆炸，因為代表硬體的投入真的會被打上一個非常大的問號。", "一個公司它可能是一個好公司，但是如果你買在一個很狗屎、很垃圾的價格、很貴的價格，那可能這個投資它就是一個壞的投資。"], "ep_key": "EP529", "title": "EP529 | 🥏", "pubdate": "2025-02-05", "duration_s": 2994, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了過年期間的家庭生活感悟，並針對台股開盤可能面臨的局勢進行分析。他指出，根據新加坡富台指電子盤的走勢，台股開盤可能面臨兩三百點的跌幅，但過年前撤出的資金預計會在開盤後陸續回補。在總經與關稅議題上，他深入剖析川普對加拿大、墨西哥及中國課徵關稅的影響，認為關稅政策在執行上面臨極大挑戰，特別是對半導體與伺服器代工產業，可能導致美國本土代工廠成本上升或產業外流，因此投資人無需過度恐慌，應保持冷靜觀察市場變化。", "topics": ["過年家庭生活與年味變化的感悟", "台股開盤走勢預測與資金回補效應", "川普關稅政策對美股與台股產業的潛在影響", "半導體與伺服器代工產業在關稅政策下的應對與困境", "投資心態調整與如何避免無用統計資訊的干擾"], "market_view": "台股開盤短期可能面臨修正，但過年前撤出的資金預計會陸續回補，對於關稅政策引起的市場波動無需過度恐慌，應冷靜尋找買點。", "industries": [{"name": "AI伺服器代工", "stance": "中性", "view": "關稅政策可能導致美國本土代工廠成本上升，而台灣代工廠可透過海外產線調配規避影響。"}, {"name": "半導體代工", "stance": "觀察", "view": "川普對晶片課稅的政策在執行上極為困難，可能面臨美國本土代工廠反彈及產業外流風險。"}, {"name": "軟體產業", "stance": "看多", "view": "美股近期呈現硬體評價下修、軟體評價上升的趨勢，台股開盤後相關軟體與代理商標的值得期待。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "view": "雖然面臨關稅政策的言論干擾，但明後年 EPS 已大致算好，股價下跌反而是合適的買點。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "觀察", "view": "近期股價隨市場對硬體評價的調整而出現波動。"}, {"symbol": "SMCI", "name": "美超微", "market": "US", "stance": "觀察", "view": "作為美國本土代工廠，若直接進口晶片可能面臨關稅直接打擊，降低其競爭力。"}], "quotes": ["躲掉一些潛在的崩跌起籌碼機會，對我們來講不一定是一個好事，因為每一次大跌都是產生買入的機會。", "關稅政策在執行上會遇到超多的問題，它很可能會自食惡果，甚至逼美國自己的代工產業外流。", "做股票不需要因為一些社會上的事件，跟家人、朋友或工作圈的人鬧翻，因為你講的每句話都有代價，而大多數的爭論都是不值得的。"], "ep_key": "EP528", "title": "EP528 | 🦖", "pubdate": "2025-02-01", "duration_s": 3105, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭首先分享了春節期間的家庭生活與車禍插曲，並藉此探討保險理賠的實務經驗。隨後，他深入分析了 DeepSeek 開源模型對 AI 產業帶來的衝擊。他指出，市場過去過度迷信「市場永遠是對的」，而 DeepSeek 證明了透過演算法優化（如 MoE 架構）能大幅降低 AI 訓練與推論成本。這將導致 AI 硬體面臨估值下修（de-rate），但同時會加速 AI 軟體應用的普及與滲透率，進而可能在未來反向刺激新一輪的硬體軍備競賽。因此，主持人表示其投資組合已全面轉向 AI 軟體股。", "topics": ["春節生活與車禍保險理賠經驗分享", "DeepSeek 開源模型對 AI 產業的衝擊與市場盲點", "AI 硬體估值下修（De-rate）與軟體股的重新估值（Re-rate）", "AI 軟硬體未來發展趨勢與投資組合調整", "聽眾 QA 問答（包含工作壓力、感情、個股與產業提問）"], "market_view": "市場並非永遠是對的，它經常會出現錯誤的定價，而這正是投資人尋找便宜標的的機會。", "industries": [{"name": "AI硬體", "stance": "觀察", "view": "短期內 EPS 雖有支撐，但面臨估值下修（de-rate）壓力，本益比可能從 30-50 倍修正至 15-20 倍。"}, {"name": "AI軟體", "stance": "看多", "view": "受惠於 AI 訓練與推論成本大幅下降，軟體應用的滲透速度將快於市場預期，迎來重新估值（re-rate）機會。"}, {"name": "機器人", "stance": "觀察", "view": "中國在機器人硬體製造領域具備類似電動車的補貼與競爭優勢，但核心大腦（AI 模型）仍是關鍵戰場。"}], "tickers": [{"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "view": "主持人提及自己擁有 Model X Plaid，並抱怨其高昂的保費與保險公司調漲保費的機制。"}, {"symbol": "META", "name": "Meta", "market": "US", "stance": "觀察", "view": "Meta 作為開源社群的代表，預期很快會吸收並推出類似 DeepSeek 的優化技術，帶動其開源生態系爆發。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "觀察", "view": "近期股價表現強勁，反映市場資金正流入 AI 相關軟體與基礎設施板塊。"}, {"symbol": "CRM", "name": "Salesforce", "market": "US", "stance": "觀察", "view": "作為 AI 軟體股代表之一，近期股價隨整體軟體板塊全面噴發。"}, {"symbol": "CFLT", "name": "Confluent", "market": "US", "stance": "觀察", "view": "近期股價出現明顯反彈，顯示軟體板塊的資金輪動與熱度回升。"}], "quotes": ["市場是反應未來，但很多人其實到現在都搞不清楚市場在反應未來。一個事件它已經出來之後，你瘋狂地去緬懷它、去討論它，沒有太多的價值。", "當你注意到市場本身是有週期、有循環、有一些短期的震盪變化的時候，你就越來越不會相信說市場是絕對有效率，以及市場永遠是對的。", "如果軟體沒有因為成本下降的利多而走起來的話，那反而就證明了整件事情越來越像一個 bubble。所以我自己接下來的調整是，全向的往軟體去做一個壓注。"], "ep_key": "EP527", "title": "EP527 | 🐾", "pubdate": "2025-01-29", "duration_s": 2997, "has_tr": true}, {"summary": "本集節目中，謝孟恭分享了近期對於 VR/XR 產業的觀察，特別是宏達電（HTC）與 Google 達成的 2.5 億美元交易案，分析其對宏達電未來轉型為設計與代工角色的潛在利多。此外，針對 AI 產業，他深入探討了中國 DeepSeek 推出開源模型 R1 對美國科技巨頭帶來的競爭壓力，並指出這可能促使微軟、Meta 等公司在資本支出（CapEx）上更加謹慎或持續擴大投入，同時建議投資人應設定移動停損以因應市場潛在的波動。", "topics": ["宏達電（HTC）與 Google 的 2.5 億美元交易案分析", "如何結合籌碼面與基本面頓化來觀察股價轉折", "中國 DeepSeek R1 開源模型對 AI 產業的衝擊", "美股科技巨頭（微軟、Meta）的資本支出（CapEx）趨勢", "AI 硬體與晶片投資的風險控管與移動停損策略"], "market_view": "美股科技巨頭的資本支出（CapEx）目前仍維持健康，只要輝達（NVIDIA）的財測與實際表現未低於預期，短期內大盤應無大礙，但需留意 DeepSeek 等競爭對手帶來的市場估值修正風險。", "industries": [{"name": "VR/XR", "stance": "觀察", "view": "宏達電若轉型為 Google 的設計與代工夥伴，對其財務與營運反而是個轉機。"}, {"name": "AI 晶片與硬體", "stance": "觀察", "view": "短期內受惠於科技巨頭持續投入資本支出，但需防範中國低成本開源模型帶來的估值修正，建議設定移動停損。"}], "tickers": [{"symbol": "2498", "name": "宏達電", "market": "TW", "stance": "觀察", "argument": "與 Google 的交易案短期內會有一波利多反應，若未來能成功轉型為代工與設計角色，對公司長期發展反而是好事。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "中性", "argument": "支付 2.5 億美元取得宏達電 XR 研發團隊與非專屬授權，用以強化自身的 XR 事業部。"}, {"symbol": "MSFT", "name": "微軟", "market": "US", "stance": "觀察", "argument": "傳出因應競爭對手進逼，開始對其 AI 相關的資本支出進行更嚴格的審查。"}, {"symbol": "META", "name": "Meta", "market": "US", "stance": "觀察", "argument": "內部對於 DeepSeek 的崛起感到恐慌，但 2025 年仍計畫大幅調高資本支出至 650 億美元以維持競爭力。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "持有中", "argument": "只要其 Guidance 與實際開出來的表現沒有 Miss，短期內 AI 晶片需求依然強勁，但個人已設定移動停損防範未然。"}], "quotes": ["基本面頓化是指當壞消息出來股價卻不再下跌，這時可能代表籌碼已經被特定人收走，是股價可能轉折的訊號。", "中國的競爭對手可以用極便宜的價格複製出類似的 AI 績效，這件事情終究會被市場當成非常重要的議題拿出來討論。", "技術指標就是一個機率，不要過度去迷信它，它是用來輔助你做判斷的工具。"], "ep_key": "EP526", "title": "EP526 | 🦤", "pubdate": "2025-01-25", "duration_s": 2997, "has_tr": true}, {"summary": "本集節目由 PlayStation 贊助。主持人謝孟恭分享了近期對台股與美股市場的觀察，特別是台灣大地震對晶圓代工廠（如台積電南科廠）的潛力影響，以及川普正式就職美國總統後，廢除拜登政府對 AI 的監管行政命令，對整體 AI 與科技產業帶來的利多。此外，他也探討了美股與台股供應鏈（如雷亞光電、Celastic、Celestica）在 AI 基礎建設與 ASIC 晶片發展下的未來趨勢，並建議投資人應保持對美國市場的敏感度。", "topics": ["PlayStation 5 Slim 與 Pro 的選擇建議", "台灣大地震對晶圓代工廠與台積電的影響", "川普就職總統後廢除 AI 監管命令對科技業的利多", "AI 晶片（ASIC）與 ODM/OEM 供應鏈的未來展望", "台股封關前的籌碼表現與過年抱股建議"], "market_view": "川普上任後廢除 AI 監管並推動去管制化，美股科技股與 AI 產業長期來看將迎來全面利多的發展機會。", "industries": [{"name": "晶圓代工", "stance": "觀察", "view": "地震雖對南科廠區造成短期影響，但多數損害可修復，對長期營收影響有限。"}, {"name": "人工智慧 (AI)", "stance": "看多", "view": "川普廢除監管命令並推動基礎建設，將加速 AI 算力成本下降與軟體應用的爆發。"}, {"name": "電動車", "stance": "中性", "view": "雖然川普可能削減補助，但電動車長期仍是必然趨勢，短期內會出現油電混合的過渡期。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "南科 Fabs 廠區受地震影響需進行調整，但預期損害可修復，對大資金而言非長期隱憂。"}, {"symbol": "CLS", "name": "Celestica", "market": "US", "stance": "觀察", "argument": "市場傳出 OpenAI 的 ASIC 晶片訂單最終可能由 Celestica 取得。"}, {"symbol": "雷亞光電", "name": "雷亞光電", "market": "TW", "stance": "觀察", "argument": "雖然目前營收表現不佳，但股價已提前反應未來一兩年 Google 光學與 CPO 的潛在貢獻。"}], "quotes": ["市場往往是後知後覺的，當大家都看懂某個趨勢並進場時，超額利潤的機會已經大幅減少。", "在股票市場中，不要去問為什麼某些沒營收的股票會漲，只要主力願意顧、買方願意買，股價就能被錢砸上去。"], "ep_key": "EP525", "title": "EP525 | 🐍", "pubdate": "2025-01-22", "duration_s": 2979, "has_tr": true}, {"summary": "本集節目由地標網通贊助。主持人謝孟恭分享了近期沉迷於《艾爾登法環》與《黑魂》系列遊戲的體驗，並談到助理 A 君在台股的學習與選股表現。針對台積電（2330）最新法說會，謝孟恭指出其財報與指引符合市場預期上緣，最大亮點在於大幅上修未來五年 AI 相關營收的年複合成長率（CAGR）至 45%（以 2024 年為基底），這等同於較前次指引翻倍。然而，他也提醒投資人，五年週期漫長，中間勢必會經歷半導體循環的下行調整，不應盲目梭哈。此外，他也看好未來中小型股在台股大盤扣除台積電後的表現機會。", "topics": ["地標網通贊助與手機優惠介紹", "主持人近期沉迷《艾爾登法環》與《黑魂》遊戲心得", "助理 A 君的台股選股與操作學習進度", "台積電（2330）法說會財報與未來指引深度解析", "AI 營收五年 CAGR 上修至 45% 的市場意涵", "台股大盤與中小型股的後市展望", "聽眾問答：閱讀興趣、任天堂概念股、CoWoS 封裝、遊戲產業與生活趣事"], "market_view": "台股扣除台積電後許多個股已大幅修正，未來一段時間中小型股的報酬率表現機會可能優於大型股。", "industries": [{"name": "晶圓代工", "stance": "看多", "view": "台積電法說會釋出強勁指引，特別是 AI 營收 CAGR 上修，顯示其產業龍頭地位無可動搖。"}, {"name": "AI 晶片/伺服器", "stance": "看多", "view": "AI 需求依然強勁，台積電大幅上修 AI 營收預期，驗證了 AI 產業的長期成長趨勢。"}, {"name": "遊戲產業", "stance": "中性", "view": "創意產業競爭激烈，博弈或內購遊戲雖賺錢但競爭大，獨立遊戲製作艱辛，投資需謹慎。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "法說會財報符合預期上緣，大幅上修 AI 營收五年 CAGR 至 45% 是最大亮點，但需注意長期仍有循環下行風險。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "看多", "argument": "黃仁勳證實產品迭代與 CoWoS 封裝調整，AI 晶片需求依然極為強勁。"}], "quotes": ["不要以為未來五年的 CAGR 這麼高就可以借錢梭哈，因為五年的時間跨度一定會包含半導體循環的下行段。", "當你發現大盤都在跌的時候，不一定是你的判斷有問題，而是整體的 Beta 不好，這時不要盲目去攤平或亂停損。", "先試著把商品做好，賺到錢之後，再去堅持你的藝術作品，這樣才能在創意產業中生存下來。"], "ep_key": "EP524", "title": "EP524 | 🎾", "pubdate": "2025-01-18", "duration_s": 2995, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭首先分享了對動畫《我獨自升級》與《鬼滅之刃》的觀影心得，並探討了作品中角色大叫設定的趣味性。隨後，他深入分析了近期市場上關於 NVIDIA 砍單 CoWoS-S 的傳言，指出這實為產品世代交替（從 Hopper 轉向 Blackwell）的正常產能調整，而非需求衰退，並對外資報告的解讀提出質疑。此外，他也討論了美國政府對中國 AI 晶片及 FinFET 技術的潛在封鎖政策，認為雖然短期會造成市場情緒波動，但科技巨頭與廠商終將找到繞過禁令的應對方案。最後，他透過聽眾問答，分享了對遠距離戀愛、夫妻育兒觀念衝突以及民主制度下個人背案規劃的看法。", "topics": ["動畫《我獨自升級》與《鬼滅之刃》觀影心得與角色設定討論", "NVIDIA 砍單 CoWoS-S 傳言解析與產品世代交替分析", "美國政府對中國 AI 晶片及 FinFET 技術封鎖政策之影響評估", "遠距離戀愛的因應策略與生涯規劃建議", "夫妻育兒觀念衝突時的溝通與妥協原則", "民主制度與政治局勢變化下的個人背案與資產配置規劃"], "market_view": "市場在下跌時往往會放大各種壞消息與謠言，但理解產業實質基本面與世代交替邏輯，才能在波動中保持冷靜。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "CoWoS-S 產能調整屬 Hopper 轉至 Blackwell 的正常世代交替，整體 AI 需求依然強勁。"}, {"name": "半導體代工", "stance": "看多", "view": "台積電等先進封裝產能持續供不應求，短期政策干擾不改長期競爭優勢。"}, {"name": "機器人/電動車", "stance": "觀察", "view": "市場開始關注特斯拉新 FSD、Optimus 放量及相關台股供應鏈的電機馬達題材。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "CoWoS-S 調整是為了將資源集中於 Blackwell (CoWoS-L)，且其擁有 DGX Cloud 等多元海外部署手段應對禁令。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "先進製程與封裝競爭力極強，若傳言屬實且嚴重，股價不會僅跌 2%，顯示市場聰明錢並未恐慌。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "創辦人重回多頭論調，市場焦點轉向其新 FSD、Optimus 機器人放量及供應鏈表現。"}, {"symbol": "5274", "name": "信驊", "market": "TW", "stance": "觀察", "argument": "面臨美系廠商競爭與估值修正壓力，但公司一直以來都在面對市場競爭。"}], "quotes": ["只要那些科技巨頭沒有去砍 CapEx（資本支出），只要他們沒有去降低採購，這絕對就不會是一個要去吃大便的訊號。", "在未知的時候是最恐怖的，當你已經可以認知一切事情之後，你就算後面遇到一些不好事情，你也不會太緊張，因為你知道到底發生什麼事情。", "每個人嘴巴長在他們身上，他一定會有意見。只要老婆給的建議不是那種很明顯違反醫囑或基本常識的，都是以老婆為主會比較好。"], "ep_key": "EP523", "title": "EP523 | 🥶", "pubdate": "2025-01-15", "duration_s": 3178, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭探討了洛杉磯野火事件引發的人性反思，並針對農曆春節將至的持股策略給出建議。他指出，長期而言持有資產（如股票、房地產）是抗通膨的必要手段，除非有極高槓桿，否則建議抱股過年。此外，他也觀察到科技巨頭如 Meta 在川普即將上任之際，開始調整其 DEI（多元、平等、包容）政策以順應民意與政治風向。針對大盤，他認為美股與台股皆進入震盪磨人的下行或整理階段，2025 年 CoWoS 雖維持成長，但 2026 年增速可能放緩，市場正處於資金與題材切換的敏感期。", "topics": ["洛杉磯野火事件與人性觀察", "農曆春節前的抱股過年策略與槓桿控制", "川普即將上任對科技巨頭 DEI 政策與風電產業的影響", "美股與台股大盤的下行與震盪走勢分析", "CoWoS 封裝產業在 2025 至 2026 年的成長性展望", "讀者問答：房地產投資、隔日沖應對、ASML 員工認股及個股看法"], "market_view": "美股與台股目前皆進入震盪磨人的下行或整理階段，市場缺乏新事件催化，估值偏高面臨修正壓力。", "industries": [{"name": "風力發電", "stance": "看空", "view": "川普上任後對風電產業態度不佳，相關補貼可能面臨調整，未來幾年產業前景較為艱難。"}, {"name": "半導體封裝 (CoWoS)", "stance": "中性", "view": "2025 年仍維持漂亮成長，但 2026 年年增率可能顯著放緩，需注意估值修正。"}, {"name": "房地產", "stance": "觀察", "view": "房市成交量已顯著萎縮，未來一兩年非熱門或大坪數物件可能出現跌價，或為較佳買點。"}], "tickers": [{"symbol": "META", "name": "Meta", "market": "US", "stance": "看多", "argument": "公司積極向右派與民意靠攏，暫停 DEI 計劃並調整人事，有助於其在川普任期內的營運發展。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "argument": "市場關注其成長增速是否能維持在超高水準，目前面臨高估值的考驗。"}, {"symbol": "ASML", "name": "艾司摩爾", "market": "US", "stance": "觀察", "argument": "雖然面臨中國禁令等短期逆風，但長期而言其半導體設備龍頭地位仍難以被取代。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "中性", "argument": "市場對 Model Y 改款 (Juniper) 期待已久，但改款通常僅能維持銷量，難以成為股價暴漲的單一催化劑。"}], "quotes": ["長期持有現金只會被通膨吃掉，在能力範圍內應盡可能持有股票或房地產等資產。", "Go woke, go broke。企業若過度強調 DEI 等意識形態而忽略本業與用戶需求，終將在市場上遭遇挫敗。", "在市場看不懂、震盪劇烈的時候，多做多錯，不如保持耐心、控制槓桿，等待趨勢明朗。"], "ep_key": "EP522", "title": "EP522 | 🦔", "pubdate": "2025-01-11", "duration_s": 3041, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了更換新麥克風 Shure MV7+ 的使用心得，並推薦了宇宙探索解謎遊戲《Outer Wilds》。針對近期市場，他指出台股在台積電創新高的帶領下，多軍展現進攻態勢。此外，他詳細分析了 2025 CES 展的亮點，特別是 NVIDIA 推出的 GB100 Superchip (Project Digits) 工作站與 RTX 50 系列顯示卡。他認為 Project Digits 補足了 NVIDIA 在邊緣運算與客製化工作站的拼圖，而 RTX 50 系列（如 5070、5090）具備極佳的性價比與 AI 補幀技術，將引發新一波換卡潮。最後，他解答了聽眾關於美股掛單抽單、加密貨幣持有狀況及 AI 語音生成技術等問題。", "topics": ["Shure MV7+ 麥克風更換心得與設定調整", "宇宙探索解謎遊戲《Outer Wilds》強烈推薦", "台股大盤走勢與台積電再創新高之看法", "2025 CES 展觀察：NVIDIA Project Digits 工作站與 GB100 晶片分析", "NVIDIA RTX 50 系列顯示卡性價比與 AI 補幀技術 (DLSS 4) 展望", "聽眾問答：美股掛單抽單、加密貨幣持有現況、AI 語音生成技術發展"], "market_view": "台股在台積電創新高的帶領下展現進攻態勢，多軍重拾信心，雖可能面臨震盪，但只要大盤未出現大吞噬 K 線，整體格局依然偏多。", "industries": [{"name": "半導體與 AI 晶片", "stance": "看多", "view": "NVIDIA 推出 GB100 晶片與 Project Digits 工作站，補足了邊緣運算與客製化 AI 訓練的市場需求。"}, {"name": "消費性電子 (顯示卡)", "stance": "看多", "view": "RTX 50 系列顯示卡定價具競爭力，搭配 DLSS 4 AI 補幀技術，預期將引發強烈的換卡需求。"}, {"name": "加密貨幣", "stance": "中性", "view": "比特幣等大幣具備實體經濟與地下匯兌的剛性需求，但目前市場可能已接近狂熱高點，需注意風險。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "台積電股價再創新高，是帶領台股多頭攻勢的核心要角。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "在 CES 展出 Project Digits 與 RTX 50 系列顯卡，展現強大的產品包裝、行銷能力與生態系護城河。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "在 NVIDIA 的 GB100 系統中，聯發科主要參與 Grace CPU 或 C2C 連接技術的開發。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "持有特斯拉等於買入美股最強的 humanoid 與自動駕駛題材，其車用 FSD 授權在商業競爭上比 NVIDIA 更具優勢。"}], "quotes": ["做創作或帶團隊，有時候你最沒想到會爆紅的東西，反而是大家最喜歡的；而你付出所有靈魂準備的內容，大家反應卻可能平平。", "AI 無用論到現在已經完全站不住腳，從資料中心到消費端顯卡，AI 軟體補強硬體的成效非常顯著，買鏟子的公司直接示範了 AI 的價值。", "在商業競爭角度，車廠付錢給 NVIDIA 買自駕方案，絕對好過付錢給競爭對手特斯拉，這讓 NVIDIA 在車用市場處於極佳位置。"], "ep_key": "EP521", "title": "EP521 | 🥝", "pubdate": "2025-01-08", "duration_s": 2933, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期觀看天文學家 Brian Cox 節目的心得，並探討了宇宙、生命與人類認知的關係。在投資方面，他深入回顧並總結了小股股（中小型股）與中大型動能股、題材股的交易邏輯差異。他指出，中大型股非常需要「市場共識」與資金堆砌，技術分析在其中扮演關鍵角色，操作上應偏向右側交易、汰弱留強，這與被動型 ETF（如 0050、VOO）的汰弱留強邏輯本質相同。最後，他強調了風險控制在長期投資與交易中的決定性作用。", "topics": ["Zero Halliburton 品牌行李箱贊助與優惠介紹", "近期動漫與天文學節目觀後感（Brian Cox 宇宙觀）", "小股股（中小型股）與中大型股交易邏輯的本質差異", "市場共識與資金堆砌對中大型股的影響", "被動型 ETF（0050、VOO）與主動交易汰弱留強邏輯的共通性", "風險控制與下檔控制在交易中的重要性", "聽眾問答：包含購車資金規劃、冒牌者症候群、創新高個股出場點等"], "market_view": "大盤在過去一年表現強勢，但下半年（特別是第四季）操作難度增加，投資人應注意市場共識的凝聚與資金流向，並嚴格控制風險。", "industries": [{"name": "ODM/伺服器代工", "stance": "中性", "view": "下半年整體進入軟掉的狀況，市場資金慢慢退去，需等待下一個共識凝聚。"}, {"name": "NAND Flash", "stance": "觀察", "view": "報價跌了很久後近期出現止跌回升跡象，市場資金開始尋找相關標的推升。"}], "tickers": [{"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "觀察", "argument": "其背後邏輯就是幫投資人做汰弱留強，將市值變小的剔除、變大的納入。"}, {"symbol": "VOO", "name": "Vanguard 標普500指數ETF", "market": "US", "stance": "觀察", "argument": "與台股 0050 類似，透過指數機制自動進行汰弱留強的被動管理。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "觀察", "argument": "近期在高檔橫盤整理，可觀察其橫盤區間下緣的無形支撐線作為調整依據。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "屬於市場高度關注且共識極強的標的，其資訊流通性極高。"}], "quotes": ["中大型股非常需要市場共識，大家共同在買單某一個故事，把估值推大到某個地方，這時技術分析與右側交易就顯得非常重要。", "主流中大型股非常切忌進行攤平，當一個東西你看錯，你就要接受你看錯，而不是一直去買變便宜的弱勢股。", "可以活得比較久的、能持續在市場上分享心得的人，他們很多都把風險擺在第一位，並且非常懂得控制自己的下檔風險。"], "ep_key": "EP520", "title": "EP520 | 🥯", "pubdate": "2025-01-04", "duration_s": 3078, "has_tr": true}, {"summary": "本集為 2025 年元旦首播，主持人謝孟恭回顧 2024 年的投資與生活，並展望 2025 年。他分享了過去兩年操作台股 50 億市值以下「小鬼股」的實戰心得，指出小鬼股具備流動性差、波動大、易受情緒與資金驅動等特性。他透過量化篩選、年報研究、實地訪查與股東會參與，發展出「在市場恐慌、流動性抽離時掛單撿便宜，並在市場狂熱時分批減碼」的逆向交易策略。此外，他也針對 AI 代理人（Agentic AI）趨勢、浸沒式散熱（Immersion Cooling）產業現況，以及 DSP 與 SerDes 晶片之技術差異進行了深入的分析與解答。", "topics": ["2024 年投資回顧與 2025 年展望", "台股小市值「小鬼股」的選股邏輯與實戰操作策略", "小鬼股的流動性風險、波動承受力與逆向交易技巧", "AI 代理人（Agentic AI）的產業走勢與硬體/軟體廠之競合關係", "浸沒式散熱（Immersion Cooling）在 AI 伺服器供應鏈的最新進展", "DSP（數位訊號處理器）與 SerDes（序列器/解序列器）晶片的技術原理與應用差異"], "market_view": "2024 年是令人滿意的一年，雖然有五成以上歸因於運氣，但做好風險與下檔控制，便能把握住市場給予的翻倍機會。", "industries": [{"name": "AI伺服器散熱", "stance": "觀察", "view": "浸沒式散熱在下一代產品（如 B100、B200、GB200）中，目前看來並未被 NVIDIA 導入，產業發酵時間需再觀察。"}, {"name": "AI 代理人 (Agentic AI)", "stance": "看多", "view": "AI Agent 是明年的重大趨勢，將有利於已掌握大量客戶與既有軟體服務的龍頭大廠進行功能升級與加值。"}, {"name": "光通訊/高速傳輸晶片", "stance": "看多", "view": "市場目前高度關注 1.6T 光通訊與 CPO 相關的傳輸晶片，其中 DSP 與 SerDes 晶片為核心關鍵。"}], "tickers": [{"symbol": "3661", "name": "世芯-KY", "market": "TW", "stance": "觀察", "view": "市場目前資金與題材多聚焦於光通訊與高速傳輸晶片（如 1.6T 升級），相關 ASIC 題材持續受到關注。"}, {"symbol": "2345", "name": "智邦", "market": "TW", "stance": "觀察", "view": "受益於交換器與光通訊模組升級趨勢，為市場持續追逐的網通大廠。"}, {"symbol": "6526", "name": "達發", "market": "TW", "stance": "看多", "view": "在 DSP 與 SerDes 晶片領域皆有深厚布局，是台股中技術實力強勁且估值高企的晶片設計公司。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "view": "在先進封裝與矽光子（CPO）技術上持續領先，並積極與客戶合作開發下一代傳輸技術。"}, {"symbol": "2388", "name": "威盛", "market": "TW", "stance": "中性", "view": "威盛的投片數字與合約負債等基本面數據已是市場共識，需注意利多是否已反映在股價中。"}], "quotes": ["你能夠改變的只有未來，你不能夠改變過去。不要花太多時間去糾結過去沒有做好的事情。", "小鬼股你只要願意去持波動的話，其實你會產生很多吃肉的機會。因為流動性極差，上去很快，下來有時候可以更快，會產生很多恐慌情緒，這就是撿便宜的機會。", "任何一個在金錢達標的都會這樣跟你講：金錢它最後你會認知到它就是一個 Token，它可以幫助你去實現你想要做的事情，但最後你最喜歡的東西不一定要花到很多錢。"], "ep_key": "EP519", "title": "EP519 | 💐", "pubdate": "2025-01-01", "duration_s": 3124, "has_tr": true}],TK={"3661": {"name": "世芯-KY", "market": "TW", "timeline": [{"ep": "EP659", "date": "2026-05-06", "stance": "看多", "argument": "與亞馬遜 Trainium 晶片高度綁定，股價表現強勢。"}, {"ep": "EP615", "date": "2025-12-03", "stance": "持有中", "argument": "與世芯-KY（M31）組成組合，雖然之前曾面臨重殺，但財報公布後盤後直接大拉，顯示美國市場反應較慢。"}, {"ep": "EP577", "date": "2025-07-23", "stance": "觀察", "argument": "聽眾問答提及，主持人認為其股價表現與公司經營能力需回歸整體績效評估。"}, {"ep": "EP559", "date": "2025-05-21", "stance": "觀察", "argument": "作為 ASIC 設計服務廠商，其與 AWS 等客戶的合作關係及未來是否採用 NVLink 技術值得持續關注。"}, {"ep": "EP542", "date": "2025-03-22", "stance": "觀察", "argument": "作為台股指標性 ASIC 業者，持續受到市場關注其在自研晶片市場的定位。"}, {"ep": "EP538", "date": "2025-03-08", "stance": "觀察", "argument": "在 ASIC 供應鏈中扮演重要角色，主要承接 Intel 等客戶的後端設計服務。"}, {"ep": "EP519", "date": "2025-01-01", "stance": "觀察", "argument": ""}], "mentions": 7, "latest_stance": "看多", "latest_date": "2026-05-06"}, "2345": {"name": "智邦", "market": "TW", "timeline": [{"ep": "EP592", "date": "2025-09-13", "stance": "觀察", "argument": ""}, {"ep": "EP530", "date": "2025-02-08", "stance": "觀察", "argument": "交換器與 AI 伺服器領域實力強勁，預期後續營運將開出不錯的成績，表現可能比散熱族群更強。"}, {"ep": "EP519", "date": "2025-01-01", "stance": "觀察", "argument": ""}], "mentions": 3, "latest_stance": "觀察", "latest_date": "2025-09-13"}, "6526": {"name": "達發", "market": "TW", "timeline": [{"ep": "EP663", "date": "2026-05-20", "stance": "觀察", "argument": ""}, {"ep": "EP519", "date": "2025-01-01", "stance": "看多", "argument": ""}], "mentions": 2, "latest_stance": "觀察", "latest_date": "2026-05-20"}, "2330": {"name": "台積電", "market": "TW", "timeline": [{"ep": "EP677", "date": "2026-07-08", "stance": "看多", "argument": "AI核心，儘管預期高，但長期仍看好其產業地位。"}, {"ep": "EP675", "date": "2026-07-01", "stance": "觀察", "argument": "受再平衡影響後開始反彈，其法說會將是接下來的市場關鍵事件。"}, {"ep": "EP673", "date": "2026-06-24", "stance": "持有中", "argument": "市場回檔時，部分資金會轉入台積電避險，但主持人認為中小股仍有機會。"}, {"ep": "EP671", "date": "2026-06-17", "stance": "觀察", "argument": "資金最終會回歸台積電，但時間點可能比預期晚，且其上漲可能伴隨其他股票的轉弱。"}, {"ep": "EP669", "date": "2026-06-10", "stance": "看多", "argument": "台積電漲價是合理且可預期的，有助於推升營收獲利數字，且不會採取暴力式漲價以維持與夥伴的長期關係。"}, {"ep": "EP668", "date": "2026-06-06", "stance": "觀察", "argument": "Mentioned in the context of past stock prices, not a current investment argument."}, {"ep": "EP667", "date": "2026-06-03", "stance": "看多", "argument": "晶圓代工龍頭，基本面強勁，有望受投信資金回流帶動。"}, {"ep": "EP665", "date": "2026-05-27", "stance": "中性", "argument": "分紅政策引發討論，但長期來看仍是台灣市場相對好的選擇。"}, {"ep": "EP664", "date": "2026-05-23", "stance": "觀察", "argument": "作為AI晶片生產的限制器，未來可  }else{
