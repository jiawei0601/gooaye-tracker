以把它整個弄到爆掉，所以我們就要放寬心。", "當大家都上車的時候呢，風向就變了。", "股票是在什麼時候最會漲？朦朧美的時候，大家算不到一個終局，大家不知道說它會紅多久，這種東西呢，你會注意到在市場裡面是特別噴的。", "資訊這種東西，你與其有所謂的100條線，然後這100條線都是雜訊，你不如有兩條超級純的，這兩條線就可以做股票，你根本不需要100個。"], "ep_key": "EP678", "title": "EP678 | 🎮", "pubdate": "2026-07-11", "duration_s": 3166}, {"summary": "主持人分享了關於年齡增長、育兒觀念的個人反思，並倡導平衡使用科技。他分析了當前股市，指出大盤從大型股轉向中小型股的輪動，以及市場領導地位的變化。他批評了聲稱能預測市場下跌的分析師，強調許多「壞消息」僅是短期雜訊或已知產業挑戰。主持人闡述其投資哲學，優先考慮長期、基本面驅動的策略，而非短期投機。他也深入探討AI科技產業趨勢，包括新產品潛在延遲及AI對就業影響的敘事演變，並回應聽眾關於市場展望和個人理財的問題。", "topics": ["個人生活與育兒哲學", "台股與全球市場動態", "投資心態與風險控管", "AI產業技術與發展挑戰", "市場資訊解讀與分析師角色", "槓桿操作與投機風險", "熊市與市場修正的應對", "長期投資與選股策略"], "market_view": "中性偏多，認為市場尚未走完，但需關注輪動與資金流向。", "industries": [{"name": "半導體", "stance": "看多", "view": "儘管有短期逆風和延遲，長期趨勢不變，仍是核心投資主軸。"}, {"name": "AI伺服器", "stance": "看多", "view": "仍是市場主流，但需注意短期波動和供應鏈的延遲問題。"}, {"name": "被動元件", "stance": "觀察", "view": "過去是法人主力，但目前多數進入修正，需觀察是否能持續反彈。"}, {"name": "功率元件", "stance": "看多", "view": "相對強勢，但市值較小，大型法人資金不易進入，需關注後續發展。"}, {"name": "軟體股", "stance": "看多", "view": "隨著AI發展，部分軟體股的敘事和基本面正在轉好，有機會表現。"}, {"name": "資安股", "stance": "看多", "view": "儘管市場曾有疑慮，但基本面強勁，且AI時代需求持續增長。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "AI核心，儘管預期高，但長期仍看好其產業地位。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "持有中", "argument": "AI核心強者，價格便宜且具成長潛力，長期持有。"}, {"symbol": "Tesla", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "偏信仰股，個人看好馬斯克及其公司發展，儘管有波動仍持有。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "個人最喜歡的軟體股之一，形態良好，若持續上漲會考慮加碼。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "持有中", "argument": "個人最喜歡的軟體股之一，形態良好，若持續上漲會考慮加碼。"}, {"symbol": "CLSK", "name": "CleanSpark", "market": "US", "stance": "持有中", "argument": "個人最喜歡的軟體股之一，形態良好，若持續上漲會考慮加碼。"}, {"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "觀察", "argument": "若資金從CPU轉出，可能會考慮轉向蘋果等巨頭。"}, {"symbol": "GOOG", "name": "Google", "market": "US", "stance": "觀察", "argument": "若資金從 TW", "stance": "中性", "argument": "本集節目贊助商，提供電動車充電服務。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "看空", "argument": "近期表現相對疲弱。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "看多", "argument": "近期表現良好。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "argument": "在降本增效和AI發展方面表現出色。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "觀察", "argument": "在AI邊緣運算有潛力，但需等待合適切入點；近期漲價值得關注。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "已出場", "argument": "為購買SpaceX而賣出部分持股。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "argument": "在市場表現不佳時仍有反彈。"}, {"symbol": "SpaceX", "name": "SpaceX", "market": "US", "stance": "持有中", "argument": "透過調節其他持股買入。"}, {"symbol": "MTK", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "主持人認為是許多人夢寐以求的工作地點。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "期貨在市場下跌時跌停，顯示有槓桿資金被迫平倉。"}, {"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "觀察", "argument": "許多人會投資的標的，今年仍有不錯的報酬率。"}, {"symbol": "006208", "name": "富邦台50", "market": "TW", "stance": "觀察", "argument": "許多人會投資的標的，今年仍有不錯的報酬率。"}], "quotes": ["「當你已經注意到說油價已經掉到這個位階，其實應該就已經在一個善後的階段。」", "「當財富效應正在發生擴張的時候，也就是可能盤面狂漲的時候，那大家會想說，理論上不是每個人都變有錢了嗎？特別像美國，幾乎大家都是上車嘛，因為他們有那個什麼401K啊什麼的。那所以應該你變有錢了，你就想多花錢。可是其實不一定是這樣子，因為在盤很好的時候，大家會認為說，我現在不把錢丟進去市場裡面的話，我的機會成本太高了，所以大家都會持續的往市場裡面丟。」", "「我會很難去想像說工作本身是會非常快樂的。只要這個工作本身它不會讓我覺得心理壓力很大，每天看到老闆，我就想他媽的給他一個走擊，或者說每天想到上班我就很憂鬱的話，那我會認為說，反正上班本身，我這樣問你一個話啦，誰是沒事去上班的？」"], "ep_key": "EP674", "title": "EP674 | 🦋", "pubdate": "2026-06-27", "duration_s": 3181}, {"summary": "本集節目主持人謝孟恭首先分享了他在全聯購買紅酒與白酒的經驗，並推薦了幾款性價比高的酒莊和葡萄品種。隨後，他轉向分析當前台股大盤，指出近期回檔是創新高後的正常休息，並非假突破或市場結構轉變，強調長期做多仍是獲利關鍵。他討論了被動元件、功率元件和半導體產業的現況，認為這些產業整體仍處於多頭格局，並預期被動元件將迎來新一波漲價。主持人也提及聯發科和博通的新晶片進展，以及記憶體產業的動態。最後，他分享了個人投資心態的轉變，強調獨立思考、不盲從市場情緒的重要性，並鼓勵聽眾為自己工作、為自己負責。", "topics": ["葡萄酒品鑑與推薦", "台股大盤分析與修正看法", "半導體產業動態與展望", "被動元件與功率元件趨勢", "個人投資心態與哲學", "韓國股市對全球市場的影響", "聯發科與博通新產品進展", "功能性訓練對身體的幫助"], "market_view": "台股近期回檔是創新高後的正常休息，市場結構未變，長期做多仍是關鍵。", "industries": [{"name": "被動元件", "stance": "看多", "view": "整體仍處於強勢多頭格局，預期將有新一波漲價，且需求緊俏。"}, {"name": "功率元件", "stance": "看多", "view": "整體形態仍非常漂亮，但需克服產能問題，才能開出營收獲利。"}, {"name": "半導體", "stance": "觀察", "view": "聯發科有新晶片獲得Google採用，博通也有新產品推出，顯示產業持續創新。"}, {"name": "記憶體", "stance": "已出場", "view": "主持人已很久沒有買進記憶體股票，轉向其他題材。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "市場回檔時，部分資金會轉入台積電避險，但主持人認為中小股仍有機會。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "持有中", "argument": "被動元件龍頭，本波修正幾乎未跌，顯示強勢。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "新晶片Triggerfish獲得Google採用，顯示其在開發上進展順利，但仍處於早期階段。"}, {"symbol": "AVGO", "name": "博通", "market": "US", "stance": "觀察", "argument": "推出新一代Wellfish晶片，是前一代Fish的雙頻版本，解決了市場對其產品迭代的疑慮。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "觀察", "argument": "前面漲幅已大，即使有利多消息也未必能再推動股價上漲。"}, {"symbol": "NOK", "name": "諾基亞", "market": "US", "stance": "觀察", "argument": "有轉型跡象，不再是單純的手機或基地台公司，開始切入光纖等新業務。"}, {"symbol": "LITE", "name": "光通", "market": "US", "stance": "已出場", "argument": "主持人已將光通的持股賣出，轉而買進CPU及其他股票。"}, {"symbol": "MRVL", "name": "邁威爾", "market": "US", "stance": "觀察", "argument": "主持人不將其歸類為純粹的光通訊公司。"}, {"symbol": "COHR", "name": "科希倫", "market": "US", "stance": "持有中", "argument": "主持人喜歡並持有該公司股票。"}, {"symbol": "LUMN", "name": "盧門", "market": "US", "stance": "持有中", "argument": "主持人喜歡並持有該公司股票。"}, {"symbol": "TER", "name": "泰瑞達", "market": "US", "stance": "持有中", "argument": "主持人喜歡並持有該公司股票。"}], "quotes": ["「投資最怕什麼？不是股票跌，而是買到那一種看起來很便宜的股票，結果買了一直跌一直壞掉，一直跌一直壞掉。」", "「終究你就是在市場裡面要持續的做多，你才會賺到錢。」", "「我希望大家有朝一日都可以走向這樣子的一個方向，就是為自己工作，為自己負責。」"], "ep_key": "EP673", "title": "EP673 | 🥬", "pubdate": "2026-06-24", "duration_s": 3057}, {"summary": "本集節目指出台股指數已創歷史新高，證實了主持人先前對修正結束的判斷。當前市場由AI伺服器需求驅動，特別是功率半導體產業，因歐美大廠交期過長，產生「排擠效應」使台灣二、三線供應商受惠。主持人強調，儘管頂級需求仍集中於歐美韓IDM，但產能瓶頸使台灣廠商獲得認證與出貨機會。同時，消費性與車用電子市場的疲軟，反而抑制了整體通膨，讓AI產業的成長得以持續。主持人也分享了在林口投資在地小生意的經驗，強調尋找有決心且願意投入的團隊。對於AI對軟體工程師的影響，他認為這是一個轉型而非淘汰，工程師將從重複性工作轉向更高層次的產品設計與問題解決，AI將作為生產力工具。整體投資策略應著重於觀察市場現象、適應變化，並專注於創造價值，而非預測未來。", "topics": ["台灣股市與總經展望", "功率半導體產業分析", "AI伺服器需求與供應鏈", "消費性及車用電子市場現況", "在地小型企業投資策略", "AI對軟體工程師職涯的影響", "投資哲學與市場輪動", "個人生活與健康議題"], "market_view": "台灣股市指數已創歷史新高，顯示先前的修正已結束，市場應以正向態度看待。", "industries": [{"name": "半導體", "stance": "看多", "view": "AI伺服器需求帶動功率半導體產業，歐美大廠交期過長使台灣供應商受惠，產能是關鍵瓶頸。"}, {"name": "AI伺服器", "stance": "看多", "view": "作為當前市場成長的主要驅動力，對特定零組件產生巨大需求，並帶動整個功率半導體供應鏈。"}, {"name": "消費性電子", "stance": "看空", "view": "市場表現疲軟，但這反而有助於抑制通膨，讓AI產業的成長得以持續而不致過熱。"}, {"name": "車用電子", "stance": "看空", "view": "與消費性電子類似，市場表現不佳，有助於維持整體經濟的穩定，避免AI帶來的過度通膨。"}, {"name": "被動元件", "stance": "觀察", "view": "部分大型被動元件表現強勁，但市場關注點已轉移，部分領域出現震盪。"}, {"name": "機器人", "stance": "觀察", "view": "仍處於萌芽階段，部分工業零件廠商的機器人相關營收有所增加，但需等待更實質的營收獲利驗證。"}, {"name": "生技股", "stance": "觀察", "view": "主持人表示不甚了解，認為許多公司缺乏營收獲利卻股價飆漲，屬於高風險的「深水區」投資。"}], "tickers": [{"symbol": "德州儀器", "name": "德州儀器", "market": "US", "stance": "觀察", "argument": "作為IDM大廠，其功率半導體產品交期長，是市場需求旺盛的指標之一。"}, {"symbol": "STM", "name": "意法半導體", "market": "other", "stance": "觀察", "argument": "作為IDM大廠，其功率半導體產品交期長，是市場需求旺盛的指標之一。"}, {"symbol": "安森美", "name": "安森美", "market": "US", "stance": "觀察", "argument": "作為IDM大廠，其功率半導體產品交期長，是市場需求旺盛的指標之一。"}, {"symbol": "國巨", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "大型被動元件公司，儘管市場關注點轉移，但仍表現強勁。"}, {"symbol": "蒙恬", "name": "蒙恬", "market": "TW", "stance": "觀察", "argument": "聽眾提及的股票，近期有顯著漲幅，但主持人未明確分析其基本面。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "看多", "argument": "主持人曾買入並意外獲得高報酬，顯示其在特定時期有強勁表現。"}], "quotes": ["你只要一直去追求說，要看誰準不準什麼的，你就注定要當韭菜給人家割，因為真的沒有人知道明天會發生什麼事情。大家都是在見招拆招。", "當一個東西已經正式的表態，然後開始一堆的媽法人衝進去的時候，就是所有的研究力量都在這邊。所以如果它是假貨的話，它會在未來的一陣子立刻就A下來。", "對我們來講，反正這個錢在市場裡面滾絕對是最快的啦，但如果說有一點餘裕可以稍微的去推一下在地的一些發展。"], "ep_key": "EP672", "title": "EP672 | 🐣", "pubdate": "2026-06-20", "duration_s": 3205}, {"summary": "主持人謝孟恭在本集節目中，首先回應了市場上對他個人和投資策略的誤解與攻擊 et）等新設計。"}, {"name": "載板", "stance": "看多", "view": "受惠於晶片雙拼（雙晶片封裝在同一載板上）等大顆晶片設計趨勢，載板產業後續仍有新的故事與成長空間。"}, {"name": "光通訊", "stance": "看多", "view": "雖然短期股價因市場獲利了結而回檔，但長期成長趨勢不變，未來仍是 AI 投資的重點領域。"}], "tickers": [{"symbol": "6756", "name": "威鋒電子", "market": "TW", "stance": "觀察", "view": "聽眾問答提及，主持人未特別表態。"}, {"symbol": "6531", "name": "愛普*", "market": "TW", "stance": "觀察", "view": "先前市場不看好，但隨著 Google TPU 採用其 IPD（整合被動元件）技術而重新獲得市場關注。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "view": "在 AI 晶片（ASIC）領域與 MediaTek 競爭，後續可能將 V10（Icefish）提前推出。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "view": "在客製化 AI 晶片領域與 Broadcom 競爭，雙方在不同世代的晶片中各有斬獲。"}, {"symbol": "6526", "name": "達發", "market": "TW", "stance": "觀察", "view": "聽眾問答提及，主持人未特別表態。"}], "quotes": ["所有你覺得很舒服的姿勢，它可能都是正在害你，因為你的身體已經忘記如何做正了。", "不要輕易把每個市場操作都當成白痴，當你看到供需失衡、價格上漲，大廠去現貨市場掃貨是合理的商業避險行為，而非單純的炒作。", "做股票要看遠方，就像飛機降落時不能只看眼前的跑道，要看遠處才能調整好姿態。吃大魚就要能忍受過程中的震盪。"], "ep_key": "EP663", "title": "EP663 | 🦘", "pubdate": "2026-05-20", "duration_s": 2998}, {"summary": "在本集節目中，主持人分享了其創投「曉南資本」在台灣獨立遊戲的投資進展，並感性分享二兒子出生前的健康波折與對台大兒醫施景中醫師的感謝。針對股市，主持人分析週五大盤大跌為急漲後的正常能量釋放，修正時間應不會太長，且目前並未感受到市場主力恐慌。他指出老 AI 股因毛利不如預期而大跌僅是短期研發投入的影響，並看好台積電在金管會放寬投信持股上限後的資金效應。此外，他看多美股資安板塊（如 CrowdStrike）及被動元件產業（如電阻、電容因大廠松下漲價及成本上升迎來漲價潮），並持續關注光通訊、成熟製程與功率元件。", "topics": ["曉南資本與台灣獨立遊戲投資進展", "感恩台大兒醫施景中醫師與個人家庭故事分享", "週五大盤大跌之大盤與總經局勢判斷", "老 AI 股毛利修正與台積電投信資金流向分析", "美股軟體與資安板塊（如 CrowdStrike）強勢表現", "被動元件（電阻、電容、MLCC）與功率元件漲價潮分析"], "market_view": "週五大盤大跌是急漲後的正常能量釋放，修正時間應該不會拖太長，且目前並未感受到市場主力恐慌。", "industries": [{"name": "半導體/台積電", "stance": "看多", "view": "金管會放寬投信持股上限，未來一兩個月投信修改條款後將有更多資金流入台積電。"}, {"name": "AI伺服器/老AI", "stance": "中性", "view": "老AI因毛利表現不如預期而修正，但這僅是短期研發與迭代成本上升，長期趨勢並未看空。"}, {"name": "資安/軟體", "stance": "看多", "view": "美股資安股如 CrowdStrike 逆勢創新高，軟體板塊在經歷修正後開始出現轉強訊號。"}, {"name": "被動元件", "stance": "看多", "view": "電阻因銀價上漲、電容因松下（Panasonic）大漲 SP-CAP 價格三成，預期將迎來全面漲價潮。"}, {"name": "功率元件/電源", "stance": "看多", "view": "新電源櫃對功率元件需求大增，美系大廠與日廠羅姆（Rohm）皆陸續調升價格。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "金管會放寬投信持股上限，預期未來一兩個月投信修改契約後將有新一波資金進駐。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "看多", "argument": "資安龍頭逆勢創下新高，顯示市場對資安需求的強勁與板塊的韌性。"}, {"symbol": "TEAM", "name": "Atlassian", "market": "US", "stance": "觀察", "argument": "軟體股板塊中被提及，可注意軟體股整體的集體表態。"}, {"symbol": "2404", "name": "漢唐", "market": "TW", "stance": "觀察", "argument": "先前毛利率下跌後又驚喜回升，用以佐證老AI毛利下跌可能僅是短期現象。"}, {"symbol": "8069", "name": "元太", "market": "TW", "stance": "觀察", "argument": "聽眾問答中提到已出場換股，主持人藉此討論停損與資金效率的重要性。"}, {"symbol": "8299", "name": "群聯", "market": "TW", "stance": "觀察", "argument": "聽眾問答中提到買入標的，主持人未對其基本面做深入表態。"}], "quotes": ["修正是一個很好的汰弱留強機會，市場會直接幫你挑出下一波的老大是誰。", "不要看過去，要看現在去哪個地方最快可以讓你翻倍，忽略沉沒成本在股市中非常重要。", "科技的進步是讓生產力躍升，但如何做出好產品、解決人的需求，這個核心永遠不會改變。"], "ep_key": "EP662", "title": "EP662 | ⛑️", "pubdate": "2026-05-16", "duration_s": 2999}, {"summary": "本集節目由 MIT 情趣精品 Haru 贊助。主持人謝孟恭分享了近期帶家人前往台中旅遊的體驗，特別提及他喜愛的餐廳 Pinocchio 以及對台中與林口房地產發展的看法。隨後，他分享了近期對紅酒研究的興趣，並透過 Wine Searcher 建立樣本來理解紅酒市場與品牌。針對大盤，他指出雖然近期市場波動讓部分投資人感到痛苦，但實際上大盤從 33,000 點一路上漲至 42,000 點，目前僅微幅回檔，多數身邊的投資人並未進行大幅度調整。此外，本集重點分析了被動元件（MLCC 與鋁電容）產業的強勁表現，指出高規格產品由日韓大廠主導，而台廠則受惠於排擠效應與中低階產品的需求，並對相關概念股進行了深入探討。", "topics": ["台中旅遊與林口房地產觀察", "紅酒研究與品牌市場分析", "台股大盤走勢與投資人心理", "被動元件（MLCC）產業供需與規格分析", "鋁電容產業趨勢與日台大廠表現"], "market_view": "大盤從 33,000 點一路上漲至 42,000 點，目前僅是微幅回檔，多數長期投資人並未進行大幅度調整，無須過度恐慌。", "industries": [{"name": "房地產", "stance": "觀察", "view": "林口與台中房市近年因人口移入與建設呈現爆發性成長，價格漲幅顯著。"}, {"name": "被動元件", "stance": "看多", "view": "MLCC 與鋁電容產業需求強勁，高階產品由日韓主導，台廠則受惠於排擠效應與中低階需求，漲價趨勢明確。"}], "tickers": [{"symbol": "6207", "name": "雷科", "market": "TW", "stance": "觀察", "view": "被動元件設備商，受惠於整體產業需求回溫。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "看多", "view": "台廠 MLCC 龍頭，雖然高階 47uF 規格僅有日韓大廠一半的產能（主攻 22uF），但仍受惠於產業排擠效應與漲價潮。"}, {"symbol": "2492", "name": "華新科", "market": "TW", "stance": "看多", "view": "受惠於 MLCC 產業整體復甦與漲價趨勢。"}, {"symbol": "2428", "name": " ": "大盤強勢指標，即使一般人無法進台積電工作，也能透過買入股票成為股東分享利潤。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "散熱材料調整傳聞不影響其長期霸主地位，CoWoS 產線亦已復線。"}, {"symbol": "5347", "name": "世界先進", "market": "TW", "stance": "看多", "argument": "成熟製程產能被客戶搶光，甚至有海外客戶願意加價包下產能，展望極佳。"}, {"symbol": "6488", "name": "環球晶", "market": "TW", "stance": "觀察", "argument": "法說會內容雖普通，但股價表現強勢，反映矽晶圓板塊轉強。"}, {"symbol": "2379", "name": "瑞昱", "market": "TW", "stance": "觀察", "argument": "近期股價強勢鎖漲停，反映消費性晶片與網通板塊的拉貨效應。"}, {"symbol": "3034", "name": "聯詠", "market": "TW", "stance": "觀察", "argument": "驅動IC板塊轉強，股價強勢鎖漲停。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "因連續漲停被列入處置股，引發外資與大戶對大市值股處置機制的抱怨。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "中性", "argument": "雖然財報指引普通導致股價重摔，但主持人認為公司本質並無太大問題。"}, {"symbol": "VSH", "name": "Vishay", "market": "US", "stance": "看多", "argument": "美股被動元件大廠，受益於被動元件產業提前復甦。"}, {"symbol": "VPG", "name": "Vishay Precision Group", "market": "US", "stance": "看多", "argument": "美股被動元件相關標的，隨產業趨勢轉強。"}], "quotes": ["抱怨世界不公平沒有意義，你要麼加入他們（買入科技股），要麼就繼續抱怨。", "這波消費性與成熟製程的拉貨，可能只是恐慌性提前備貨，而非終端需求真正復甦，下半年要注意動能是否放緩。", "券商限貸與融資收傘，並非市場槓桿過高，而是因為大盤漲太多，資產市值暴增觸及了券商的法規上限。"], "ep_key": "EP660", "title": "EP660 | 🍄‍🟫", "pubdate": "2026-05-09", "duration_s": 3092}, {"summary": "本集節目中，主持人首先分享了個人的減重與功能性健身訓練心得，強調身體掌控度提升帶來的正面影響。隨後深入分析科技產業動態，指出被動元件產業在高階需求吃緊下，台廠受惠於 AI 伺服器與訂單排擠效應而轉強。此外，CPU 與 ASIC 產業趨勢依舊強勁，AMD 展望樂觀，台股 ASIC 族群如世芯、創意等持續輪動。主持人也對聯發科大漲後的估值提出看法，並分享其在美股軟體股（如 Palantir、CrowdStrike）的布局，最後提出在當前高斜率盤勢下適度降槓桿的交易策略。", "topics": ["主持人近期減重與功能性健身訓練心得", "被動元件產業因 AI 伺服器與訂單排擠效應轉強", "CPU 與 ASIC 產業趨勢與台美股相關標的表現", "聯發科大漲後的估值與未來展望", "總體盤勢看法與槓桿調整策略", "Palantir 財報與企業級 AI 應用（避免 AI Slop）", "軟體股與硬體股（如工業電腦）的強弱勢對比"], "market_view": "盤勢斜率極高，即便出現回檔修正，預期也會很快出現反彈，目前操作上會適度進行降槓桿。", "industries": [{"name": "被動元件", "stance": "觀察", "view": "高階被動元件供需吃緊，台廠主要受惠於 AI 伺服器帶來的訂單排擠與溢出效應。"}, {"name": "半導體/CPU", "stance": "看多", "view": "AI 應用與伺服器工作負載持續推升 CPU 需求，AMD 與 Intel 展望樂觀。"}, {"name": "ASIC", "stance": "看多", "view": "台股 ASIC 類股持續輪動，世芯受惠於亞馬遜 Trainium 晶片，創意受惠於 Google TPU。"}, {"name": "IC設計", "stance": "中性", "view": "聯發科股價已快速反應未來預期，短期內可能需要時間橫盤整理。"}, {"name": "企業軟體", "stance": "看多", "view": "看好具備解決企業精準度問題、避免 AI 垃圾內容（AI Slop）的龍頭軟體股。"}, {"name": "矽晶圓", "stance": "觀察", "view": "矽晶圓產業週期預期將開始往上。"}, {"name": "晶圓代工", "stance": "觀察", "view": "成熟製程廠房產能利用率高，甚至有供不應求的狀況。"}], "tickers": [{"symbol": "2327", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "董事長陳泰銘舉辦 AI 大會，帶動被動元件板塊轉強。"}, {"symbol": "2492", "name": "華新科", "market": "TW", "stance": "觀察", "argument": "旗下新昌電因出貨交期拉長通知激勵股價漲停，帶動族群效應。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "股價快速反應預期，可能已漲得有點太滿，預期會橫盤整理一陣子。"}, {"symbol": "3661", "name": "世芯-KY", "market": "TW", "stance": "看多", "argument": "與亞馬遜 Trainium 晶片高度綁定，股價表現強勢。"}, {"symbol": "3443", "name": "創意", "market": "TW", "stance": "看多", "argument": "與 Google TPU 合作關係緊密，先前已提前發動。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "看多", "argument": "上修伺服器 CPU TAM，對市佔率與 AI 營收能見度極具信心。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "法說會提及生成式 AI 工作負載推升 CPU 需求。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "財報表現佳，其 FDE 模式能協助企業降低 AI 產生垃圾內容（AI Slop）的風險。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "持有中", "argument": "屬於主持人看好並長期持有的美股軟體標的之一。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "argument": "屬於主持人看好並長期持有的美股軟體標的之一。"}, {"symbol": "ASAN", "name": "Asana", "market": "US", "stance": "觀察", "argument": "主持人有在觀察，但認為其在軟體股中表現相對較弱。"}, {"symbol": "6451", "name": "訊芯-KY", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及標的，主持人未深入評論。"}, {"symbol": "6488", "name": "環球晶", "market": "TW", "stance": "觀察", "argument": "矽晶圓產業週期預期將開始往上。"}, {"symbol": "5347", "name": "世界先進", "market": "TW", "stance": "觀察", "argument": "成熟製程產能利用率高，廠房產能甚至已賣光。"}], "quotes": ["現在的網路就是大家都宣稱自己有傳說廚具，但我們至今還沒有看到傳說料理的誕生。", "我寧願等到派對開到一半，警察進來臨檢，大家一起被帶回派出所，也不要在派對結束前就自己先走掉。"], "ep_key": "EP659", "title": "EP659 | 🦤", "pubdate": "2026-05-06", "duration_s": 3105}, {"summary": "在本集節目中，主持人謝孟恭分享了對5月大盤走勢的看法，認為4月的漲勢過於瘋狂，後續高機率會迎來健康的回檔修正。在產業方面，他深入探討了軟體股與AI的關係，指出市場對AI取代軟體工程師與SaaS服務的擔憂過度，並看好 Atlassian、Cloudflare、CrowdStrike 與 Palantir 等具有實質產品交付能力的軟體公司。此外，針對台積電先進封裝研發主管轉戰聯發科的新聞，他分析了聯發科與 Google TPU 的先進封裝供應鏈佈局，並在聽眾問答中建議利用股票質押解決出國留學的資金需求。", "topics": ["5月大盤走勢展望與回檔修正預期", "軟體產業與AI發展的關係：SaaS末日論是否過譽", "軟體股財報與實質產品交付能力分析", "台積電先進封裝主管轉戰聯發科的產業影響", "Google TPU 先進封裝供應鏈（CoWoS 與 EMIB）佈局", "聽眾問答：ASIC 與 GPU 的共存關係、記憶體模組產業循環、股票質押資金調度"], "market_view": "4月的漲勢過於瘋狂，預期5月或後續高機率會迎來一波健康的回檔修正（上課的機會）。", "industries": [{"name": "軟體/SaaS", "stance": "看多", "view": "市場對AI取代軟體工程師與SaaS服務的擔憂過度，看好具備實質產品交付與客製化部署能力的軟體公司。"}, {"name": "半導體先進封裝", "stance": "看多", "view": "先進封裝（如CoWoS）需求持續強勁，聯發科與Google等大廠正積極佈局多元封裝供應鏈以確保產能。"}, {"name": "記憶體", "stance": "觀察", "view": "基本面確實好轉且面臨缺貨，但台灣記憶體類股的股價反應通常較美股市場慢。"}], "tickers": [{"symbol": "TEAM", "name": "Atlassian", "market": "US", "stance": "看多", "argument": "財報表現優異，席位不減反增，打破了市場對SaaS服務因AI而萎縮的悲觀預期。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "看多", "argument": "在AI時代，其派遣工程師協助客戶部署AI的顧問模式反而成為競爭優勢。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "argument": "屬於主持人長期看好並持有的核心軟體股之一。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "持有中", "argument": "屬於主持人長期看好並持有的核心軟體安全股之一。"}, {"symbol": "ADBE", "name": "Adobe", "market": "US", "stance": "觀察", "argument": "雖然面臨生成式AI的競爭壓力，但專業設計領域仍具備高黏著度，估值修正後可持續觀察。"}, {"symbol": "CRM", "name": "Salesforce", "market": "US", "stance": "看多", "argument": "創辦人領導力強，積極導入Agentforce與無頭架構，轉型速度快。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "挖角台積電先進封裝主管，顯示其在先進封裝與ASIC晶片佈局上的野心。"}, {"symbol": "3035", "name": "智原", "market": "TW", "stance": "觀察", "argument": "法說會預估2027年ASIC市佔率達10-15%，市場預期與評價分歧，需持續觀察。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "大廠自研ASIC晶片並不會威脅其龍頭地位，兩者在AI市場中為共存關係。"}], "quotes": ["不要因為看到某個環節可以被AI加速，就輕易宣判整個產業或職業的死亡，產品的最終交付與責任承擔才是關鍵。", "股票質押是一個非常低成本且靈活的資金調度工具，能讓你在不賣出核心資產（如台積電）的情況下取得流動性。", "市場悲觀時往往會過度放大擔憂，此時關注公司的實際財務數據與產品交付，比聽信創投圈的哲學性言論更靠譜。"], "ep_key": "EP658", "title": "EP658 | 🪿", "pubdate": "2026-05-02", "duration_s": 2997}, {"summary": "本集節目中，主持人分享了與鄰居醫生的趣味靈異故事。市場方面，台積電近期面臨外資強大賣壓，大盤呈現「拉積盤」與中小板塊輪動的格局，但台積電與聯發科的長線高點應尚未抵達。此外，記憶體板塊（如旺宏）與被動元件板塊近期迎來報價上漲與強勢反彈。產業技術方面，主持人指出 Intel 的 EMIB 封裝良率已達 90%，市場因載板良率低估了其進度，這將有利於 Intel 後續爭取封裝訂單並帶動相關供應鏈。最後，Meta 大舉向 AWS 採購 Graviton 5 晶片，顯示 CPU 需求依然火熱。", "topics": ["鄰居醫生的靈異體質與家中的玩具收藏趣事", "台積電面臨外資賣壓與台股「拉積盤」效應", "記憶體與被動元件板塊的報價上漲與反彈契機", "Intel EMIB 封裝良率達 90% 的產業內幕與載板誤區", "Meta 與 AWS 簽訂 Graviton 5 晶片大單對 CPU 供應鏈的影響", "主動型與被動型 ETF 的選擇與槓桿操作風險示警"], "market_view": "台積電面臨外資短期賣壓導致大盤出現拉積盤與中小群體輪動，但長線高點應尚未抵達。", "industries": [{"name": "半導體", "stance": "看多", "view": "台積電與聯發科長線看好，Intel 封裝良率超預期將帶動相關供應鏈。"}, {"name": "記憶體", "stance": "觀察", "view": "經歷長期低迷後出現集體反彈，旺宏董事長釋出超級利多，產品線迎來漲價。"}, {"name": "被動元件", "stance": "觀察", "view": "台廠表現落後外國同業，但近期出現報價上漲與補漲行情。"}, {"name": "AI伺服器/雲端", "stance": "看多", "view": "Meta 大舉採購 AWS Graviton 5，CPU 需求依然火熱。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "雖然面臨外資短期賣壓，但長線高點尚未抵達。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "看多", "argument": "表現非常強勢，長線目標價仍有想像空間。"}, {"symbol": "2337", "name": "旺宏", "market": "TW", "stance": "觀察", "argument": "董事長法說會釋出超級利多，MCU 與 NOR Flash 迎來漲價。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "EMIB 封裝良率達 90% 已可量產，市場因載板問題低估其封裝實力。"}, {"symbol": "6531", "name": "愛普*", "market": "TW", "stance": "觀察", "argument": "為 Intel 載板提供 IPD，受益於 Intel 封裝進度。"}, {"symbol": "META", "name": "Meta", "market": "US", "stance": "觀察", "argument": "與 AWS 簽訂大單部署 Graviton 5，顯示 CPU 需求強勁。"}], "quotes": ["主動型基金長期很難打敗大盤，對於大多數人，最樸實無華的選擇依然是 0050、006208 或 VOO 等被動型 ETF。", "開槓桿必須設定停損點，不要在槓桿開大時還硬凹，因為市場總有一天會逼你認輸。", "Intel 的 EMIB 封裝良率其實已達 90% 可量產階段，市場先前因載板良率低而低估了其後端封裝能力。"], "ep_key": "EP657", "title": "EP657 | 🐫", "pubdate": "2026-04-29", "duration_s": 3023}, {"summary": "本集節目中，主持人分享了近期調整資產配置的心路歷程。因應台股週四的大幅回檔與週五的反彈，他進行了歷來最大幅度的持股調整，並大舉加碼台積電。主因是金管會放寬投信單一持股上限至 25%，預期將引發投信大舉補部位（估計需買進十萬張以上），這可能導致資金排擠效應，形成「拉積盤」，使中小型股面臨修正壓力。此外，美股 CPU 類股因生成式 AI 需求全面噴出，但主持人提醒市場對於 CPU 與 GPU 配比可能過度樂觀。Google 新一代 TPU 晶片（8T/8I）的發表也帶動 Broadcom 與聯發科（MTK）的討論，聯發科更因此連拉三根漲停。", "topics": ["主持人近期大舉調整持股與加碼台積電的策略", "金管會放寬投信持股上限至 25% 對台積電與大盤的影響", "美股 CPU 類股大漲及生成式 AI 對 CPU 需求的真實配比觀察", "Google TPU 8T/8I 發表，聯發科與博通在 Training/Inference 的分工與展望", "減肥藥物 Mounjaro 的使用心得與副作用分享"], "market_view": "大盤在經歷週四壓力測試後反彈，金管會放寬投信持股上限將有利台積電，但需注意資金排擠導致中小型股下跌的「拉積盤」效應。", "industries": [{"name": "AI伺服器/CPU", "stance": "觀察", "view": "CPU類股全面噴出，但市場傳言CPU與GPU配比達1:1過於樂觀，實際觀察約為2:11或4:1。"}, {"name": "ASIC/TPU", "stance": "看多", "view": "Google發表TPU 8T/8I，聯發科負責Training、博通負責Inference，兩者出貨量預期相當，看好後續表現。"}, {"name": "半導體代工", "stance": "看多", "view": "台積電受惠於政策放寬投信持股上限，預期將有大量被動與主動資金流入，且估值相較其他AI股仍屬便宜。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "因金管會放寬投信持股上限至25%，預期投信將大舉買進補齊部位，且以明年EPS估算目前估值仍便宜。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "看多", "argument": "在Google TPU 8T/8I中負責Training晶片設計，近期股價強勢連拉三根漲停。"}, {"symbol": "AVGO", "name": "博通", "market": "US", "stance": "看多", "argument": "在Google TPU合作中負責Inference部分，與聯發科共同瓜分新一代TPU商機。"}, {"symbol": "INTC", "name": "英特爾", "market": "US", "stance": "觀察", "argument": "財報數字與展望不錯且準備漲價，帶動整體CPU板塊大漲。"}], "quotes": ["在市場上漲時不要預設高點，因為有時會漲到你難以想像的劇情。", "投信持股上限放寬到25%等於是幫台積電解鎖封印，但要注意中小型股可能會因為資金排擠而被狂賣。", "投資交易本來就是會有賺有賠，最重要的是整體部位是賺錢的，並且在機會明確時要積極參與。"], "ep_key": "EP656", "title": "EP656 | 🍇", "pubdate": "2026-04-25", "duration_s": 2999}, {"summary": "本集節目中，主持人謝孟恭分享了2026年4月台股與美股市場的強勁表現，台指期甚至一度衝上3萬8千點。他分享了自己近期在體重管理、網球訓練與機能性訓練上的進展與心得。在投資方面，他指出4月份市場極度瘋狂，許多交易員與朋友的月報酬率（MTD）高達50%甚至翻倍，這讓他產生了「汰慢留快」的FOMO心理。他分析了資金規模對報酬率的限制，並觀察到記憶體與被動元件產業在台、美、日、韓市場的強弱分化。最後，他針對供應鏈中VR產品可能遞延的傳聞進行分析，並更新了Marvell（美滿電子）在MPU與聯發科在ASIC/客製化晶片領域的最新動態。", AI 應用的 Token 消耗與實質變現能力反思（以 Uber 為例）"], "market_view": "美股與台股大盤皆處於極強的多頭格局，任何拉回都是買點。", "industries": [{"name": "半導體", "stance": "看多", "view": "台積電展望極佳，Blackwell 晶片出貨將帶動強勁拉貨潮。"}, {"name": "被動元件", "stance": "看多", "view": "全球被動元件（MLCC）全面噴發，行業復甦訊號明確。"}, {"name": "記憶體", "stance": "中性", "view": "價格上漲但台股相關標的走勢疲弱，資金可能已轉移。"}, {"name": "光通訊", "stance": "觀察", "view": "目前資金過度集中，若轉弱資金可能流向記憶體或被動元件。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "法說會展望極佳，資本支出達上限顯現強烈信心，未來仍有上修空間。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "法說會對 CPU 催化劑態度保守，但 MLCC 供需改善符合預期。"}, {"symbol": "6548", "name": "長華科", "market": "TW", "stance": "已出場", "argument": "股性較慢因而減碼換股，但目前確實處於便宜的評價區塊。"}, {"symbol": "2404", "name": "漢唐", "market": "TW", "stance": "觀察", "argument": "近期股價強勢表態，發動時間點令人意外且有趣。"}, {"symbol": "8358", "name": "金居", "market": "TW", "stance": "觀察", "argument": "基本面表現良好且市場看好，但股價已整理盤整許久。"}, {"symbol": "VSH", "name": "Vishay", "market": "US", "stance": "看多", "argument": "股價強勢大噴發，反映全球被動元件市場的強勁復甦。"}, {"symbol": "VPG", "name": "Vishay Precision Group", "market": "US", "stance": "看多", "argument": "身為 Vishay 旗下公司，也已做好隨之起飛的準備。"}, {"symbol": "ETN", "name": "Eaton", "market": "US", "stance": "看多", "argument": "股價出乎意料地強勢拉出，顯示整體電力與被動元件板塊動能強勁。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "目前漲幅落後，但若未來 CPU 出現嚴重缺貨，將具備漲價題材。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "觀察", "argument": "目前漲幅落後，但若未來 CPU 出現嚴重缺貨，將具備漲價題材。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "Blackwell 晶片準備出貨且產能利用率極高，拉貨效應將非常恐怖。"}, {"symbol": "UBER", "name": "Uber", "market": "US", "stance": "觀察", "argument": "短期內大量消耗 AI Token 顯示需求強勁，但仍需觀察實質財務回報。"}], "quotes": ["健康是前面那個 1，財富與工作都是後面的 0，沒有健康一切都是零。", "多頭市場的拉回，不論跌勢多恐怖，都是尋找支撐做多的好機會。", "AI 時代不能只看 Token 消耗量（Token Maximizer），最終還是要回歸實質的財務回報（Result-based）。"], "ep_key": "EP654", "title": "EP654 | 🌵", "pubdate": "2026-04-18", "duration_s": 2999}, {"summary": "本集節目中，主持人謝孟恭分享了其充滿彈性、容易對新事物產生好奇但隨後又失去興趣的性格特質，並以此延伸討論了過動症（ADHD）特質在探索世界時的正面意義。在市場分析方面，主持人指出當前美股與台股大盤走勢極佳，屬於「搶錢的行情」，建議投資人好好把握多頭。他特別看好台積電的長期上檔空間，並詳細解析了聯發科與Google在AI晶片（V8、V9）上的深度合作，認為這將為聯發科帶來顯著的EPS貢獻與估值重估（Re-rating）機會。此外，他也提及被動元件產業因CPU等硬體需求爆發而出現的漲價潮，值得密切觀察。", "topics": ["個人性格特質與過動症（ADHD）特質的正面思考", "美股與台股大盤的強勁多頭走勢與投資策略", "台積電（2330）的估值分析與未來上檔空間", "聯發科（2454）與Google在AI客製化晶片（ASIC）的深度合作與前景", "Marvell（MRVL）與Google合作對Broadcom及聯發科的影響", "被動元件產業（如太陽誘電、國巨）的漲價潮與背後硬體需求驅動力", "聽眾問答：育兒經驗、美股主要持股、趨勢判斷方法及AI Token價格走勢"], "market_view": "當前美股與台股大盤走勢極佳，屬於「搶錢的行情」，建議投資人好好把握多頭、積極參與。", "industries": [{"name": "半導體/AI晶片", "stance": "看多", "view": "台積電上檔空間仍大，聯發科與Google合作的AI晶片將帶來極大貢獻。"}, {"name": "被動元件", "stance": "觀察", "view": "因CPU等硬體需求爆發出現漲價潮，國巨創歷史新高，需觀察缺貨潮能否持續。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "市場預估明後年EPS可達130-140元，給予20倍本益比，股價看2800元並非不可能，上檔空間仍大。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "看多", "argument": "與Google合作的AI晶片（V8、V9）預期出貨量極大，有望在3-4年內貢獻超過一半的EPS，帶來估值重估機會。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "argument": "成為Google晶片設計的新合作夥伴，開發TIA等晶片，顯示AI市場為藍海而非零和競爭。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "在ASIC設計領域極強，雖然Google引入新夥伴，但對其影響有限，整體AI市場持續擴大。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "受惠於被動元件漲價潮，股價創下歷史新高，後續需觀察整體族群是否全面啟動。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "持有中", "argument": "主持人透露其美股主要持股之一，屬於CPU板塊的配置。"}, {"symbol": "ARM", "name": "ARM", "market": "US", "stance": "持有中", "argument": "主持人透露其美股主要持股之一，看好其在CPU領域的長期發展。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "持有中", "argument": "主持人透露其美股主要持股之一，作為CPU板塊的重要配置。"}, {"symbol": "LITE", "name": "Lumentum", "market": "US", "stance": "持有中", "argument": "主持人透露其美股主要持股之一，屬於光通訊板塊。"}, {"symbol": "COHR", "name": "Coherent", "market": "US", "stance": "持有中", "argument": "主持人透露其美股主要持股之一，同樣屬於光通訊相關配置。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "argument": "主持人透露其美股主要持股之一。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "argument": "主持人透露其美股主要持股之一。"}], "quotes": ["在多頭行情中，該咬的都要咬到，部位該上的就是要上好上滿，不要因為害怕高點而錯失機會。", "AI是一個藍海市場，不要覺得有新玩家加入，其他人就得死，大家其實都可以獲得對應的市場份額。", "會傷害你的人，通常都是你最相信、最愛的人；在投資上，要抱得住股票，必須對它有足夠的理解與信仰。"], "ep_key": "EP653", "title": "EP653 | 🕊️", "pubdate": "2026-04-15", "duration_s": 2999}, {"summary": "本集節目中，主持人謝孟恭分析了近期中東地緣政治對市場的影響，指出利空消息已逐漸鈍化，台股維持強勢多頭，美股則回檔至季線支撐。在產業方面，AI 算力需求依然強勁，除了 GPU 外，CPU 的調度與客製化 ASIC 需求也大增，甚至出現 CPU 短缺現象。此外，被動元件（如鉭質電容、高階 MLCC）因 AI 伺服器需求出現嚴重缺貨，後續市況看好。光通訊產業則出現美系大廠自帶設備委託台灣代工廠（如具備 SMT 產線者）生產的新趨勢。", "topics": ["中東局勢與台美股大盤走勢分析", "AI 時代下 CPU 與客製化 ASIC 的算力短缺商機", "Anthropic 發表新模型 Mythos 與 AI 新創的算力瓶頸", "被動元件產業復甦：鉭質電容、鋁電容與高階 MLCC 缺貨潮", "光通訊產業新趨勢：美系大廠自帶設備委託台灣 SMT 廠代工", "個股操作策略：盤中跌幅應對與加碼、減碼的風險管理"], "market_view": "台股維持強勢多頭並創新高，美股回檔至季線若能守住則修正可能結束。", "industries": [{"name": "半導體/AI晶片", "stance": "看多", "view": "AI 時代除了 GPU，CPU 的調度與客製化 ASIC 需求也大增，出現供不應求與短缺現象。"}, {"name": "被動元件", "stance": "看多", "view": "鉭質電容、鋁電容與高階 MLCC 因 AI 伺服器需求嚴重缺貨，看好後續報價上漲與產業復甦。"}, {"name": "光通訊", "stance": "看多", "view": "需求持續強勁，且出現美系大廠自帶設備委託台灣具 SMT 產線之廠商代工的新趨勢。"}, {"name": "SaaS/軟體", "stance": "觀察", "view": "長期持有中，等待下一波行情，短期受 AI 模型更新消息影響波動。"}], "tickers": [{"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "持有中", "argument": "光通訊需求強勁，帶動第二季美股持股部位快速回升並創新高。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "看多", "argument": "受惠於 AI 時代下高階傳輸與 CPU/ASIC 的強勁需求。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "argument": "入股 RISC-V 公司 SiFive，顯示其在 AI 時代對 CPU 架構的重視。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "目前線形不佳，且面臨新工廠、平價車款與 FSD 的過渡期，短期面臨資金消耗壓力。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "看多", "argument": "下週將召開法說會，旗下基美（Kemet）鉭質電容持續漲價，看好被動元件缺貨潮。"}, {"symbol": "3714", "name": "富采", "market": "TW", "stance": "觀察", "argument": "具備 SMT 產線的 LED 廠，可能受惠於美系光通訊大廠自帶設備代工的新趨勢。"}], "quotes": ["選擇比努力重要。在不對的標的努力半天，就算買賣點抓得再好，也無法阻止淨值下跌。", "多頭行情就是要『很多頭』，也就是各類股輪流發動，這才是健康的市場結構。", "當你的持股部位大到一定程度，如果遇到盤中帶量下殺，必須果斷減碼以控制風險，避免陪大家坐車坐到最後。"], "ep_key": "EP652", "title": "EP652 | 🐸", "pubdate": "2026-04-11", "duration_s": 3062}, {"summary": "本集節目中，主持人謝孟恭分享了參與富邦悍將球員陳真邀請及林哲瑄退役儀式的感動體驗。針對大盤，他指出台股多頭修正已結束並強勢反彈，美股則展現強勁的「死貓跳」並站上季線，提醒投資人切勿在多頭市場中空手。產業方面，分析了 Intel 與 Tesla 合作對雙方的影響，指出 Tesla 因晶圓製造高額資本支出仍具隱憂，而 Intel 則可望受惠。此外，他深入剖析手機產業的供需分化，指出 Apple 採取不漲價但提升規格的策略將擴大市佔，而中國平價手機供應鏈則面臨嚴重的砍單危機。最後，針對光通訊、CPU、記憶體與被動元件等熱門板塊提供了最新的產業觀察。", "topics": ["參與富邦悍將林哲瑄退役儀式與生活近況分享", "台美股大盤走勢分析與「不要空手」的投資心態", "Intel 與 Tesla 合作案對雙方股價與產業的影響剖析", "智慧型手機產業供需分化：Apple 的市佔策略與中國手機砍單潮", "AI 時代下的 CPU、光通訊、記憶體與被動元件產業前景觀察", "投資問答：槓桿使用時機、個股故事的多重解讀與光通訊細分板塊佈局"], "market_view": "台股多頭修正已結束並強勢反彈，美股強勁反彈站上季線，投資人在多頭市場中切勿輕易空手。", "industries": [{"name": "半導體/先進封裝", "stance": "看多", "view": "Intel 的先進封裝（如 EMIB）與晶圓代工業務可望因與 Tesla 合作而受惠，且 AI 時代 CPU 出現缺口。"}, {"name": "電動車", "stance": "中性", "view": "Tesla 投入大量資金進行晶圓生產製造，在初期良率未拉升前，恐持續面臨高額折舊與虧損隱憂。"}, {"name": "智慧型手機", "stance": "觀察", "view": "產業面臨兩極分化，Apple 逆勢不漲價搶佔份額，而中國平價手機供應鏈則面臨高達 40% 的嚴重砍單潮。"}, {"name": "光通訊", "stance": "看多", "view": "美股市場強勢板塊，看好上游磊晶、雷射晶片、CPO 設備及 AOI 檢測設備的發展。"}, {"name": "被動元件", "stance": "看多", "view": "鉭電容與鋁電容持續缺貨緊俏，未來可望迎來循環大潮。"}], "tickers": [{"symbol": "INTC", "name": "Intel", "market": "US", "stance": "看多", "argument": "與馬斯克合作為其晶圓代工與先進封裝業務帶來利多，可望獲得更多授權或顧問費。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "中性", "argument": "與 Intel 合作屬中性事件，市場對其大舉投資晶圓製造導致虧損的擔憂依然存在。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "看多", "argument": "在記憶體高成本環境下選擇不漲價並增加規格，策略高明，預期出貨表現將顯著優於同行。"}, {"symbol": "005930", "name": "三星電子", "market": "other", "stance": "看多", "argument": "與馬斯克合作對其晶圓代工業務屬利多，且若手機業務維持穩定，將對中國手機廠造成打擊。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "持有中", "argument": "因預期其將獲得某大廠的 ASIC 設計訂單而提前佈局，若股價轉弱或暴漲會進行調節。"}, {"symbol": "6217", "name": "中探針", "market": "TW", "stance": "觀察", "argument": "作為「一上漲各自表述」的案例，市場對其炒作 Pogo Pin 或 NVIDIA 針腳有不同解讀，本質上反映資金與供需推升。"}, {"symbol": "5269", "name": "祥碩", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人未對其個股基本面或股價發表具體看法。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "觀察", "argument": "提及旗下擁有自研的 Axion 系列 CPU。"}, {"symbol": "AMZN", "name": "Amazon", "market": "US", "stance": "觀察", "argument": "提及旗下擁有自研的 Graviton 系列 CPU。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "argument": "提及旗下擁有自研的 Cobalt 系列 CPU。"}], "quotes": ["在股票市場就不要整天想要空手，等你想追回來的時候，往往又會面臨市場的再度重擊。", "槓桿一般來說都是在有賺錢的時候才會去加，在虧損的部位上加槓桿是極其危險的，且高波動時降低槓桿能避免被強制斷頭。", "一個上漲各自表述。股票上漲時市場會編織各種不同的故事，但最核心的依然是資金與供需關係。"], "ep_key": "EP651", "title": "EP651 | One for all", "pubdate": "2026-04-08", "duration_s": 2991}, {"summary": "謝孟恭在本集分享其使用瘦瘦針的個人近況，並針對近期中東地緣政治局勢（如霍爾木茲海峽衝突）進行總體經濟與地緣政治的解讀。在投資策略上，他強調「應對重於預測」的原則。本集核心焦點在於「Agentic AI（代理人AI）」時代的來臨，這將使運算需求從 GPU 轉向大量消耗 CPU，進而看好 AMD、Intel、ARM 等 CPU 相關標的。此外，他也關注中東鋁廠遭炸毀事件對鋁價及相關供應鏈（如鋁電容、塑化股）的潛在影響。", "topics": ["瘦瘦針（Ozempic）使用心得與身體變化分享", "中東地緣政治局勢與美軍預防性軍事行動解讀", "投資心法：應對市場變化重於預測未來", "Agentic AI 時代來臨對 CPU 需求的爆發性成長", "CPU 相關美股（AMD、Intel、ARM）與台股（嘉澤）佈局", "中東鋁廠遭炸對鋁價、鋁電容及替代品 MLCC 的影響", "聽眾問答：童年綽號、幼兒戒尿布心路歷程、元太（8069）停損反思"], "market_view": "美股現在處於比較難做的狀態（機歪），相較之下台股好做很多。", "industries": [{"name": "AI伺服器 / CPU", "stance": "看多", "view": "Agentic AI 時代需要大量推理與調用，CPU 將從配角轉為主角，需求顯著提升。"}, {"name": "光通訊", "stance": "看多", "view": "在美股市場中表現相對強勢。"}, {"name": "被動元件 (鋁電容)", "stance": "觀察", "view": "中東鋁廠遭炸可能引發鋁電容缺貨，但需注意 MLCC 加電感（TLVR）有替代效應，非無上限暴漲。"}, {"name": "塑化", "stance": "觀察", "view": "部分投資人預期中國因伊朗石油受阻而轉向台廠，但非主持人首選。"}], "tickers": [{"symbol": "AMD", "name": "超微半導體", "market": "US", "stance": "看多", "argument": "x86 雙雄之一，快速蠶食 Intel 的市佔率，且執行長蘇姿丰確認 AI Agent 流程多為傳統 CPU 任務。"}, {"symbol": "INTC", "name": "英特爾", "market": "US", "stance": "看多", "argument": "x86 雙雄之一，雖然市佔流失但整體市場擴大仍會成長，且 CFO 坦言 Xeon 6 產能極度吃緊。"}, {"symbol": "ARM", "name": "安謀", "market": "US", "stance": "看多", "argument": "伺服器市佔率從 2018 年的 <5% 成長至 2025 年的 20-25%，在 CSP 中更達 50%，是強勢的 CPU 類股。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "看多", "argument": "雖然以 GPU 為主，但其最新平台（如 Vera Rubin）也搭載自研 ARM 架構 CPU，亦可視為 CPU 相關類股。"}, {"symbol": "3533", "name": "嘉澤", "market": "TW", "stance": "看多", "argument": "與 CPU Socket 高度相關的台股標的，表現相對強勢。"}, {"symbol": "8069", "name": "元太", "market": "TW", "stance": "觀察", "argument": "聽眾因虧損 60% 停損。主持人表示已許久未討論電子紙，建議聽眾反思當初買進與如今停損的邏輯是否一致。"}], "quotes": ["投資的焦點不應該放在如何去預判事件，而是事件發生之後要如何去做處理。", "羨慕跟嫉妒別人是快樂之賊。當你開始羨慕別人的生活時，你就破壞了自己內心的平靜與平衡。", "買進一個標的，只有你自己知道理由是什麼。理論上每一次買進，你都要對自己負責。"], "ep_key": "EP650", "title": "EP650 | 🦄", "pubdate": "2026-04-04", "duration_s": 3020}, {"summary": "本集主持人謝孟恭分享了個人使用瘦瘦針與學習網球的近況。針對大盤，他指出台股表現極為強勢，回測均線後若能持續創高，則僅屬多頭回檔；而美股則暫視為走空後的死貓跳反彈。由於油價與 VIX 波動度仍維持高檔，主持人選擇不開槓桿並適度減碼以因應連假。此外，本集重點分析了 Nvidia 投資 Marvell 20 億美元的戰略意圖，主持人認為此舉旨在推廣 NVLink Fusion 生態系並圍堵 Broadcom，但整體 AI 傳輸市場仍屬藍海，Broadcom 與 Astera Labs 等競爭對手受到的實質衝擊有限。", "topics": ["個人近況：瘦瘦針減重進度與網球運動體驗分享", "台股與美股大盤走勢、反彈性質與減碼策略", "高油價與高波動度對投資槓桿的警示", "Nvidia 投資 Marvell 20 億美元之戰略意圖與 NVLink Fusion 生態系分析", "Marvell 與 Astera Labs (ALAB) 在高速傳輸與記憶體池化市場的共存關係", "玻璃基板題材的時程展望與 CPO 概念股的類比"], "market_view": "台股回測均線後強勢反彈，若再創高則屬多頭回檔；美股則暫視為走空後的死貓跳反彈，需留意高油價與高波動度風險。", "industries": [{"name": "AI高速傳輸/半導體", "stance": "看多", "view": "Nvidia 透過投資 Marvell 擴大 NVLink 生態系，整體 AI 傳輸與客製化晶片市場（藍海）持續擴大。"}, {"name": "玻璃基板", "stance": "觀察", "view": "屬於未來題材，實際放量預估需 1.5 至 2 年，營收認列較慢，類似早期的 CPO 概念。"}], "tickers": [{"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "持有中", "argument": "獲 Nvidia 投資 20 億美元合作 NVLink Fusion，短期屬戰略宣告，長期看好其在交換機與客製化晶片的發展。"}, {"symbol": "NVDA", "name": "Nvidia", "market": "US", "stance": "觀察", "argument": "透過投資 Marvell 推廣 NVLink Fusion 生態系，鞏固其在 AI 晶片與周邊傳輸的霸主地位。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "雖然 Nvidia 投資 Marvell 意在搶奪其客製化晶片與傳輸市場，但整體 AI 藍海市場持續擴大，Broadcom 仍能成長。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "觀察", "argument": "與 Marvell 的解決方案並非完全在同一賽道，兩者在主機端與 GPU 端可共存，市場過度擔憂其競爭衝擊。"}, {"symbol": "CRDO", "name": "Credo", "market": "US", "stance": "觀察", "argument": "與 Astera Labs 同屬高速傳輸概念股，近期因市場擔憂競爭而受挫，但實際影響有限。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "觀察", "argument": "主持人認為最該投資或購買 Marvell 的其實是 AMD，因為 AMD 缺乏這一塊生態系。"}, {"symbol": "006208", "name": "富邦台50", "market": "TW", "stance": "觀察", "argument": "聽眾提到女兒投資此 ETF 報酬率突破 100%，主持人表示讚許。"}], "quotes": ["在市場波動放大的時候，理論上你的部位就要稍微扣一點現金回來。", "當你覺得最不舒服、最想一鍵出清的時候，往往反而是相對好的買點。", "Nvidia 投資 Marvell 並不是要去消滅 Broadcom 或 Astera Labs，而是要把整塊餅做大，大家在藍海市場裡都還是能分到一杯羹。"], "ep_key": "EP649", "title": "EP649 | 💌", "pubdate": "2026-04-01", "duration_s": 3038}, {"summary": "謝孟恭在本集分享了個人的健康檢查與減重經驗，並針對近期美股與台股的劇烈回檔進行分析。他指出，隨著指數基期拉高，投資人應以百分比而非絕對點數來看待跌幅。面對市場修正，他採取分批減碼、保留現金的策略，並預期若 4 月出現恐慌性殺跌，將是極佳的左側交易布局時點。此外，他看好蘋果（Apple）在 AI 時代扮演類似 Cloudflare 的「過路費」角色，並詳細解析了玻璃基板（Glass Core Substrate）與 TGV 技術的發展時程與產業鏈機會。", "topics": ["個人健康檢查與使用減重針（瘦瘦針）之經驗分享", "美股與台股指數基期拉高後的跌幅百分比觀念", "面對市場劇烈修正與地緣政治風險的資金與交易策略", "蘋果（Apple）開放 AI 模型接入 Siri 的商業模式與優勢", "玻璃基板（Glass Core Substrate）與 TGV 技術的發展時程與封裝應用", "Google 的 KV Cache 壓縮技術對記憶體（HBM/DRAM）需求的影響"], "market_view": "面對市場劇烈修正，投資人應以百分比而非絕對點數看待跌幅，並保留現金等待恐慌性殺跌的布局時機。", "industries": [{"name": "半導體/先進封裝", "stance": "觀察", "view": "玻璃基板（GCS）與 TGV 是未來大晶片封裝趨勢，但放量時程預計在 2027 至 2028 年，晚於 CPO。"}, {"name": "記憶體", "stance": "看多", "view": "雖然市場擔憂 KV Cache 等壓縮技術減少記憶體需求，但根據傑文斯悖論，效率提升反而會刺激更大的記憶體總需求。"}], "tickers": [{"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "看多", "argument": "在 AI 時代扮演類似 Cloudflare 的過路費角色，且不需像其他巨頭一樣投入巨額 Capex，回檔時是極佳的加碼標的。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "看多", "argument": "技術線型與未來展望佳，在科技股普遍破底時，是主動將資金轉入的強勢股選擇。"}, {"symbol": "NVDA", "name": "Nvidia", "market": "US", "stance": "觀察", "argument": "股價持續破底，不建議在這種高檔強勢股破底時進行加碼。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "股價持續破底，但在玻璃基板與光通訊交換器（Tomahawk 系列）的進度領先。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "在玻璃基板與 EMIB 先進封裝技術上布局領先，有望承接 Google TPU V9 的封裝訂單。"}], "quotes": ["不要被絕對點數給錨定了，要去看百分比。以前一萬點跌一千點是跌停，現在三萬點跌一千點只是日常波動。", "傑文斯悖論：當一個東西因為技術改進而變得更便宜、更有效率時，它的總需求反而會變得更大，而不是變小。", "在科技股普遍破底的時候，我比較不會想去加碼那些前面漲很久、現在開始破底的股票，反而會去買線型相對強勢或有未來展望的標的。"], "ep_key": "EP648", "title": "EP648 | 🦆", "pubdate": "2026-03-28", "duration_s": 2997}, {"summary": "主持人謝孟恭在本集節目中分享了對 AI 實際應用與生產力提升的看法，強調 AI 是漸進式的工具，不會一夕顛覆社會，應專注於本業並將其作為輔助工具。市場話題方面，討論了 OpenAI 暫緩 Sora 影片生成項目的原因（成本與資源聚焦），以及馬斯克計劃建置 1 Terawatt 的 Terafab 晶片廠，指出其核心在於成本考量（轉向三星合作），並對其垂直整合晶片製造持保留態度。最後，主持人分析大盤目前呈區間震盪，看好光通訊、CPO 以及 CPU 在推論應用的後續表現。", "topics": ["AI 實際應用與生產力提升的漸進式轉變", "OpenAI 暫緩 Sora 影片生成項目的市場影響與原因分析", "馬斯克建置 1 Terawatt Terafab 的成本考量與垂直整合挑戰", "台美股大盤區間震盪走勢與資產配置策略", "光通訊、CPO 與 CPU 推論應用的投資機會", "聽眾問答：AI Agent 概念股、處置股操作策略與 SpaceX 上市看法"], "market_view": "大盤目前仍屬於區間震盪格局，直到中東局勢緩和，操作上建議逢高調節、大跌時補貨。", "industries": [{"name": "AI影片生成", "stance": "觀察", "view": "長期趨勢不變，但短期受限於高昂算力成本、版權爭議與技術瓶頸，OpenAI 已暫緩 Sora 項目。"}, {"name": "光通訊/CPO", "stance": "看多", "view": "持續看好光通訊與共同封裝光學（CPO）的發展，已將台美股部分資金往此領域配置。"}, {"name": "半導體/CPU", "stance": "看多", "view": "CPU 在 AI 推論（Inference）的應用開始受到市場重視，AMD 已包下相關產能，後續表現值得期待。"}, {"name": "晶片代工", "stance": "觀察", "view": "馬斯克因成本考量將 AI 晶片代工轉向三星，但垂直整合晶片製造難度極高，短期仍需依賴傳統代工廠。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "馬斯克因價格考量未與台積電達成 AI 晶片代工合作。"}, {"symbol": "三星電子", "name": "三星電子", "market": "other", "stance": "觀察", "argument": "三星提供更便宜的價格與高度配合的代工服務，吸引馬斯克合作。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "看多", "argument": "AI Agent 爬取數據皆需通過其安全防護與收費牆，為 AI Agent 趨勢下的實質受益者。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "看多", "argument": "在企業端（B2B）的 AI Agent 應用上表現優異。"}, {"symbol": "AMD", "name": "超微半導體", "market": "US", "stance": "看多", "argument": "已包下相關 CPU 產能，看好 CPU 在 AI 推論應用的潛力。"}, {"symbol": "SpaceX", "name": "SpaceX", "market": "US", "stance": "看多", "argument": "若未來上市，不論估值如何都會配置 1-2% 的基本部位。"}], "quotes": ["那些會被淘汰的人，不是被 AI 淘汰，而是被懂得使用 AI 的人淘汰。", "好的產品成功因素有很多，並不單純取決於你的寫程式（Coding）速度變快了十倍。", "馬斯克的很多討論其實都聚焦在成本，他想要垂直整合晶片製造，但在先進製程上這幾乎是不可能的任務。"], "ep_key": "EP647", "title": "EP647 | 🍬", "pubdate": "2026-03-25", "duration_s": 3054}, {"summary": "謝孟恭分享參與投資機構討論的收穫，指出美國資料中心當前最大瓶頸在於電網（Grid）而非發電，並探討了小型核反應爐（SMR）與浸沒式散熱等技術。大盤方面，近期因伊朗地緣政治衝突引發不確定性，美股破位觸發 CTA 趨勢資金停損賣壓。謝孟恭認為 AI 趨勢與光通訊（CPO）需求未變，拉回仍是買點。此外，記憶體板塊（如美光）利多不漲，資金可能外溢至其他因成本或需求漲價的板塊（如高階 MLCC、TLVR 電感）。NAND 漲勢預期將優於 DRAM。", "topics": ["投資機構交流會心得與持股觀察", "美國資料中心電力瓶頸與電網、SMR、散熱技術探討", "地緣政治衝突對油價與美股大盤的影響", "CTA 趨勢資金操作機制與市場破位賣壓", "記憶體（美光）利多不漲與資金外溢效應", "被動元件（MLCC、TLVR）與 NAND/DRAM 供需展望", "企業擴產態度（大膽下注 vs 保守）對供應鏈勝負的影響"], "market_view": "地緣政治不確定性高，美股破位觸發 CTA 趨勢資金停損，但 AI 與光通訊長線趨勢未變，拉回仍是買點。", "industries": [{"name": "AI伺服器/散熱", "stance": "觀察", "view": "晶片 TDP 持續提高，浸沒式散熱技術指標公司進度落後，短期仍以水冷、冰水為主。"}, {"name": "光通訊", "stance": "看多", "view": "被視為 AI 2.0，CPO 與網路互連需求強勁，雖估值高波動大，但拉回仍是極佳買點。"}, {"name": "記憶體", "stance": "中性", "view": "美光財報利多不漲，板塊可能進入橫盤，但 NAND 漲幅預期將優於 DRAM。"}, {"name": "被動元件", "stance": "觀察", "view": "需區分成本推升與需求驅動，高階 MLCC 與 TLVR 電感具備實質需求驅動的漲價空間。"}], "tickers": [{"symbol": "BE", "name": "Bloom Energy", "market": "US", "stance": "觀察", "argument": "探討其在台灣的供應鏈，資料中心 onsite 發電需求看增。"}, {"symbol": "MU", "name": "Micron", "market": "US", "stance": "中性", "argument": "財報毛利率表現極佳但利多不漲，市場已提前反應預期。"}, {"symbol": "4958", "name": "臻鼎-KY", "market": "TW", "stance": "觀察", "argument": "聽眾問及光通訊營收，主營 Pluggable，CPO 相關性較低。"}, {"symbol": "6451", "name": "訊芯-KY", "market": "TW", "stance": "觀察", "argument": "鴻海集團中與 CPO/矽光子較具直接關聯的標的。"}], "quotes": ["電網（Grid）的建置跟不上，才是目前美國資料中心最缺的瓶頸，而非單純的電力產出。", "要區分漲價是需求驅動（Demand-driven）還是成本推升，需求驅動的板塊在市場上的表現會好很多。", "在現在這個時代，敢衝、敢擴產、敢配合客戶大膽下注的企業，往往會是最大的贏家。"], "ep_key": "EP646", "title": "EP646 | 🦙", "pubdate": "2026-03-21", "duration_s": 3047}, {"summary": "在本集中，主持人謝孟恭回顧了自己從事交易與 Podcast 的心路歷程，指出交易策略需隨盤勢動態調整，並分享他如何從追求產業內線轉向注重風險管理與期望值。針對近期 NVIDIA GTC 大會，他認為市場對台積電「裂口」的擔憂屬過度解讀，NVIDIA 採雙軌制（台積電與三星）行之有年。NVIDIA 已轉型為 AI 工廠的系統解決方案供應商，長期前景看好。此外，他分析了廣達的長期成長潛力、ASIC 市場競爭格局（Meta 與微軟面臨瓶頸，Google 傳引入第三家設計服務廠 Marvell），以及 SRAM/PSRAM 概念股（華邦電、愛普）的技術與實質貢獻。", "topics": ["主持人交易心路歷程與策略演變", "NVIDIA GTC 大會重點與系統解決方案轉型", "廣達（2382）的長期成長與評價展望", "ASIC 晶片市場動態與 Google 供應鏈傳聞", "SRAM 與 Pseudo SRAM（華邦電、愛普）技術解析與投資看法"], "market_view": "大盤估值可能需要降息預期支持才能進一步推升，否則當前價格可能已定價。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "NVIDIA 轉型為 AI 工廠系統解決方案供應商，廣達等台廠供應鏈在未來幾年成長能見度極高。"}, {"name": "ASIC", "stance": "觀察", "view": "Meta 與微軟自主研發面臨產能或效率瓶頸，Broadcom 仍具優勢，Google 傳尋找第三家合作夥伴。"}, {"name": "記憶體", "stance": "觀察", "view": "SRAM 概念多為 PSRAM 題材（如華邦電、愛普），實質貢獻尚需時間觀察；低價庫存效應對部分模組廠非一次性。"}, {"name": "銅資源", "stance": "觀察", "view": "正在思考銅相關類股的估值，可能需要降息循環啟動才能進一步推升。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "已轉型為 AI 工廠的 Total Solution 供應商，長期競爭力極強，發表會後股價震盪屬預期內。"}, {"symbol": "2382", "name": "廣達", "market": "TW", "stance": "看多", "argument": "未來幾年成長性明確，預期 2027-2028 年將迎來出貨大爆發，拉回是極佳的佈局點。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "先進製程產能供不應求，NVIDIA 尋求三星雙軌制並非台積電出現裂口。"}, {"symbol": "2344", "name": "華邦電", "market": "TW", "stance": "觀察", "argument": "其 Cube 技術可作為 L3 Cache，概念接近 SRAM，傳 AMD 為其客戶，屬題材性機會。"}, {"symbol": "6531", "name": "愛普*", "market": "TW", "stance": "觀察", "argument": "其 VHBM/Z-HBM 技術具想像空間，但屬於客製化產品，實質產能與貢獻仍需時間驗證。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "看多", "argument": "在 ASIC 領域依然是最具競爭力的老牌玩家。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "argument": "市場傳言其可能成為 Google TPU 的第三家 ASIC 設計服務合作夥伴。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "與 Broadcom 同為 Google TPU 目前的主要設計服務合作夥伴。"}, {"symbol": "8299", "name": "群聯", "market": "TW", "stance": "觀察", "argument": "受惠於低價庫存成本優勢，且此效應預期為複數季度而非一次性。"}, {"symbol": "3260", "name": "威剛", "market": "TW", "stance": "觀察", "argument": "受惠於低價庫存成本優勢，且此效應預期為複數季度而非一次性。"}], "quotes": ["交易最難的是在當下做出判斷，事後諸葛的檢討都很容易，但我們實際上是在跟機率做對抗。", "NVIDIA 已經不是單純的晶片供應商，  }else{
