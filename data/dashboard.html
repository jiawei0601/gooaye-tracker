力系統優化", "軟體產業與 AI Agent 在利基市場（如半導體檢測）的應用", "聽眾問答：感情底線、寵物離世、盤前盤後功課變化、頂流人士的共同特質"], "market_view": "台股目前處於區間震盪，而美股那斯達克則非常強勢地創下新高，整體市場呈現健康輪動的格局。", "industries": [{"name": "AI伺服器電力系統", "stance": "看多", "view": "隨著 AI 伺服器功耗邁向百萬瓦（MW）等級，高壓直流電（HVDC）、Power Shelf 及 BBU 等電力優化方案成為剛性需求。"}, {"name": "軟體與AI Agent", "stance": "看多", "view": "台股軟體股近期出現族群性轉強，特別看好能切入半導體廠等高門檻利基市場、提供實質效率提升的 AI 軟體公司。"}, {"name": "重電與電網", "stance": "觀察", "view": "AI 伺服器耗電量極大，未來可能帶動國家級電網建設與重電設備的需求，但目前台股相關標的先前已有一波漲幅。"}], "tickers": [{"symbol": "光寶科", "name": "光寶科技", "market": "TW", "stance": "觀察", "view": "作為 HVDC 趨勢下的關鍵 Player 之一，值得持續關注其在電力系統的佈局。"}, {"symbol": "台達電", "name": "台達電子", "market": "TW", "stance": "觀察", "view": "台股大型權值股，同樣是電力與電源管理領域的關鍵 Player，有機會隨產業趨勢向上。"}, {"symbol": "AMD", "name": "超微半導體", "market": "US", "stance": "中性", "view": "近期股價強勢，但供應鏈訪查顯示其在明年 AI 伺服器市佔率仍僅約一成，並未看到明顯加單，股價上漲可能源於市場預期或資金推動。"}, {"symbol": "IFNNY", "name": "英飛凌", "market": "other", "stance": "觀察", "view": "作為功率半導體巨頭，在 HVDC 趨勢下應是主要受益者，但需觀察其整體產品組合與消費性電子的復甦狀況。"}], "quotes": ["投資這種文化事業或好玩的項目，就是要抱持著『願賭服輸』、甚至『不求回報』的心態，選對了人，事情自然會往好的方向發展。", "當你注意到自己已經開始三心二意、想看新妹妹時，其實就代表你對現有的伴侶已經失去興趣了。這時候應該勇敢且果斷地跟對方說清楚，不要用拖延來造成更大的傷害。", "要追求卓越，就不可能有完美的 Work-Life Balance。那些在各領域做到頂尖的人，共同特質就是擁有極高的『韌性』，並且永不言敗、死不放手。"], "ep_key": "EP569", "title": "EP569 | 🐦‍🔥", "pubdate": "2025-06-25", "duration_s": 3224, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期對算命與靈能挑戰的看法，強調人生決定應掌握在自己手中，不應過度依賴算命。在投資方面，他探討了台股與美股市場的效率性與不效率性，指出成交量大、法人關注度高的標的通常效率較高，而成交量低、缺乏券商覆蓋的標的則可能存在不效率的獲利機會。此外，他分享了「全資收購」的思考模式，建議投資人以擁有整家公司的角度來評估個股，並對近期地緣政治局勢（如伊朗與以色列衝突）對市場的短期影響進行了避險操作與分析。", "topics": ["Selly App 網路服務贊助介紹", "算命體驗與人生自主權的思考", "市場效率性與不效率性的投資機會", "全資收購思考模式在個股評估的應用", "地緣政治局勢（伊朗與以色列）對股市的影響與避險操作", "聽眾 QA：遊戲推薦、ChatGPT 訓練、追漲停策略、高風險妊娠心路歷程"], "market_view": "市場短期內可能因地緣政治等不確定性出現波動，但長期而言，理解市場的效率與不效率性並專注於個股基本面才是關鍵。", "industries": [{"name": "科技業", "stance": "觀察", "view": "科技業中仍有許多具備成長性的標的，但需注意地緣政治與市場波動風險。"}, {"name": "金融業", "stance": "中性", "view": "聽眾提及想進入金融業，主持人認為其為穩定的選擇，但考機師等其他行業亦是可行方向。"}], "tickers": [{"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "看多", "argument": "對於覺得個股研究太難的投資人，建議從買進大盤指數型基金開始。"}, {"symbol": "006208", "name": "富邦台美50", "market": "TW", "stance": "看多", "argument": "與0050類似，是適合一般投資人參與市場的指數化投資工具。"}, {"symbol": "VOO", "name": "Vanguard標普500ETF", "market": "US", "stance": "看多", "argument": "美股大盤指數型基金，適合做為長期資產配置的基礎。"}, {"symbol": "VT", "name": "Vanguard全世界股票ETF", "market": "US", "stance": "看多", "argument": "提供全球市場的廣泛分散投資，適合不想花時間研究個股的投資人。"}], "quotes": ["盡量把生死大權都放到自己身上，不管做什麼事情都是，你會發現你就掌握了人生的主控權。", "為什麼我要買這個東西？我如果要全額收購它的話，我現在願不願意買下這家公司？用這個思維去想事情，你就可以有效分出哪些是短線、哪些是長線標的。", "兩性關係裡面，沒有一套 everything theory 可以套用在每個人身上，都是 it depends，看人、看事、看情境。"], "ep_key": "EP568", "title": "EP568 | 🐧", "pubdate": "2025-06-21", "duration_s": 3108, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期前往算命的趣事，並藉此探討人生決策應由自己掌握，而非依賴算命。在市場分析方面，他指出台股 AI 供應鏈等老名字在經歷前期的強勁漲勢後，近期因法人結帳與作帳因素出現類股輪動與回檔。此外，他討論了 Apple 摺疊機的最新傳聞與備貨量上修，以及 Meta 自研晶片 MTIA 的拉貨效應，並建議投資人若要佈局 MTIA 相關機會，應往中下游的伺服器組裝、散熱與線材等供應鏈尋找機會。", "topics": ["算命趣事與人生決策論", "台股 AI 供應鏈與類股輪動", "Apple 摺疊機傳聞與備貨量分析", "Meta 自研晶片 MTIA 與中下游供應鏈機會", "聽眾問答：離婚財產清算、金錢匱乏感、政治立場與投資、GroK 計算問題"], "market_view": "市場在六月出現法人結帳與作帳導致的類股輪動，前期漲多的 AI 老名字出現回檔，資金開始流向低基期的標的。", "industries": [{"name": "AI 供應鏈", "stance": "中性", "view": "前期漲多的老名字因法人結帳出現回檔，市場出現類股輪動。"}, {"name": "摺疊手機", "stance": "觀察", "view": "Apple 摺疊機備貨量傳出上修，摺疊機市場可能由 Apple 重新定義並引領風潮。"}, {"name": "AI ASIC 晶片", "stance": "觀察", "view": "Meta 的 MTIA 晶片拉貨效應顯現，但整體產能仍受限於 Broadcom 的 CoWoS 片數分配。"}], "tickers": [{"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "view": "作為 Meta 等客戶的 ASIC 合作夥伴，其 CoWoS 片數分配是觀察 ASIC 出貨量的關鍵指標。"}, {"symbol": "6104", "name": "創威", "market": "TW", "stance": "持有中", "view": "作為 MTIA 相關供應鏈（如線材），在 Meta 拉貨下可能迎來市場關注。"}, {"symbol": "3227", "name": "原相", "market": "TW", "stance": "持有中", "view": "任天堂供應鏈成員，主持人先前佈局的標的之一。"}, {"symbol": "6138", "name": "茂達", "market": "TW", "stance": "持有中", "view": "任天堂供應鏈成員，主持人先前佈局的標的之一。"}, {"symbol": "CFLT", "name": "Confluent", "market": "US", "stance": "持有中", "view": "主持人持有中的美股軟體股，雖然近期股價在谷底掙扎，但仍選擇維持配置不輕易砍掉。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "觀察", "view": "表現強勁並創新高的 AI 軟體股，與其他弱勢軟體股形成對比。"}], "quotes": ["人生大事盡量要讓自己去做決定，不然你就是一輩子都只能夠依賴在某一個人身上。", "我們去挑選供應鏈的時候，首選就是要去挑說，第一個它可能供這些客戶的比例是高的，再來就是價格要是好的。", "很多看起來像是美德的東西，其實最後綁架你的東西，讓你導致想要你又不敢去追那樣的一個想法。"], "ep_key": "EP567", "title": "EP567 | 🦒", "pubdate": "2025-06-18", "duration_s": 2999, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了二兒子安哥的最新回診狀況，確認其僅有一顆腎臟並伴隨良性囊腫，雖過程煎熬但目前已無大礙。在消費與實體經濟方面，他意外發現 Switch 2 在實體店面不需排隊即可購得，並觀察到高檔餐廳與頂級餐飲在股災期間出現退訂潮，反映出實體經濟與消費力道可能受到股市震盪的影響。在科技產業部分，他深入分析了 Oracle 的強勁增長與 RPO 數據，並探討 NVIDIA 最新推出的 DGX Cloud Lepton 服務，認為這將使算力租賃市場走向去差別化的「大宗商品化」（Commoditization），對 NeoCloud 業者長期競爭不利，但對消費者與 NVIDIA 自身則是雙贏局面。最後，他對台灣房市在新青安政策後的收銀根現狀發表看法，預期中大坪數房屋壓力將增加，但林口等人口移入區的房價仍具支撐。", "topics": ["二兒子安哥回診與健康狀況分享", "實體經濟消費力道與 Switch 2 購買現況", "Oracle (ORCL) 營運展望與 AI 訂單分析", "NVIDIA DGX Cloud Lepton 對算力租賃市場的影響", "台灣房地產市場在新青安與收銀根政策下的展望"], "market_view": "主持人認為雖然半導體與電子業表現強勁，但實體經濟與部分傳統產業已受到股市震盪與政策收緊的影響，消費力道出現局部降溫。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "Oracle 與各大 CSP 廠對 AI 算力的需求依然極為強勁，訂單能見度高。"}, {"name": "算力租賃 (NeoCloud)", "stance": "看空", "view": "隨著 NVIDIA 推出 Lepton 平台，算力租賃將走向去差別化的大宗商品化，長期面臨消價競爭。"}, {"name": "台灣房地產", "stance": "中性", "view": "政府收緊銀根導致成交量萎縮，中大坪數壓力大，但具人口紅利的特定重劃區房價仍有撐。"}, {"name": "餐飲業", "stance": "觀察", "view": "高檔餐飲在股災期間出現退訂與空位，但長期而言因缺工與人力成本上升，外食價格將持續走高。"}], "tickers": [{"symbol": "ORCL", "name": "Oracle", "market": "US", "stance": "看多", "argument": "掌握在手的 RPO 訂單數量驚人，且未來與 StarGate 的合作將帶來巨大貢獻，雲端市佔率有望顯著提升。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "推出 DGX Cloud Lepton 打造算力版 Uber，不僅賺取硬體錢，更進一步壟斷軟硬體整合與分潤平台。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "argument": "作為 AMD 的死忠客戶，但在 AMD 晶片的下單數量上其實較先前宣稱的有所下修。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "中性", "argument": "目前在 AI 晶片市場仍處於不期不待、不受傷害的狀態，並未看到顯著的斬獲。"}], "quotes": ["效率的極大化往往是反人性的。在投資上，理性的策略是一次買進，但感性上如果無法承受波動，分批佈局才是能讓你堅持下去的作法。", "NVIDIA 推出 Lepton 平台，等於是把所有 NeoCloud 業者定義成它的代工廠。它不僅決定誰能拿到 GPU，還能決定算力分派與價格，展現了極高的壟斷與議價權。", "台灣的房地產在很多人手中是理財工具，因為持有成本與房貸利率低，即使成交量因政策雪崩，房價短期內也難以出現大幅度崩跌。"], "ep_key": "EP566", "title": "EP566 | 🌵", "pubdate": "2025-06-14", "duration_s": 2995, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了與業界朋友聚餐的交流心得，探討了在經歷 4 月市場波動後的資金調度與槓桿管理，並強調在資本市場中承擔風險以換取報酬的必要性。總經與大盤方面，主持人認為台美股市後續雖有匯損、關稅等利空環繞，但市場呈現「跌不下去」的狀態。他指出，上半年許多公司的業績成長可能源自於因應關稅而提前拉貨（Pull-in），這恐將轉化為下半年的業績壓力。此外，本集也詳細評估了 Apple WWDC 2025 的發表內容，認為雖然 Apple Intelligence 表現未達市場高預期，但其軟硬體整合優勢與生態系稅收模式依然穩固，對其後續表現持觀察與續抱態度，並透露自己近期將部分資金轉向日股進行佈局。", "topics": ["Sharp 夏普家電特賣贊助與產品介紹", "4 月市場波動後的投資心路歷程與槓桿管理", "實體創業與資本市場投資的差異與風險", "台美股市當前利空環境與上半年提前拉貨（Pull-in）效應", "日股市場近期佈局與標的分享", "Apple WWDC 2025 發表會評估與 Apple Intelligence 展望", "聽眾 QA：直覺訓練、權證交易下單失誤、與家人犯罪之大義滅親看法"], "market_view": "後續雖有匯損與關稅等利空環繞，但市場呈現跌不下去的狀態，惟需注意上半年提前拉貨效應可能導致下半年業績面臨壓力。", "industries": ["半導體", "中性", "台積電等公司已明確揭露匯率對毛利的影響，市場未跌代表已反映，但其他硬體廠仍有匯損隱憂。", "消費性電子", "觀察", "上半年因關稅預期出現緊急拉貨潮，需防範下半年需求放緩與庫存去化壓力。", "機器人", "看多", "長期看好並持有日本機器人及減速器相關供應鏈標的。"], "tickers": ["2330", "台積電", "TW", "中性", "公司已清楚說明美元升值對毛利的正面影響，市場對此已有所反映。", "LOGI", "Logitech", "US", "觀察", "公司於會議中證實確實有因應關稅而提前拉貨（Pull-in）的現象。", "AAPL", "Apple", "US", "持有中", "WWDC 雖然缺乏驚喜且 AI 表現落後，但其軟硬體整合與生態系護城河依然強大，選擇繼續持有。", "6208", "富邦台美雙星高息", "TW", "觀察", "聽眾提及長期持有的標的，主持人未對其前景做額外評論。", "6301", "小松製作所", "other", "觀察", "主持人提及近期佈局日股時，東證指數（TOPIX）相關權值股為其考慮方向之一。", "6324", "Harmonic Drive Systems", "other", "持有中", "看好其在諧波減速器領域的技術實力，為長期持有的日股機器人概念股。", "3004", "昭和真空", "other", "觀察", "主持人提及近期買進不少日東紡（Nittobo）等日本玻纖與石英相關半導體材料股。"], "quotes": ["你就是靠承擔風險來換取報酬。你承擔越大的風險，往往代表你有一個潛在的可能性可以拿到更大的一個報酬。", "上半年的緊急拉貨，很多時候這些業績就會變成下半年的業績帳（業障）。", "大義滅親與否是一個尺度的問題。如果家人的不法行為已經嚴重干擾到你的生活、甚至拖累到整個家庭，選擇報警處理是完全合理的。"], "ep_key": "EP565", "title": "EP565 | 🦛", "pubdate": "2025-06-11", "duration_s": 3057, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期慶祝生日的趣事與朋友贈送的禮物，並探討了近期美國政壇與科技巨頭間的紛爭。特別聚焦於川普與馬斯克因「OBBB法案」（One Big Beautiful Bill）所引發的財政赤字爭議，分析兩人從合作走向分歧的權力與利益邏輯，並評估此事件對特斯拉及馬斯克旗下企業的潛在監管與市場影響。此外，針對博通（Broadcom）最新財報與法說會進行深度解析，看好其在 AI 網通、ASIC 晶片及乙太網路（Ethernet）領域的長期成長性，並對比了英偉達（NVIDIA）與博通在 ASIC 發展路徑上的不同觀點。", "topics": ["主持人謝孟恭生日趣事與朋友贈送的 PlayStation Portal 等禮物分享", "川普與馬斯克因 OBBB 法案（美國財政赤字與減稅方案）產生的分歧與爭執", "馬斯克與川普決裂對特斯拉（Tesla）及 SpaceX 的潛在監管與市場影響", "博通（Broadcom）最新財報解析與 AI 網通、ASIC 晶片的長期成長展望", "NVIDIA 與 Broadcom 在 ASIC 與 GPU 發展路徑上的觀點對比"], "market_view": "整體市場仍處於 AI 帶動的增量市場階段，雖然科技巨頭間有觀點交鋒，但相關硬體與網通基礎建設需求持續蓬勃發展。", "industries": [{"name": "電動車", "stance": "觀察", "view": "特斯拉面臨馬斯克政治立場反覆帶來的進步派消費者流失壓力，短期銷量可能承壓。"}, {"name": "AI網通", "stance": "看多", "view": "AI 叢集規模擴大帶動光學元件（Optics）與乙太網路（Ethernet）需求持續爆發。"}, {"name": "ASIC", "stance": "看多", "view": "雖然 NVIDIA 創辦人黃仁勳對 ASIC 持保留態度，但博通強調客製化 ASIC 在特定模型優化與成本控制上仍具備長期優勢。"}], "tickers": [{"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "view": "馬斯克與川普決裂可能使其失去潛在的監管鬆綁紅利，且先前得罪民主黨支持者，短期內兩頭不討好，但長期仍持續觀察其基本面。"}, {"symbol": "AVGO", "name": "博通", "market": "US", "stance": "看多", "view": "財報與展望皆優，在 AI 網通與客製化 ASIC 領域地位穩固，2025至2027年成長能見度高。"}, {"symbol": "NVDA", "name": "英偉達", "market": "US", "stance": "中性", "view": "黃仁勳在台灣分析師會議上對 ASIC 發展持批評態度，強調 GPU 快速迭代的優勢，與博通立場不同。"}], "quotes": ["川普的行為模式就是：死不認錯，永遠都是別人的錯，且『我全都要、既要且要』。", "AI 網通市場是一個增量市場，而非存量市場。雖然各家廠商會互相 Trash Talk，但最終大家都會一起成長。"], "ep_key": "EP564", "title": "EP564 | 🍙", "pubdate": "2025-06-07", "duration_s": 2997, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期市場全面大漲的行情，並坦言自己因 4 月份的修正而過度保守，導致部分部位錯過這波反彈。他強調在行情好時，應注意哪些個股的漲幅能超越大盤。此外，本集重點討論了無人機產業的最新發展，特別是烏克蘭「蜘蛛網行動」對俄羅斯戰略轟炸機造成的毀滅性打擊，這將加速全球無人機的滲透率與研發投入。最後，主持人分析了 Credo 財報後的暴漲，以及 CoreWeave 在 AI 伺服器租賃市場的驚人漲幅，並反思自己在投資判斷上的盲點。", "topics": ["市場全面反彈與個人部位風控反思", "無人機產業的關鍵轉折點：烏克蘭蜘蛛網行動", "台灣無人機產業的佈局（自研、商購、軍購）", "Credo 財報分析與 AEC 傳輸線材市場展望", "CoreWeave 暴漲與 AI 伺服器租賃市場的投資反思"], "market_view": "大盤反彈力道極為強勁，應注意在反彈中漲幅超越大盤的個股，但同時仍需提防後續可能出現的崩殺風險。", "industries": [{"name": "無人機", "stance": "看多", "view": "蜘蛛網行動將成為無人機產業加速滲透的關鍵轉折點，各國政府將大幅增加採購與研發預算。"}, {"name": "AEC 傳輸線材", "stance": "看多", "view": "隨著交換器與 AI 伺服器傳輸吞吐量需求提升，對高精度與高準度的線材要求越來越高。"}, {"name": "AI 伺服器租賃 (NeoCloud)", "stance": "觀察", "view": "雖然面臨激烈競爭，但在微軟與 OpenAI 的強力支持下，資金力量不容小覷。"}], "tickers": [{"symbol": "7408", "name": "日東紡 (Nittobo)", "market": "other", "stance": "持有中", "argument": "作為 Low-DK 材料的主要受益者，雖然台灣相關想像題材股跟著發酵，但直接持有日股日東紡是最明確的選擇。"}, {"symbol": "AVAV", "name": "AeroVironment", "market": "US", "stance": "看多", "argument": "台灣向其軍購 Switchblade 折疊刀自殺式無人機，是無人機領域的指標公司。"}, {"symbol": "Anduril", "name": "Anduril Industries", "market": "US", "stance": "看多", "argument": "台灣向其採購自殺式無人機，若該公司上市將會是非常具吸引力的投資標的。"}, {"symbol": "CRDO", "name": "Credo", "market": "US", "stance": "看多", "argument": "財報後因揭露 Amazon、xAI 與 Microsoft 等大客戶而暴漲，在 Scale-out 領域具備強大競爭力。"}, {"symbol": "3665", "name": "貿聯-KY", "market": "TW", "stance": "看多", "argument": "作為 Credo 的主要出貨對象，將受益於傳輸線材需求的高速成長。"}, {"symbol": "CoreWeave", "name": "CoreWeave", "market": "US", "stance": "觀察", "argument": "今年以來漲幅驚人，反映出微軟與 OpenAI 資金支持的強大力量，推翻了先前因競爭激烈而看淡的觀點。"}, {"symbol": "CSCO", "name": "Cisco", "market": "US", "stance": "觀察", "argument": "今年網通市場整體好轉，Cisco 作為網通大廠表現不俗，且與 Splunk 的整合值得關注。"}], "quotes": ["市場犯錯是看時間軸怎麼看，如果是在短期內犯錯，那真的就是一個超甜的機會。", "當你今天注意到有一個標的是出現了不可思議的漲幅，一般來講就是有機會後面還沒有結束，因為市場上的資金不是白癡。", "我們真的比較難掌握的是時間，發酵的時間是很難掌握的，這就是為什麼即便槓桿這個東西非常迷人，但因為時間的變數，會導致你被掃出去。"], "ep_key": "EP563", "title": "EP563 | 🕸️", "pubdate": "2025-06-04", "duration_s": 2970, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭首先祝大家端午節快樂，並分析了近期美股與台股期指夜盤的震盪走勢，認為目前市場波動仍屬正常範圍，投資人無需因連假而過度恐慌清倉。在產業研究方面，謝孟恭分享了對 AI 軟硬體產業的最新觀察，指出硬體端（如 NVIDIA 的 GB200/GB300 伺服器）的未來出貨量與營收能見度已大致被市場掌握，呈現區間震盪格局；而市場焦點正逐漸轉移至軟體端。他預測，隨著 AI 導入降低工程師開發成本，軟體公司的營運費用（OPEX）將顯著下修，進而釋放強大的營運槓桿，這將是下一個季度推動軟體股重估值（Re-rate）的關鍵指標。此外，他也探討了中美科技戰下，中國市場特規晶片與消費性晶片的出貨現況。", "topics": ["端午連假市場心態與期指夜盤震盪分析", "NVIDIA 財報會議解讀與 GB200/GB300 出貨量預估", "AI 軟體產業的營運槓桿與 OPEX 下修趨勢", "台灣軟體公司與 CSP 業者導入 AI 的實地訪查觀察", "中美科技戰下中國消費性晶片與 AI 晶片的限制邊界"], "market_view": "目前美股與台股期指夜盤的下跌僅是正常震盪，投資人無需因連假恐慌而刻意清空部位。", "industries": [{"name": "AI硬體/伺服器", "stance": "中性", "view": "硬體端的出貨數據與能見度已大致被市場算清，目前呈現區間震盪格局。"}, {"name": "AI軟體", "stance": "看多", "view": "AI 導入將顯著降低軟體公司的開發成本（OPEX），帶來營運槓桿爆發，是下一個季度的關注焦點。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "argument": "雖然有 H20 減量或中國市場變數，但 Blackwell 需求強勁，未來幾季營收與獲利仍將非常漂亮。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "觀察", "argument": "在 I/O 大會展示了強大的 AI 軟體能力，未來幾季若能交出因 AI 帶動訂閱與 ASP 提升的數據，將啟動軟體股大潮。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "argument": "作為科技巨頭之一，其 AI 變現的數據與進度同樣是軟體產業重估值的指標。"}, {"symbol": "6653", "name": "創奕能源", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人未對其基本面做深入表態。"}, {"symbol": "3032", "name": "偉創力", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人未對其基本面做深入表態。"}, {"symbol": "2382", "name": "廣達", "market": "TW", "stance": "觀察", "argument": "作為 NVIDIA 伺服器的主要供應商之一，其出貨能力與產能持續受到市場關注。"}, {"symbol": "2017", "name": "官科", "market": "TW", "stance": "觀察", "argument": "主持人拜訪該公司並討論台灣軟體業導入 AI 的看法，認為 AI 協助開發能有效控制人力成本。"}], "quotes": ["不需要太害怕連假，除非是基於個人風控，否則在連假前刻意清空部位長期來看並非特別好的做法。", "AI 軟體股的關鍵看點在於 OPEX 的控制。當營收持續成長而 OPEX 因 AI 協助開發而維持溫和成長，營運槓桿大開會讓 EPS 呈現爆發性成長。", "不要輕易嘗試複雜的貨幣避險，除非資金體量極大或有實質商業成本控管需求，否則散戶避險往往弄巧成拙。"], "ep_key": "EP562", "title": "EP562 | 🫛", "pubdate": "2025-05-31", "duration_s": 2997, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期收到前輩老師簽名專輯的感動，並與聽友暢談人生階段的轉變、家庭生活與育兒的體悟。針對市場，主持人分析了四月大跌後的反彈行情，指出目前融資餘額尚未跟上，暗示此波買盤可能多為公司派與董監事。面對即將到來的連假與輝達（NVIDIA）財報，市場觀望氣氛濃厚。主持人認為台幣匯率有持續走升的趨勢，這將對台灣出口產業造成影響。在操作策略上，由於部分台股中小型持股表現疲軟，他計畫在美股接近新高之際，將整體持股水位調降至 80-90% 左右，保留更多現金以因應後續可能的波動，並強調小股操作需特別注意大股東出貨的籌碼風險。", "topics": ["前輩老師簽名專輯與人生階段感悟", "與嘉一國際（Max、Frankie、Charles）的聚會與婚姻自由討論", "育兒生活與陪伴孩子的溫馨時刻", "四月大跌後的反彈行情與融資餘額分析", "連假前夕與輝達財報的市場觀望心理", "台幣匯率走勢對出口產業的潛在影響", "中小型個股的籌碼風險與大股東出貨觀察", "個人持股水位調整與現金配置策略"], "market_view": "市場在經歷四月大跌後大幅反彈，但目前風險可能已大於潛在利潤，操作上應轉趨謹慎並適度提高現金水位。", "industries": [{"name": "AI硬體", "stance": "看多", "view": "隨著 Grace Blackwell 開始量產，下半年的出貨數據與產業前景依然看好。"}, {"name": "航空", "stance": "觀察", "view": "市場近期熱捧航空類股，但需注意多數分析未將匯率變動的負面影響納入考量。"}, {"name": "消費性電子", "stance": "中性", "view": "部分零組件拉貨可能因關稅預期而提前，下半年可能面臨需求疲軟的考驗。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "預期即將公佈的財報與展望仍會維持在指引附近或釋出好消息，長期趨勢不變。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "在四月大跌時估值曾跌至極具吸引力的十幾倍前瞻本益比，目前已隨市場大幅反彈。"}, {"symbol": "CFLT", "name": "Confluent", "market": "US", "stance": "觀察", "argument": "近期開出的展望較為保守，是個人軟體配置中唯一表現未達預期的標的。"}], "quotes": ["做越多一般來說是賠越多，在市場裡面待的時間越長，理論上你的報酬會是越好。", "小類股我覺得就是要經歷過一些空頭的修正，以後去買任何的小規股，我一定會非常認真的檢查它的大股東有哪些人。", "我們現在對小朋友做的事情，其實就是他的童年。我們能夠做的就是，一代做得比一代好。"], "ep_key": "EP561", "title": "EP561 | 🦝", "pubdate": "2025-05-28", "duration_s": 3040, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了參加 NVIDIA 私人展示會（Enterprise 與 Consumer 展區）的見聞。在 Enterprise 展區，他重點分析了 NVIDIA 新一代 GB200/GB300 伺服器架構，特別是其關鍵新構造 Midplane（中介板）的設計與供應鏈機會，並指出 GB200 的量產良率已顯著改善。在 Consumer 展區，他實測了 50 系列顯示卡（如 5090）在 AI 補幀與遊戲效能上的突破，並探討了 AI 助理（如 Sidekick）在實況與日常生活中的應用前景。最後，他分析了 Google I/O 大會展示的 Gemini 應用，認為 Google 透過將 AI 與雲端硬碟等服務打包（Bundle）銷售，將在 AI 變現上取得優勢，但也可能面臨 AI Search 導致點擊率下降、進而壓縮廣告毛利的挑戰。", "topics": ["NVIDIA 私人展示會（Enterprise 展區）見聞與 GB200/GB300 供應鏈分析", "NVIDIA 50 系列顯示卡實測效能與 AI 補幀技術體驗", "AI 助理（Sidekick）在實況主與日常生活中的應用前景", "Google I/O 大會與 Gemini 變現模式分析（Bundle 銷售與廣告毛利挑戰）", "聽眾問答：詐騙防範、台指期轉倉操作、留鬍子的好處與家庭趣事"], "market_view": "市場大趨勢仍由 AI 基礎建設主導，短期內相關供應鏈營收將顯著反映良率提升與量產展開。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "GB200 量產良率已顯著提升，新架構如 Midplane 將為特定供應商帶來新機會。"}, {"name": "顯示卡", "stance": "看多", "view": "50 系列顯示卡結合硬體提升與 AI 補幀技術，實際遊戲與 AI 運算體驗遠超預期。"}, {"name": "AI軟體與搜尋", "stance": "中性", "view": "AI 搜尋（如 Google AI Overview）將改變使用者行為，可能導致網站點擊率下降並壓縮廣告毛利。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "其 Enterprise 伺服器新架構與 Consumer 50 系列顯卡皆展現極強的技術領先與市場競爭力。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "觀察", "argument": "透過將 Gemini 與雲端硬碟等服務打包銷售具備競爭力，但 AI 搜尋可能壓縮其高毛利的廣告業務。"}, {"symbol": "Amphenol", "name": "安費諾", "market": "US", "stance": "看多", "argument": "預期為 NVIDIA 新伺服器架構中關鍵 Midplane（中介板）的主要供應商。"}, {"symbol": "Rogers", "name": "羅傑斯", "market": "US", "stance": "觀察", "argument": "先前市場謠傳其可能參與 Midplane 相關材料供應，但主持人已因股價下跌停損出場。"}], "quotes": ["買股票最終是要去套用凱因斯的選美理論，你並不是要去選一個你覺得是最正的，你要選的是市場最後面會覺得是最正的那一個，這樣才可以賺錢。", "最正確的東西，其實是沒有辦法幫你賺到錢的，很難幫你賺到錢。在我們的認知裡面，有時候就是要直接站出來給大家打臉，反而能更快獲得正確的答案。", "不要把錢給任何人。只要你有這樣的一個大原則，你就很難被騙。每個人要從我的口袋拿錢的時候，都要是一個很困難的事情。"], "ep_key": "EP560", "title": "EP560 | 🪹", "pubdate": "2025-05-24", "duration_s": 3083, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了參加 Computex 2025 的心得，並深入剖析 NVIDIA (NVDA) 執行長黃仁勳 (Jensen Huang) 的 Keynote 演講重點。他指出，NVIDIA 透過 NVLink Fusion 授權正式進軍 ASIC 市場，這將擴大其整體潛在市場 (TAM)，並對 Broadcom (AVGO) 等既有 ASIC 業者帶來競爭壓力。此外，他也分享了參觀華碩 (ASUS) 展位的觀察，包含 AI Agent、與正崴合作的 AI 機器狗等軟硬體整合應用，並對當前 AI 伺服器硬體發展與消費性電子市場的循環發表看法。", "topics": ["NVIDIA Keynote 演講與黃仁勳旋風觀察", "NVIDIA 透過 NVLink Fusion 授權進軍 ASIC 市場之策略分析", "ASIC 市場競爭格局與各大 CSP (Google, Amazon, Microsoft) 的採用意願分析", "Computex 2025 華碩 (ASUS) 展位參觀心得：AI Agent 與機器狗應用", "AI 伺服器硬體發展現況與消費性電子市場的循環週期", "聽眾問答：美元資產配置、職場人際與挫折應對、高膽固醇治療經驗、ADHD 藥物與專注力討論"], "market_view": "市場在經歷 4 月的修正後已逐漸收斂回穩，目前大盤約在零軸附近震盪，整體氛圍相較去年顯得較為冷靜與收斂。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "目前硬體規格與量產進度相對穩定，短期內較難看到突破性的全新硬體技術展示，市場更關注軟硬體整合與實際量產表現。"}, {"name": "ASIC", "stance": "觀察", "view": "NVIDIA 透過 NVLink 授權介入後，ASIC 市場的想像空間擴大，但各大 CSP 仍會考量是否要與 NVIDIA 進行更深度的綁定。"}, {"name": "消費性電子", "stance": "中性", "view": "目前消費性電子產品對營收的貢獻與成長性遠不如 AI 伺服器，但長期來看市場仍存在物極必反的輪動機會。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "透過 NVLink Fusion 授權進軍 ASIC 市場，將進一步擴大其整體潛在市場 (TAM) 並提升軟體滲透率。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "作為既有 ASIC 市場的領導者，未來將面臨 NVIDIA 進入該市場帶來的競爭與挑戰。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "作為 NVIDIA NVLink Fusion 的設計合作夥伴之一，有機會藉此切入大型 CSP 客戶的 ASIC 晶片設計。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "argument": "名列 NVIDIA 的設計合作夥伴，有望受益於 NVLink Fusion 授權帶來的潛在 ASIC 開發商機。"}, {"symbol": "3661", "name": "世芯-KY", "market": "TW", "stance": "觀察", "argument": "作為 ASIC 設計服務廠商，其與 AWS 等客戶的合作關係及未來是否採用 NVLink 技術值得持續關注。"}, {"symbol": "2357", "name": "華碩", "market": "TW", "stance": "觀察", "argument": "在 Computex 展示了 AI Agent、與正崴合作的 AI 機器狗等軟硬體整合應用，展現其在 AI 領域的佈局。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "近期股價反彈幅度大，已針對部分加碼部位進行獲利了結與再平衡，轉配置至其他標的。"}], "quotes": ["NVIDIA 的 NVLink 是一個非常強大的護城河，現在他們要把這個技術授權出去，代表他們連 ASIC 的市場也想要分一杯羹。", "不要把職場上的挫折變成對工作的恐懼，生命中本來就有很多事情是衝著你來的，要試著去調適並接受它。", "不要一直跟別人做絕對的比較，每個人的出生背景、機遇、幸運程度都不同，重點是你有沒有讓自己成為更好的人。"], "ep_key": "EP559", "title": "EP559 | 🫴", "pubdate": "2025-05-21", "duration_s": 2991, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期與老友重溫射擊遊戲《絕地求生》(PUBG) 以及參加 Tizzy Bac 演唱會的懷舊體驗，並宣布其遊戲投資公司即將開張，同時為優勢資本劉東徵求 AI 量化實習生。在市場與產業分析方面，主持人探討了川普在中東外交取得的進展，特別是推動美國企業與中東的互惠合作。針對 AI 伺服器市場，他指出雖然中東採購意向（如沙烏地阿拉伯）為市場注入活水，但實際訂單尚未立即顯現，且 AI 需求（Demand）確實出現下調，供應鏈正處於 GB200 與 GB300 的換代過渡期。此外，川普推動的飛機與軍火外交將使航空航太產業（如波音及其供應鏈）受惠，但台灣相關供應鏈需留意台幣升值帶來的匯率風險。最後，主持人分析了關稅政策對紡織、製鞋等傳統產業的潛在影響，指出高階產品因轉嫁能力強受影響較小，而中低階通用產品則可能面臨客戶要求共攤關稅的壓力。", "topics": ["生活近況：重溫 PUBG 遊戲與 Tizzy Bac 演唱會體驗", "優勢資本劉東徵求 AI 量化實習生與交易競賽", "川普中東外交與美中東企業互惠合作", "AI 伺服器市場需求下調與中東採購意向分析", "GB200 與 GB300 換代過渡期及庫存去化問題", "航空航太產業展望：波音產能復甦與台灣供應鏈匯率風險", "川普關稅政策對紡織、製鞋等產業的影響與轉嫁能力分析", "聽眾 QA：投資心態、人生意義、健康管理與創業建議"], "market_view": "市場對 AI 的看法已逐漸冷靜並下調預期，這有助於擠出市場水分，使產業發展更為健康，但仍需留意下半年川普關稅政策落實帶來的波動。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "整體需求（Demand）出現下調，雖然中東採購意向帶來潛在活水，但實際訂單尚未立即顯現，且供應鏈面臨 GB200 與 GB300 的換代庫存去化問題。"}, {"name": "航空航太", "stance": "看多", "view": "受惠於川普的飛機與軍火外交，客機需求極為旺盛，波音產能逐步復甦，但台灣相關供應鏈需注意台幣升值帶來的匯兌損失風險。"}, {"name": "紡織製鞋", "stance": "中性", "view": "高階產品因客戶轉嫁能力強，受關稅影響有限；中低階通用型產品則可能面臨客戶要求共同分攤關稅的降價壓力。"}], "tickers": [{"symbol": "SMCI", "name": "Super Micro Computer", "market": "US", "stance": "觀察", "argument": "因中東客戶佔比較高，在川普中東外交釋出採購意向時，股價第一時間被市場作為聯想與賭注的對象。"}, {"symbol": "BA", "name": "Boeing", "market": "US", "stance": "看多", "argument": "作為美國客機與軍工龍頭，在川普推動的飛機外交與中東大單（如 787、777X）支持下，長期積壓訂單龐大，產能正逐步回升。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "聽眾提及特斯拉，主持人順勢提到特斯拉股價波動劇烈，從市場高喊先摸 100 美元到後來反彈，展現股市的不可預測性。"}], "quotes": ["生命中的快樂是來自於承擔與責任，有經過 pain 的東西，你 gain 到的東西它的深度跟底蘊才夠，你才會覺得獲得滿足。", "沒有一個必勝或是一定怎麼樣做就會贏的投資方法，重點是你要怎麼樣『弱水三千，只取一瓢飲』，去鞏固好你自己賺錢的方法。"], "ep_key": "EP558", "title": "EP558 | 🌷", "pubdate": "2025-05-17", "duration_s": 3062, "has_tr": true}, {"summary": "本集節目中，謝孟恭分享了近期對個人健康與膽固醇控制的宣戰，並透過與聽眾「小藥」的交流，探討了指數型投資與主動選股的配置心態。針對總體經濟與市場動態，他分析了中美關稅戰的緩和趨勢及對供應鏈的拉貨效應，並深入解讀輝達（NVIDIA）在主導中東 AI 伺服器與 GPU 採購案中的不同劇本與供應鏈影響。他透露自己已減碼指數期貨與 0050，轉向看好台積電 2 奈米（N2）設備鏈與 AI 眼鏡等中小型題材。", "topics": ["個人膽固醇控制與健康宣戰", "與聽眾小藥交流：指數型投資與主動選股配置", "中美關稅戰緩和與短期拉貨效應", "輝達中東 AI 採購案的規格解讀與供應鏈影響", "個人部位調整：減碼指數、轉向中小型題材", "看好題材：台積電 2 奈米設備鏈與 AI 眼鏡"], "market_view": "市場在經歷 4 月恐慌後迅速反彈，關稅不確定性雖未完全消除但短期緩和，目前處於人道走廊的拉貨與調整期，應在派對行情中保持謹慎並適度調整部位。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "中東採購案規格仍有待釐清，若為 3000 箱以上的 Rex 規格將對供應鏈產生顯著拉貨效應。"}, {"name": "半導體設備", "stance": "看多", "view": "看好台積電 2 奈米（N2）製程推進帶動的相關設備與元件需求。"}, {"name": "AI眼鏡", "stance": "看多", "view": "近期代工廠陸續取得美國品牌客戶訂單，是後續值得關注的潛力題材。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "view": "主導中東 AI 採購案，但新聞稿中關於 Supercomputer 的定義（GPU、Tray 或 Rex）仍有模糊空間。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "view": "2 奈米製程需求強勁，將惠及台灣本土的相關設備與元件供應商。"}, {"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "已出場", "view": "主持人已將個人 0050 部位賣出，計畫將資金轉向中小型標的。"}], "quotes": ["賺錢有數，生命要顧。要把身體健康放在第一位，隨時監測並積極處理健康問題。", "一般人看到整天想要改來改去、沒有中心思想的人，通常是賠最多錢的。選定適合自己的方法並堅持下去非常重要。", "當大家極度恐慌時，AI 並不是假貨，基本面依然可以報；但在大家狂歡時，也要注意市場可能已經跑到另一個極端。"], "ep_key": "EP557", "title": "EP557 | 🐠", "pubdate": "2025-05-14", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目由 Saily 贊助。主持人謝孟恭分享即將參加 Computex 的規劃，並對硬體與軟體（特別是 AI Agent）的發展進行預測。他指出，雖然硬體方面的驚喜可能較少，但軟硬整合與 AI 應用將是亮點。此外，他分析了美國聽證會對 AI 禁令與關稅的討論，認為過度監管可能適得其反，並重申對台美股市大盤維持偏多看法，強調市場不確定性消除後估值將逐步修復。", "topics": ["Saily eSIM 服務推薦", "Computex 2025 展望與硬體架構預測", "基本面研究與產業知識累積的重要性", "美國聽證會對 AI 監管與關稅的討論", "台美股市大盤走勢與籌碼面分析", "聽眾 Q&A 與生活/投資問題解答"], "market_view": "對台美股市大盤維持偏多看法，認為最差的情況已經過去，不確定性消除後市場估值將逐步修復。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "硬體架構如 GB300 與 NVL72 (Clipper) 仍具看頭，但部分新架構量產時程可能延後。"}, {"name": "半導體", "stance": "看多", "view": "雖然面臨關稅與監管不確定性，但整體產業長期需求與競爭力依然強勁。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "其 GB100/GB300 及 Clipper 架構仍是 AI 伺服器市場的絕對核心。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "在自駕與電池技術上仍具領先地位，但面臨平價車款的競爭壓力。"}], "quotes": ["知道自己買的股票背後是一間公司，了解基本面才能在市場大跌時有持股的信心。", "嚴格的監管與限制有時反而會阻礙美國自身的 AI 領先地位，甚至將市場拱手讓給競爭對手。"], "ep_key": "EP556", "title": "EP556 | 🦣", "pubdate": "2025-05-10", "duration_s": 2976, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了育兒近況與家庭互動，並針對近期市場熱議的半導體關稅與台幣升值議題進行深入剖析。他指出，川普政府的關稅政策與盧特尼克的發言雖為市場帶來波動，但投資人應將其視為談判過程而非最終結果。此外，台幣近期強勁升值對台灣出口導向型企業（尤其是毛利較低的中小型加工出口商）將帶來匯損與毛利壓縮的挑戰，而資產股、航空股與食品股則相對受益。最後，主持人對巴菲特即將退休及波克夏的未來接班傳承表達了看法與敬意。", "topics": ["育兒近況與大兒子對二寶的適應過程", "盧特尼克對台灣 AI 晶片的發言與半導體關稅預期", "台幣強勢升值對台灣出口業與中小型企業的衝擊", "台幣升值受益板塊（資產股、航空股、食品股）的連想", "巴菲特即將退休與波克夏接班人 Greg Abel 的展望", "庫克對蘋果供應鏈管理與台積電代工決策的成功"], "market_view": "短期內市場因關稅與匯率變動速度過快而面臨波動，下半年需留意企業因台幣升值導致的 EPS 下修與財測調整。", "industries": [{"name": "半導體", "stance": "觀察", "view": "關稅政策仍在徵詢專家意見階段，短期波動難免，但非最終定局。"}, {"name": "出口製造業", "stance": "看空", "view": "台幣升值過快將嚴重壓縮毛三到四的加工出口業者利潤，甚至導致虧損。"}, {"name": "航空業", "stance": "看多", "view": "台幣升值增加購買力，且以美元計價的燃油成本相對變便宜，屬直接受益產業。"}, {"name": "資產股", "stance": "看多", "view": "台幣升值期間，資產股與內需型板塊通常具有相對強勢的資金吸引力。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "雖然面臨關稅與匯率波動，但其作為蘋果等大客戶的核心代工夥伴地位依然穩固。"}, {"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "觀察", "argument": "在庫克極強的供應鏈與庫存管理下，獲利能力極佳，且早期選擇台積電代工是極為卓越的決定。"}, {"symbol": "BRK.A", "name": "波克夏", "market": "US", "stance": "觀察", "argument": "巴菲特即將退休，接班人 Greg Abel 雖面臨壓力，但公司已做好長期傳承準備。"}], "quotes": ["當你趕快想要把一個東西解決，想要找到一個所謂的正確的解答，你可能就會亂湊一堆東西，然後把自己的生活搞得超級複雜。", "以一個出口導向的經濟體來說，我們還是希望匯率不要升得太恐怖，升得太快會讓中小型企業來不及調動而就地引爆。", "要扮演好一個好的爸媽真的不簡單，我們都是邊做邊學，不要用自己的經驗去套在別人的身上。"], "ep_key": "EP555", "title": "EP555 | 🐥", "pubdate": "2025-05-07", "duration_s": 2971, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了二寶回家後的育兒心得與挑戰。在市場方面，他指出近期市場反彈力道強勁，台美股部位皆已顯著回升。他強調雖然短期內 AI 需求依然強勁，但中長期仍需關注 AI 伺服器需求放緩以及台幣瘋狂升值對出口電子業帶來的匯損壓力。此外，他提到 GB200 伺服器出貨量預計在第二季快速放量，將帶動台系供應鏈營收成長，並預測 AI 發展的下一波主旋律將轉向軟體與 Agent 應用。", "topics": ["二寶回家後的育兒與大寶吃醋挑戰", "近期市場強勁反彈與個人部位回升狀況", "AI 伺服器中長期需求放緩與供需平衡預測", "台幣瘋狂升值對台灣出口電子業的匯損影響", "GB200 伺服器出貨放量對台系供應鏈的利多", "AI 發展趨勢從硬體建設轉向軟體與 Agent 應用"], "market_view": "市場反彈力道強勁，但中長期需密切關注 AI 需求放緩與台幣升值帶來的匯損影響。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "短期需求依然強勁，但中長期需求已開始下修，供需平衡時間可能比想像中早。"}, {"name": "晶圓代工", "stance": "看多", "view": "以台積電為代表，目前依然維持供不應求的強勢狀態。"}, {"name": "電子代工 (ODM/OEM)", "stance": "看多", "view": "受益於 GB200 出貨放量，第二季起營收與 EPS 有望快速攀升。"}, {"name": "AI軟體", "stance": "看多", "view": "AI 基礎建設完成後，軟體與 Agent 應用將迎來爆發，成為下一波市場主旋律。"}, {"name": "工具機", "stance": "看空", "view": "台幣升值且日圓貶值時，台灣工具機相較於日本產品的競爭力會下滑。"}], "tickers": [{"symbol": "TSM", "name": "台積電", "market": "US", "stance": "看多", "argument": "公司角度依然維持供不應求，短期內業績能見度極高。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "argument": "資本支出維持強勢，短期內 AI 需求與業績表現依然良好。"}, {"symbol": "MSFT", "name": "微軟", "market": "US", "stance": "看多", "argument": "Copilot 與 AI 導入表現優異，並在財報會議中強調軟體與 Agent 的重要性。"}, {"symbol": "AMZN", "name": "亞馬遜", "market": "US", "stance": "看多", "argument": "AI 訓練與推論伺服器表現優異，未來將帶動伺服器規格調整。"}, {"symbol": "2317", "name": "鴻海", "market": "TW", "stance": "看多", "argument": "先前股價已跌深，隨著 GB200 出貨在第二季快速放量，營收將迎來爆發性成長。"}, {"symbol": "DUOL", "name": "Duolingo", "market": "US", "stance": "觀察", "argument": "近期股價表現強勁，雖然面臨巨頭競爭，但中小型軟體公司仍有其特定痛點的解決能力。"}], "quotes": ["人生沒有後悔藥，當時不敢上槓桿一定有它的理由存在，只要有抓到重點都還是會持續賺錢。", "短期內 AI 很好是不需要去辯論的，重點是到底可以好多久，供需拉平的時間點可能會比大家想像的早。", "AI 基礎建設的建置循環，應該會比大家想像的來得早進入結束，下一波爆發將會是軟體。"], "ep_key": "EP554", "title": "EP554 | 🐺", "pubdate": "2025-05-03", "duration_s": 2999, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了即將離開月子中心的心得，並從各項服務的市場行情切入，分析月子中心的性價比。在市場動態方面，主持人觀察到美中關稅戰出現部分退讓與豁免的理性跡象，並深入探討關稅不確定性對半導體及科技供應鏈的潛在下修風險。他指出，雖然 Google 的資本支出與發展依然強勁，但微軟、美超微（SMCI）以及台灣部分電源供應器廠商的展望下修或遞延，可能預示著 AI 供應鏈在下半年面臨拉貨放緩與獲利預估下修的考驗。最後，他強調台積電下半年的財測將是驗證此波修正是否結束的關鍵指標。", "topics": ["月子中心服務與市場行情性價比分析", "美中關稅戰的最新進展與豁免清單", "關稅不確定性對半導體與科技供應鏈的影響", "Google 與微軟等科技巨頭的資本支出展望", "美超微（SMCI）與台灣電源供應器廠商的下修訊號", "AI 伺服器與 CoWoS 產能的最新供需動態", "台積電作為供應鏈長鞭效應尾端的驗證角色"], "market_view": "市場在貝森特持續發話下呈現較穩健的狀態，但關稅不確定性拖延過久仍對實體經濟與科技供應鏈帶來下修壓力。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "微軟、美超微及台灣電源供應器廠商出現展望下修或拉貨遞延的訊號，下半年可能面臨拉平整理。"}, {"name": "半導體", "stance": "觀察", "view": "關稅不確定性可能導致半導體產業提早進入下修階段，需觀察台積電下半年的財測驗證。"}, {"name": "航運", "stance": "觀察", "view": "關稅政策可能引發一段時間的貨架清空潮，後續成本將由消費者承擔。"}], "tickers": [{"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "argument": "資本支出並未下調，整體發展依然健康強勁，是目前巨頭中最強大的。"}, {"symbol": "MSFT", "name": "微軟", "market": "US", "stance": "觀察", "argument": "需觀察接下來一兩季是否會出現下調資本支出或拉貨放緩的訊號。"}, {"symbol": "SMCI", "name": "美超微", "market": "US", "stance": "看空", "argument": "下修了財務預期數字，可能與 NVIDIA H200 或 HGX 200 系列出貨遞延有關，是個不好的訊號。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "argument": "GB 系列出貨障礙雖有改善，但 CoWoS 需求預估已從 400k 以上下修至 360k-380k，需注意對乘數的影響。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "作為長鞭效應的尾端，若下半年沒有下修財測，則代表此波供應鏈修正已經結束。"}], "quotes": ["關稅的不確定性如果可以盡快解決，即使數字不是大家要的，對國際貿易的動態和成本計算也是好事，最怕的是無頭蒼蠅式的亂拉亂搞。", "遞延在過往的經驗中，我們可以把它視為半取消了，它不是一個好訊號，因為如果東西大家真的很想要，應該會一直去搶，而不是願意等待。", "不要整天去在意網路上你不認識的人告訴你幾歲該有多少錢，有幸福的家庭、愛你的老婆小孩和不錯的工作，你就是成功的人。"], "ep_key": "EP553", "title": "EP553 | 🦨", "pubdate": "2025-04-30", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期測試 AI 圖像生成影片（Image-to-Video）模型 FramePack 的心得，並探討其在終端運行（6G VRAM）與免除審查限制上的優勢。他認為，開源且無限制的 AI 應用能打破科技巨頭的管制，未來將驅動二線雲端服務商（CSP）與 AI 終端硬體（如 AI PC）的爆發性需求。總經方面，他對 AI 產業長期發展維持樂觀，並預期台幣短期因川普關稅戰壓力將偏向升值或穩定。聽眾問答部分，他建議不要過度干涉長輩的資產配置，並提醒短期資金（如交屋款）切勿投入股市，以免因市場波動面臨流動性風險。", "topics": ["FramePack 圖像生成影片模型測試心得", "AI 模型的審查管制與開源發展趨勢", "AI 算力與終端硬體（AI PC）的未來機會", "台幣匯率走勢與川普關稅政策的影響", "長輩資產配置與農會存款風險探討", "短期資金（交屋款）的股市投資風險提醒", "初戀的定義與兩性關係中的意思表示確認"], "market_view": "雖然近期股市因關稅與修正回檔，但 AI 產業的長期可能性與需求依然持續擴大，科技高點往上衝的趨勢並未結束。", "industries": [{"name": "AI 伺服器與算力", "stance": "看多", "view": "隨著圖像與影片生成需求爆發，算力與存儲需求將持續大幅上升。"}, {"name": "二線雲端服務商 (CSP)", "stance": "看多", "view": "願意掛載無限制 AI 模型的二線 CSP 將迎來算力租借的爆發性機會。"}, {"name": "AI 終端硬體 (AI PC/筆電)", "stance": "看多", "view": "未來能直接在終端預載並運行無審查 AI 模型的硬體裝置將大有可為。"}], "tickers": [{"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "馬斯克投入政治可能換來美國自駕法案快速通關，對特斯拉是重要利多。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "觀察", "argument": "過去表現極佳，目前進入橫盤整理，屬於正常的市場循環。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "在 2020 至 2021 年大漲後也曾停滯整整一年，大盤走勢受其影響極大。"}], "quotes": ["你管好自己的錢就好了，去叫別人做事情，很多時候會發現吃力不討好還被討厭。", "未來半年到一年、甚至是兩年要用到的錢，儘量不要全部都丟股票市場，以免因市場波動導致無法交屋或被迫降級消費。", "在低點你反而不想買股票，反而要把東西賣成現金，你不覺得是很怪嗎？加權指數碰五年線、櫃買碰十年線，都是長期難得的機會。"], "ep_key": "EP552", "title": "EP552 | 🪭", "pubdate": "2025-04-26", "duration_s": 3002, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了錢包與遙控器離奇出現的趣事，並探討了近期台積電海外布局損益、關稅戰局勢、聯準會降息預期、AWS 資本支出傳聞以及特斯拉最新財報。他指出，台積電美國廠初期虧損為正常折舊現象，而關稅戰在貝森特等溫和派發言下有收斂跡象。對於聯準會，他認為降息勢在必行，並分析了川普與鮑威爾的互動。此外，他釐清了 AWS 砍單傳聞，並對特斯拉財報後大漲、馬斯克回歸公司、Model Y 改款及機器人晶片規劃給予正面評價，建議在空頭市場中仍需注意高估值股票的風險。", "topics": ["生活趣事：錢包與遙控器離奇現身", "台積電海外布局損益與折舊政策解析", "美中關稅戰局勢與溫和派官員發言影響", "聯準會降息預期與川普的政治墊背策略", "AWS 砍單與 CoWoS 下調傳聞釐清", "特斯拉財報解析：馬斯克回歸、Model Y 改款與機器人晶片規劃", "空頭市場下的資產配置與高估值股票風險"], "market_view": "市場目前已進入定義上的空頭市場，行情偏空，建議避開估值極高且短期內無法看到大量獲利灌入的公司。", "industries": [{"name": "半導體", "stance": "看多", "view": "台積電等優質半導體公司在空頭市場中估值已跌至非常便宜且具吸引力的水準。"}, {"name": "AI伺服器", "stance": "觀察", "view": "微軟確實有放緩資本支出，但 AWS 與 Google 整體需求依然健康，CoWoS 下調可能僅是產品換代調整。"}, {"name": "電動車", "stance": "觀察", "view": "特斯拉短期交車數據下滑主因 Model Y 改款過渡期，長期仍需觀察機器人與軟體服務的變現進度。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "海外建廠初期虧損為五年快速折舊的正常現象，目前估值已跌至極具性價比的便宜區間。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "財報雖差但馬斯克承諾回歸專注公司是最大利多，長期看好其機器人晶片規劃與 Model Y 改款前景，但目前估值偏高。"}, {"symbol": "MSFT", "name": "微軟", "market": "US", "stance": "中性", "argument": "AI 支出確實有所放緩，部分算力規劃轉向 Open AI 的 Stargate 專案，市場對此已有預期。"}, {"symbol": "GOOG", "name": "谷歌", "market": "US", "stance": "看多", "argument": "AI 算力投資健康度最高，自有 TPU 投入不遺餘力且算力供不應求。"}, {"symbol": "AMZN", "name": "亞馬遜", "market": "US", "stance": "觀察", "argument": "AWS 雖有 CoWoS 調整傳聞，但官方澄清基本面無大礙，需等待法說會進一步確認。"}], "quotes": ["台積電的折舊政策是五年，相較於同業的七到十年更為短痛，這讓它在第六年開始具備極強的成本競爭力。", "在市場行情偏空的時候，我們有一個素養，就是盡量避開估值極高、且短期內無法看到大量獲利灌進來的公司。", "不要跟馬斯克對賭（Don't bet against Elon），他的注意力放在哪裡，他就會像愚公移山一樣把東西硬幹出來。"], "ep_key": "EP551", "title": "EP551 | 🐦", "pubdate": "2025-04-23", "duration_s": 2999, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了對當前台美股市場的觀察，特別是針對台積電最新財報與展望進行深入剖析。台積電第二季財報指引優於預期，但市場反應收斂，反映出對川普政府半導體關稅等不確定性的擔憂。主持人指出，台積電作為產業長邊效應的尾端，其訂單調整通常最晚發生，投資人應密切觀察光通訊等中游零組件廠的砍單訊號。此外，也探討了輝達黃仁勳訪問中國的政治與商業意涵，認為其可能扮演美中之間的協調使者，而非單純的選邊站。", "topics": ["台積電第二季財報指引與市場反應分析", "川普政府半導體關稅政策對產業的潛在衝擊", "半導體產業長邊效應與零組件砍單觀察指標", "輝達黃仁勳訪問中國的政治與商業意涵解讀", "投資心態調整與槓桿、維持率的風險管理"], "market_view": "市場目前對川普關稅等政策不確定性的擔憂仍處於高位，導致利多消息反應收斂，投資人應保持現金彈性並密切觀察中游砍單訊號。", "industries": [{"name": "半導體", "stance": "觀察", "view": "台積電財報雖好，但作為長邊效應尾端，需防範後續整體需求下修的延遲反應。"}, {"name": "光通訊", "stance": "看空", "view": "部分光通訊零組件已出現砍單跡象，尤其是微軟相關供應鏈表現較弱。"}, {"name": "AI伺服器", "stance": "觀察", "view": "需密切觀察交期較短的零組件是否開始砍單，以確認AI伺服器需求是否下修。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "第二季指引遠超預期，但未上修全年展望，且作為長邊效應尾端，潛在風險可能延遲顯現。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "觀察", "argument": "黃仁勳訪中可能扮演美中協調使者，且其產品在光通訊等供應鏈的訂單變化值得關注。"}, {"symbol": "INTC", "name": "英特爾", "market": "US", "stance": "觀察", "argument": "市場盛傳其與台積電成立合資公司的謠言，雖被台積電否認，但反映出市場對其產能與技術合作的討論。"}, {"symbol": "MSFT", "name": "微軟", "market": "US", "stance": "看空", "argument": "在光通訊零組件與輝達相關產品的訂單表現上，微軟是主要雲端服務商中表現最疲弱的。"}], "quotes": ["台積電是長邊效應的尾端，也就是針對庫存跟訂單的修正，最後面才會動到台積電。", "我們在過去的經驗就是告訴我們，我們每次看到一些很誇張的事情，後面就一定會發生更誇張的事情把它蓋掉，所以盡可能在每次事件都要去學會一些課題，維持率不要抓得太緊。", "在市場犯錯的時候，去找到一些機會。市場很常在犯錯，如果市場沒有犯錯的話，就不會有一堆低谷讓你買了。"], "ep_key": "EP550", "title": "EP550 | ⛳", "pubdate": "2025-04-19", "duration_s": 2860, "has_tr": true}, {"summary": "本集節目中，謝孟恭分享了近期家庭與育兒的心路歷程，並探討了川普政府關稅政策對科技產業與供應鏈的實質影響。他指出，川普與其幕僚的言論反覆，對市場造成極大的不確定性，但從實質豁免清單與產業報告來看，雖然中國製造仍面臨高關稅壓力，但部分消費性電子產品的豁免對蘋果等供應鏈是短期的利多。此外，他也分析了輝達（NVIDIA）因出口管制與庫存調整所面臨的財務壓力，以及 Google 趁勢推廣 TPU 的競爭態勢，並強調在波動市場中保持現金與動態調整部位的重要性。", "topics": ["NordVPN 贊助與跨區追劇體驗", "育兒心路歷程與對醫療檢查的心理調適", "川普政府關稅政策與其言論對市場的干擾", "鴻海關稅影響報告與各生產基地的稅率分析", "輝達（NVIDIA）H20 出口管制與財務影響", "Google 趁勢推廣 TPU 的競爭格局", "股災期間的部位調整與現金流管理"], "market_view": "市場正處於因川普關稅言論而劇烈波動的收斂階段，最恐慌的情緒可能已過，但仍需密切追蹤實質關稅政策對供應鏈的不可逆影響。", "industries": [{"name": "AI伺服器", "stance": "中性", "view": "AI伺服器屬於剛性需求，受關稅政策的實質影響相對較小，但仍需觀察後續零組件課稅的變化。"}, {"name": "消費性電子", "stance": "觀察", "view": "手機與手錶等產品雖獲得部分關稅豁免，但若後續半導體與電子產品被獨立課稅，需求仍可能大幅縮水。"}, {"name": "記憶體", "stance": "觀察", "view": "若筆電與手機需求因關稅而下滑一至兩成，記憶體與被動元件等通用型產品將面臨極大的去化壓力。"}], "tickers": [{"symbol": "2317", "name": "鴻海", "market": "TW", "stance": "觀察", "argument": "針對美國海關豁免清單出具各生產基地關稅影響報告，但隨後又面臨川普言論反覆的挑戰。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "觀察", "argument": "面臨 H20 晶片出口中國的管制，可能導致營收流失並產生約 55 億美元的庫存與採購承諾減值費用。"}, {"symbol": "GOOG", "name": "Google", "market": "US", "stance": "看多", "argument": "趁輝達面臨出口管制與供應鏈調整之際，大力推廣自家的 TPU 晶片，在 AI 領域具有強大競爭力。"}, {"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "觀察", "argument": "透過談判成功爭取到部分產品的關稅豁免，且在印度等非中基地已有產能布局，受關稅衝擊程度低於預期。"}], "quotes": ["當你沒有預期到，或是你沒有預期會這麼慘的時候，那個是非常痛苦的；可是像你現在已經是有那種死豬不怕滾水燙的狀態，所以你就會覺得後面的各種問題應該都不會是太大的問題。", "市場很憎恨他們的原因，因為你整天改來改去，你真的不可以這樣改來改去，因為整個商業的行徑會完全被中斷掉。", "投資或是交易也沒有這麼複雜啦，如果說大家都可以很誠實的面對自己，然後做的差的就講出來給大家笑嘛，你一定有看錯的東西，講出來給大家笑，我覺得根本沒有什麼大不了的。"], "ep_key": "EP549", "title": "EP549 | 🍄‍🟫", "pubdate": "2025-04-16", "duration_s": 2995, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭回顧了台股經歷二十幾年來最險惡的一週，大盤與櫃買指數經歷劇烈震盪，融資餘額大幅清洗。他認為在籌碼面與技術面清洗乾淨後，短期底部已現，只要國際局勢不再惡化，市場將逐步回歸健康。針對川普政府的關稅政策，他預期在各方壓力下將有所收斂，並可能引發新一波的轉單潮，使台灣供應鏈在兩套供應鏈體系中受惠。此外，他也分享了對債券與黃金價格波動的看法，並提出下一階段的資產配置策略。", "topics": ["台股二十幾年來最險惡一週的回顧與籌碼清洗", "川普關稅政策的後續發展與對美股大七企的影響", "美中貿易戰 2.0 下的台灣供應鏈轉單機會", "中國對晶片與零組件關稅回擊的產業影響分析", "債券與黃金價格狂跌的市場資金流動解釋", "下一階段不受關稅影響的防守型資產配置策略"], "market_view": "台股與櫃買指數在經歷劇烈的融資清洗後，短期底部已經出現，只要國際局勢不再惡化，市場將逐步回歸健康並緩步復甦。", "industries": [{"name": "半導體", "stance": "觀察", "view": "中國對美晶片關稅回擊將重創 Intel，但在台積電投片的美系廠商如 AMD 則因被視為非美產品而暫時受惠。"}, {"name": "AI伺服器", "stance": "看多", "view": "在美中兩套供應鏈劃分下，未在美國金圓廠生產的晶片與相關伺服器零組件將迎來轉單與急單機會。"}, {"name": "食品與內需", "stance": "看多", "view": "屬於不受關稅直接影響的產業，在市場不確定性高時，適合作為防守型的資產配置選擇。"}, {"name": "軟體", "stance": "觀察", "view": "雖然不受關稅直接影響，但若整體經濟因關稅緊縮導致巨頭砍 IT 資本支出，仍會受到間接衝擊。"}], "tickers": [{"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "觀察", "argument": "作為美股大七企之一，具有富可敵國的影響力，會透過手段對政府的極端關稅政策進行施壓與反應。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "看空", "argument": "因其在美國本土設計與生產，將直接承受中國對美晶片課徵的高額關稅，面臨實質性的巨大打擊。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "看多", "argument": "因晶片在台積電投片，在中國關稅認定上被視為非美產品，短期內在中國市場將獲得競爭優勢。"}, {"symbol": "6415", "name": "矽力*-KY", "market": "TW", "stance": "看多", "argument": "屬於中骨台皮的電源管理 IC 廠，基本上沒有美國元素，在中國去美化與關稅戰 2.0 下將直接受益。"}], "quotes": ["在股票市場裡面，我們盡量不要去盲信任何人，因為他有一天一定會讓你受傷，百分之百會讓你受傷，所以 trust but verify。", "你躲過的一些回檔，可能也代表你未來會躲過的一些漲幅，所以有時候市場的一些波動，就是該把它吃下來。", "不要去追求說什麼你一定要毫髮無傷、本多終勝，那個應該不是一個很好的努力的方向。"], "ep_key": "EP548", "title": "EP548 | 🌋", "pubdate": "2025-04-12", "duration_s": 2999, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了二寶順利出生的喜悅，並透露孩子雖有腎異位與肚子囊腫，但目前狀況穩定，對此充滿感激。面對近期全球股市因川普關稅政策引發的劇烈崩盤，他指出 VIX 恐慌指數與台股融資維持率已達極度恐慌的歷史低點，許多融資部位因跌停鎖死無法出場，甚至面臨負債風險。他呼籲政府切勿實施禁空令或縮減跌幅等限制流動性的措施，並強調在極端行情中保持理性與控管槓桿的重要性，期盼關稅談判後續能釋出轉圜空間以緩解市場壓力。", "topics": ["二寶出生與台大醫院醫療團隊感謝", "川普關稅政策對全球金融市場與供應鏈的衝擊", "VIX 恐慌指數與台股融資維持率的極端表現", "台股多檔個股連續跌停鎖死對融資部位的影響", "反對禁空令與縮減跌幅等限制流動性政策的立場", "歷史極端行情後的市場展望與風控反思"], "market_view": "目前市場處於極度恐慌與超賣狀態，雖面臨巨大壓力，但歷史經驗顯示極端行情後終將迎來轉機，關鍵在於控管槓桿以確保能存活至市場回溫。", "industries": [{"name": "AI 伺服器", "stance": "觀察", "view": "關稅增加導致資本支出成本上升，可能減少可購買的套數，對產業基本面造成直接影響。"}, {"name": "半導體", "stance": "觀察", "view": "國安基金進場預期以台積電等大型權值股為主要護盤標的，但難以惠及融資斷頭的中小型股。"}, {"name": "消費性電子", "stance": "觀察", "view": "若關稅政策全面實施，iPhone 等產品的供應鏈結構將面臨 10% 至 40% 不等的成本上漲壓力。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "view": "作為國安基金進場控盤與維持指數的首選標的。"}], "quotes": ["你要有辦法活下來，才能看到那個光輝。在自己的槓桿比例上面要非常非常的小心。", "千萬不要去搞出什麼禁空令，或是去縮減跌幅這樣子的做法，因為它只會讓股市的成交量更低，你終究是要面對的。", "每次的災難後面，可能就會是一些在災難時候敢買進，或是敢繼續持有、敢相信的人，他們最大獲利的空間。"], "ep_key": "EP547", "title": "EP547 | 🚞", "pubdate": "2025-04-09", "duration_s": 2982, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭首先呼籲聽眾在市場不佳時保持樂觀與開心，並分享自己近期購買 PS5 Pro 的心得。隨後深入探討川普提出的「對等關稅」政策，指出其計算方式（赤字除以進口）並非傳統關稅，而是實質上的「指鹿為馬」，對台灣、日本、東南亞等國造成巨大衝擊。主持人分析，台灣因過去兩年出口大量 AI 伺服器等資通產品，反而因此被課徵高達 32% 的關稅。面對下週一可能出現的台股恐慌性大跌，主持人表示自己已進入防守狀態，並保留 15% 的現金，建議投資人在此波動極大的行情中控制好資金槓桿，並以 VIX 指數作為買進訊號的參考。", "topics": ["心態調整與生活分享（健身房、PS5 Pro 購買心得）", "川普對等關稅政策的本質與計算公式解析", "關稅政策對台灣資通產業、蘋果及東南亞台商的衝擊", "美股科技巨頭與軟體廠商（如 SAP）的 AI 應用發展", "面對市場極端行情與下週一恐慌性下跌的應對策略"], "market_view": "市場因川普的對等關稅政策面臨極大不確定性，下週一恐出現恐慌性大跌，建議進入防守狀態並嚴格控管資金槓桿。", "industries": [{"name": "AI伺服器/資通產品", "stance": "觀察", "view": "台灣因過去兩年出口大量 AI 伺服器，在川普的公式下反而被課徵高達 32% 的高關稅，面臨極大衝擊。"}, {"name": "半導體", "stance": "觀察", "view": "雖然市場討論半導體豁免，但川普表示後續還會再拿出來談，台灣半導體產業恐難輕易被放過。"}, {"name": "消費電子", "stance": "觀察", "view": "蘋果等在中國及東南亞皆有生產基地的公司，在關稅政策下毛利可能受到高達 10% 的影響。"}, {"name": "企業軟體 (ERP)", "stance": "觀察", "view": "SAP 等廠商推出 AI 助理（如 Joule）協助企業流程，未來通用型 AI 將由巨頭主導，特有型軟體則需靠客製化服務取勝。"}], "tickers": [{"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "觀察", "view": "關稅一次被開到底，毛利影響可能達 10%，但其消費者黏著度較高，且後續不確定性相對較低。"}, {"symbol": "SAP", "name": "SAP", "market": "US", "stance": "觀察", "view": "推出 AI 助理 Joule 導入企業 ERP 流程，未來需觀察其能否為客戶量身打造專屬的特畫版商業軟體。"}], "quotes": ["生活帶來您檸檬，就把它做成檸檬水喝掉。不管老天給你什麼，球來就打，讓自己隨時維持在開心健康的狀態。", "川普的對等關稅根本不是關稅，它是直接把 deficit（赤字）除以 import（進口），這是我看過歷史上最大的指鹿為馬。", "指數兵法最重要的一點是：你要有部位，而不是太在意價格。如果你的曝險不夠，等行情真的啟動時，有時候你根本追不回來。"], "ep_key": "EP546", "title": "EP546 | 🕶️", "pubdate": "2025-04-05", "duration_s": 2992, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了即將迎來二寶的個人心路歷程，並深入探討當前 AI 軟硬體市場的發展。他指出，雖然 OpenAI 推出 GPT-4o 等新功能引發熱潮，但各家廠商普遍面臨算力嚴重不足的瓶頸。針對股市，他提出「袋鼠市（Kangaroo Market）」的概念，預期市場將呈現上下跳動的區間震盪格局。在操作策略上，他建議在市場恐慌、融資大減時，分批佈局具有實質營收與獲利支撐的硬體公司，並維持理性、避免被情緒左右。", "topics": ["二寶即將出生的心路歷程與感悟", "OpenAI GPT-4o 圖像生成熱潮與 AI 算力不足瓶頸", "袋鼠市（Kangaroo Market）概念與未來市場區間震盪預期", "台股融資大減與恐慌殺盤後的應對策略", "硬體公司估值修正後的防守性投資機會", "聽眾問答：記憶體、降海蟹、沐浴乳稀釋、Ubiquiti、系統工程師職涯等"], "market_view": "預期市場將進入上下跳動的「袋鼠市」區間震盪格局，建議在下沿恐慌時分批佈局，上沿時適度調節。", "industries": [{"name": "AI硬體/伺服器", "stance": "看多", "view": "雖然面臨估值修正與短期產出瓶頸，但實質需求依然強勁，估值修正後具備防守性投資價值。"}, {"name": "記憶體", "stance": "觀察", "view": "產業復甦是實質存在的，但個股表現（如美光）可能受到市場共識與估值偏好的影響。"}], "tickers": [{"symbol": "MU", "name": "美光", "market": "US", "stance": "持有中", "view": "雖然基本面與報價持續成長，且未來 HBM 份額有望上升，但股價表現近期不如預期，仍選擇繼續持有。"}, {"symbol": "UI", "name": "Ubiquiti", "market": "US", "stance": "已出場", "view": "過去曾長期持有且非常喜歡其產品，但目前已無持股。"}], "quotes": ["人生會一直故意丟一樣的考題給你，直到確定你學會這堂課。直到你可以正面地面對發生的不好事情，你才算真正解脫、真正成長。", "當大家都不約而同表示算力不夠，市場卻沒有反應、照樣狂跌，這就呼應了當市場轉空時，大家只會去找壞消息，好消息根本救不起來。", "投資有賺有賠，有時候真的要認輸。基本面看對、驗證也對，但市場共識不在這、估值大家不喜歡，股價就是不會漲，這就是市場。"], "ep_key": "EP545", "title": "EP545 | 💥", "pubdate": "2025-04-02", "duration_s": 3041, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期參訪台股軟體公司的觀察，探討 AI 基礎建設（硬體）在經歷兩年大年後，市場正進入估值修正階段，而下一個機會可能轉向軟體應用。他分析了大型與小型軟體公司在 To C 與 To B 市場的競爭格局，指出 To B 軟體因高度客製化與資料整理的 Know-how，仍具備護城河。針對大盤，他觀察到台股持續破底，美股 Nasdaq 雖未創波段新低但仍面臨修正壓力，預期下週一可能出現融資斷頭的恐慌殺盤，並計畫逐步將現金部位打入，尋找相對強勢的大型權值股進行布局。", "topics": ["參訪台股軟體公司與 AI 軟體產業觀察", "AI 基礎建設（硬體）與軟體應用的發展階段對比", "大型與小型軟體公司在 To C 與 To B 市場的競爭格局", "To B 軟體導入企業的痛點與資料整理模組化 Know-how", "台股與美股大盤走勢分析與融資維持率觀察", "面對恐慌殺盤時的資金配置與相對強勢股（TSMC、聯發科、台達電）布局策略", "聽眾問答：量子電腦、資產配置、房貸增貸、傳產接班與生活分享"], "market_view": "大盤持續破底且融資維持率偏低，預期下週一可能出現恐慌大殺盤，計畫將部分現金部位打入，尋找相對強勢的大型權值股進行布局。", "industries": [{"name": "AI硬體/基礎建設", "stance": "中性", "view": "經歷兩年大年後，目前進入估值修正階段，未來即便營收獲利漂亮，也難現過去的狂飆重估。"}, {"name": "AI軟體/應用", "stance": "看多", "view": "硬體建設完成後，市場機會將轉向軟體，尤其是具備高度客製化與資料整理能力的 To B 專業軟體。"}], "tickers": [{"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "看多", "argument": "屬於高度客製化的軟體公司，切入的產業具備護城河，是未來篩選軟體股的 Top Pick 範例。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "面臨外資瘋狂提款的壓力，需觀察外資何時賣完以及台幣貶值走勢。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "看多", "argument": "股價走勢相對大盤非常強勢，可能與其 ASIC 布局及未來重估的故事有關。"}, {"symbol": "2308", "name": "台達電", "market": "TW", "stance": "看多", "argument": "在大型權值股中表現相對強勢，是拉回時會優先考慮買進的標的。"}], "quotes": ["估值高低不能只看本益比倍數，必須同時考量其稅後盈餘的成長率，否則估值就會給得離拉拉。", "To B 軟體的導入本質上是服務業，需要深入企業理解運作並進行資料清洗與模組化，這不是大型巨頭推一個通用模型就能輕易解決的。", "在大家大停損的時候去買，考驗的是個人的耐受度，每個人要根據自己的條件與風險承受度去做資產規劃。"], "ep_key": "EP544", "title": "EP544 | 🐋", "pubdate": "2025-03-29", "duration_s": 3194, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了即將迎來二寶預產期的消息，並說明因不採取催生，後續節目播出時間可能因生產而有所調整。在市場與總經方面，第一季即將結束，主持人進行了投資檢討，指出美股因先前科技股回檔及特斯拉、蘋果、美光等標的下跌，導致第一季前半的獲利回吐甚至轉負，台股則維持在負 10% 左右。目前市場量能顯著萎縮，反映出地緣政治擔憂與清明連假前的觀望氣氛。對於 AI 產業，主持人分析了阿里巴巴蔡崇信對 AI 泡沫化的警示，認為四大 CSP 因算力自用，泡沫化風險較低，但需留意租賃業者（如 CoreWeave）的潛在風險；同時指出中國因制裁限制，正蓬勃發展邊緣運算（Edge AI）與 GB10、H20 等替代方案。", "topics": ["二寶預產期與節目播出時間調整說明", "第一季投資績效檢討與財富效應對消費的影響", "台美股大盤走勢、量縮原因與川普關稅政策的後續影響", "阿里巴巴蔡崇信對 AI 泡沫化警示的解讀與 CSP 算力自用分析", "中國 AI 算力需求轉向邊緣運算（Edge AI）與 GB10、H20 的發展趨勢", "聽眾問答：親子關係、華碩呆帳收回、五大半導體設備商比較、Garmin 投資看法"], "market_view": "目前大盤處於較不利的格局，台股量能顯著萎縮，市場在清明連假與川普對等關稅政策明朗前觀望氣氛濃厚，操作上建議持續保留較多現金以維持彈性。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "整體算力需求持續上升，但需注意 Data Center 佔比可能下降，邊緣運算（Edge AI）佔比將拉高。"}, {"name": "AI算力租賃", "stance": "看空", "view": "租賃業者（如 CoreWeave）若面臨微軟等大客戶需求飽和，可能面臨較大的估值擠壓與泡沫化風險。"}, {"name": "半導體設備", "stance": "中性", "view": "五大設備商（ASML、AMAT、LRCX、TEL、KLA）各有專精，其中 ASML 在曝光機獨大，KLA 專精於製程控制與量測。"}], "tickers": [{"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "第一季因股價跌幅較大，對整體美股部位績效造成顯著拖累。"}, {"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "持有中", "argument": "第一季進行抄底，但後續股價表現不佳，拖累整體績效。"}, {"symbol": "MU", "name": "美光", "market": "US", "stance": "持有中", "argument": "第一季進行抄底，但隨後股價下跌，導致獲利回吐。"}, {"symbol": "2357", "name": "華碩", "market": "TW", "stance": "觀察", "argument": "先前傳出的呆帳已順利收回，且身為 NVIDIA GB10 的主要供應商，後續動向值得關注。"}, {"symbol": "GRMN", "name": "Garmin", "market": "US", "stance": "觀察", "argument": "是非常優秀且產品穩定的公司，但因個人偏好較少投資消費性電子品牌，故未納入核心持股。"}], "quotes": ["財富效應是真實存在的，當股票資產縮水時，人們在日常消費上確實會變得更加緊縮與保守。", "在面臨波動與修正的行情中，持續握有一些現金是必要的，這能讓你在市場出現機會時擁有更多的彈性。", "AI 算力需求絕對會持續上升，但其構成正在發生變化，特別是邊緣運算（Edge AI）在中國市場的發展速度可能會超乎預期。"], "ep_key": "EP543", "title": "EP543 | 🎁", "pubdate": "2025-03-26", "duration_s": 3049, "has_tr": true}, {"summary": "本集節目由眠豆腐贊助。主持人謝孟恭分享了近期對中國與台灣人共識的觀察，並探討了愛國流量變現的荒謬現象。針對美股與台股大盤，他指出雖然近期出現回檔，但只要川普不釋出利空，市場仍有機會迎來反彈。此外，他深入分析了 GTC 大會後 ASIC 產業的發展，認為雖然 NVIDIA 推出 Rubin 平台，但 CSP 廠商與特斯拉等大買家仍有強烈動機開發自研 ASIC，並看好聯發科與 NVIDIA 合作的 Premium ASIC 服務將成為其未來重要成長動能。", "topics": ["眠豆腐 2.0 與芝麻豆腐床墊推薦", "愛國流量變現與背骨仔現象觀察", "美股與台股大盤走勢與反彈預期", "NVIDIA GTC 大會後的 ASIC 產業趨勢", "聯發科與 NVIDIA 合作 Premium ASIC 服務", "聽眾問答：投資心態、體檢、ASIC 股、CB 債與生活分享"], "market_view": "雖然近期大盤出現回檔，但只要川普不釋出利空，市場仍有機會迎來反彈，目前操作上偏向挑選穩健便宜、估值較低的股票。", "industries": [{"name": "ASIC", "stance": "看多", "view": "雖然 NVIDIA 推出 Rubin 平台，但 CSP 廠商與特斯拉等大買家仍有強烈動機開發自研 ASIC，產業能見度持續看好。"}, {"name": "半導體", "stance": "中性", "view": "NVIDIA 產品線更新速度極快，雖然對供應鏈帶來拉動，但也需注意 component 備料與實際出貨量之間的落差風險。"}], "tickers": [{"symbol": "MTK", "name": "聯發科", "market": "TW", "stance": "看多", "argument": "與 NVIDIA 合作 Premium ASIC 服務，未來在 ASIC 與 AI 相關收入可望顯著成長，成為重要動能。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "argument": "產品線更新速度極快，透過 NVLink 與交換器等技術優勢，持續擴大其在 AI 領域的生態系與影響力。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "雖然積極採購 NVIDIA GPU，但其自研的 Dojo 晶片仍貢獻了 10% 到 20% 的算力，並將持續推進。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "作為主要的 ASIC 合作夥伴之一，持續受益於 CSP 廠商的自研晶片需求。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "argument": "在 ASIC 領域與 CSP 廠商有密切合作，雖然部分業者表現有起伏，但整體趨勢仍向上。"}, {"symbol": "3661", "name": "世芯-KY", "market": "TW", "stance": "觀察", "argument": "作為台股指標性 ASIC 業者，持續受到市場關注其在自研晶片市場的定位。"}, {"symbol": "3443", "name": "創意", "market": "TW", "stance": "觀察", "argument": "台股大型 ASIC 業者之一，在整體自研晶片趨勢下具備市場期待。"}], "quotes": ["如果一個人他講的話跟他做的事情是有衝突的話，你儘量都是先相信他做的事情，他的身體在哪，那個是很老實的。", "不要去相信說有人可以知道什麼地方是行情的最高點和最低點，那個是沒有意義的事情，你就是儘量的還是要去做出對應的調整。"], "ep_key": "EP542", "title": "EP542 | 🤡", "pubdate": "2025-03-22", "duration_s": 3016, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期個人生活近況與對股市波動的心態調整。他指出當前全球股市（除歐股、港股外）正經歷估值修正（修估值），而非基本面轉壞。針對 NVIDIA 的 GTC 大會，他認為發表內容多在市場預期內、缺乏驚喜，但強調從 NTM 估值來看 NVIDIA 並未高估。此外，他詳細解析了 CPO（光電共封裝）與銅導線在傳輸距離上的應用趨勢，並提醒投資人注意 NVIDIA 產品快速迭代可能引過度下單（重複下單）與供應鏈調整的潛在隱憂。", "topics": ["主持人生活近況與錢包遺失插曲", "股市波動心態與防守實力考驗", "NVIDIA GTC 大會發表內容與市場反應分析", "CPO（光電共封裝）與銅導線傳輸技術趨勢", "NVIDIA 產品快速迭代與重複下單的潛在風險", "聽眾問答：投資規劃、財務報表觀察指標、公家機關數位轉型、遊戲虛寶交易等"], "market_view": "當前全球股市正經歷政策盤主導的估值修正階段，基本面並未看到立即性的壞消息，應以保守防守姿態應對波動。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "NVIDIA 產品迭代極快，需注意供應鏈調整與客戶重複下單後續修正的風險。"}, {"name": "光通訊/CPO", "stance": "看多", "view": "隨著傳輸距離拉長與降低能耗需求，光通訊與 CPO 相關類股是長期明確且充分反映的趨勢。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "view": "GTC 大會缺乏驚喜，但 NTM 估值約 20 倍出頭並不算高估，需留意新舊產品交替對訂單的影響。"}, {"symbol": "TSM", "name": "台積電", "market": "US", "stance": "觀察", "view": "股價回檔碰觸先前低點，若跌破則提供資金進場收拾的機會。"}, {"symbol": "3017", "name": "奇鋐", "market": "TW", "stance": "觀察", "view": "水冷散熱技術在後續產品（如 Ruby Ultra）的架構變化中，其晶片與散熱規劃需重新定義。"}, {"symbol": "2382", "name": "廣達", "market": "TW", "stance": "觀察", "view": "目前貢獻營收的多為舊款 Hopper 產品，Blackwell 實際出貨量可能低於市場預期。"}, {"symbol": "2317", "name": "鴻海", "market": "TW", "stance": "觀察", "view": "目前營收主要由舊款產品貢獻，需注意新舊產品交替期的訂單調整。"}], "quotes": ["股票市場是唯一一個打折大家會覺得很難過的地方，其他地方打折大家都很高興。", "如果進攻時可以賺到錢，防守時可以賠少一點，長期下來的績效就會比較好。", "策略如果規劃好了，在還沒有達到設定的降部位或停損時機之前，就不應該隨意去調整它。"], "ep_key": "EP541", "title": "EP541 | 🦊", "pubdate": "2025-03-19", "duration_s": 2997, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期在市場「人道走廊」開啟後的減碼策略，目前已將現金水位調整至預期目標，並計劃在指數反彈至月季線附近時進行下一階段減碼，以維持約20%的現金。他強調市場常有估值修正與恐慌，投資人應保持理性並控管資金。產業方面，他持續看好AI硬體、光通訊及軟體股的長期趨勢，並針對台股板卡廠、記憶體及美股AI硬體股進行了佈局調整。此外，他也分享了個人對「驚喜」與接電話的厭惡，並在QA環節解答了聽眾關於大額資金分批投入、台美股配置、軟體股前景及生活態度的提問。", "topics": ["人道走廊與減碼策略", "市場估值修正與資金控管", "台股與美股近期操作調整", "AI硬體、光通訊與軟體產業前景", "個人生活態度與對驚喜的厭惡", "聽眾QA：大額資金投入、台美股配置、軟體股與生活問題解答"], "market_view": "目前市場處於人道走廊反彈階段，建議趁反彈適度減碼、保留現金以應對後續波動，但整體基本面仍在改善中。", "industries": [{"name": "板卡/顯示卡", "stance": "看多", "view": "第四季財報利空出盡後，受惠於Nvidia與AMD新卡推出及AI邊緣運算需求，今年表現看好。"}, {"name": "記憶體", "stance": "中性", "view": "NAND表現預期優於DRAM，但因廠商產能未拉滿，後續價格漲幅可能不如預期，已適度調節。"}, {"name": "AI硬體/光通訊", "stance": "觀察", "view": "長期需求無虞，但短期估值修正且跌速過快，需觀察GTC大會能否持續帶動硬體與光通訊需求。"}, {"name": "軟體", "stance": "看多", "view": "在硬體資本支出面臨變現壓力的情況下，軟體股有必須展現營收與獲利增長的壓力，長期仍具表現機會。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "view": "股價修正至便宜價位，長期基本面無虞，但短期因應現金調度而有所調節。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "觀察", "view": "新卡推出預期將帶動板卡市場需求。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "觀察", "view": "政府相關營收佔比較高，需注意美國政府縮減預算及關稅戰帶來的潛在影響。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "view": "政府營收佔比約十幾趴，需注意政府預算縮減的潛在影響。"}, {"symbol": "ORCL", "name": "Oracle", "market": "US", "stance": "觀察", "view": "政府營收佔比約十幾趴，同樣面臨政府預算縮減的潛在影響。"}], "quotes": ["最好的狀況當然是不要等到反彈才減碼，一般跌破的時候就可以考慮減碼了，但是這一波最主要的原因是因為它下跌的實在是太快了。", "當你手上是有扣著一些現金的話，你看到崩盤，一般來講你是會很興奮的；但如果你手上是沒有現金的話，你看到崩盤會非常非常的緊張。", "環境其實超級重要，環境的重要性是遠大於大家的想像。當你身邊環繞的是一群強者的話，你就會一直變強。"], "ep_key": "EP540", "title": "EP540 | 🧋", "pubdate": "2025-03-15", "duration_s": 2989, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了義大利好友 Fernando 逝世的感傷故事，並藉此提醒聽眾珍惜當下、專心過好生活。針對市場，他認為大盤格局已轉為偏空，反彈若無力站回主要均線即是確立轉空，因此他採取保守態度，持續減碼「制服股」（同業皆有的持股）與融資水位較高的標的，保留 solid EPS 的公司。此外，他討論了 CoreWeave 獲得 OpenAI 百億美元合約的潛在利多，以及台積電、AMD、NVIDIA、Intel 等成立 JV 的傳聞。最後，他分析了川普關稅政策對資本市場的衝擊，並指出其對盟友的施壓將增加市場判斷的難度。", "topics": ["義大利好友 Fernando 逝世的感悟與珍惜當下", "市場格局轉空與持股部位調整策略", "CoreWeave 獲得 OpenAI 百億美元合約之影響", "台積電、AMD、NVIDIA、Intel 成立 JV 的傳聞分析", "川普關稅政策與其對資本市場的衝擊"], "market_view": "市場整體格局已轉為偏空，若反彈無力站回主要均線即確立轉空，操作上應轉向保守並持續調降部位。", "industries": ["AI伺服器", "中性", "CoreWeave 獲得 OpenAI 合約可能帶動相關租賃與 GPU 業者，但需注意大客戶微軟下調訂單的風險。"], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "argument": "作為 AI 核心，其估值已相對便宜，若其估值受壓，其他高估值 AI 股將更危險。"}, {"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "觀察", "argument": "作為多軍燈塔之一也出現暴跌，顯示市場情緒極差，但其生態系穩健，長期 AI 整合仍具優勢。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "因 JV 傳聞在盤前有所動作，但需注意可能只是反彈讓資金逃王的契機。"}, {"symbol": "TSM", "name": "台積電", "market": "US", "stance": "觀察", "argument": "參與 JV 傳聞，但在台灣盤中時間並未對此消息做出強烈股價反應。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "雖然股價波動大且面臨修正，但因個人長期使用其產品且信仰高，以部位上限控制風險而不輕易停損。"}], "quotes": ["我們不能夠改變的是動態的世界，可是我們可以改變的是我們要怎麼去面對這個世界。", "當市場上有一家核心、最厲害的公司躺在那邊估值便宜，而其他高估值的公司卻沒有人要買，那你怎麼會覺得你可以撐一個很高的估值？", "與其去試著挑戰那些不可以決定的事情，讓自己更加難過，那不如就當你做好一切準備，就好好享受生命。"], "ep_key": "EP539", "title": "EP539 | 🕊️", "pubdate": "2025-03-12", "duration_s": 2999, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期美股大盤（特別是科技股與那斯達克）面臨劇烈回檔的個人心路歷程與應對策略，強調維持一定現金部位與降低槓桿的重要性。隨後詳細解析了博通（Broadcom）最新財報與法說會釋出的訊號，探討非 AI 業務復甦遲緩的現象，並深入剖析博通在客製化晶片（ASIC）市場的競爭版圖、潛在的四大新客戶（包含 Open AI、Apple、SoftBank/Arm、Fujitsu 等），以及與 NVIDIA 在 AI 晶片市場的競合關係。最後，主持人也對川普政府的關稅政策與地緣政治對半導體供應鏈的影響發表看法，並在 Q&A 環節解答聽眾關於投資心態、客製化晶片供應鏈、算命、當沖與兒童社會化等多元問題。", "topics": ["美股大盤劇烈回檔的心得與資金配置策略", "博通（Broadcom）財報與非 AI 業務復甦狀況分析", "博通 ASIC 客製化晶片市場版圖與潛在四大新客戶預測", "博通與 NVIDIA 在 AI 晶片市場的競爭與合作關係", "川普關稅政策與地緣政治對半導體供應鏈（台積電、日本）的影響", "聽眾問答：投資心態、ASIC 供應鏈、算命看法、當沖與兒童社會化"], "market_view": "大盤面臨劇烈回檔，建議投資人降低槓桿並維持一定比例的現金部位，但仍應在市場中維持基本持股以防錯過反彈。", "industries": [{"name": "半導體/ASIC", "stance": "看多", "view": "客製化晶片（ASIC）市場持續成長，博通作為龍頭將與 NVIDIA 的通用 GPU 形成雙雄競爭格局。"}, {"name": "非AI半導體", "stance": "觀察", "view": "非 AI 業務復甦進度持續低於預期，可能因過去幾年過度擴產導致供過於求，需拉長觀察期。"}], "tickers": [{"symbol": "AVGO", "name": "博通", "market": "US", "stance": "看多", "argument": "AI 相關業務成長強勁，且擁有 Google、Meta、ByteDance 等大客戶，未來更有四大潛在客製化晶片新客戶加入。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "通用 GPU 依然強勢，但未來將直接面臨博通主導的 ASIC 陣營在市佔率上的競爭。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "赴美投資研發中心是因應地緣政治與客戶需求的戰略布局，台灣仍保有製程技術的絕對優勢。"}, {"symbol": "MRVL", "name": "邁威爾科技", "market": "US", "stance": "觀察", "argument": "雖然近期股價面臨修正，但在 AWS 客製化晶片與 Google CPU 合作上仍有持續關注的價值。"}, {"symbol": "3661", "name": "世芯-KY", "market": "TW", "stance": "觀察", "argument": "在 ASIC 供應鏈中扮演重要角色，主要承接 Intel 等客戶的後端設計服務。"}], "quotes": ["現金為王這句話聽聽就好，因為講現金為王的人，很多時候在市場殺下來時一路現金為王，反彈上去也還是現金為王，根本不敢買。", "在股票市場要賺錢，有時候就是要先學會怎麼樣去賠錢，學會怎麼樣去吃一些回檔，因為不可能每次都是風和日麗。", "放下其實並不是原諒你的前東家或前老闆，你是原諒你自己，因為你不用再花寶貴的時間與腦力去讓他們更痛苦。"], "ep_key": "EP538", "title": "EP538 | 🐟", "pubdate": "2025-03-08", "duration_s": 2988, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了將當年的「培訓機師準備講義」傳承給朋友的感觸，並探討了年輕人在職場上面臨的「畫大餅」與「實際薪酬」的拉鋸。針對台積電對美投資 1000 億美元的協議，主持人認為此 deal 談得極好，不僅避開了與 Intel 合資的潛在陷阱，也為川普政府做足了面子，且無明確時程壓力，具備高度轉換彈性。此外，主持人分析了 AI 算力租賃公司 CoreWeave 的 IPO 招股書，指出其在營收暴增的同時淨虧損持續擴大，並對台灣盲目跟風算力租賃與大模型開發的趨勢表示擔憂，預期未來可能面臨嚴重的財務與折舊壓力。", "topics": ["培訓機師準備講義的傳承與職涯感悟", "年輕人在職場上面臨的畫大餅與薪酬現實", "台積電對美投資 1000 億美元協議的深度解析", "CoreWeave IPO 招股書揭露的財務赤字與折舊風險", "對台灣發展算力租賃與大模型趨勢的擔憂", "聽眾問答：0050 拆股、特斯拉的估值看點、免治馬桶與滑雪計畫"], "market_view": "大盤與個股在壞消息環伺、股價下跌時，往往才是能買到好價格的時機，投資需具備承受波動的胃納量。", "industries": [{"name": "半導體", "stance": "看多", "view": "台積電對美投資協議談得極好，具備高度轉換彈性，且海外布局是因應台灣水電與人才限制的必然規劃。"}, {"name": "AI算力租賃", "stance": "看空", "view": "算力租賃與大模型開發恐為錢坑，隨著 GPU 快速迭代，業者將面臨巨大的折舊與消價競爭壓力。"}, {"name": "電動車", "stan
