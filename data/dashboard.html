以把它整個弄到爆掉，所以我們就要放寬心。", "當大家都上車的時候呢，風向就變了。", "股票是在什麼時候最會漲？朦朧美的時候，大家算不到一個終局，大家不知道說它會紅多久，這種東西呢，你會注意到在市場裡面是特別噴的。", "資訊這種東西，你與其有所謂的100條線，然後這100條線都是雜訊，你不如有兩條超級純的，這兩條線就可以做股票，你根本不需要100個。"], "ep_key": "EP678", "title": "EP678 | 🎮", "pubdate": "2026-07-11", "duration_s": 3166}, {"summary": "主持人分享了關於年齡增長、育兒觀念的個人反思，並倡導平衡使用科技。他分析了當前股市，指出大盤從大型股轉向中小型股的輪動，以及市場領導地位的變化。他批評了聲稱能預測市場下跌的分析師，強調許多「壞消息」僅是短期雜訊或已知產業挑戰。主持人闡述其投資哲學，優先考慮長期、基本面驅動的策略，而非短期投機。他也深入探討AI科技產業趨勢，包括新產品潛在延遲及AI對就業影響的敘事演變，並回應聽眾關於市場展望和個人理財的問題。", "topics": ["個人生活與育兒哲學", "台股與全球市場動態", "投資心態與風險控管", "AI產業技術與發展挑戰", "市場資訊解讀與分析師角色", "槓桿操作與投機風險", "熊市與市場修正的應對", "長期投資與選股策略"], "market_view": "中性偏多，認為市場尚未走完，但需關注輪動與資金流向。", "industries": [{"name": "半導體", "stance": "看多", "view": "儘管有短期逆風和延遲，長期趨勢不變，仍是核心投資主軸。"}, {"name": "AI伺服器", "stance": "看多", "view": "仍是市場主流，但需注意短期波動和供應鏈的延遲問題。"}, {"name": "被動元件", "stance": "觀察", "view": "過去是法人主力，但目前多數進入修正，需觀察是否能持續反彈。"}, {"name": "功率元件", "stance": "看多", "view": "相對強勢，但市值較小，大型法人資金不易進入，需關注後續發展。"}, {"name": "軟體股", "stance": "看多", "view": "隨著AI發展，部分軟體股的敘事和基本面正在轉好，有機會表現。"}, {"name": "資安股", "stance": "看多", "view": "儘管市場曾有疑慮，但基本面強勁，且AI時代需求持續增長。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "AI核心，儘管預期高，但長期仍看好其產業地位。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "持有中", "argument": "AI核心強者，價格便宜且具成長潛力，長期持有。"}, {"symbol": "Tesla", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "偏信仰股，個人看好馬斯克及其公司發展，儘管有波動仍持有。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "個人最喜歡的軟體股之一，形態良好，若持續上漲會考慮加碼。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "持有中", "argument": "個人最喜歡的軟體股之一，形態良好，若持續上漲會考慮加碼。"}, {"symbol": "CLSK", "name": "CleanSpark", "market": "US", "stance": "持有中", "argument": "個人最喜歡的軟體股之一，形態良好，若持續上漲會考慮加碼。"}, {"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "觀察", "argument": "若資金從CPU轉出，可能會考慮轉向蘋果等巨頭。"}, {"symbol": "GOOG", "name": "Google", "market": "US", "stance": "觀察", "argument": "若資金從    <ul class="plain">${(a.topics||[]).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>
   <ul class="plain">${(a.quotes||[]).map(t=>`<li>💬 ${esc(t)}</li>`).join("")}</ul>
   <ul class="tl">${(a.tickers||[]).map(t=>`<li>${tag(t.stance)}<b>${esc(t.symbol)}</b> ${esc(t.name)} — ${esc(t.argument)}</li>`).join("")}</ul>
   </details></div>`;}
 }else{
  const src=cur==="tk"?TK:IND;
  const keys=Object.keys(src).sort((a,b)=>src[b].mentions-src[a].mentions);
  for(const k of keys){
   const r=src[k],txt=(k+JSON.stringify(r)).toLowerCase();
   if(q&&!txt.includes(q))continue;
   h+=`<div class="card"><h3>${esc(k)} ${r.name&&r.name!==k?esc(r.name):""}
   ${tag(r.latest_stance)}</h3>
   <div class="dim">提及 ${r.mentions} 次 · 最近 ${esc(r.latest_date)}</div>
   <details ${q?"open":""}><summary>立場時間軸</summary><ul class="tl">
   ${r.timeline.map(e=>`<li>${tag(e.stance)}<b>${esc(e.ep)}</b> <span class="dim">${esc(e.date)}</span> ${esc(e.argument||e.view)}</li>`).join("")}
   </ul></details></div>`;}
 }
 v.innerHTML=h||'<p class="dim">沒有符合的資料</p>';
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
 cur=b.dataset.v;document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x===b));render();});
$("#q").oninput=render;
$("#meta").textContent=`${EPS.length} 集 · ${Object.keys(TK).length} 檔標的 · ${Object.keys(IND).length} 個產業`;
render();
</script></body></html>
