導體產業，因歐美大廠交期過長，產生「排擠效應」使台灣二、三線供應商受惠。主持人強調，儘管頂級需求仍集中於歐美韓IDM，但產能瓶頸使台灣廠商獲得認證與出貨機會。同時，消費性與車用電子市場的疲軟，反而抑制了整體通膨，讓AI產業的成長得以持續。主持人也分享了在林口投資在地小生意的經驗，強調尋找有決心且願意投入的團隊。對於AI對軟體工程師的影響，他認為這是一個轉型而非淘汰，工程師將從重複性工作轉向更高層次的產品設計與問題解決，AI將作為生產力工具。整體投資策略應著重於觀察市場現象、適應變化，並專注於創造價值，而非預測未來。", "topics": ["台灣股市與總經展望", "功率半導體產業分析", "AI伺服器需求與供應鏈", "消費性及車用電子市場現況", "在地小型企業投資策略", "AI對軟體工程師職涯的影響", "投資哲學與市場輪動", "個人生活與健康議題"], "market_view": "台灣股市指數已創歷史新高，顯示先前的修正已結束，市場應以正向態度看待。", "industries": [{"name": "半導體", "stance": "看多", "view": "AI伺服器需求帶動功率半導體產業，歐美大廠交期過長使台灣供應商受惠，產能是關鍵瓶頸。"}, {"name": "AI伺服器", "stance": "看多", "view": "作為當前市場成長的主要驅動力，對特定零組件產生巨大需求，並帶動整個功率半導體供應鏈。"}, {"name": "消費性電子", "stance": "看空", "view": "市場表現疲軟，但這反而有助於抑制通膨，讓AI產業的成長得以持續而不致過熱。"}, {"name": "車用電子", "stance": "看空", "view": "與消費性電子類似，市場表現不佳，有助於維持整體經濟的穩定，避免AI帶來的過度通膨。"}, {"name": "被動元件", "stance": "觀察", "view": "部分大型被動元件表現強勁，但市場關注點已轉移，部分領域出現震盪。"}, {"name": "機器人", "stance": "觀察", "view": "仍處於萌芽階段，部分工業零件廠商的機器人相關營收有所增加，但需等待更實質的營收獲利驗證。"}, {"name": "生技股", "stance": "觀察", "view": "主持人表示不甚了解，認為許多公司缺乏營收獲利卻股價飆漲，屬於高風險的「深水區」投資。"}], "tickers": [{"symbol": "德州儀器", "name": "德州儀器", "market": "US", "stance": "觀察", "argument": "作為IDM大廠，其功率半導體產品交期長，是市場需求旺盛的指標之一。"}, {"symbol": "STM", "name": "意法半導體", "market": "other", "stance": "觀察", "argument": "作為IDM大廠，其功率半導體產品交期長，是市場需求旺盛的指標之一。"}, {"symbol": "安森美", "name": "安森美", "market": "US", "stance": "觀察", "argument": "作為IDM大廠，其功率半導體產品交期長，是市場需求旺盛的指標之一。"}, {"symbol": "國巨", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "大型被動元件公司，儘管市場關注點轉移，但仍表現強勁。"}, {"symbol": "蒙恬", "name": "蒙恬", "market": "TW", "stance": "觀察", "argument": "聽眾提及的股票，近期有顯著漲幅，但主持人未明確分析其基本面。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "看多", "argument": "主持人曾買入並意外獲得高報酬，顯示其在特定時期有強勁表現。"}], "quotes": ["你只要一直去追求說，要看誰準不準什麼的，你就注定要當韭菜給人家割，因為真的沒有人知道明天會發生什麼事情。大家都是在見招拆招。", "當一個東西已經正式的表態，然後開始一堆的媽法人衝進去的時候，就是所有的研究力量都在這邊。所以如果它是假貨的話，它會在未來的一陣子立刻就A下來。", "對我們來講，反正這個錢在市場裡面滾絕對是最快的啦，但如果說有一點餘裕可以稍微的去推一下在地的一些發展。"], "ep_key": "EP672", "title": "EP672 勢。", "topics": ["Computex 2024 趨勢與觀察", "NVIDIA 的策略轉變與產品發布", "Marvell 股價波動與市場影響", "AI PC 的發展與挑戰", "資料中心光學互連技術", "開源與閉源 AI 模型之競合", "市場心理與投資策略", "功率半導體產業展望"], "market_view": "主持人認為市場仍處於多頭格局，但需留意修正與盤整，並關注資金輪動。", "industries": [{"name": "半導體/AI伺服器", "stance": "看多", "view": "NVIDIA引領AI發展，從GPU擴展至整體解決方案，光學互連是未來趨勢。"}, {"name": "AI PC", "stance": "觀察", "view": "AI PC若能實現離線AI處理將有巨大潛力，帶動新一波銷量，但仍需觀察其市場接受度。"}, {"name": "資料中心", "stance": "看多", "view": "光學互連將取代銅線，CPO是關鍵，資料中心仍會成長但部分工作將轉移至地端。"}, {"name": "功率半導體", "stance": "觀察", "view": "基本面改善，可能成為下一波題材，但市場偏好高本益比的「雙擊」股。"}, {"name": "被動元件", "stance": "觀察", "view": "AI PC將使用更高規格的被動元件，若AI PC銷量好可望受惠。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "argument": "領導AI發展，從GPU擴展至整體解決方案，市場影響力巨大。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "argument": "黃仁勳點名後股價飆漲，但其ASIC/DSP能力仍在發展中，市場反應過度。"}, {"symbol": "TSM", "name": "TSMC", "market": "US", "stance": "看多", "argument": "晶圓代工龍頭，基本面強勁，有望受投信資金回流帶動。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "晶圓代工龍頭，基本面強勁，有望受投信資金回流帶動。"}, {"symbol": "ON", "name": "ON Semiconductor", "market": "US", "stance": "觀察", "argument": "功率元件/半導體基本面良好，可能成為下一波題材。"}, {"symbol": "ADI", "name": "Analog Devices", "market": "US", "stance": "觀察", "argument": "功率元件/半導體基本面良好，可能成為下一波題材。"}, {"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "觀察", "argument": "大盤代表，適合長期持有，再平衡策略的考量標的。"}, {"symbol": "0050正2", "name": "元大台灣50正2", "market": "TW", "stance": "觀察", "argument": "槓桿型產品，風險報酬較高，適合特定市場條件。"}], "quotes": ["「當你把一些事情慢下來之後，那又有新的一番風味。」", "「你確實是有辦法去，當我今天可能知道你喜歡的口味是什麼，那我也有辦法把它具象化形容出來，我把這個語言給參透之後，我可以去抓到，不管是自己或身邊你愛的人你喜歡的人，或甚至是你新交的朋友你喜歡的東西可能是什麼，我可以立刻的去做一些聯想。」", "「行情只要走到極端，就有很多怪咖會跑出來。」"], "ep_key": "EP667", "title": "EP667 | 🌍", "pubdate": "2026-06-03", "duration_s": 3051, "has_tr": false}, {"summary": "本集節目分為生活感悟與市場分析兩部分。主持人分享了透過放慢生活步調、專注於日常小事來提升生活品質的體驗，並將其與內觀、禪修的概念連結，強調這種「儀式感」能幫助人更深刻感受生活美好，甚至對身體健康也有益。在市場分析方面，主持人指出當前市場極度瘋狂，許多股票被處置 持續修正，但個股表現分化，被動元件等強勢族群逆勢創高，整體仍屬健康的輪動格局。", "industries": [{"name": "被動元件", "stance": "看多", "view": "大廠 Panasonic 已發出部分漲價信，現貨市場出現掃貨潮，供需失衡將推動漲價潮持續延續。"}, {"name": "半導體/AI晶片", "stance": "觀察", "view": "Broadcom 與 MediaTek 在客製化 AI 晶片（ASIC）領域持續競爭，產品線規劃出現雙拼（Chiplet）等新設計。"}, {"name": "載板", "stance": "看多", "view": "受惠於晶片雙拼（雙晶片封裝在同一載板上）等大顆晶片設計趨勢，載板產業後續仍有新的故事與成長空間。"}, {"name": "光通訊", "stance": "看多", "view": "雖然短期股價因市場獲利了結而回檔，但長期成長趨勢不變，未來仍是 AI 投資的重點領域。"}], "tickers": [{"symbol": "6756", "name": "威鋒電子", "market": "TW", "stance": "觀察", "view": "聽眾問答提及，主持人未特別表態。"}, {"symbol": "6531", "name": "愛普*", "market": "TW", "stance": "觀察", "view": "先前市場不看好，但隨著 Google TPU 採用其 IPD（整合被動元件）技術而重新獲得市場關注。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "view": "在 AI 晶片（ASIC）領域與 MediaTek 競爭，後續可能將 V10（Icefish）提前推出。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "view": "在客製化 AI 晶片領域與 Broadcom 競爭，雙方在不同世代的晶片中各有斬獲。"}, {"symbol": "6526", "name": "達發", "market": "TW", "stance": "觀察", "view": "聽眾問答提及，主持人未特別表態。"}], "quotes": ["所有你覺得很舒服的姿勢，它可能都是正在害你，因為你的身體已經忘記如何做正了。", "不要輕易把每個市場操作都當成白痴，當你看到供需失衡、價格上漲，大廠去現貨市場掃貨是合理的商業避險行為，而非單純的炒作。", "做股票要看遠方，就像飛機降落時不能只看眼前的跑道，要看遠處才能調整好姿態。吃大魚就要能忍受過程中的震盪。"], "ep_key": "EP663", "title": "EP663 | 🦘", "pubdate": "2026-05-20", "duration_s": 2998, "has_tr": false}, {"summary": "在本集節目中，主持人分享了其創投「曉南資本」在台灣獨立遊戲的投資進展，並感性分享二兒子出生前的健康波折與對台大兒醫施景中醫師的感謝。針對股市，主持人分析週五大盤大跌為急漲後的正常能量釋放，修正時間應不會太長，且目前並未感受到市場主力恐慌。他指出老 AI 股因毛利不如預期而大跌僅是短期研發投入的影響，並看好台積電在金管會放寬投信持股上限後的資金效應。此外，他看多美股資安板塊（如 CrowdStrike）及被動元件產業（如電阻、電容因大廠松下漲價及成本上升迎來漲價潮），並持續關注光通訊、成熟製程與功率元件。", "topics": ["曉南資本與台灣獨立遊戲投資進展", "感恩台大兒醫施景中醫師與個人家庭故事分享", "週五大盤大跌之大盤與總經局勢判斷", "老 AI 股毛利修正與台積電投信資金流向分析", "美股軟體與資安板塊（如 CrowdStrike）強勢表現", "被動元件（電阻、電容、MLCC）與功率元件漲價潮分析"], "market_view": "週五大盤大跌是急漲後的正常能量釋放，修正時間應該不會拖太長，且目前並未感受到市場主力恐慌。", "industries": [{"name": "半導體/台積電", "stance": "看多", "view": "金管會放寬投信持股上限，未來一兩個月投信修改條款後將有更多資金流入台積電。"}, {"name": "AI伺服器/老AI", "stance": "中性", "view": "老AI因毛利表現不如預期而修正，但這僅是短期研發與迭代成本上升，長期趨勢並未看空。"}, {"name": "資安/軟體", "stance": "看多", "view": "美股資安股如 CrowdStrike 逆勢創新高，軟體板塊在經歷修正後開始出現轉強訊號。"}, {"name": "被動元件", "stance": "看多", "view": "電阻因銀價上漲、電容因松下（Panasonic）大漲 SP-CAP 價格三成，預期將迎來全面漲價潮。"}, {"name": "功率元件/電源", "stance": "看多", "view": "新電源櫃對功率元件需求大增，美系大廠與日廠羅姆（Rohm）皆陸續調升價格。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "金管會放寬投信持股上限，預期未來一兩個月投信修改契約後將有新一波資金進駐。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "看多", "argument": "資安龍頭逆勢創下新高，顯示市場對資安需求的強勁與板塊的韌性。"}, {"symbol": "TEAM", "name": "Atlassian", "market": "US", "stance": "觀察", "argument": "軟體股板塊中被提及，可注意軟體股整體的集體表態。"}, {"symbol": "2404", "name": "漢唐", "market": "TW", "stance": "觀察", "argument": "先前毛利率下跌後又驚喜回升，用以佐證老AI毛利下跌可能僅是短期現象。"}, {"symbol": "8069", "name": "元太", "market": "TW", "stance": "觀察", "argument": "聽眾問答中提到已出場換股，主持人藉此討論停損與資金效率的重要性。"}, {"symbol": "8299", "name": "群聯", "market": "TW", "stance": "觀察", "argument": "聽眾問答中提到買入標的，主持人未對其基本面做深入表態。"}], "quotes": ["修正是一個很好的汰弱留強機會，市場會直接幫你挑出下一波的老大是誰。", "不要看過去，要看現在去哪個地方最快可以讓你翻倍，忽略沉沒成本在股市中非常重要。", "科技的進步是讓生產力躍升，但如何做出好產品、解決人的需求，這個核心永遠不會改變。"], "ep_key": "EP662", "title": "EP662 | ⛑️", "pubdate": "2026-05-16", "duration_s": 2999, "has_tr": false}, {"summary": "本集節目由 MIT 情趣精品 Haru 贊助。主持人謝孟恭分享了近期帶家人前往台中旅遊的體驗，特別提及他喜愛的餐廳 Pinocchio 以及對台中與林口房地產發展的看法。隨後，他分享了近期對紅酒研究的興趣，並透過 Wine Searcher 建立樣本來理解紅酒市場與品牌。針對大盤，他指出雖然近期市場波動讓部分投資人感到痛苦，但實際上大盤從 33,000 點一路上漲至 42,000 點，目前僅微幅回檔，多數身邊的投資人並未進行大幅度調整。此外，本集重點分析了被動元件（MLCC 與鋁電容）產業的強勁表現，指出高規格產品由日韓大廠主導，而台廠則受惠於排擠效應與中低階產品的需求，並對相關概念股進行了深入探討。", "topics": ["台中旅遊與林口房地產觀察", "紅酒研究與品牌市場分析", "台股大盤走勢與投資人心理", "被動元件（MLCC）產業供需與規格分析", "鋁電容產業趨勢與日台大廠表現"], "market_view": "大盤從 33,000 點一路上漲至 42,000 點，目前僅是微幅回檔，多數長期投資人並未進行大幅度調整，無須過度恐慌。", "industries": [{"name": "房地產", "stance": "觀察", "view": "林口與台中房市近年因人口移入與建設呈現爆發性成長，價格漲幅顯著。"}, {"name": "被動元件", "stance": "看多", "view": "MLCC 與鋁電容產業需求強勁，高階產品由日韓主導，台廠則受惠於排擠效應與中低階需求，漲價趨勢明確。"}], "tickers": [{"symbol": "6207", "name": "雷科", "market": "TW", "stance": "觀察", "view": "被動 。"], "ep_key": "EP656", "title": "EP656 | 🍇", "pubdate": "2026-04-25", "duration_s": 2999, "has_tr": false}, {"summary": "本集節目中，主持人謝孟恭分享了2026年4月台股與美股市場的強勁表現，台指期甚至一度衝上3萬8千點。他分享了自己近期在體重管理、網球訓練與機能性訓練上的進展與心得。在投資方面，他指出4月份市場極度瘋狂，許多交易員與朋友的月報酬率（MTD）高達50%甚至翻倍，這讓他產生了「汰慢留快」的FOMO心理。他分析了資金規模對報酬率的限制，並觀察到記憶體與被動元件產業在台、美、日、韓市場的強弱分化。最後，他針對供應鏈中VR產品可能遞延的傳聞進行分析，並更新了Marvell（美滿電子）在MPU與聯發科在ASIC/客製化晶片領域的最新動態。", "topics": ["2026年4月台股與美股的瘋狂行情與台指期新高", "主持人的個人生活近況：減重、網球與機能性訓練心得", "市場極端行情下的交易員心理與「汰慢留快」的FOMO效應", "資金規模對投資報酬率的限制與非線性關係", "記憶體與被動元件產業在國際市場（台、美、日、韓）的強弱分化", "VR供應鏈遞延傳聞的解讀與應對策略", "Marvell（美滿電子）MPU（Carmel）與聯發科（MTK）在客製化晶片（ASIC）領域的最新進展與潛在風險"], "market_view": "市場在極度瘋狂與FOMO情緒下，資金正競相追逐短期內漲速最快的標的。", "industries": [{"name": "半導體/ASIC", "stance": "觀察", "view": "聯發科與Marvell在客製化晶片（ASIC）領域持續競爭，但需注意與Intel先進封裝合作的潛在良率風險。"}, {"name": "記憶體", "stance": "觀察", "view": "台股記憶體表現相對疲軟，但美股與韓股的記憶體巨頭依然非常強勢。"}, {"name": "被動元件", "stance": "看多", "view": "日本與韓國（如三星電機）的被動元件股表現極強，台股被動元件雖在歷史高點但走勢較慢，主持人為此直接佈局日股被動元件。"}, {"name": "VR/虛擬實境", "stance": "觀察", "view": "下半年VR產品可能面臨遞延，但供應鏈問題通常會逐步解決，若因遞延傳聞導致股價修正，反而是加碼機會。"}], "tickers": [{"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "近期股價表現強勁，其Hummingbird與Zebra晶片產品線有進展，但未來表現高度綁定Intel先進封裝（EMIB）的良率狀況。"}, {"symbol": "MRVL", "name": "Marvell (美滿電子)", "market": "US", "stance": "觀察", "argument": "其MPU（代號 Carmel）目前出貨量尚不大，預期將是LPU的對手，並由Marvell主導，但實際獲利貢獻仍難以估算。"}, {"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "觀察", "argument": "被動投資本質上就是相信市場共識的決定，由資金買盤推升市值前50大的公司。"}, {"symbol": "SEMCO", "name": "三星電機", "market": "other", "stance": "看多", "argument": "韓國被動元件巨頭，近期股價表現極為強勢。"}, {"symbol": "VSH", "name": "Vishay", "market": "US", "stance": "觀察", "argument": "美股被動元件相關標的，近期走勢亦佳。"}], "quotes": ["在市場大家最絕望的時候，很多時候就會產生一些令你難以相信的行情。", "當資金變大的時候，那些人動得就會比較慢，也可能是為了追求保險跟保守作為主要考量，所以績效方面比較不會衝那麼快。", "嫉妒心是快樂之賊。"], "ep_key": "EP655", "title": "EP655 | 🐯", "pubdate": "2026-04-22", "duration_s": 3023, "has_tr": false}, {"summary": "本集節目中，主持人首先分享了對讀者來信的感觸，並探討人生、健康與成功的定義。 晶圓製造導致虧損的擔憂依然存在。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "看多", "argument": "在記憶體高成本環境下選擇不漲價並增加規格，策略高明，預期出貨表現將顯著優於同行。"}, {"symbol": "005930", "name": "三星電子", "market": "other", "stance": "看多", "argument": "與馬斯克合作對其晶圓代工業務屬利多，且若手機業務維持穩定，將對中國手機廠造成打擊。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "持有中", "argument": "因預期其將獲得某大廠的 ASIC 設計訂單而提前佈局，若股價轉弱或暴漲會進行調節。"}, {"symbol": "6217", "name": "中探針", "market": "TW", "stance": "觀察", "argument": "作為「一上漲各自表述」的案例，市場對其炒作 Pogo Pin 或 NVIDIA 針腳有不同解讀，本質上反映資金與供需推升。"}, {"symbol": "5269", "name": "祥碩", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人未對其個股基本面或股價發表具體看法。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "觀察", "argument": "提及旗下擁有自研的 Axion 系列 CPU。"}, {"symbol": "AMZN", "name": "Amazon", "market": "US", "stance": "觀察", "argument": "提及旗下擁有自研的 Graviton 系列 CPU。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "argument": "提及旗下擁有自研的 Cobalt 系列 CPU。"}], "quotes": ["在股票市場就不要整天想要空手，等你想追回來的時候，往往又會面臨市場的再度重擊。", "槓桿一般來說都是在有賺錢的時候才會去加，在虧損的部位上加槓桿是極其危險的，且高波動時降低槓桿能避免被強制斷頭。", "一個上漲各自表述。股票上漲時市場會編織各種不同的故事，但最核心的依然是資金與供需關係。"], "ep_key": "EP651", "title": "EP651 | One for all", "pubdate": "2026-04-08", "duration_s": 2991, "has_tr": false}, {"summary": "謝孟恭在本集分享其使用瘦瘦針的個人近況，並針對近期中東地緣政治局勢（如霍爾木茲海峽衝突）進行總體經濟與地緣政治的解讀。在投資策略上，他強調「應對重於預測」的原則。本集核心焦點在於「Agentic AI（代理人AI）」時代的來臨，這將使運算需求從 GPU 轉向大量消耗 CPU，進而看好 AMD、Intel、ARM 等 CPU 相關標的。此外，他也關注中東鋁廠遭炸毀事件對鋁價及相關供應鏈（如鋁電容、塑化股）的潛在影響。", "topics": ["瘦瘦針（Ozempic）使用心得與身體變化分享", "中東地緣政治局勢與美軍預防性軍事行動解讀", "投資心法：應對市場變化重於預測未來", "Agentic AI 時代來臨對 CPU 需求的爆發性成長", "CPU 相關美股（AMD、Intel、ARM）與台股（嘉澤）佈局", "中東鋁廠遭炸對鋁價、鋁電容及替代品 MLCC 的影響", "聽眾問答：童年綽號、幼兒戒尿布心路歷程、元太（8069）停損反思"], "market_view": "美股現在處於比較難做的狀態（機歪），相較之下台股好做很多。", "industries": [{"name": "AI伺服器 / CPU", "stance": "看多", "view": "Agentic AI 時代需要大量推理與調用，CPU 將從配角轉為主角，需求顯著提升。"}, {"name": "光通訊", "stance": "看多", "view": "在美股市場中表現相對強勢。"}, {"name": "被動元件 (鋁電容)", "stance": "觀察", "view": "中東鋁廠遭炸可能引發鋁電容缺貨，但需注意 MLCC 加電感（TLVR）有替代效應，非無上限暴漲。"}, {"name": "塑化", "stance": "觀察", "view": "部分投資人預期中國因伊朗石油受阻而轉向台廠，但非主持人首選。"}], "tickers": [{"symbol": "AMD", "name": "超微半導體", "market": "US", "stance": "看多", "argument": "x86 雙雄之一，快速蠶食 Intel 的市佔率，且執行長蘇姿丰確認 AI Agent 流程多為傳統 CPU 任務。"}, {"symbol": "INTC", "name": "英特爾", "market": "US", "stance": "看多", "argument": "x86 雙雄之一，雖然市佔流失但整體市場擴大仍會成長，且 CFO 坦言 Xeon 6 產能極度吃緊。"}, {"symbol": "ARM", "name": "安謀", "market": "US", "stance": "看多", "argument": "伺服器市佔率從 2018 年的 <5% 成長至 2025 年的 20-25%，在 CSP 中更達 50%，是強勢的 CPU 類股。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "看多", "argument": "雖然以 GPU 為主，但其最新平台（如 Vera Rubin）也搭載自研 ARM 架構 CPU，亦可視為 CPU 相關類股。"}, {"symbol": "3533", "name": "嘉澤", "market": "TW", "stance": "看多", "argument": "與 CPU Socket 高度相關的台股標的，表現相對強勢。"}, {"symbol": "8069", "name": "元太", "market": "TW", "stance": "觀察", "argument": "聽眾因虧損 60% 停損。主持人表示已許久未討論電子紙，建議聽眾反思當初買進與如今停損的邏輯是否一致。"}], "quotes": ["投資的焦點不應該放在如何去預判事件，而是事件發生之後要如何去做處理。", "羨慕跟嫉妒別人是快樂之賊。當你開始羨慕別人的生活時，你就破壞了自己內心的平靜與平衡。", "買進一個標的，只有你自己知道理由是什麼。理論上每一次買進，你都要對自己負責。"], "ep_key": "EP650", "title": "EP650 | 🦄", "pubdate": "2026-04-04", "duration_s": 3020, "has_tr": false}, {"summary": "本集主持人謝孟恭分享了個人使用瘦瘦針與學習網球的近況。針對大盤，他指出台股表現極為強勢，回測均線後若能持續創高，則僅屬多頭回檔；而美股則暫視為走空後的死貓跳反彈。由於油價與 VIX 波動度仍維持高檔，主持人選擇不開槓桿並適度減碼以因應連假。此外，本集重點分析了 Nvidia 投資 Marvell 20 億美元的戰略意圖，主持人認為此舉旨在推廣 NVLink Fusion 生態系並圍堵 Broadcom，但整體 AI 傳輸市場仍屬藍海，Broadcom 與 Astera Labs 等競爭對手受到的實質衝擊有限。", "topics": ["個人近況：瘦瘦針減重進度與網球運動體驗分享", "台股與美股大盤走勢、反彈性質與減碼策略", "高油價與高波動度對投資槓桿的警示", "Nvidia 投資 Marvell 20 億美元之戰略意圖與 NVLink Fusion 生態系分析", "Marvell 與 Astera Labs (ALAB) 在高速傳輸與記憶體池化市場的共存關係", "玻璃基板題材的時程展望與 CPO 概念股的類比"], "market_view": "台股回測均線後強勢反彈，若再創高則屬多頭回檔；美股則暫視為走空後的死貓跳反彈，需留意高油價與高波動度風險。", "industries": [{"name": "AI高速傳輸/半導體", "stance": "看多", "view": "Nvidia 透過投資 Marvell 擴大 NVLink 生態系，整體 AI 傳輸與客製化晶片市場（藍海）持續擴大。"}, {"name": "玻璃基板", "stance": "觀察", "view": "屬於未來題材，實際放量預估需 1.5 至 2 年，營收認列較慢，類似早期的 CPO 概念。"}], "tickers": [{"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "持有中", "argument": "獲 Nvidia 投資 20 億美元合作 NVLink Fusion，短期屬戰略宣告，長期看好其在交換機與客製化晶片的發展。"}, {"symbol": "NVDA", "name": "Nvidia", "market": "US", "stance": "觀察", "argument": "透過投資 Marvell 推廣 NVLink Fusion 生態系，鞏固其在 AI 晶片與周邊傳輸的霸主地位。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "雖然 Nvidia 投資 Marvell 意在搶奪其客製化晶片與傳輸市場，但整體 AI 藍海市場持續擴大，Broadcom 仍能成長。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "觀察", "argument": "與 Marvell 的解決方案並非完全在同一賽道，兩者在主機端與 GPU 端可共存，市場過度擔憂其競爭衝擊。"}, {"symbol": "CRDO", "name": "Credo", "market": "US", "stance": "觀察", "argument": "與 Astera Labs 同屬高速傳輸概念股，近期因市場擔憂競爭而受挫，但實際影響有限。"}, {"symbol": "AMD", "name": "AMD", "market": "US", "stance": "觀察", "argument": "主持人認為最該投資或購買 Marvell 的其實是 AMD，因為 AMD 缺乏這一塊生態系。"}, {"symbol": "006208", "name": "富邦台50", "market": "TW", "stance": "觀察", "argument": "聽眾提到女兒投資此 ETF 報酬率突破 100%，主持人表示讚許。"}], "quotes": ["在市場波動放大的時候，理論上你的部位就要稍微扣一點現金回來。", "當你覺得最不舒服、最想一鍵出清的時候，往往反而是相對好的買點。", "Nvidia 投資 Marvell 並不是要去消滅 Broadcom 或 Astera Labs，而是要把整塊餅做大，大家在藍海市場裡都還是能分到一杯羹。"], "ep_key": "EP649", "title": "EP649 | 💌", "pubdate": "2026-04-01", "duration_s": 3038, "has_tr": false}, {"summary": "謝孟恭在本集分享了個人的健康檢查與減重經驗，並針對近期美股與台股的劇烈回檔進行分析。他指出，隨著指數基期拉高，投資人應以百分比而非絕對點數來看待跌幅。面對市場修正，他採取分批減碼、保留現金的策略，並預期若 4 月出現恐慌性殺跌，將是極佳的左側交易布局時點。此外，他看好蘋果（Apple）在 AI 時代扮演類似 Cloudflare 的「過路費」角色，並詳細解析了玻璃基板（Glass Core Substrate）與 TGV 技術的發展時程與產業鏈機會。", "topics": ["個人健康檢查與使用減重針（瘦瘦針）之經驗分享", "美股與台股指數基期拉高後的跌幅百分比觀念", "面對市場劇烈修正與地緣政治風險的資金與交易策略", "蘋果（Apple）開放 AI 模型接入 Siri 的商業模式與優勢", "玻璃基板（Glass Core Substrate）與 TGV 技術的發展時程與封裝應用", "Google 的 KV Cache 壓縮技術對記憶體（HBM/DRAM）需求的影響"], "market_view": "面對市場劇烈修正，投資人應以百分比而非絕對點數看待跌幅，並保留現金等待恐慌性殺跌的布局時機。", "industries": [{"name": "半導體/先進封裝", "stance": "觀察", "view": "玻璃基板（GCS）與 TGV 是未來大晶片封裝趨勢，但放量時程預計在 2027 至 2028 年，晚於 CPO。"}, {"name": "記憶體", "stance": "看多", "view": "雖然市場擔憂 KV Cache 等壓縮技術減少記憶體需求，但根據傑文斯悖論，效率提升反而會刺激更大的記憶體總需求。"}], "tickers": [{"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "看多", "argument": "在 AI 時代扮演類似 Cloudflare 的過路費角色，且不需像其他巨頭一樣投入巨額 Capex，回檔時是極佳的加碼標的。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "看多", "argument": "技術線型與未來展望佳，在科技股普遍破底時，是主動將資金轉入的強勢股選擇。"}, {"symbol": "NVDA", "name": "Nvidia", "market": "US", "stance": "觀察", "argument": "股價持續破底，不建議在這種高檔強勢股破底時進行加碼。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "argument": "股價持續破底，但在玻璃基板與光通訊交換器（Tomahawk 系列）的進度領先。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "在玻璃基板與 EMIB 先進封裝技術上布局領先，有望承接 Google TPU V9 的封裝訂單。"}], "quotes": ["不要被絕對點數給錨定了，要去看百分比。以前一萬點跌一千點是跌停，現在三萬點跌一千點只是日常波動。", "傑文斯悖論：當一個東西因為技術改進而變得更便宜、更有效率時，它的總需求反而會變得更大，而不是變小。", "在科技股普遍破底的時候，我比較不會想去加碼那些前面漲很久、現在開始破底的股票，反而會去買線型相對強勢或有未來展望的標的。"], "ep_key": "EP648", "title": "EP648 | 🦆", "pubdate": "2026-03-28", "duration_s": 2997, "has_tr": false}, {"summary": "主持人謝孟恭在本集節目中分享了對 AI 實際應用與生產力提升的看法，強調 AI 是漸進式的工具，不會一夕顛覆社會，應專注於本業並將其作為輔助工具。市場話題方面，討論了 OpenAI 暫緩 Sora 影片生成項目的原因（成本與資源聚焦），以及馬斯克計劃建置 1 Terawatt 的 Terafab 晶片廠，指出其核心在於成本考量（轉向三星合作），並對其垂直整合晶片製造持保留態度。最後，主持人分析大盤目前呈區間震盪，看好光通訊、CPO 以及 CPU 在推論應用的後續表現。", "topics": ["AI 實際應用與生產力提升的漸進式轉變", "OpenAI 暫緩 Sora 影片生成項目的市場影響與原因分析", "馬斯克建置 1 Terawatt Terafab 的成本考量與垂直整合挑戰", "台美股大盤區間震盪走勢與資產配置策略", "光通訊、CPO 與 CPU 推論應用的投資機會", "聽眾問答：AI Agent 概念股、處置股操作策略與 SpaceX 上市看法"], "market_view": "大盤目前仍屬於區間震盪格局，直到中東局勢緩和，操作上建議逢高調節、大跌時補貨。", "industries": [{"name": "AI影片生成", "stance": "觀察", "view": "長期趨勢不變，但短期受限於高昂算力成本、版權爭議與技術瓶頸，OpenAI 已暫緩 Sora 項目。"}, {"name": "光通訊/CPO", "stance": "看多", "view": "持續看好光通訊與共同封裝光學（CPO）的發展，已將台美股部分資金往此領域配置。"}, {"name": "半導體/CPU", "stance": "看多", "view": "CPU 在 AI 推論（Inference）的應用開始受到市場重視，AMD 已包下相關產能，後續表現值得期待。"}, {"name": "晶片代工", "stance": "觀察", "view": "馬斯克因成本考量將 AI 晶片代工轉向三星，但垂直整合晶片製造難度極高，短期仍需依賴傳統代工廠。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "馬斯克因價格考量未與台積電達成 AI 晶片代工合作。"}, {"symbol": "三星電子", "name": "三星電子", "market": "other", "stance": "觀察", "argument": "三星提供更便宜的價格與高度配合的代工服務，吸引馬斯克合作。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "看多", "argument": "AI Agent 爬取數據皆需通過其安全防護與收費牆，為 AI Agent 趨勢下的實質受益者。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "看多", "argument": "在企業端（B2B）的 AI Agent 應用上表現優異。"}, {"symbol": "AMD", "name": "超微半導體", "market": "US", "stance": "看多", "argument": "已包下相關 CPU 產能，看好 CPU 在 AI 推論應用的潛力。"}, {"symbol": "SpaceX", "name": "SpaceX", "market": "US", "stance": "看多", "argument": "若未來上市，不論估值如何都會配置 1-2% 的基本部位。"}], "quotes": ["那些會被淘汰的人，不是被 AI 淘汰，而是被懂得使用 AI 的人淘汰。", "好的產品成功因素有很多，並不單純取決於你的寫程式（Coding）速度變快了十倍。", "馬斯克的很多討論其實都聚焦在成本，他想要垂直整合晶片製造，但在先進製程上這幾乎是不可能的任務。"], "ep_key": "EP647", "title": "EP647 | 🍬", "pubdate": "2026-03-25", "duration_s": 3054, "has_tr": false}, {"summary": "謝孟恭分享參與投資機構討論的收穫，指出美國資料中心當前最大瓶頸在於電網（Grid）而非發電，並探討了小型核反應爐（SMR）與浸沒式散熱等技術。大盤方面，近期因伊朗地緣政治衝突引發不確定性，美股破位觸發 CTA 趨勢資金停損賣壓。謝孟恭認為 AI 趨勢與光通訊（CPO）需求未變，拉回仍是買點。此外，記憶體板塊（如美光）利多不漲，資金可能外溢至其他因成本或需求漲價的板塊（如高階 MLCC、TLVR 電感）。NAND 漲勢預期將優於 DRAM。", "topics": ["投資機構交流會心得與持股觀察", "美國資料中心電力瓶頸與電網、SMR、散熱技術探討", "地緣政治衝突對油價與美股大盤的影響", "CTA 趨勢資金操作機制與市場破位賣壓", "記憶體（美光）利多不漲與資金外溢效應", "被動元件（MLCC、TLVR）與 NAND/DRAM 供需展望", "企業擴產態度（大膽下注 vs 保守）對供應鏈勝負的影響"], "market_view": "地緣政治不確定性高，美股破位觸發 CTA 趨勢資金停損，但 AI 與光通訊長線趨勢未變，拉回仍是買點。", "industries": [{"name": "AI伺服器/散熱", "stance": "觀察", "view": "晶片 TDP 持續提高，浸沒式散熱技術指標公司進度落後，短期仍以水冷、冰水為主。"}, {"name": "光通訊", "stance": "看多", "view": "被視為 AI 2.0，CPO 與網路互連需求強勁，雖估值高波動大，但拉回仍是極佳買點。"}, {"name": "記憶體", "stance": "中性", "view": "美光財報利多不漲，板塊可能進入橫盤，但 NAND 漲幅預期將優於 DRAM。"}, {"name": "被動元件", "stance": "觀察", "view": "需區分成本推升與需求驅動，高階 MLCC 與 TLVR 電感具備實質需求驅動的漲價空間。"}], "tickers": [{"symbol": "BE", "name": "Bloom Energy", "market": "US", "stance": "觀察", "argument": "探討其在台灣的供應鏈，資料中心 onsite 發電需求看增。"}, {"symbol": "MU", "name": "Micron", "market": "US", "stance": "中性", "argument": "財報毛利率表現極佳但利多不漲，市場已提前反應預期。"}, {"symbol": "4958", "name": "臻鼎-KY", "market": "TW", "stance": "觀察", "argument": "聽眾問及光通訊營收，主營 Pluggable，CPO 相關性較低。"}, {"symbol": "6451", "name": "訊芯-KY", "market": "TW", "stance": "觀察", "argument": "鴻海集團中與 CPO/矽光子較具直接關聯的標的。"}], "quotes": ["電網（Grid）的建置跟不上，才是目前美國資料中心最缺的瓶頸，而非單純的電力產出。", "要區分漲價是需求驅動（Demand-driven）還是成本推升，需求驅動的板塊在市場上的表現會好很多。", "在現在這個時代，敢衝、敢擴產、敢配合客戶大膽下注的企業，往往會是最大的贏家。"], "ep_key": "EP646", "title": "EP646 | 🦙", "pubdate": "2026-03-21", "duration_s": 3047, "has_tr": false}, {"summary": "在本集中，主持人謝孟恭回顧了自己從事交易與 Podcast 的心路歷程，指出交易策略需隨盤勢動態調整，並分享他如何從追求產業內線轉向注重風險管理與期望值。針對近期 NVIDIA GTC 大會，他認為市場對台積電「裂口」的擔憂屬過度解讀，NVIDIA 採雙軌制（台積電與三星）行之有年。NVIDIA 已轉型為 AI 工廠的系統解決方案供應商，長期前景看好。此外，他分析了廣達的長期成長潛力、ASIC 市場競爭格局（Meta 與微軟面臨瓶頸，Google 傳引入第三家設計服務廠 Marvell），以及 SRAM/PSRAM 概念股（華邦電、愛普）的技術與實質貢獻。", "topics": ["主持人交易心路歷程與策略演變", "NVIDIA GTC 大會重點與系統解決方案轉型", "廣達（2382）的長期成長與評價展望", "ASIC 晶片市場動態與 Google 供應鏈傳聞", "SRAM 與 Pseudo SRAM（華邦電、愛普）技術解析與投資看法"], "market_view": "大盤估值可能需要降息預期支持才能進一步推升，否則當前價格可能已定價。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "NVIDIA 轉型為 AI 工廠系統解決方案供應商，廣達等台廠供應鏈在未來幾年成長能見度極高。"}, {"name": "ASIC", "stance": "觀察", "view": "Meta 與微軟自主研發面臨產能或效率瓶頸，Broadcom 仍具優勢，Google 傳尋找第三家合作夥伴。"}, {"name": "記憶體", "stance": "觀察", "view": "SRAM 概念多為 PSRAM 題材（如華邦電、愛普），實質貢獻尚需時間觀察；低價庫存效應對部分模組廠非一次性。"}, {"name": "銅資源", "stance": "觀察", "view": "正在思考銅相關類股的估值，可能需要降息循環啟動才能進一步推升。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "已轉型為 AI 工廠的 Total Solution 供應商，長期競爭力極強，發表會後股價震盪屬預期內。"}, {"symbol": "2382", "name": "廣達", "market": "TW", "stance": "看多", "argument": "未來幾年成長性明確，預期 2027-2028 年將迎來出貨大爆發，拉回是極佳的佈局點。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "先進製程產能供不應求，NVIDIA 尋求三星雙軌制並非台積電出現裂口。"}, {"symbol": "2344", "name": "華邦電", "market": "TW", "stance": "觀察", "argument": "其 Cube 技術可作為 L3 Cache，概念接近 SRAM，傳 AMD 為其客戶，屬題材性機會。"}, {"symbol": "6531", "name": "愛普*", "market": "TW", "stance": "觀察", "argument": "其 VHBM/Z-HBM 技術具想像空間，但屬於客製化產品，實質產能與貢獻仍需時間驗證。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "看多", "argument": "在 ASIC 領域依然是最具競爭力的老牌玩家。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "argument": "市場傳言其可能成為 Google TPU 的第三家 ASIC 設計服務合作夥伴。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "與 Broadcom 同為 Google TPU 目前的主要設計服務合作夥伴。"}, {"symbol": "8299", "name": "群聯", "market": "TW", "stance": "觀察", "argument": "受惠於低價庫存成本優勢，且此效應預期為複數季度而非一次性。"}, {"symbol": "3260", "name": "威剛", "market": "TW", "stance": "觀察", "argument": "受惠於低價庫存成本優勢，且此效應預期為複數季度而非一次性。"}], "quotes": ["交易最難的是在當下做出判斷，事後諸葛的檢討都很容易，但我們實際上是在跟機率做對抗。", "NVIDIA 已經不是單純的晶片供應商，而是 AI 工廠的系統解決方案供應商（Total Solution Supplier）。", "就算題材是對的、基本面也會跟上，不代表股價現在就會發酵，仍必須參考市場情緒進行調整。"], "ep_key": "EP645", "title": "EP645 | 🎱", "pubdate": "2026-03-18", "duration_s": 2999, "has_tr": false}, {"summary": "本集節目由君綺醫美贊助，主持人謝孟恭分享了近期體驗鳳凰電波、海芙音波與皮秒雷射的醫美心得，強調預防保養與及早投入的複利效果。在市場與總經方面，主持人指出當前處於震盪的「戰鬥週」，提醒投資人避免頻繁追高殺低，並分享自身在油價等指標變動下調整持股、甚至砍在阿呆谷後又拉回的心路歷程。產業部分，記憶體（特別是旺宏、美光）因產能移轉與報價好轉再度成為焦點；同時，主持人提醒 GTC 大會前夕市場對光通訊等題材已有預期，需防範利多出盡的修正風險，並對 Tesla 的 Robotaxi 發展與後續訂單狀況抱持蹲低跳高的觀察態度。", "topics": ["君綺醫美鳳凰電波、海芙音波與皮秒雷射體驗心得", "震盪市況下的交易心理與避免頻繁追高殺低", "記憶體產業（旺宏、美光）的報價與產能移轉趨勢", "GTC 大會前夕的市場預期與光通訊題材風險管理", "Tesla 訂單狀況與 Robotaxi 發展的 Bottom-up 觀察", "軟體股與硬體股的個別表現差異及反向操作思考", "聽眾問答：親子互動、折疊機趨勢、市場效率性與投資紀律討論"], "market_view": "目前市場處於震盪的戰鬥週，投資人應避免頻繁追高殺低，並在面臨潛在破底危機時提早規劃流動性與持股輪動。", "industries": [{"name": "醫美", "stance": "看多", "view": "及早投入保養具有複利效果，選擇大品牌與經驗豐富的醫師能有顯著改善。"}, {"name": "記憶體", "stance": "看多", "view": "eMMC 與 Nor Flash 報價持續向好，旺宏等公司搭上此波風潮表現強勢。"}, {"name": "光通訊", "stance": "觀察", "view": "GTC 大會前市場已高度預期光通訊解決方案，需提防大會後利多出盡的修正風險。"}, {"name": "軟體", "stance": "中性", "view": "軟體股並非一言以蔽之的整體，部分受 AI 加持轉強，部分則持續走弱，需個別篩選。"}], "tickers": [{"symbol": "2337", "name": "旺宏", "market": "TW", "stance": "觀察", "view": "受惠於 Nor Flash 價格上漲與外資報告調升目標價，成為市場關注焦點。"}, {"symbol": "MU", "name": "美光", "market": "US", "stance": "觀察", "view": "市場傳聞其毛利率有望開出極高水準，股價漲勢反映了市場的先行預期。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "view": "雖然市場對 Robotaxi 存疑，但從供應鏈訂單來看有追加 關 ESD 與 TVS 廠商帶來轉單利多。"}], "tickers": [{"symbol": "MU", "name": "美光", "market": "US", "stance": "觀察", "view": "市場傳出其毛利率表現準備再創歷史新高，且數字可能優於市場預期。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "view": "第四代 LPU 有機會在台積電以 N3 搭配 CoWoS-R 生產，持續擴大其先進製程與封裝領先優勢。"}, {"symbol": "NVDA", "name": "英偉達", "market": "US", "stance": "看多", "view": "目前 Forward PE 處於非常便宜的位置，作為 AI 的絕對領導者，即便 GTC 大會後股價震盪，下方空間也有限。"}, {"symbol": "ORCL", "name": "甲骨文", "market": "US", "stance": "觀察", "view": "最新公布的財報與業績表現還可以，並未釋出特別重大的市場警訊。"}], "quotes": ["人生很有趣的一點是，當你這件事情學不好，它就會一直用同樣的東西來虐你，虐到你知道為止。", "你的個性其實會決定你的生活長什麼樣子，你的操作長什麼樣子，其實都是個性決定的。", "不要去追逐市場上最熱門、最 hitto 的東西，你應該是專注在你的個性是怎麼樣，就把這個個性發揮到極限。"], "ep_key": "EP643", "title": "EP643 | 🦊", "pubdate": "2026-03-11", "duration_s": 3092, "has_tr": true}, {"summary": "本集節目由 NordVPN 贊助。主持人謝孟恭首先分享了近期與生展店同仁在「麗木」餐廳聚餐的溫馨體驗，並探討了與孩子互動、控制其物慾及使用 3C 產品的教養心得。在市場分析方面，他指出當前台股與日股大盤雖有回檔，但整體表現依然穩健，而美股則呈現類股輪動與探底格局。針對近期光通訊板塊的大幅回檔，他詳細剖析了博通（Broadcom）執行長關於「銅介質優於光介質」的發言，認為市場對此過度解讀，並重申光通訊長期趨勢不變，目前的回檔反而是分批布局設備廠與相關供應鏈的良機。此外，他深入分析了蘋果（Apple）在記憶體漲價背景下的定價與硬體升級策略，看好其透過維持售價、提升規格來搶占市占率，並預期未來將透過 AI 訂閱服務提升長期客戶價值（Lifetime Value）。", "topics": ["NordVPN 贊助與旅遊規劃建議", "麗木餐廳聚餐與教養、控制物慾心得分享", "台股、日股與美股大盤走勢與回檔看法", "軟體股（PLTR、NET、CRWD）財報後表現與市場反思", "光通訊板塊回檔分析與博通（AVGO）執行長發言解讀", "蘋果（Apple）在記憶體漲價潮下的硬體定價與 AI 訂閱服務策略", "聽眾問答：多螢幕看盤習慣、記憶體漲價對 OEM 廠的影響、ETF 9816 投資看法"], "market_view": "台股與日股目前僅是健康回檔，美股則呈現類股輪動與探底格局，無須過度恐慌或躁動。", "industries": [{"name": "軟體股", "stance": "看多", "view": "經歷前期大幅修正後，優質軟體股在財報與展望亮眼下已展現強勁反彈，重回上升軌道。"}, {"name": "光通訊", "stance": "看多", "view": "近期因市場過度解讀博通發言而出現大幅回檔，但長期升級趨勢不變，回檔反而是布局良機。"}, {"name": "半導體設備", "stance": "看多", "view": "台積電相關設備供應鏈表現強韌，回檔幅度有限，持續看好並積極卡位布局。"}, {"name": "智慧型手機", "stance": "中性", "view": "記憶體價格大漲將嚴重擠壓 Android 陣營的毛利，而蘋果則有望憑藉高毛利優勢與不漲價策略搶占市占率。"}], "tickers": [{"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "看多", "argument": "近期表現強勁，股價已從先前的低谷大幅回升至接近年內高點。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "看多", "argument": "優質軟體股之一，近 料。"}, {"name": "軟體工程", "stance": "中性", "view": "AI 並非單純消滅職缺，而是造成結構性改變，傳統開發與客服職缺減少，但 AI/ML、資料工程與安全等新職缺大幅增加。"}, {"name": "被動元件", "stance": "看多", "view": "高階 AI 與車用需求強勁，且日系大廠逐步退出低階市場，中低階被動元件有機會迎來供需轉折與轉單潮。"}, {"name": "光通訊", "stance": "看多", "view": "在 TPU 需求帶動與投片量持續上升之下，光通訊相關類股近期表現相對強勢。"}], "tickers": [{"symbol": "3016", "name": "胡連", "market": "TW", "stance": "觀察", "argument": "聽眾提及群聯調整付款條件，主持人認為此類預收款要求通常代表供不應求，屬偏多解讀。"}, {"symbol": "2308", "name": "台達電", "market": "TW", "stance": "觀察", "argument": "台達電雖然在太陽能與充電樁有佈局，但目前營收佔比仍小，市場主要關注的仍是其 AI 伺服器相關的電源與散熱解決方案。"}, {"symbol": "SQ", "name": "Block", "market": "US", "stance": "觀察", "argument": "宣布裁員 4000 人以提升效率，雖然市場喜聞樂見裁員帶來的財務改善，但其過去在財務投入上較缺乏紀律。"}, {"symbol": "AOI", "name": "Applied Optoelectronics", "market": "US", "stance": "持有中", "argument": "光通訊相關標的，近期受惠於產業趨勢表現極為強勢。"}], "quotes": ["產業人士的看法往往因為專業訓練而相對理性與保守，有時會漏看市場極端狂熱的噴發行情，因此產業觀點應作為資料庫的一環，而非唯一的下注依據。", "AI 對就業市場的影響是結構性的改變，就像當年電腦出現一樣，會先淘汰一部分人，但隨後會創造出更多需要新技能的職缺。", "當大家都把產能往最缺的高端產品挪動時，中低端產品反而可能因為產能被排擠而出現意想不到的缺貨與漲價行情。"], "ep_key": "EP640", "title": "EP640 | 🐈", "pubdate": "2026-02-28", "duration_s": 3089, "has_tr": true}, {"summary": "本集節目由黑佳佳圍棋 HJJ GO 贊助，主持人謝孟恭分享了圍棋作為決策訓練工具的價值。在市場觀察方面，他指出美股與台股/日股呈現兩極化表現，台股與日股行情瘋狂，許多投資人在年初即達成全年績效，而美股表現相對疲弱。此外，他深入探討了 NVIDIA 即將召開的 GTC 大會，分析了 CPU 封裝技術升級（Scale-up/Scale-out）以及 Groq 晶片（SRAM 技術）對三星及伺服器架構的潛在影響。最後，他針對太陽能產業進行了詳細的供需與政策分析，指出在美國 IRA 法案與去中國化趨勢下，非中國（Non-China）太陽能供應鏈將迎來新契機，但也面臨變壓器短缺與電網併網等瓶頸。", "topics": ["黑佳佳圍棋 HJJ GO 課程推廣與決策思維訓練", "美股與台股、日股市場的兩極化表現與資金輪動", "NVIDIA GTC 大會預測：CPU 封裝技術升級與 Groq 晶片（SRAM）影響分析", "太陽能產業深度解析：美國 IRA 法案、去中國化趨勢與非中國供應鏈的機會", "科技巨頭自建能源面臨的瓶頸：變壓器短缺與電網併網挑戰", "聽眾問答：小兒尿管瘻管手術集氣、全新（2455）與台郡（6269）看法、大盤修正判斷邏輯"], "market_view": "今年行情呈現兩極化，台股與日股表現瘋狂，而美股表現相對疲弱，資金在不同市場與板塊間持續輪動。", "industries": [{"name": "半導體與伺服器封裝", "stance": "看多", "view": "NVIDIA GTC 大會預期將推動 CPU 封裝技術（Scale-up/Scale-out）升級，帶動相關設備與材料需求。"}, {"name": "太陽能", "stance": "觀察", "view": "在美國 IRA 法案與去中國化政策推動下，非中國（Non-China）太陽能供應鏈有發揮空間，但產業整體仍受制於電網與變壓器瓶頸。"}, {"name": "重電與變壓器", "stance": "看多", "view": "變壓器目前是電網建設與科技巨頭自建能源的關鍵瓶頸，交期長達三年，相關廠商如華城持續受惠。"}], "tickers": [{"symbol": "2455", "name": "全新", "market": "TW", "stance": "觀察", "view": "聽眾問答提及，主持人定位為不錯的公司，但未提供具體買賣點建議。"}, {"symbol": "6269", "name": "台郡", "market": "TW", "stance": "觀察", "view": "聽眾問答提及，過去在蘋果概念股中較常被討論，但近期市場關注度較低，目前無特別題材。"}, {"symbol": "1519", "name": "華城", "market": "TW", "stance": "看多", "view": "受惠於變壓器極度短缺（交期長達三年）的產業瓶頸，股價表現持續強勢。"}, {"symbol": "6443", "name": "元晶", "market": "TW", "stance": "觀察", "view": "先前跟著衛星題材上漲，近期在太陽能板塊整體轉強與政策去中國化背景下受到市場關注。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "view": "即將召開的 GTC 大會預期將釋出新技術，有望進一步驅動公司與供應鏈的成長。"}, {"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "持有中", "view": "台股大盤表現極佳，帶動 0050 等大盤型 ETF 績效表現優異。"}], "quotes": ["做交易跟做生意一樣，核心邏輯都是在充滿不確定性的環境下，做出期望值最好的決策。", "強者的重點永遠是專注在下一盤要怎麼下得更好，就像在股市交易一樣，錯了部位就砍掉，專心看下一次怎麼贏才是重點。", "市場的資金是會呼吸、會輪動的，當大家都在唱衰某個市場或產業時，往往就是反轉的開始。"], "ep_key": "EP639", "title": "EP639 | 🐗", "pubdate": "2026-02-25", "duration_s": 3126, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了他在農曆新年期間的放鬆體驗，並探討了近期美股與台股的市場動態。他指出，台股在開春後預期將維持在相對穩定的區間，而美股近期表現則面臨較大壓力。此外，他深入分析了川普政府關稅政策的潛在影響，認為關稅難以輕易取消，並將增加市場的不確定性。最後，他針對資安產業及 AI 發展趨勢進行了探討，強調應保持冷靜與理性的基本面分析，避免盲目跟風市場的過度樂觀情緒。", "topics": ["農曆新年假期生活與心態轉變", "台股與美股開春盤勢預估", "川普關稅政策的法律挑戰與市場影響", "資安產業與 AI 發展趨勢分析", "個人投資心態與標的選擇經驗分享"], "market_view": "台股開春預期維持在放假前的類似區間，而美股近期表現則相對較差，市場不確定性因關稅政策而增加。", "industries": [{"name": "資安產業", "stance": "觀察", "view": "近期因 Anthropic 推出新安全功能而面臨修正，但長期防護需求與靜態偵測工具仍有其各自的市場定位。"}, {"name": "半導體", "stance": "觀察", "view": "記憶體等部分板塊近期表現強勁，但整體市場仍處於動態調整中。"}, {"name": "應用軟體", "stance": "觀察", "view": "未來將逐漸走向 API 化，使用者介面的重要性可能降低，能提供更好執行結果的軟體將成為關鍵。"}], "tickers": [{"symbol": "2303", "name": "聯電", "market": "TW", "stance": "觀察", "argument": "主持人對其成熟製程面臨中國競爭的長期展望持保留態度，但也不排除市場短期波動帶來的機會。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "作為先進製程的領頭羊，長期競爭力依然穩固。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "過去曾帶來極高回報，雖然近期有所回檔，但仍是長期持有的軟體標的之一。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "argument": "長期看好的資安與網路服務公司，重點在於其阻擋惡意流量的能力。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "觀察", "argument": "其端點防護技術在市場上具有獨特地位，與靜態代碼偵測工具的定位不同。"}, {"symbol": "MU", "name": "美光", "market": "US", "stance": "觀察", "argument": "雖然面臨市場波動，但作為記憶體大廠仍具備一定的產業地位。"}], "quotes": ["人生就是不停地打發時間，重點是要找到好玩、有趣、有意義的事情來做。", "市場是不喜歡不確定性的，當有爭議或問題可能出現時，就會引發一些賣壓。", "不要在每次的操作裡面迷失掉自己，控制好自己的風險才是最重要的。"], "ep_key": "EP638", "title": "EP638 | 🐈‍⬛", "pubdate": "2026-02-21", "duration_s": 3062, "has_tr": true}, {"summary": "主持人謝孟恭分享峇里島度假心得，並探討近期美股軟體股與資安股的修正。他認為市場對 AI 取代軟體開發的擔憂導致軟體股面臨全面性通殺（Overshoot），但這也創造了尋找被錯殺標的的機會。他看好 Cloudflare (NET) 與 CrowdStrike (CRWD) 等在 AI 時代中物理層需求不減反增的資安與基礎設施公司，並對微軟 (MSFT) 的算力自主策略表示肯定，對 Google (GOOGL) 則持中性觀望態度。", "topics": ["峇里島度假體驗與頂級 Villa 服務觀察", "美股大盤震盪格局與科技股、軟體股修正分析", "AI 趨勢下軟體股被全面通殺（Overshoot）的投資機會", "Cloudflare、CrowdStrike 等資安與基礎設施股的競爭優勢", "微軟與 Google 在 AI 算力與應用上的佈局看法", "Apple Intelligence 與 OpenCOBOL/OpenCloud 等 AI Agent 的安全隱憂與硬體優勢"], "market_view": "美股大盤目前處於相對疲軟的震盪格局下緣，軟體股面臨全面性通殺，但這屬於市場過度反應（Overshoot），提供了篩選優質錯殺股的時機。", "industries": [{"name": "軟體與 SaaS", "stance": "觀察", "view": "多數軟體股因 AI 取代隱憂面臨估值修正，需篩選真正能結合 AI 變現或具備高成長率的標的。"}, {"name": "資訊安全", "stance": "看多", "view": "在 AI Agent 與開源工具普及下，企業對資安防護與合規性的要求（如低延遲、防洩密）不減反增。"}, {"name": "半導體與光通訊", "stance": "觀察", "view": "光通訊板塊近期表現強勁，但需注意強勢股在市場回穩後可能面臨補跌或資金抽離的風險。"}], "tickers": [{"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "看多", "argument": "AI 時代對低延遲、CDN 與資安防護的物理需求不變，流量增加將帶動其收費站模式持續受益。"}, {"symbol": "CRWD", "name": "CrowdStrike", "market": "US", "stance": "看多", "argument": "毛利率不減反增，在企業導入 AI 工具時，其端點安全與合規防護具備不可替代性。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "看多", "argument": "決定將算力留給自家 ASIC 使用是強烈的自主宣告，未來在 ASIC 佈局上將獲得更多討論與優勢。"}, {"symbol": "GOOGL", "name": "Alphabet (Google)", "market": "US", "stance": "中性", "argument": "市場已普遍預期其為 AI 贏家，估值已反映，預期未來股價可能呈現相對橫盤整理。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "看多", "argument": "Apple Intelligence 結合硬體端安全與隱私保護，有望使蘋果成為 AI Agent 趨勢下的最終贏家。"}, {"symbol": "CRM", "name": "Salesforce", "market": "US", "stance": "看空", "argument": "營收增速放緩，且非個人偏好的軟體類型，在軟體股修正潮中較不具吸引力。"}, {"symbol": "PANW", "name": "Palo Alto Networks", "market": "US", "stance": "觀察", "argument": "公司承認為了推動平台化而對客戶進行讓利折讓，短期財務表現可能承壓，需等待股價修正更深再考慮。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "觀察", "argument": "營收年增率極高，不應與一般低成長的軟體股放在同一個估值模型比較。"}], "quotes": ["市場在恐慌時往往會 Overshoot（過度反應），這時候全面通殺軟體股，反而創造了去尋找被錯殺優質公司的機會。", "AI 讓很多事情變得可能（Make everything possible），但可能不代表可行（Possible doesn't mean viable），後續的維護、安全與合規成本才是關鍵。", "不要過度仰賴單一估值指標（如 PS ratio），營收年增率 10% 與 50% 的公司，就算當下 PS 相同，未來的發展與評價也完全不同。"], "ep_key": "EP637", "title": "EP637 | 🦖", "pubdate": "2026-02-18", "duration_s": 3084, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了帶家人出國度假的近況，並探討了近期美股與台股的市場走勢。他指出台股近期表現極佳，甚至快達到去年的全年績效，而美股則相對疲弱。在產業與個股方面，他詳細分析了應用材料（Applied Materials）的財報與未來展望，指出 HBM 堆疊、檢測設備及玻璃基板（Glass Substrate）是未來的關鍵成長動能，並強調無塵室（Clean Room）建設速度是目前市場的瓶頸。此外，他也對 Palantir 的做空報告提出反駁，認為其在軟體整合與本體論（Ontology）上的價值不易被 AI 輕易取代，並重申投資應看重未來展望而非僅看過去數據。", "topics": ["家庭出國度假與保姆服務體驗", "台股與美股近期走勢對比", "應用材料（AMAT）財報分析與半導體設備展望", "無塵室（Clean Room）建設瓶頸對設備商的影響", "Palantir（PLTR）做空報告反駁與軟體股價值探討", "AI 對軟體產業的實際影響與「隨插即用」軟體的危機", "聽眾問答：裝潢糾紛、吃素還願、大盤指數投資與車價預期"], "market_view": "台股近期表現極佳，甚至快要達到去年的全年績效，而美股則相對疲弱，呈現兩極化的走勢。", "industries": [{"name": "半導體設備", "stance": "看多", "view": "HBM 堆疊層數增加、檢測設備需求提升及玻璃基板發展，將持續帶動設備商營收。"}, {"name": "無塵室建置", "stance": "看多", "view": "無塵室是目前設備進場的瓶頸，若建設加速將帶動整體設備與廠務營收進來。"}, {"name": "AI 軟體", "stance": "中性", "view": "隨插即用的表面應用軟體易被 AI 取代，但涉及複雜資料整合與客製化服務的軟體仍具護城河。"}], "tickers": [{"symbol": "AMAT", "name": "Applied Materials", "market": "US", "stance": "看多", "argument": "財報與展望大幅超越預期，受益於 HBM 堆疊、先進檢測及玻璃基板趨勢。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "看多", "argument": "其軟體整合與本體論（Ontology）具備高進入門檻，並非簡單的 AI 即可取代，做空報告的論點有失偏頗。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "關稅政策可能促使美國車價變得更便宜，特斯拉在馬斯克領導下也有持續降價的空間。"}], "quotes": ["財報最重要的一定是 guidance（業績指引），未來是怎麼樣其實比過去更加重要，投資不能看後照鏡。", "出事情的通常都不是你的公司，出事情的幾乎都是你的成本，也就是你買得太高、賠了太多錢。", "隨插即用的軟體就是有可能會被 AI 給取代，但需要派工程師去客製化、做複雜資料整合的軟體，其價值依然存在。"], "ep_key": "EP636", "title": "EP636 | 🐚", "pubdate": "2026-02-14", "duration_s": 2982, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期帶小孩在羅馬就醫的波折經歷，並藉此感悟到家庭與健康的重要性遠超工作與投資。在市場與產業方面，他針對記憶體產業（美光、海力士）的驗證傳言進行分析，認為不論是美光或海力士在 HBM 驗證上遇到卡關，終究只是短期市場情緒波動，三家大廠未來仍會各據其份額，且 DDR5 的利潤在特定情況下甚至不輸 HBM。此外，他提到衛星通訊 PCB 廠美格（Mako）因 SpaceX 訂單上修而調升展望，股價隨之大漲，印證了先前對衛星產業鏈上修的判斷。最後，針對 Google 研發 DRAM Rack 欲取代 HBM 的傳言，他指出這屬於科技巨頭為擺脫供應商制約的實驗性方案，短期內難以全面取代 HBM，投資人應理性看待此類市場雜音。", "topics": ["羅馬就醫經歷與家庭感悟", "記憶體產業（美光、海力士）HBM 驗證傳言與 DDR5 市場分析", "美格（Mako）調升展望與衛星通訊產業鏈機會", "Google 研發 DRAM Rack 取代 HBM 傳言之深度解析", "過年期間持股部位調整與槓桿調整策略", "聽眾問答：男生之間的 Bro-mance、台灣有錢人的特徵、技術面篩選與個股（ALAB、3533）看法"], "market_view": "大盤反彈到新高超乎預期，長期而言股票就是要持續持有，但過年期間因不確定性選擇將槓桿部位減掉、僅留現股過年。", "industries": [{"name": "記憶體", "stance": "中性", "view": "HBM 驗證卡關傳言僅為短期情緒波動，大廠若將產能轉去生產 DDR5 說不定更賺錢，三家大廠終究會各分份額。"}, {"name": "低軌衛星", "stance": "看多", "view": "SpaceX 與 Starlink 訂單持續上修，帶動相關通訊 PCB 產業鏈（如美格）展望與業績爆發。"}, {"name": "AI 晶片與伺服器", "stance": "觀察", "view": "科技巨頭（如 Google）積極開發自研晶片（ASIC）與替代記憶體架構（DRAM Rack），旨在降低對單一供應商（如 NVIDIA）的依賴與成本。"}], "tickers": [{"symbol": "MU", "name": "美光", "market": "US", "stance": "中性", "view": "傳言其 HBM 驗證遇到問題，但即使未順利出貨 HBM，轉產 DDR5 亦能維持良好獲利。"}, {"symbol": "Mako", "name": "美格", "market": "other", "stance": "持有中", "view": "上修 HDI PCB 展望，受惠於低軌衛星訂單大增，股價單日大漲 22% 印證產業鏈上修趨勢。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "觀察", "view": "財報表現非常好，重申其在交換器領域努力獲取更多客戶，長期發展方向正確。"}, {"symbol": "3533", "name": "嘉澤", "market": "TW", "stance": "觀察", "view": "聽眾詢問其財報與跳上去打的策略，主持人認為此檔不適合看財報做交易，而是看新產品與新技術的導入。"}], "quotes": ["投資財福靠自己，投資健康就讓膳存來幫你。", "不要隨便去相信誰取代誰，特別是被取代的是一個已經是標準答案的解法，這個沒有這麼容易就被取代掉。", "富二代最需要的是守，而不是去亂衝。富二代不要整天想要創業搞新的東西，那個財富就可以守住。"], "ep_key": "EP635", "title": "EP635 | 🌴", "pubdate": "2026-02-11", "duration_s": 3074, "has_tr": true}, {"summary": "本集節目由 cashback 反多多贊助。謝孟恭分享了對孩子教育與生活選擇的看法，強調賺錢是為了擁有更多選擇權，並珍惜與孩子相處的時光。針對股市，他指出台股盤中出現恐慌殺盤，自己趁機補倉，但這波操作偏向買反彈，仍需觀察標的是否能持續創新高。美股科技巨頭（Amazon、Google、Meta、Microsoft）上修資本支出（CapEx），雖然市場短期反應不佳，但他認為這是長期利好，並詳細分析了各巨頭在 AI、ASIC、光通訊及地軌道衛星等領域的佈局與供應鏈機會。", "topics": ["孩子教育與生活選擇權的思考", "台股恐慌殺盤的應對與反彈操作", "美股科技巨頭資本支出（CapEx）上修的解讀", "Amazon、Google、Meta、Microsoft 的 AI 與硬體佈局", "光通訊、ASIC 與地軌道衛星供應鏈機會", "被動元件產業的價格與獲利結構觀察"], "market_view": "台股盤中出現恐慌殺盤，自己趁機補倉買反彈，但仍需觀察標的是否能持續創新高，並注意不要在指數高檔時把部位打得太滿。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "科技巨頭持續擴大資本支出，AI 應用與硬體需求長期趨勢依然看好。"}, {"name": "光通訊", "stance": "看多", "view": "Google 的 OCS 採用 Lumenment 的 MEMS 方案，光通訊領域持續有有趣的發展。"}, {"name": "地軌道衛星", "stance": "觀察", "view": "Amazon 的地軌道衛星計畫（Project Kuiper）佔其資本支出不小比重，相關供應鏈值得關注。"}, {"name": "被動元件", "stance": "觀察", "view": "被動元件開始漲價，且原料價格下跌後產品價格不易回落，有利於產品與獲利結構改善。"}], "tickers": [{"symbol": "AMZN", "name": "Amazon", "market": "US", "stance": "觀察", "view": "開出高達 2000 億美元的資本支出，但需注意其中包含工廠、物流、機器人及地軌道衛星，非全為 AI 伺服器。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "觀察", "view": "資本支出達 1850 億美元，除了採購 GPU 外，也大量使用自研的 TPU，且光通訊 OCS 方案值得關注。"}, {"symbol": "META", "name": "Meta", "market": "US", "stance": "觀察", "view": "資本支出達 1350 億美元，目前未看到其在 ASIC 上有卓越突破，預期仍以採購通用型 GPU 為主。"}, {"symbol": "MSFT", "name": "Microsoft", "market": "US", "stance": "觀察", "view": "預估資本支出約 1500 億美元，其自研晶片 Maia 正在加班趕工，相關供應鏈如專用機殼廠值得注意。"}, {"symbol": "CLS", "name": "Celestica", "market": "US", "stance": "觀察", "view": "屬於 Google 供應鏈，股價已盤整蠻長一段時間。"}, {"symbol": "FLEX", "name": "Flex", "market": "US", "stance": "觀察", "view": "同樣屬於 Google 供應鏈的合作夥伴。"}, {"symbol": "LUMN", "name": "Lumentum", "market": "US", "stance": "觀察", "view": "提供 Google OCS 所需的 MEMS 解決方案，近期走勢在逆勢中往上。"}], "quotes": ["賺錢的目的就是為了讓你有更多的選擇，生活重在彈性，而不是為了跟別人穿一樣的制服。", "有時候跌的理由跟漲的理由剛好是一體兩面，現在因為資本支出太高而跌，後面可能就會因為這些投資帶來獲利而漲。", "當市場出現恐慌、大家亂丟股票的時候，往往是自己最 on_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期對酒精與生活體驗的體悟，並深入剖析當前瘋狂的市場狀態。他指出，雖然市場熱度極高、融資餘額與開戶數創高，但此波上漲的廣度其實很窄，主要由少數核心科技股（如記憶體、AI 相關股）與大型權值股支撐。他建議投資人應適度降低槓桿、設定移動停利，並將資金轉往估值合理、具備長期趨勢的板塊。此外，他詳細探討了記憶體（NAND Flash/SSD）報價大漲的產業現況，並看好台積電持續擴廠所帶動的半導體廠務、水電、氣體與無塵室等周邊設備商的長期機會。", "topics": ["生活體悟與酒精成癮者的反思", "當前瘋狂市場的風險控管與資金配置策略", "記憶體（NAND Flash/SSD）產業報價與合約價趨勢", "台積電擴廠效應下的半導體廠務、水電、氣體與無塵室機會", "馬斯克兩奈米晶圓廠構想與第一性原理的討論", "折疊手機軸承產業趨勢更新"], "market_view": "市場有可能瘋狂地超越你的想像，但此波上漲廣度極窄，建議投資人適度降低槓桿、設定移動停利，並將資金轉往估值合理的防守型標的。", "industries": [{"name": "記憶體", "stance": "看多", "view": "NAND Flash 與 SSD 報價持續瘋狂上漲，原廠漲價態度強硬且不急於鎖定長約價，超級週期尚未結束。"}, {"name": "半導體設備與廠務", "stance": "看多", "view": "台積電持續買地擴廠，將帶動廠務、水電、特殊化學氣體及無塵室（Cleanroom）等周邊需求的長期爆發。"}, {"name": "折疊手機軸承", "stance": "觀察", "view": "蘋果折疊手機開發方向可能轉為對折式（左右折）且僅需單一軸承，相關供應鏈隨消息面起伏。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "持續買地擴建新廠，1月中旬法說會的展望將是市場關鍵的檢驗點。"}, {"symbol": "AMAT", "name": "應用材料", "market": "US", "stance": "觀察", "argument": "美股半導體設備股近期表現極為瘋狂，估值甚至已提前反映到2028年的預期。"}, {"symbol": "ASML", "name": "艾司摩爾", "market": "US", "stance": "觀察", "argument": "美股半導體設備巨頭之一，近期股價表現強勁但估值偏高。"}, {"symbol": "KLA", "name": "科磊", "market": "US", "stance": "觀察", "argument": "美股半導體檢測設備龍頭，股價同樣呈現瘋狂噴出的狀態。"}, {"symbol": "3081", "name": "聯亞", "market": "TW", "stance": "觀察", "argument": "在光通訊與矽光子族群中具備核心地位，但股價一向偏貴且營收尚未完全跟上。"}, {"symbol": "3558", "name": "神準", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及的光通訊相關個股，主持人列為觀察並提醒注意追高風險。"}, {"symbol": "3034", "name": "聯詠", "market": "TW", "stance": "已出場", "argument": "主持人已將帳上表現不佳、不隨大盤起舞的標的進行減碼與清倉。"}, {"symbol": "8054", "name": "安國", "market": "TW", "stance": "已出場", "argument": "先前因消息面狂飆，主持人已在近期逢高獲利了結、清空部位。"}, {"symbol": "聖暉*", "name": "聖暉*", "market": "TW", "stance": "看多", "argument": "台積電擴廠效應下，無塵室工程與廠務系統整合的直接受益者。"}, {"symbol": "信紘科*", "name": "信紘科*", "market": "TW", "stance": "看多", "argument": "半導體廠務製程廢液處理及二次配管工程商，受惠於晶圓廠持續擴建。"}, {"symbol": "和桐*", "name": "和桐*", "marke 作被市場質疑是套娃與重複收取手續費。"}], "quotes": ["長期持有標的其實非常不容易，因為每次壞消息出來，你就要做出當下的判斷，你到底要繼續持有還是要賣。", "老黃真的沒有騙你，就是買越多省越多，買最新的東西，你可能還會意外地又再省更多。", "人生之中的一些決定，我都有辦法把它腦補成為是好的，你沒有在一些關鍵的時間回頭看，你不會知道這個選擇到底是好還是壞。"], "ep_key": "EP625", "title": "EP625 | 🧸", "pubdate": "2026-01-07", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期與投資團隊參訪台灣 MR（混合實境）硬體與軟體開發公司的經驗，並對 VR/AR/MR 產業的未來發展與虛實整合趨勢表達樂觀看法。針對台股大盤，台積電在 2026 年開春首日表現強勁，主持人預期台積電在 2027 年的 Forward P/E 估值推動下，股價站上 2000 元指日可待。此外，針對市場上關於 TPU、Broadcom 及 AWS 砍單的傳言，主持人予以澄清，並指出 Google 對晶片的需求依然強勁。最後，本集也深入探討了 S-RAM、PS-RAM、VHM 與 Cube 等記憶體技術在 Edge AI 端的應用前景，並提醒投資人注意技術面與基本面的搭配使用。", "topics": ["MR/VR/AR 產業參訪心得與虛實整合未來趨勢", "台積電 2026 年開春表現與 2027 年估值展望", "澄清 Google TPU、Broadcom 及 AWS 砍單傳言", "台積電 2026 年資本支出（CapEx）展望", "S-RAM、PS-RAM、VHM 與 Cube 在 Edge AI 端的應用與想像", "技術面（日線、週線、月線）與基本面的搭配策略"], "market_view": "台積電在 2027 年估值推動下，摸到 2000 元是非常容易的事情，大盤將持續由台積電帶領向前衝。", "industries": [{"name": "MR/VR/AR", "stance": "看多", "view": "虛實整合技術進步迅速，未來在 Edge 端與智慧輔助上的應用將更加模糊虛實界線。"}, {"name": "半導體代工", "stance": "看多", "view": "台積電不論在 GPU、ASIC 或記憶體封裝（CoWoS/HBM）都處於極佳位置，資本支出有望上修。"}, {"name": "記憶體", "stance": "觀察", "view": "Edge AI 端的記憶體需求（如 VHM、Cube）正受到市場關注，但需分清是真需求還是短期想像。"}, {"name": "被動元件", "stance": "觀察", "view": "近期被動元件族群股價有所表態，但部分個股上漲其實是伴隨記憶體代理等其他故事。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "2027 年估值看好，股價上 2000 元指日可待，且 2026 年資本支出有望達到 500 億美元以上。"}, {"symbol": "TSM", "name": "台積電ADR", "market": "US", "stance": "看多", "argument": "開春表現強勁，溢價持續存在，反映市場對其領先地位的共識。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "argument": "對晶片需求極大、需索無度，市場傳出的砍單傳言基本上是錯誤的。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "中性", "argument": "市場傳言其 TPU 訂單遭砍，但實際上 Google 的長期晶片規劃並未改變。"}, {"symbol": "AMZN", "name": "Amazon", "market": "US", "stance": "中性", "argument": "市場傳出 AWS 晶片訂單砍單，但近期 AWS 晶片表現其實相當不錯，傳言不實。"}, {"symbol": "ORCL", "name": "Oracle", "market": "US", "stance": "觀察", "argument": "前陣子債務信用評等被拿出來討論，但整體 AI 資本支出趨勢未變。"}, {"symbol": "2344", "name": "華邦電", "market": "TW", "stance": "觀察", "argument": "其 Cube 技術在官方網站上說明可作為 L3 Cache 使用，屬於 Edge 端的 S-RAM 概念。"}, {"symbol": "6531", "name": "愛普*", "market": "TW", "stance": "觀察", "argument": "其 VHM 技術（Wafer-on-Wafer）可被視為 L3 Cache 應用，股價已脫離盤整區間。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "作為被動元件龍頭，近期有漲價狀況，且未來資料中心對電容電感需求將直線上升。"}, {"symbol": "3034", "name": "聯詠", "market": "TW", "stance": "觀察", "argument": "在 AI 晶片領域進度較慢，需等待整體消費性電子需求回溫，目前處於 K 型經濟的下檔。"}], "quotes": ["市場上太多 noise，這就是 noise，這就是把你洗掉的一些有得沒有的小鬼故事。", "你可以用月線當成是趨勢，用日線當成是強弱。月線多頭排列的股票，日線拉回就是買點。", "買到好的公司，你就算技術面買點買得很差，它終究還是會讓你賺錢。"], "ep_key": "EP624", "title": "EP624 | 🎥", "pubdate": "2026-01-03", "duration_s": 2994, "has_tr": true}, {"summary": "本集為 2025 年最後一集，主持人謝孟恭回顧過去一年的個人生活、家庭與事業發展，並對 2026 年的投資布局進行展望。他指出目前台股與美股指數皆處於相對高檔，提醒投資人切勿預設高點。展望新的一年，他持續看好電力與能源基礎建設、光收發模組、雷射（如 EML、CW）及先進封裝等 AI 相關供應鏈。同時，他也分析了因記憶體漲價而受壓力的下游系統廠、網通與 IPC 產業，並分享其「動能投資」與「耐心持有」的觀點轉換。", "topics": ["2025 年個人生活與家庭回顧", "實體店面與遊戲資本（消難、烏山）投資進展", "2026 年產業趨勢展望：電力、光通訊、雷射與先進封裝", "記憶體漲價對下游系統廠、網通與 IPC 的影響", "投資心態轉變：從關注每月營收轉向季度與長期趨勢", "聽眾問答：資產縮水應對、房價下跌與保證金問題、職場性騷擾應對"], "market_view": "目前指數處於相對高檔，但切勿預設高點，若大盤出現 5% 至 10% 的回檔將是極佳的買進機會。", "industries": [{"name": "電力與能源建設", "stance": "看多", "view": "在 AI 伺服器與資料中心建置下，電力需求迫切，相關電力系統與設備將持續重要。"}, {"name": "光通訊與光收發模組", "stance": "看多", "view": "光收發模組與相關材料（如磷化銦）的市場需求成長率將高於其他硬體，是明年加碼布局的重點。"}, {"name": "記憶體", "stance": "觀察", "view": "記憶體價格持續上漲，雖對記憶體廠有利，但會對下游系統廠、網通與 IPC 廠造成成本壓力。"}, {"name": "系統廠/網通/IPC", "stance": "看空", "view": "若記憶體維持高價，且無法立刻反映成本給終端客戶，明年表現可能受到壓抑。"}], "tickers": [{"symbol": "Tesla", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "其 AI Cluster 需使用自建的電力系統進行供應。"}, {"symbol": "Amphenol", "name": "安費諾", "market": "US", "stance": "觀察", "argument": "銅線相關標的，在市場炒作光通訊時容易被殺，但實際業績依然良好。"}, {"symbol": "Credo", "name": "Credo", "market": "US", "stance": "觀察", "argument": "銅線傳輸相關標的，業績表現依然會很好，但市場定位常與光通訊產生排擠。"}, {"symbol": "3105", "name" 團隊的原因。", "SRAM雖然速度極快，但因成本高昂且難以微縮，無法完全取代HBM，兩者各有其適用的應用場景。"], "ep_key": "EP622", "title": "EP622 | 🕯️", "pubdate": "2025-12-27", "duration_s": 2995, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了與兒子互動的溫馨育兒點滴，並探討了男性在傳統教育下不輕易表達情感的現象。針對投資策略，謝孟恭回顧了 2025 年的投資表現，指出年底 Tesla 及小股組合的復甦使全年績效略優於去年。他分享了自 4 月市場大波動後，將槓桿比例降至 1.1 至 1.5 倍的保守策略，並優化了多個帳戶的維持率與緊急備用金管道。此外，他透露未來將持續加大台股小股組合的配置，並轉向更長線的「放置 Play」模式，同時對 APM Memory (愛普*) 的 3D 堆疊與細電容技術前景進行了產業分析。", "topics": ["NordVPN 贊助與遠端工作安全宣導", "溫馨育兒點滴與男性情感表達的省思", "2025 年投資績效回顧與槓桿策略調整", "4 月市場波動帶來的流動性管理與帳戶優化啟示", "台股小股組合配置調整與長線投資思維", "APM Memory (愛普*) 3D 堆疊與細電容技術前景分析"], "market_view": "目前大盤表現與年底復甦優於預期，但仍需維持保守的槓桿比例並做好流動性管理以防範黑天鵝事件。", "industries": ["半導體", "記憶體", "軟體"], "tickers": [{"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "argument": "年底出現明顯復甦，對整體投資組合績效貢獻顯著。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "argument": "作為美股軟體股組合的一部分，今年帶來了非常好的報酬。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "美股軟體股組合之一，在年尾結算時表現優異。"}, {"symbol": "CFLT", "name": "Confluent", "market": "US", "stance": "持有中", "argument": "雖然以較特別的方式出場，但整體仍有賺到錢。"}, {"symbol": "6531", "name": "愛普*", "market": "TW", "stance": "觀察", "argument": "其 WoW 與 VHM 技術受關注，細電容技術（IPD）在 CoWoS-L 載板的應用與 IP 授權具備想像空間，但量產與營收貢獻時程仍待觀察。"}], "quotes": ["在世界上獲得好的評價有兩種格式：第一種是好的人說你很好，第二種是從那些非常討厭的人眼中獲得他很討厭你、覺得你是廢物的評價，這叫做負負得正。", "有錢有有錢的養法，沒有錢也有沒錢的養法，如果你都沒有被生下來的話，你就感受不到這一切。"], "ep_key": "EP621", "title": "EP621 | 🎄", "pubdate": "2025-12-24", "duration_s": 3007, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭首先針對近期社群媒體上關於育兒與生育觀點的討論風波進行澄清，強調其本意並非指責特定族群，而是反對社群上刻意製造育兒焦慮與軍備競賽的現象。在市場與投資方面，主持人分享了近期在台股與美股的觀察，指出目前正處於產業題材的轉換期，硬體端（如記憶體、光通訊、散熱等）依然維持強勢，但他也開始關注 AI 軟體應用的發展，並詳細剖析了保險科技公司 Lemonade 與特斯拉合作，利用車輛數據進行精準保費計算的創新商業模式，探討 AI 如何推動傳統保險業的變革。", "topics": ["社群育兒焦慮與生育觀點澄清", "主動選股的空間與市場認知落差", "優士資本（劉董）交易員培訓徵才宣傳", "台股與美股近期盤勢與題材轉換觀察", "AI 軟體應用：Lemonade 與 Tesla 合作的保險科技模式", "傳統企業導入 AI 的痛點與組織阻力", "聽眾問答：小琉球旅遊、Lisa 吵架風波、設備股與衛星股判斷、正二 ETF 投資邏輯"], "market_view": "目前市場處於題材轉換的震盪階段，硬體端仍有表現空間，但操作上應避免在高位盲目追高，並依資金水位進行動態調整。", "industries": [{"name": "記憶體", "stance": "看多", "view": "美光財報顯示記憶體（包括 HBM、DRAM、NAND Flash）持續缺貨，預期供需吃緊將延續至明年上半年甚至整年。"}, {"name": "光通訊", "stance": "看多", "view": "美股光通訊類股表現依然強勁，台股相關標的亦維持強勢整理。"}, {"name": "散熱", "stance": "觀察", "view": "散熱族群在禮拜五出現轉強並挑戰前高的跡象，持續觀察其續航力。"}, {"name": "低軌衛星", "stance": "看多", "view": "雖然短期股價可能出現突破後拉回的震盪走勢，但整體產業趨勢與美美政府政策支持方向依然明確。"}, {"name": "保險科技", "stance": "看多", "view": "AI 應用在保險業（如 Lemonade 的動態保費計算）能實現更精準的風險定價與營運槓桿，是具前景的破壞式創新。"}], "tickers": [{"symbol": "MU", "name": "美光", "market": "US", "stance": "看多", "argument": "財報證實記憶體市場持續嚴重缺貨，產業景氣走勢比預期更為持久。"}, {"symbol": "LUMN", "name": "Lumentum", "market": "US", "stance": "看多", "argument": "美股光通訊指標股之一，持續維持強勢的技術走勢。"}, {"symbol": "COHR", "name": "Coherent", "market": "US", "stance": "看多", "argument": "光通訊板塊強勢股，受益於 AI 基礎建設的持續需求。"}, {"symbol": "LMND", "name": "Lemonade", "market": "US", "stance": "觀察", "argument": "與特斯拉合作透過 API 獲取駕駛數據進行動態保費定價，具備強大的營運槓桿潛力，但需注意其賠付率與財務轉正狀況。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "其擁有的車輛與軟體數據透過 API 開放給保險科技公司，推動車險業務的創新與合作。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "中性", "argument": "作為權值股，其股價波動有時受外資拉抬指數影響，不適合單純用來判斷特定中小型族群的資金輪動。"}], "quotes": ["主動選股還是有很多空間，因為市場上笨蛋真的太多了。很多時候你都可以感覺得到，在下跌的時候一堆人一直罵、一直酸，但最後賺錢的總是我。", "不要去相信社群上面跟你講說 30 歲一定要有多少資產、要搞軍備競賽的人。我是在保護那些比較弱勢的人，不要被社群上的焦慮感給綁架。", "傳統大企業要轉換 AI 比較困難的原因，第一是利益受損的既得利益者會抗拒，第二是後台歷史數據格式太過複雜，光是做轉接器與資料整理就非常困難。"], "ep_key": "EP620", "title": "EP620 | 🐥", "pubdate": "2025-12-20", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期家庭生活與育兒心得，並對當前股市大盤的震盪走勢進行分析。他指出，近期市場出現熱門股跌停、人氣潰散的現象，因此在操作策略上轉向「拾荒組」，逢低布局多頭排列但短期被市場拋售的標的。此外，針對 Amazon 傳出將融資 OpenAI 的新聞，主持人分析了 AWS 加入 AI 聯盟對光通訊與 ASIC 產業的潛在影響，並詳細探討了低軌衛星（如 SpaceX、Starlink 供應鏈）在台股的連動機會，最後以深入淺出的方式科普了矽光子、雷射晶片與 CPO 的技術原理。", "topics": ["出國旅遊與過敏體質適應問題", "家庭生活、全家福拍攝與育兒心路歷程", "近期股市大盤震盪與「拾荒組」投資策略", "Amazon 融資 OpenAI 傳聞與 AWS 晶片供應鏈影響", "低軌衛星（SpaceX/Starlink）題材與台股相關個股機會", ，目前操作策略轉為區間盤看待，研究時間大於交易時間。", "industries": [{"name": "AI伺服器/交換器", "stance": "看多", "view": "中長期趨勢明確，銅與光通訊解決方案在未來幾年只會放大，短期回檔反而是介入時機。"}, {"name": "散裝航運", "stance": "觀察", "view": "BCI 指數因西非鐵礦砂與烏俄停戰傳聞上漲，應關注現貨船佔比較高的業者以直接受惠。"}, {"name": "半導體設備", "stance": "觀察", "view": "近期開始拉出設備股進行細拆，特別是與 EMIB 相關的設備股，需篩選出真正能供應給主要大廠的標的。"}], "tickers": [{"symbol": "3661", "name": "世芯-KY", "market": "TW", "stance": "持有中", "argument": "與世芯-KY（M31）組成組合，雖然之前曾面臨重殺，但財報公布後盤後直接大拉，顯示美國市場反應較慢。"}, {"symbol": "SBLK", "name": "Star Bulk Carriers", "market": "US", "stance": "觀察", "argument": "幾乎都在走現貨船，若 BCI 指數持續上漲，較容易直接享受到租金上漲的紅利。"}, {"symbol": "2606", "name": "裕民", "market": "TW", "stance": "觀察", "argument": "台灣散裝航運業者中，裕民也是有在走現貨船的代表之一。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "中性", "argument": "在 AWS 採用 NVLink 的架構調整下，理論上 Broadcom 的 ASIC 業務可能會受到一些影響。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "不論 AWS 如何調整架構，NVIDIA 在整體 AI 伺服器與 NVLink 趨勢中依然是絕對的受益者。"}], "quotes": ["投資自己身體的基本面，絕對是穩賺不賠。", "當你可以悟懂這些事情（絕大多數的憂慮最後都沒發生）的話，你就會知道說，真的出了問題你再來去煩惱怎麼樣快速的去解決它，而不是在問題都還沒有出來之前，你就先開始擔憂。", "不要在你生氣的時候下判斷，生氣的時候下的判斷，一堆都會後悔。"], "ep_key": "EP615", "title": "EP615 | 🌶️", "pubdate": "2025-12-03", "duration_s": 3126, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭首先分享了與情人節、育兒及電玩相關的個人生活經驗，並探討了 AI 應用的變現模式與企業 DNA 的關聯。在市場分析方面，主持人深入剖析了 NVIDIA（輝達）對供應鏈（Group A）施加砍價壓力的背後邏輯，指出這與 Google TPU 的競爭及成本控管密切相關。此外，他也探討了茂林（BizLink）等 Group C 廠商的處境，並對 Intel 的股價波動、EMIB 技術的未來前景，以及記憶體與 IC 設計產業的輪動發表了看法，強調投資應注重風險控管與動態調整。", "topics": ["育兒經驗與電玩教育的看法", "AI 應用的變現模式與企業 DNA 的關聯", "NVIDIA 供應鏈砍價壓力與 Group A 採購策略分析", "Google TPU 競爭對 NVIDIA 成本控管的影響", "Intel 股價波動與 EMIB 技術前景", "記憶體與 IC 設計產業的輪動與投資策略", "投資風險控管與動態減碼的實務經驗"], "market_view": "市場目前仍處於偏向藍海的階段，尚未進入紅海的惡性競爭，但需密切關注大廠之間的價格戰與供應鏈調整。", "industries": [{"name": "AI伺服器", "stance": "觀察", "view": "NVIDIA 正在加強對 L6 到 L10 整合的控管，並對供應鏈施加砍價壓力以進行成本控管。"}, {"name": "半導體封裝", "stance": "看多", "view": "EMIB 技術在 TPU V9 世代將會放量，台系相關廠商長期前景看好。"}, {"name": "記憶體", "stance": "中性", "view": "雖然報價與基本面續勢仍佳，但短期內可能面臨市場資金輪動的壓力。"}, {"name": "IC設計", "stance": "看多", "view": "IC 設計板塊如 MTK、GUC 等近期表現良好，具有資金避風港與輪動的機會。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "argument": "正在對供應鏈施加砍價壓力，並試圖將生產整合至 L10 以控制成本。"}, {"symbol": "3665", "name": "貿聯-KY", "market": "TW", "stance": "觀察", "argument": "屬於 Group C 廠商，主要採購方為 CSP，受 NVIDIA 直接砍價的影響較小。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "股價因市場傳言 Apple 訂單及 EMIB 技術而上漲，但實際放量時間仍遠。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "看多", "argument": "預期在 2026 年可取得 20K 至 30K 的 CoWoS 產能，長期成長故事仍在。"}, {"symbol": "2344", "name": "華邦電", "market": "TW", "stance": "已出場", "argument": "在先前高點已進行減碼，目前維持較低持股。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "作為先進製程與先進封裝的龍頭，其產能依然供不應求。"}], "quotes": ["資金很難騙人，特別是當有族群性產生時，一般來說這邊就真的是有一些狀況。", "你的成本不是公司的成本，這句話非常有道理，投資時必須隨時注意自己的安全邊際。", "不要想要每個都賺到，你已經有賺到很多錢就很厲害了，動態調整部位才能讓心情比較舒服。"], "ep_key": "EP614", "title": "EP614 | 🌻", "pubdate": "2025-11-29", "duration_s": 3022, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了其參與 NMMEA 亞洲新媒體高峰會的經驗，並重申其「消難資本」與「烏山資本」在台灣遊戲產業的投資規劃，強調以資本介入加速台灣遊戲走向國際。在市場分析方面，本集聚焦於 Google 股價強勢背後的供應鏈動態，詳細解析 TPU（特別是 V7/Ironwood）的市場需求與封裝瓶頸。主持人指出，雖然 Google TPU 需求極為強勁，但這並不意味著 GPU（如 NVIDIA）會被完全取代，兩者為並存關係。此外，亦探討了台積電 CoWoS 產能限制對供應鏈的影響，以及聯發科、博通在 TPU 專案中的角色與獲利模式差異，並提醒投資人注意市場對 AI 題材的過度反應與動態調整。", "topics": ["Sony WH-1000XM6 降噪耳機贊助合作", "NMMEA 亞洲新媒體高峰會與台灣遊戲產業投資規劃", "Google 股價強勢與 TPU 供應鏈深度解析", "博通（Broadcom）與聯發科（MediaTek）在 Google TPU 專案的獲利與角色差異", "台積電 CoWoS 產能瓶頸與後段封測廠（如 Amkor、ASE）的潛在機會", "NVIDIA GPU 與 ASIC（TPU）的市場定位與並存關係", "聽眾問答：ESG 看法、交易心態調整、台股期貨槓桿、個股與產業配置探討"], "market_view": "目前 AI 產業仍處於嬰兒期，市場常出現過度反應（Overhype）與「捧 A 踩 B」的現象，投資人應保持動態調整的心態，不宜過早下定論。", "industries": [{"name": "遊戲產業", "stance": "看多", "view": "台灣有許多優秀的遊戲開發團隊，透過資本介入與資源整合，有機會將台灣遊戲推向全球市場。"}, {"name": "AI 半導體 / ASIC", "stance": "看多", "view": "Google TPU 等 ASIC 需求極為強勁，但與 GPU 為並存關係，並非絕對的替代關係。"}, {"name": "半導體封測 (CoWoS)", "stance": "看多", "view": "台積電 CoWoS 產能供不應求，瓶頸可能導致訂單外溢至其他後段封裝測試廠。"}], "tickers": [{"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "argument": "TPU 需求極為強勁，部署速度極快，且新一代 Gemini 模型表現亮眼，供應鏈動能強勁。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "看多", "argument": "作為 Google TPU 的主要 ASIC 合作夥伴，提供整顆晶片解決方案，單價高且獲利空間大。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "切入 Google 新一代 TPU 的 IO 與 CoW 封裝設計，但因手機市場疲軟及記憶體漲價壓抑毛利，股價表現較為疲弱。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "市場因 Google 強勢而恐慌性拋售 NVIDIA 是不理性的，GPU 的廣泛適用性與生態系優勢依然無可替代。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "作為全球先進製程與 CoWoS 封裝的絕對龍頭，其產能擴充速度是整體 AI 晶片出貨的最大關鍵。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "其 EMIB 封裝技術未來有機會獲得微軟或 Google 新一代晶片的採用，作為台積電產能不足的備案。"}], "quotes": ["不要把股票市場當成球賽在看，非得拼個你死我活。投資是來賺錢的，保持動態調整的心態最重要。", "當一個族群開始有超多人去盯的時候，一般來講，超多人盯卻還沒有反應的東西，可能真的有問題。", "散戶千萬不要自視甚高，認為自己可以買在主力前面。追高動能題材股是合理的，因為你不可能比消息人士更早知道。"], "ep_key": "EP613", "title": "EP613 | 🦔", "pubdate": "2025-11-26", "duration_s": 2994, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期與遊戲投資團隊交流的啟發，探討了人生與投資中的「終局之戰」與直覺訓練。針對近期美股大盤（特別是那斯達克）在週四出現的大幅拉回，他分析這主要是 CTA 賣壓與避險基金因跌破關鍵價位而進行的程式化減碼與去槓桿，而非基本面改變。他重申「有問題的是你的買進成本，而不是公司基本面」，並針對市場對 NVIDIA 應收帳款與庫存過高的質疑進行理性駁斥。操作上，他採取「低買高賣」的動能調節策略，並在指數跌破季線時積極補部位，同時強調在市場恐慌時保持冷靜與紀律的重要性。", "topics": ["喬治優特國季電暖器贊助與冬季保暖推薦", "聖誕節佈置與對小孩夢幻教育的看法", "與遊戲投資團隊會面的啟發與終局論", "美股大盤（那斯達克）週四暴跌原因分析（CTA 與去槓桿）", "NVIDIA 應收帳款與庫存數據的理性分析與市場錯殺", "動能操作策略調整：從汰弱留強轉為低買高賣", "聽眾問答：債券配置、台美股操作差異、5269 祥碩與消費性電子展望、全職交易的心態調適"], "market_view": "大盤拉回主要是程式化交易與去槓桿引起的技術性賣壓，基本面並未轉壞，跌破季線是積極補部位的機會，但需注意均線若拉平甚至轉為負斜率時的大回檔風險。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "NVIDIA 的基本面依然強勁，新產品即將出貨，應收帳款與庫存上升屬於正常商業週期的展現。"}, {"name": "消費性電子", "stance": "中性", "view": "整體消費性電子需求目前仍不被市場看好，相關個股如祥碩（5269）短期缺乏新的催化劑。"}, {"name": "軟體", "stance": "觀察", "view": "正密切觀察 Cloudflare、Palantir 等軟體股是否能展現出 "3653", "name": "健策", "market": "TW", "stance": "看多", "argument": "在散熱領域驗證過關且表現優異，在市場大殺時展現出極佳的抗跌與反彈韌性。"}, {"symbol": "6282", "name": "康舒", "market": "TW", "stance": "觀察", "argument": "聽眾提及個股，主持人未對其基本面做過多評論。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "手機晶片相關，目前非主持人偏好的 AI 主流題材。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "雖然之前操作曾受傷，但認為大型股破底時仍可適度參與，並看好其機器人長期願景。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "提及 2021 年底曾出現假突破後拉回的歷史走勢作為技術面參考。"}, {"symbol": "2408", "name": "南亞科", "market": "TW", "stance": "觀察", "argument": "記憶體相關個股，目前整體記憶體族群處於減碼階段。"}, {"symbol": "2337", "name": "旺宏", "market": "TW", "stance": "觀察", "argument": "記憶體相關個股，目前整體記憶體族群處於減碼階段。"}, {"symbol": "2344", "name": "華邦電", "market": "TW", "stance": "已出場", "argument": "在之前的反彈波段中，已於 36 至 38 元區間將大部分持股獲利了結。"}, {"symbol": "4967", "name": "十銓", "market": "TW", "stance": "持有中", "argument": "將華邦電獲利了結的資金轉去加碼十銓，看好其後續表現。"}, {"symbol": "2496", "name": "卓越", "market": "TW", "stance": "觀察", "argument": "聽眾提及個股，主持人未做評論。"}], "quotes": ["當你把現金水位拉高，你根本就希望它崩盤。它上去你看了難過，它掉下來你覺得跌得不夠深，心態會變得非常輕鬆。", "基本面好、有業績的股票，跌下來至少會有像我們這種看基本面的人去幫你接牌；完全靠技術面炒上去的，下來有時候就直接去死了。", "不要去期待有人會每次都對。不要在人家抓錯趨勢的時候去笑人家，因為你不可能每次都對，相信有人會每次都對的人，就是會被詐騙的體質。"], "ep_key": "EP610", "title": "EP610 | 🍅", "pubdate": "2025-11-15", "duration_s": 3034, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了參與《百靈果》與《台通》節目的心得，並探討了個人在自媒體經營、生活重心與心態上的轉變。針對當前金融市場，他指出多頭家數比例已顯著下滑，盤面結構轉趨不健康，資金高度集中於少數強勢股（如記憶體與部分 AI 相關標的）。他建議投資人應適度降低持股水位、保留現金，並開始關注因短期報價或題材受害、但長期展望佳的「受害者」標的，等待落底機會。此外，他也觀察到全球旅遊與航空業在經歷報復性消費後，可能因產能擴張與需求放緩而面臨價格走溫的趨勢。", "topics": ["參與台通與百靈果節目的心得與心態轉變", "當前台股大盤結構與多頭家數下滑的警訊", "資金過度集中強勢股的風險與因應策略", "記憶體產業報價趨勢與相關供應鏈看法", "尋找因短期題材受害、估值偏低標的的投資機會", "全球旅遊與航空業報復性消費後的產能與價格趨勢"], "market_view": "當前盤面結構不健康，多頭家數顯著下滑，資金高度集中，建議投資人適度降低持股水位、保留現金並維持警戒。", "industries": [{"name": "記憶體", "stance": "觀察", "view": "目前報價維持強勢，但預期明年第一季開始報價漲幅將顯著收斂並進入橫盤整理。"}, {"name": "網通", "stance": "觀察", "view": "網通廠因多採固定價格的標案模式，在記憶體等零組件漲價過程中短期利潤受蝕，需等待零組件報價回穩。"}, {"name": "旅遊與航空", "stance": "觀察", "view": "經歷報復性旅遊潮後，因業者產能擴張且消費者預算收緊，未來價格與熱度可能逐漸走溫。"}], "tickers": [{"symbol": "群聯", "name": "群聯", "market": "TW", "stance": "觀察", "view": "公司本身仍有庫存且受惠於報價上漲，市場先前關於其無庫存的傳言與實際情況有出入。"}, {"symbol": "富喬", "name": "富喬", "market": "TW", "stance": "觀察", "view": "隨著相關題材升溫，股價跟隨市場資金集中趨勢而有所表現。"}], "quotes": ["在盤勢持續修正、淨值開始盤跌的狀態下，把錢收回來（保留現金）是一個很重要的事情，但很多人其實做不到。", "不要在有新低價的時候去做超底，即便 K 線看起來止跌回穩，但若均線仍呈現空頭排列，仍需保持謹慎。", "有些事情你當下就要去做，因為當下不做，你長大之後就完全不想做了，連拿好處跟你換你可能都不要。"], "ep_key": "EP609", "title": "EP609 | 🌪️", "pubdate": "2025-11-12", "duration_s": 2997, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了與外資高層交流的心得，探討了在投資中過度追逐細節與雜訊可能導致的焦慮與失誤，強調掌握產業大趨勢（如 CoWoS、CoPoS 等先進封裝方向）並保持合理持股比例的重要性。此外，針對 AI 模型的競爭，主持人分析了 Apple 與 Google 潛在的合作模式，並指出 Google 在硬體（TPU）與 AI 應用上的強勢地位。在記憶體產業方面，主持人結合各大原廠法說會資訊，指出 AI 伺服器對 HBM 與高階 SSD 的強勁需求正持續排擠常規產能，預期記憶體供需緊俏將延續至 2026 年底甚至 2027 年，呈現結構性的超級循環。", "topics": ["與外資高層交流：投資心態與抓大放小的哲學", "Apple 與 Google 的 AI 合作：客製化模型與學習曲線", "Google 在 AI 晶片（TPU）與生態系的強勢地位", "記憶體產業結構性變革：AI 伺服器需求與產能排擠效應", "各大記憶體原廠（Samsung、SK Hynix、美光、鎧俠、SanDisk）最新市況展望", "投資停損與減碼策略的心理調適"], "market_view": "市場盤面震盪時，應適度調降持股水位至舒服的比例，避免受短期雜訊干擾而錯失長期大趨勢。", "industries": [{"name": "先進封裝", "stance": "看多", "view": "CoWoS 與未來的 CoPoS 等先進封裝方向明確，掌握關鍵設備與零組件即可長期布局。"}, {"name": "AI 模型", "stance": "觀察", "view": "模型廠商競爭激烈導致議價能力降低，但客製化與授權模式仍具發展空間。"}, {"name": "記憶體", "stance": "看多", "view": "AI 需求拉動 HBM 與高階 SSD，排擠常規 DDR 產能，供需吃緊預計持續至 2026 年底。"}], "tickers": [{"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "view": "在搜尋、AI 模型、TPU 自研晶片及授權業務上表現強勢，估值合理，為重點鎖定對象。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "觀察", "view": "自研伺服器晶片並積極推動 AI，與 Google 合作客製化模型可能意在學習與後續自研。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "view": "雖然面臨自研晶片競爭，但目前在 AI 晶片市場仍具主導地位。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "觀察", "view": "雖然具備高成長率，但目前的估值（P/E 乘數）高到不可思議。"}, {"symbol": "3006", "name": "晶豪科", "market": "TW", "stance": "觀察", "view": "聽眾問答提及，主持人未對個股發表特定看法，僅對記憶體產業整體市況進行分析。"}], "quotes": ["時間跟健康最珍貴，投資要贏在起跑點，身體管理當然也是。", "你如果每天去盯著報價的變化、去盯著市場大家的一些新的說法，你很容易會受到這種市場的雜訊所影響，反而吃不到大魚。", "記憶體這個循環它一定是走得比過去的循環都還要來得大，這是無庸置疑的，可是它最後也一定會大家大擴產，需求最後一定會被滿足。"], "ep_key": "EP608", "title": "EP608 | 🍭", "pubdate": "2025-11-08", "duration_s": 2999, "has_tr": true}, {"summary": "本集節目由 NordVPN 贊助。主持人謝孟恭分享了近期台股與美股市場的劇烈波動，特別是期貨市場在國際盤混亂時的套利機會。他宣布了「烏山資本」的誕生，這是繼「驍南資本」後的第二號基金，旨在與文策院及民間投資人合作，共同投資與支持台灣本土遊戲開發團隊。此外，他分析了記憶體產業與 Astera Labs (ALAB) 的最新財報表現，並探討了 AI 對白領工作與未來社會結構（如 UBI）的潛在影響。", "topics": ["烏山資本的成立與台灣遊戲產業投資計畫", "期貨市場開盤套利策略與斷頭潮觀察", "記憶體產業報價與市場供需現況", "Astera Labs (ALAB) 財報分析與中國市場晶片叢集需求", "AI 對白領工作、自動化及 UBI（基本收入）的影響", "Intel (INTC) 的轉型、先進封裝 (EMIB) 與台廠供應鏈機會"], "market_view": "市場目前處於相對高檔且震盪加劇的階段，建議投資人控制槓桿，適度保留現金或配置於指數型基金以應對波動。", "industries": [{"name": "遊戲開發", "stance": "看多", "view": "看好台灣本土遊戲開發的長期潛力，並透過烏山資本進行早期階段的股權投資。"}, {"name": "記憶體", "stance": "觀察", "view": "目前報價維持相對健康，但個股股價已累積較大漲幅，需留意回檔風險。"}, {"name": "半導體先進封裝", "stance": "看多", "view": "Intel 的 EMIB 封裝技術有望帶動相關台廠供應鏈的發展，打破台積電獨大的局面。"}], "tickers": [{"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "持有中", "view": "財報與展望皆優於預期，但股價因市場估值與傳言波動劇烈，長期看好其在高速傳輸晶片的地位。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "view": "新執行長上任後製程與體質逐步改善，其 EMIB 先進封裝技術有機會爭取到 CSP 客戶並帶動台廠供應鏈。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "view": "雖然面臨 Intel 等對手的競爭，但其在先進製程與封裝的領先地位依然穩固。"}], "quotes": ["在市場恐慌暴殺的時候，有時候真的就像是送錢給你一樣，但前提是你要有足夠的資金餘裕。", "你要去尊重那些很認真跟你分析推理的人，即使他最後看錯，這樣的人還是值得信賴的；而不是去聽那些只會馬後炮嘲諷的人。", "投資有問題的通常是你的成本，而不是公司本身。如果你成本買得太高，就會每天擔心受怕、亂殺亂砍。"], "ep_key": "EP607", "title": "EP607 | 🌲", "pubdate": "2025-11-05", "duration_s": 3053, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期參與孩子學校校外教學的感悟，並透過與地方股友的互動，探討了市場上「幫忙開燈」等大戶資金操作的趣味現象。在市場分析方面，主持人指出當前市場呈現兩極化，AI 相關的少數標的與大型權值股持續創高，而非 AI 領域如消費性電子、車用等則表現疲弱。此外，本集重點解讀了 Amazon (AWS) 的最新財報與法說會內容，強調 AWS 正在瘋狂增加容量（capacity），顯示 AI 伺服器、光通訊元件及 HBM 記憶體等供應鏈需求依然極度強勁，並未如市場先前謠傳的出現砍單或需求放緩，AI 浪潮仍持續進行中。", "topics": ["校外教學與帥氣老爸的定義", "地方股友與市場大戶的「開燈」操作", "當前市場兩極化與通膨隱憂的探討", "Amazon (AWS) 財報解讀與資本支出展望", "AWS 供應鏈（光通訊、交換器、PCB、記憶體）的輪動與機會", "AI 晶片與 HBM 記憶體（三星、SK 海力士）的競爭格局"], "market_view": "當前市場呈現兩極化，資金高度集中於 AI 相關的大型權值股，非 AI 領域表現疲弱，且供應鏈各環節持續漲價可能帶來通膨隱憂。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "AWS 等巨頭持續擴大資本支出並增加容量，AI 伺服器需求依然極度強勁。"}, {"name": "光通訊", "stance": "看多", "view": "光通訊元件與交換器需求因 AI 佈局而持續被大廠掃貨卡位。"}, {"name": "記憶體", "stance": "看多", "view": "HBM 記憶體是 AI 運算的重要瓶頸，大廠正積極爭奪產能。"}, {"name": "PCB", "stance": "看多", "view": "資金在各板塊輪動後，近期有重新流回銅箔基板與 PCB 相關標的的趨勢。"}], "tickers": [{"symbol": "6138", "name": "茂達", "market": "TW", "stance": "已出場", "argument": "去年曾持有約一億多台幣的部位，在經歷跌停與調整後已停損絕大多數部位。"}, {"symbol": "AMZN", "name": "Amazon", "market": "US", "stance": "觀察", "argument": "財報顯示 AWS 瘋狂增加容量以因應供不應求的 AI 需求，但主持人本身未直接持有其個股。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "argument": "先前市場傳出其將搶奪 AWS 相關市場份額，對其他供應鏈造成壓力。"}, {"symbol": "CRDO", "name": "Credo", "market": "US", "stance": "持有中", "argument": "先前股價被市場放空壓制，近期隨著 AWS 需求明朗而創下新高。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "持有中", "argument": "先前股價經歷大幅修正，近期出現巨量反彈，長期依然看好。"}, {"symbol": "3665", "name": "貿聯-KY", "market": "TW", "stance": "觀察", "argument": "作為 AWS 供應鏈成員，近期股價表現強勢，可能與 Power Whip 供電題材相關。"}, {"symbol": "6191", "name": "精成科", "market": "TW", "stance": "觀察", "argument": "主要偏向 Google 供應鏈，近期股價亦受到整體板塊帶動。"}, {"symbol": "5439", "name": "高技", "market": "TW", "stance": "觀察", "argument": "屬於 AWS 供應鏈中大家高度關注的 PCB 相關標的。"}, {"symbol": "2368", "name": "金像電", "market": "TW", "stance": "觀察", "argument": "受惠於 PCB 與板材整體資金回流，股價獲得帶動。"}, {"symbol": "2383", "name": "台光電", "market": "TW", "stance": "觀察", "argument": "銅箔基板大廠，受惠於 AI 伺服器與 PCB 板塊整體轉強。"}, {"symbol": "6274", "name": "台耀", "market": "TW", "stance": "觀察", "argument": "銅箔基板相關標的，近期股價隨板塊整體拉升。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "在 AI 晶片市場持續維持壟斷性優勢，並積極卡位光通訊與 HBM 產能以排擠對手。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "看多", "argument": "近期向台積電下達的客製化晶片（ASIC）需求與訂單量非常龐大。"}, {"symbol": "005930", "name": "三星電子", "market": "other", "stance": "觀察", "argument": "在 HBM4 世代的表現非常強眼，預期未來將擴大與 NVIDIA 的合作並提升市佔率。"}, {"symbol": "2337", "name": "旺宏", "market": "TW", "stance": "已出場", "argument": "先前做完題材後便已出場，雖然近期股價有波動，但已無持股。"}], "quotes": ["這麼熱的行情裡，你最該降溫的不是部位，而是你的腦袋。", "投資是一場長跑，最好的報酬不是追在最高點，而是讓你每天都醒得剛剛好。", "市場上很多時候是這樣，同樣一個故事，在股價高的時候和低的時候，大家的說法和態度會完全相反。"], "ep_key": "EP606", "title": "EP606 | 🌙", "pubdate": "2025-11-01", "duration_s": 3089, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了帶全家人前往日本觀看綠洲合唱團（Oasis）演唱會的體驗，並對家庭關係與養育觀念有了新的體悟。針對市場狀況，他指出當前大盤雖在高位，但盤面如同「糖豆人地板」般震動劇烈，空頭家數上升，個股走勢分化嚴重。操作上他提高了技術面的權重，並採取高週轉率、降低槓桿的策略以防範大回檔。此外，他分析了 Skyworks 與 Qorvo 合併對射頻（RF）產業的影響，並持續看好 Google 供應鏈的後市表現。", "topics": ["日本家族旅遊與綠洲合唱團演唱會體驗分享", "當前台美股大盤高檔震盪下的操作策略與週轉率調整", "射頻晶片大廠 Skyworks 與 Qorvo 合併案對產業鏈的影響", "Google 供應鏈與光通訊產業（如光聖）的展望", "答覆聽眾關於自安類股、記憶體與裝潢產業的提問"], "market_view": "大盤雖維持高檔，但個股走勢極度分化且震盪加劇，操作上應降低槓桿、提高週轉率並嚴格執行汰弱留強。", "industries": [{"name": "射頻（RF）", "stance": "中性", "view": "Skyworks 與 Qorvo 合併雖短期刺激反彈，但整體消費端與通路庫存尚未顯著回溫，且面臨中國廠商的低價競爭。"}, {"name": "光通訊", "stance": "看多", "view": "受惠於 Google 等美系大廠需求強勁，整體產業表現與展望佳。"}, {"name": "裝潢與設計", "stance": "觀察", "view": "產業面臨嚴重的師傅缺工問題，但若能往高階、精緻服務方向發展，利潤與薪資依然優渥。"}], "tickers": [{"symbol": "SWKS", "name": "Skyworks", "market": "US", "stance": "觀察", "view": "與 Qorvo 合併後成為射頻巨頭，有望主導高端市場並提升議價權。"}, {"symbol": "QRVO", "name": "Qorvo", "market": "US", "stance": "觀察", "view": "與 Skyworks 合併，短期股價受消息刺激反彈，但長期仍需觀察整合效益。"}, {"symbol": "6442", "name": "光聖", "market": "TW", "stance": "看多", "view": "作為 Google 的光通訊合作夥伴，受惠於大客戶強勁需求，股價表現亮眼。"}, {"symbol": "2344", "name": "華邦電", "market": "TW", "stance": "已出場", "view": "雖注意到三星減產對 MLC NAND 的潛在機會而進行短線交易，但因其營收佔比低，已獲利出場。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "view": "為美股核心持股之一，持續看好其在 AI 領域的龍頭地位。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "view": "為美股核心持股之一，維持長期持有的看法。"}, {"symbol": "MU", "name": "Micron", "market": "US", "stance": "持有中", "view": "跟隨記憶體（DRAM/NAND）產業復甦趨勢而持有的標的。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "觀察", "view": "與 Creado 同屬高速傳輸解決方案領域，持續關注其技術發展。"}, {"symbol": "CRDO", "name": "Credo", "market": "US", "stance": "觀察", "view": "美股高速傳輸晶片標的，目前股價基期相對較低。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "view": "納入美股軟體組合中，與 Palantir 一同看好其長期發展。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "view": "台股核心持股，為晶圓代工領域最頂尖的選擇。"}, {"symbol": "2308", "name": "台達電", "market": "TW", "stance": "持有中", "view": "台股核心持股，為電源管理與散熱領域的領先者。"}, {"symbol": "3037", "name": "欣興", "market": "TW", "stance": "持有中", "view": "台股核心持股，看好其在載板與先進封裝材料的領先地位。"}, {"symbol": "4968", "name": "立積", "market": "TW", "stance": "觀察", "view": "若射頻市場客戶因美中關係轉向非美系供應鏈，立積等台廠有望受惠。"}, {"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "view": "聽眾問答提及之自安與晶片相關標的，主持人未做過多評論。"}], "quotes": ["現在的盤面很像糖豆人的地板，踩上去就會開始震動，你必須隨時準備換到下一個安全的地板，否則就會掉下去。", "基本面有時候對我們來說既是祝福也是詛咒，因為你算完數字知道它佔營收比例不高，可能就會提早下車，反而賺不到後面超額的市場情緒財。", "在職場或生活上面對衝突，與其選擇匿名檢舉，不如直接且友善地當面溝通，匿名搞人往往最後會給自己帶來更多麻煩。"], "ep_key": "EP605", "title": "EP605 | 🪇😎 arigatouuu  😑🎸", "pubdate": "2025-10-29", "duration_s": 3132, "has_tr": false}, {"summary": "本集節目中，謝孟恭分享了與昔日樂團好友重聚並協助其在林口開設運動伸展店「Flex」的溫馨故事。在市場話題方面，他進一步追蹤了 Nexperia（安世半導體）的後續發展，指出荷蘭政府的干預可能導致其在中國以外的資產被強制出售，並分析了這對供應鏈轉單的持續影響。此外，他對記憶體市場（特別是 MLC NAND 與 DDR4/DDR5 的產能排擠）以及 Tesla 最新財報表現進行了深入解析，並對 AI 晶片新創 Anthropic 與 Google、Broadcom 的合作關係提出了獨特見解。", "topics": ["昔日樂團好友重聚與林口 Flex 運動伸展店投資", "Nexperia（安世半導體）事件後續與供應鏈轉單效應", "記憶體市場報價與三星 MLC NAND 產能調整分析", "Tesla 第三季財報解析與 Robotaxi、Cybercab 未來展望", "Anthropic、Google 與 Broadcom 的 AI 晶片合作關係解密"], "market_view": "當前市場部分板塊已出現狂歡與離群值的超額利潤，投資人應注意風險並設定移動停損。", "industries": [{"name": "半導體", "stance": "觀察", "view": "Nexperia 事件將持續引發車用與工業晶片的供應鏈轉單效應。"}, {"name": "記憶體", "stance": "看多", "view": "記憶體報價持續上漲，HBM 與先進製程產能排  "market": "TW", "stance": "看多", "argument": "作為 Diodes 子公司，將直接受惠於 Nexperia 斷貨帶來的二極體與功率元件轉單。"}, {"symbol": "2481", "name": "強茂", "market": "TW", "stance": "看多", "argument": "受惠於 Nexperia 斷貨事件，同屬功率半導體與離散元件競爭者而具轉單想像空間。"}, {"symbol": "DIOD", "name": "Diodes", "market": "US", "stance": "看多", "argument": "Nexperia 斷貨事件的直接橫向競爭對手，將直接受惠於轉單效應。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "argument": "長期看好且持有，但會透過再平衡將單一持股比例控制在兩到三成以規避波動風險。"}], "quotes": ["股票只要有人愛，有人愛的就是正宮，所以沒有什麼太大問題。", "當老大格突然間在荷蘭政府的操作之下，他的反擊導致整個市場上的供應被他給斷掉了，那是不是就變成說其他人有一些機會？", "慈母多敗兒，這句話是真的，對小孩子好、有耐心，但還是要稍微注意，不能無條件接受所有失控行為。"], "ep_key": "EP603", "title": "EP603 | 🐠", "pubdate": "2025-10-22", "duration_s": 3037, "has_tr": true}, {"summary": "本集節目由 Saily 贊助。主持人謝孟恭分享了近期與大兒子諾雅互動的育兒體悟，強調與孩子建立健康、平等關係的重要性，並反思了兩代人教育觀念的轉變。在市場分析方面，主持人深入解讀了台積電（2330）最新法說會的財務數據，指出其營收與毛利率表現優異，並分析了 HPC 季增率持平與資本支出微調背後的產業邏輯。此外，針對 OpenAI 傳出將放寬色情內容限制的市場傳聞，主持人看好這將成為記憶體與儲存需求（DRAM、NAND Flash、HDD）的強大催化劑，並對特規記憶體與標準型記憶體的價格連動關係進行了探討。", "topics": ["Saily 贊助與出國上網方案推薦", "育兒體悟：與孩子的溝通、情緒管理與兩代教育觀念反思", "台積電（2330）法說會財務數據與市場預期解讀", "AI 與非 AI 需求復甦狀況及資本支出展望", "OpenAI 放寬色情內容限制傳聞對記憶體與儲存產業的潛在影響", "DRAM 與 NAND Flash 報價趨勢與特規記憶體市場觀察", "聽眾問答：算命體驗、工作抉擇、槓桿投資邏輯與路怒症應對"], "market_view": "台積電法說會數據優於預期，整體市場仍處於健康的發展路徑上，短期波動多為市場情緒與期權套利所致。", "industries": [{"name": "半導體", "stance": "看多", "view": "台積電先進製程需求強勁，非 AI 領域也已見底回升，整體產業景氣健康。"}, {"name": "記憶體", "stance": "看多", "view": "DRAM 與 NAND 報價持續上漲，OpenAI 若放寬色情內容將進一步大幅催化儲存需求。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "view": "法說會毛利率與 EPS 表現亮眼，先進製程佔比持續提升，長期趨勢依舊看好。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "觀察", "view": "作為 AI 領域的主要玩家，其需求與台積電的產能擴充緊密相關。"}, {"symbol": "AMD", "name": "超微", "market": "US", "stance": "觀察", "view": "AI 晶片的主要投片客戶之一，其訂單調整會影響台積電的產能利用率。"}], "quotes": ["越文明的地方，越不會把小朋友當成是自己的一個好像說可以舒壓的管道，你不能對他兇、不能罵他、不能打他，他是一個人，所以你不能這樣對他。", "在市場進入一個高效率的階段時，大家把研究能量全開，最後資金堆進去、漲最兇、噴最厲害的，往往就是最後檢驗出來獲利與營收最好的那一個。", "當你很衰、做出來的判斷品質不高時，你要做的事情就是『密迪古阿康』，把自己縮起來，盡量不要做決定，等外面的砲聲不見了再慢慢出來。"], "ep_key": "EP602", "title": "EP602 | 🐈‍⬛", "pubdate": "2025-10-18", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期參與台通與軟劇場舞台劇、迪士尼音樂劇的觀後感。針對股市，他分析了近期美股與台股的震盪走勢，指出高檔出現大K棒可能預示趨勢轉折，因此他已提前將整體持股部位降至八成以下以控制風險。此外，本集重點討論了 Broadcom 與 OpenAI 的合作重申、10B 訂單的真實客戶（推測為 Anthropic 採購 Google 的 TPU），以及 Broadcom 新成立的乙太網路聯盟（ESUN）對 AWS 供應鏈的衝擊，並深入探討 Google 在 ASIC 晶片與伺服器整機外賣的潛在商機。", "topics": ["舞台劇與迪士尼音樂劇觀後感分享", "美股與台股近期震盪走勢與個人減碼策略", "Broadcom 與 OpenAI 合作重申及 10B 訂單客戶推測", "Google TPU 透過 Broadcom 授權外賣給 Anthropic 的商業模式", "Broadcom 成立 ESUN 乙太網路聯盟對 AWS 供應鏈的影響", "Google ASIC 晶片與伺服器整機外賣的潛在商機與供應鏈機會"], "market_view": "高檔出現大K棒可能預示趨勢轉折，在震盪放大且可能進入橫盤整理的格局下，應主動調降持股部位、保留現金以應對波動。", "industries": [{"name": "半導體/ASIC", "stance": "看多", "view": "Google 的 TPU 透過 Broadcom 授權外賣給 Anthropic，顯示 ASIC 晶片外賣市場比預期更早發生且商機龐大。"}, {"name": "AI伺服器", "stance": "觀察", "view": "若 Google 未來不只賣晶片，而是整機外賣，後端代工廠如 Celestica 與 Flextronics 將迎來新機會。"}, {"name": "光通訊/乙太網路", "stance": "觀察", "view": "Broadcom 成立 ESUN 聯盟推動乙太網路架構，導致 AWS 供應鏈出現大跌，但整體仍屬增量市場的競爭。"}], "tickers": [{"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "看多", "view": "重申與 OpenAI 合作並主導 ESUN 聯盟，且透過授權 Google TPU 給 Anthropic 展現強大的生態系影響力。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "view": "其 TPU 表現優異且已開始透過 Broadcom 授權外賣，未來若進一步外賣整機伺服器，將帶來全新成長動能。"}, {"symbol": "CLS", "name": "Celestica", "market": "US", "stance": "觀察", "view": "作為 Google 伺服器組裝廠，主要負責新產品 Kick-off 階段，產能擴張幅度較 Flex 有限。"}, {"symbol": "FLEX", "name": "Flextronics", "market": "US", "stance": "觀察", "view": "作為 Google 伺服器組裝廠，未來可能成為最主要負責量產的合作夥伴。"}, {"symbol": "3363", "name": "茂林-KY", "market": "TW", "stance": "觀察", "view": "股價創下新高，可能與 NVIDIA 重申 800G 架構及 Busbar、Power Whip 的供應鏈需求有關。"}], "quotes": ["當今天整個盤已經開始波動放到很大的時候，如果你的部位還是有維持槓桿，你就會很常發生所謂的紀律停損與紀律追回，最後發現你的錢就不見了。", "時間到了你自己就會懂。你要自己去經歷過才知道，不用急著在還沒到那個階段時，就硬要去花錢買時間或做不適合的決定。"], "ep_key": "EP601", "title": "EP601 | 🐜", "pubdate": "2025-10-15", "duration_s": 3123, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分析了近期美股與台股的劇烈波動，特別是 Nasdaq 大跌與富台指電子盤的跌幅，並指出這是一次健康的市場修正。他強調在瘋狂行情中進行基本風控與汰弱留強的重要性，建議投資人維持低槓桿或無槓桿狀態。此外，節目重點討論了中國限制稀土出口對全球供應鏈的影響，主持人認為這將加速「去中國化」（Non-China）供應鏈的建立，雖然短期內不會導致全面停擺，但可能引發通膨與部分零組件漲價。最後，他分享了對軍工股、加密貨幣市場爆倉潮的看法，並在 QA 環節解答聽眾關於全職投資、心理停損、花錢觀念及親子互動等問題。", "topics": ["美股與台股近期劇烈修正與大盤走勢分析", "汰弱留強與基本風控的策略（Drawdown 控制）", "中國限制稀土出口對半導體、AI 晶片及全球供應鏈的影響", "「去中國化」（Non-China）供應鏈與關鍵零組件的未來趨勢", "加密貨幣市場史上最大爆倉潮與槓桿風險", "全職投資人的多重收入來源與花錢觀念的轉變", "QA 時間：解答聽眾關於個股繼承、心理停損及親子打電動等問題"], "market_view": "市場在相對高檔出現劇烈修正屬於健康現象，投資人應藉此機會進行汰弱留強並嚴格控制槓桿與回撤（Drawdown）。", "industries": [{"name": "半導體/AI伺服器", "stance": "觀察", "view": "稀土限制短期內不會導致 AI 晶片生產全面停擺，但可能因供應鏈調整而引發零組件漲價。"}, {"name": "軍工產業", "stance": "中性", "view": "稀土限制對美國國防軍工影響較大，但相關軍工股股價表現仍相對平穩。"}, {"name": "加密貨幣", "stance": "觀察", "view": "近期經歷史上最大爆倉潮，高槓桿合約交易者幾乎全數被掃出場，顯示市場波動極具毀滅性。"}], "tickers": [{"symbol": "LMT", "name": "洛克希德馬丁", "market": "US", "stance": "觀察", "argument": "股價在稀土事件後表現平穩，並未出現劇烈下跌。"}, {"symbol": "NOC", "name": "諾斯洛普格魯曼", "market": "US", "stance": "觀察", "argument": "股價在近期市場波動中表現相對抗跌。"}, {"symbol": "BA", "name": "波音", "market": "US", "stance": "觀察", "argument": "在近期地緣政治與稀土事件影響下，股價表現還算平穩。"}, {"symbol": "3010", "name": "華立", "market": "TW", "stance": "觀察", "argument": "聽眾繼承的標的，主持人建議若不了解應考慮換到能掌握的優質標的上。"}, {"symbol": "6698", "name": "東捷資訊", "market": "TW", "stance": "觀察", "argument": "聽眾繼承的標的，主持人建議不需糾結於過去的成本，應以現值評估是否重新配置。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "觀察", "argument": "股價表現看起來已經收完它要的茂達，目前呈現無聊結案的狀態。"}, {"symbol": "6138", "name": "茂達", "market": "TW", "stance": "觀察", "argument": "與國巨的案子看起來已經結束，股性偏牛且經營層作風較為溫吞。"}], "quotes": ["投資理財不靠自己，投資健康就讓善存來幫你。", "多頭的時候大家都會忽略壞消息，空頭的時候大家就會把壞消息放得非常大。", "進市場就不要怕熱，一定會有崩盤、修正、熊市，待得夠久你就會看過很多次，重點是要習慣並懂得面對它。"], "ep_key": "EP600", "title": "EP600 | 🏕️", "pubdate": "2025-10-11", "duration_s": 3062, "has_tr": true}, {"summary": "本集節目由 Sharp 夏普贊助。主持人謝孟恭分享了個人膽固醇治療的實驗心得，並針對林口幼兒園疑似虐嬰事件表達關注與看法。在市場與產業方面，本集焦點在於 OpenAI 與 AMD 的重大合作（採購 6GW 的 Instinct GPU），主持人對此合作在軟體層面（挑戰 NVIDIA CUDA lash、HDD），認為隨著AI影像生成技術（如Sora 2）的爆發，儲存需求將大幅增加。此外，他也深入分析了無人機產業在去中化趨勢下的地緣政治機會，並指出CIS（影像感測器）等零組件可能因此受惠。", "topics": ["育兒心得與AI工具在故事生成上的應用", "台灣幼教與百貨業的經營現狀與缺工問題", "近期大盤慣性反彈與持股調整策略", "Nand Flash與HDD等儲存產業在AI影像生成時代的長期機會", "無人機產業去中化趨勢及相關零組件（如CIS）的轉機", "聽眾問答：美股投資、加碼策略、儲存股看法及生活問題解答"], "market_view": "大盤呈現慣性往上彈升，但除了半導體與電子零組件等特定強勢產業外，許多行業其實已進入衰退，操作上應適度調整持股並注意風險。", "industries": [{"name": "半導體", "stance": "看多", "view": "與電子零組件為當前表現特別強勢的板塊，數據表現依然良好。"}, {"name": "DRAM", "stance": "觀察", "view": "短期報價上漲，但除了HBM外，台廠關聯度較低，屬於短期報價上漲行情。"}, {"name": "Nand Flash", "stance": "看多", "view": "隨著AI影像生成技術爆發，儲存空間需求將大幅增加，有機會走成長期大行情。"}, {"name": "HDD", "stance": "看多", "view": "受惠於冷儲存與AI影像生成帶來的龐大儲存需求，前景看好。"}, {"name": "無人機", "stance": "觀察", "view": "地緣政治與去中化趨勢明確，東歐與台灣市場需求大，但需注意部分個股估值已高。"}, {"name": "CIS", "stance": "看多", "view": "無人機去中化趨勢下，非中國製的CIS元件需求有望迎來轉機。"}], "tickers": [{"symbol": "華邦電", "name": "華邦電", "market": "TW", "stance": "觀察", "argument": "除了短期報價外，後續還有Cube等大型故事可以期待。"}, {"symbol": "OmniVision", "name": "豪威科技", "market": "other", "stance": "中性", "argument": "為中國主要的CIS廠商，在去中化趨勢下可能面臨西方市場的排擠。"}, {"symbol": "Sony", "name": "索尼", "market": "US", "stance": "看多", "argument": "在無人機去中化趨勢下，非中系的CIS廠商如Sony將有機會受惠。"}, {"symbol": "Samsung", "name": "三星電子", "market": "other", "stance": "看多", "argument": "作為非中系的CIS主要供應商之一，有望在去中化浪潮中分得一杯羹。"}], "quotes": ["會賺錢的方法不一定是好方法，因為很多會賺錢的方法最後會讓你死掉；可以重複執行、並經歷過各種行情考驗的方法才是好方法。", "在無人機去中化趨勢下，與其去賭標案花落誰家，不如往上游去思考哪些共通的零組件是大家都需要的。", "人生轉職或面臨轉換期時，敢做的人贏，先做就對了，不用等完全準備好再開始。"], "ep_key": "EP597", "title": "EP597 | 🦔", "pubdate": "2025-10-01", "duration_s": 3022, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期對大盤與個股的看法。他指出，第四季即將到來，回顧過去三季市場波動劇烈，特別是四月份的修正讓許多投資人調整了風控機制。近期大盤出現回檔，他自己也選擇降低槓桿部位以控制風險。在產業方面，他持續關注記憶體（DRAM/NAND）的報價與漲價趨勢，並詳細剖析了 Marvell（MRVL）在 DSP/Retimer 晶片與 AEC（主動式電纜）市場的最新傳言，以及其對 Astera Labs（ALAB）、Credo（CRDO）和台股茂林-KY（3695）等競爭對手的潛在衝擊。他強調，雖然市場情緒會因傳言而劇烈震盪，但仍應回歸產業基本面與增量市場的本質來判斷。", "topics": ["Apple Watch 高血壓功能跨區破解方法分享", "感謝聽眾對花蓮地震災後重建的協助與正向情緒的力量", "回顧過去三季股市表現與第四季風控、槓桿調整策略", "記憶體（DRAM/NAND）產業報價與漲價趨勢觀察", "Marvell（MRVL）在 AEC 與 DSP/Retimer 市場的最新傳言與供應鏈分析", "Astera Labs（ALAB）、Credo（CRDO）與茂林-KY（3695）的競爭關係與股價波動剖析", "台股與國際大盤近期回檔的因應對策與轉換節奏"], "market_view": "大盤近期出現回檔，操作上應適度降低槓桿部位以控制風險，並注意第四季快速的類股輪動與轉換節奏。", "industries": [{"name": "記憶體", "stance": "看多", "view": "持續看好 DRAM 與 NAND 的缺貨與漲價趨勢，認為這是一個較大格局的產業趨勢。"}, {"name": "AEC（主動式電纜）", "stance": "觀察", "view": "市場傳言 Marvell 的 AEC 晶片開始放量，導致競爭對手股價受挫，但整體高速傳輸市場仍在持續擴張。"}, {"name": "機器人/AI伺服器", "stance": "觀察", "view": "長期看好特斯拉的 Optimus 與相關機器人供應鏈，但台股相關標的目前吸引力相對沒那麼大。"}], "tickers": [{"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "觀察", "view": "市場傳出其 AEC 相關晶片在 Amazon 開始放量，帶動股價與供應鏈轉強，將持續盯緊其後續發展。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "觀察", "view": "近期股價因 Marvell 的競爭傳言而出現修正，但其在 Retimer 市場仍具備高度可靠性與技術優勢。"}, {"symbol": "CRDO", "name": "Credo", "market": "US", "stance": "觀察", "view": "在 AEC 市場市佔率極高且產品強大，近期股價雖受傳言衝擊，但其產業地位不易被輕易動搖。"}, {"symbol": "3695", "name": "茂林-KY", "market": "TW", "stance": "觀察", "view": "作為 AEC 線材供應商，近期股價受到 Marvell 競爭傳言的波及而走弱。"}, {"symbol": "3231", "name": "緯創", "market": "TW", "stance": "觀察", "view": "在市場大殺時表現相對逆勢抗跌，是值得在盤面修正時持續觀察的指標股。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "view": "看好其 Robotaxi 與 Optimus 機器人的長期發展，在部位中佔有相當大的比例。"}, {"symbol": "6274", "name": "台燿", "market": "TW", "stance": "觀察", "view": "在選擇特定族群時，會將其與同族群的聯茂、台光電等個股放在一起比較觀察。"}], "quotes": ["有老水手跟勇敢的水手，可是沒有勇敢的老水手。在市場中必須隨時注意自己的風控與槓桿機制。", "不要忽略情緒的力量，一直看負面的東西會讓整個人變得消沈；聚焦在正向、美好的事物上，會發現世界其實很美好。", "當你愛上一個人的時候，腦袋就像是被沖昏頭一樣，會做出許多不理性的決定。感情的事外人很難介入指導。"], "ep_key": "EP596", "title": "EP596 | 🧃", "pubdate": "2025-09-27", "duration_s": 3153, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了與遊戲玩家「小屁仙」的恩怨趣事，並藉此探討人生與投資中「不要在單一事件拼生死」的機會成本與心態。針對大盤，他指出台股近期出現「垃圾盤」現象，即台積電一枝獨秀吸納資金，導致中小型股面臨持股轉換與盤整，但這也是尋找下一波主流的良好時機。產業方面，記憶體（特別是 DDR4）與被動元件（如華新科、國巨）近期報價與股價表現強勢，值得持續追蹤。此外，他也澄清了市場上關於亞馬遜（Amazon）與 Anaperna、Anthropic 砍單的負面傳聞，認為多屬市場情緒波動下的「小作文」，產業基本面並無實質惡化。", "topics": ["與遊戲玩家小屁仙的恩怨與人生心態啟示", "台股「垃圾盤」現象與 搶票心路歷程，並強調在能力範圍內爭取稀缺資源的重要性。針對大盤，他指出目前市場仍處於激情輪動的狀態，雖然出現部分顛簸，但類股輪動健康。產業方面，他澄清了 NVIDIA 新 CPX 架構會減少 HBM 用量的錯誤新聞，並詳細分析記憶體（DRAM 與 NAND）因美光等大廠暫停報價及企業級 SSD 供不應求所帶來的下一波大潮。此外，他也深入解析了國巨高價收購茂達股權的策略布局，認為這是一筆能同時取得茂達與大中控制權的划算交易。", "topics": ["Radiohead 演唱會門票與搶票心路歷程", "大盤激情輪動與投資心態調整", "NVIDIA CPX 架構對 HBM 與 CoWoS 需求之澄清", "記憶體（DRAM/NAND）大廠暫停報價與企業級 SSD 缺貨潮", "國巨高價公開收購茂達之產業布局與策略分析"], "market_view": "目前市場仍處於全面起漲、激情且健康的輪動狀態，雖然開始出現一些顛簸，但整體表現依然強勁。", "industries": [{"name": "電動車", "stance": "看多", "view": "在降息環境下，電動車等非必需消費品表現通常會轉好。"}, {"name": "記憶體", "stance": "看多", "view": "DRAM 與 NAND 報價拐頭向上，且大廠暫停報價，記憶體大潮正式啟動。"}, {"name": "AI伺服器", "stance": "看多", "view": "NVIDIA 的 CPX 架構為新增需求，將帶動更多 GPU 與相關零組件的用量。"}, {"name": "被動元件", "stance": "看多", "view": "國巨持續透過橫向與縱向併購擴大版圖，未來在模組化銷售上更具議價優勢。"}], "tickers": [{"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "看多", "view": "受惠於降息預期，股價直接射上去，符合非必需消費品在降息循環中的表現。"}, {"symbol": "MU", "name": "美光", "market": "US", "stance": "看多", "view": "美光宣布暫停 DRAM 報價一個星期，顯示其有意在氣氛對時主動拱價。"}, {"symbol": "2327", "name": "國巨", "market": "TW", "stance": "看多", "view": "高價公開收購茂達股權，策略上可將被動元件升級為模組銷售，並間接控制大中。"}, {"symbol": "6138", "name": "茂達", "market": "TW", "stance": "觀察", "view": "被國巨公開收購 5% 至 20% 股權，需觀察公司派是否會引進白馬騎士進行反抗。"}, {"symbol": "6435", "name": "大中", "market": "TW", "stance": "觀察", "view": "作為茂達持股四成多的子公司，將隨國巨收購茂達而間接納入國巨版圖。"}, {"symbol": "2345", "name": "智邦", "market": "TW", "stance": "觀察", "view": "聽眾問答中提及第一隻買的股票，主持人對其技術面與基本面表現持觀察態度。"}], "quotes": ["不用錢的最貴，這是一個至高無上的道理，因為它可能要付出很多無形的代價。", "在多頭的時候，人人都是股神，沒什麼好吹的；只有在空頭低谷時還能一起度過，才代表有學到東西。", "只要使用槓桿，在賠錢的時候千萬不要用槓桿去攤平，且一旦進入上槓桿的階段，就一定要帶著獲利出場。"], "ep_key": "EP592", "title": "EP592 | 🍀", "pubdate": "2025-09-13", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期陪伴二兒子在台大醫院住院的經歷與感悟，並對台灣健保制度的定價與自費醫療資源分配提出反思。在市場與產業方面，主持人指出記憶體（DRAM 與 NAND Flash）市況持續轉佳，美光（MU）等記憶體大廠前景看好；同時分析了 NVIDIA 最新推出的 CPX 晶片（Ruby 單晶片版本）在 AI 推論（Inference）階段的定位與散熱需求。此外，針對微軟（MSFT）向 Nebius 採購 194 億美元基建服務大單，主持人認為此舉反映出 AI 基礎建設需求依然強勁，並看好台廠相關供應鏈（如華碩、緯穎等）的轉骨機會。
