, "ep_key": "EP590", "title": "EP590 | 🫏", "pubdate": "2025-09-06", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期家庭關係的體悟，並針對近期美股與台股的劇烈震盪進行盤勢分析。他指出，雖然市場在經歷大幅回檔後出現強勁的下影線反彈，但他個人仍維持謹慎態度，並已迅速降低指數部位、提高現金水位，採取慢慢買進的策略。在產業布局上，他持續看好 AI 伺服器供應鏈的長期趨勢，特別是 Nvidia 換代至 Rubin 平台所帶來的散熱方案（如 MCL、液態金屬、SoCam 介面）與 Google TPU 的強勁需求；同時，他也將軍工題材（如無人機與飛彈）納入部分核心持股，看好其在政策支持下的長期發展潛力。", "topics": ["家庭關係與成長體悟分享", "近期台美股市場震盪與操作策略調整", "AI 伺服器供應鏈與散熱技術（MCL、液態金屬）觀察", "Nvidia Rubin 平台與 Google TPU 供應鏈展望", "軍工產業（無人機、飛彈）的長期投資價值", "選擇權部位的風險管理與槓桿控制"], "market_view": "市場雖然在經歷劇烈震盪後出現強勁的下影線反彈，但短期內可能仍有修正空間，因此已迅速降低指數部位並提高現金水位，採取慢慢買進的保守策略。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "長期趨勢依然強勁，持續追蹤 Nvidia 換代與 Google TPU 帶來的供應鏈新機會。"}, {"name": "散熱", "stance": "看多", "view": "隨著晶片 TDP 持續升高，MCL、液態金屬等新一代散熱方案將成為未來的關鍵趨勢。"}, {"name": "軍工", "stance": "看多", "view": "無人機與飛彈等國防採購預算無限上修，且具備資本市場熱度，已將其納入部分核心持股。"}], "tickers": [{"symbol": "NVDA", "name": "Nvidia", "market": "US", "stance": "看多", "view": "即將換代進入 Rubin 平台，其散熱方案與 Team 介面的修改將帶來新的供應鏈商機。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "view": "TPU 的需求狀況非常良好，台灣相關供應鏈將因此受惠。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "觀察", "view": "可透過其 Earnings Call 來進一步確認 Google TPU 的強勁需求狀況。"}, {"symbol": "5016", "name": "科德寶", "market": "other", "stance": "觀察", "view": "過去與 SoCam 搭配使用，但目前放量情況可能不如預期，正被其他方案替代。"}, {"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "持有中", "view": "作為長期投資的基本配置，但近期已因應市場震盪降低了整體的指數部位。"}], "quotes": ["不是說你要有一個完美的土壤、很好的環境，你才會長成一個很好的樹；有時候你一定要剛好遇到一些奇怪的事情，才能讓你長成現在的樣子。", "如果你真的要擔心會踩到任何人，或是讓任何人覺得不開心的話，那你什麼事情都不能夠做。", "撈到大錢的機會，通常都是對標的有愛、有信仰的，因為這些類似信仰的價值，很多時候是幫你賺到大錢的關鍵。"], "ep_key": "EP589", "title": "EP589 | 🦋", "pubdate": "2025-09-03", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目由 iHerb 贊助。主持人謝孟恭分享了對於育兒與家庭教育的看法，強調應避免將上一代的比較與軍備競賽創傷傳遞給下一代。在市場話題方面，分析了 NVIDIA 最新財報與展望，指出其各項數據健康，Rubin 晶片已在產線上生產並預計明年量產。此外，探討了 AI 晶片功耗提升帶來的散熱升級需求（如 MCL 散熱方案），以及 Google 推出 Nano Banana 模型對儲存（Nand Flash）與 AI 影片生成市場的潛在爆發性影響。最後，主持人分享其大盤操作策略，已將指數部位賣出並準備轉入個股，維持較為保守的警戒狀態。", "topics": ["育兒觀念與避免家庭軍備競賽比較", "NVIDIA 財報分析與 Rubin 晶片展望", "AI 晶片高功耗帶來的散熱技術（MCL）升級趨勢", "Google Nano Banana 模型與 Nand Flash 儲存市場機會", "大盤操作策略轉變：指數部位轉入個股與保守警戒"], "market_view": "大盤型態目前走得不是太好看，已持續將指數部位賣出並準備進入個股，整體進入較為保守的警戒狀態。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "NVIDIA 財報與 Rubin 晶片展望健康，明年量產將搭配 CX8 推向市場。"}, {"name": "散熱", "stance": "看多", "view": "晶片功耗若大於 2000W 需導入 MCL 散熱方案，將帶來新的散熱題材與故事。"}, {"name": "記憶體/儲存", "stance": "觀察", "view": "若 AI 影片生成需求爆發，Nand Flash 報價有望在 3Q 開始往上衝。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "財報數字與 Guidance 健康，Rubin 晶片已在產線上生產並預計明年量產。"}, {"symbol": "3017", "name": "奇晟", "market": "TW", "stance": "看多", "argument": "在 MCL 散熱方案（微管道上蓋）技術上是實力最強大的玩家。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "argument": "Nano Banana 展現強大 AI 影片生成連續性，且其 TPU 與 Data Center 基礎建設極為強大。"}], "quotes": ["我們最好能夠做的事情，就是我們要扛住一些事，不要把我們小時候的一些創傷，然後傳在下一代身上。", "現貨是領先的，它提早就知道。如果它有形成一個族群的話，那八九不離十後面就是會有一些狀況出現。", "最簡單的，創新高、破頸線、破底翻，我覺得就超級好用，然後搭配你的基本面看得到，你就可以買到不錯的點位。"], "ep_key": "EP588", "title": "EP588 | 🐦‍⬛", "pubdate": "2025-08-30", "duration_s": 2986, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭探討了個人心態隨年齡增長的轉變，並深入分析當前股市的槓桿現象與風險管理。在產業方面，重點關注 AI 伺服器與高速傳輸技術的升級趨勢，特別是因應 AWS 伺服器升級需求，銅箔、玻纖布（如 Q-glass）等材料規格提升帶來的商機。此外，也討論了 Retimer 與 PCIe Switch（如 Astera Labs 的產品）在高速傳輸架構中的角色與未來展望，強調在市場尋找新方向時，應著眼於中長期的技術升級紅利。", "topics": ["年齡增長與心態轉變的階段性體悟", "股市槓桿現象與風險管理的重要性", "AI 伺服器與高速傳輸材料（銅箔、玻纖布）升級趨勢", "Retimer 與 PCIe Switch 在傳輸架構中的應用與展望", "讀者問答：個股操作、心態調適與家庭關係討論"], "market_view": "市場持續維持熱鬧階段，槓桿打滿的人越來越多，投資人應做好風險管理，隨時準備應對可能的震盪。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "高速傳輸與材料升級（如銅箔、玻纖布）是中長期的核心趨勢。"}, {"name": "高速傳輸晶片", "stance": "看多", "view": "Retimer 與 PCIe Switch 在提升傳輸效率與降低延遲上扮演關鍵角色。"}], "tickers": [{"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "觀察", "view": "其 NVLink 是強大的競爭項目，Rubin 晶片提前推出可能卡位搶奪材料。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "持有中", "view": "在 Retimer 表現優異，且其 PCIe Switch 產品 Scorpion 獲得客戶良好反饋。"}, {"symbol": "2308", "name": "台達電", "market": "TW", "stance": "持有中", "view": "看好其 Power Rack 相關解決方案，營收有機會持續成長。"}], "quotes": ["投資終究是要面對自己的內心，與自己的心魔對抗，而不是跟別人對抗。", "你要去改變一個人，跟他講一百次，不如他自己吃屎一次。等他吃屎之後，你趕快幫助他去修復，你就會變成好人。"], "ep_key": "EP587", "title": "EP587 | 🍯", "pubdate": "2025-08-27", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目由 NordVPN 贊助。主持人謝孟恭分享了帶大兒子去洗牙的親子互動，並觀察到孩子面臨學校老師變動的成長歷程。在工作方面，他提到「消男子資本」創始股東會進展順利，規模持續擴大。針對近期市場，他分享了在台股與美股大跌恐慌時，透過短線與波段操作成功抓到反彈並拉回績效的經驗。此外，本集探討了美國政府可能入股台積電與 Intel 的傳聞、AI 模型（如 GPT-5、Gemini）的競爭態勢與 Google 的伺服器優勢，並在 QA 環節解答了關於指數投資、AR/VR 眼鏡前景、波浪理論及夫妻相處等問題。", "topics": ["親子互動與孩子成長的觀察", "消男子資本創始股東會與永續發展", "近期台美股大跌後的反彈操作與績效拉回", "美國政府入股台積電與 Intel 傳聞之解讀", "AI 模型競爭（GPT-5、Gemini）與 Google 伺服器優勢", "聽眾問答：指數投資、AR/VR 眼鏡前景、波浪理論與夫妻相處"], "market_view": "市場大跌恐慌時是尋找短線與波段操作、撿便宜羊毛的絕佳機會，近期大跌後已出現強勁反彈。", "industries": [{"name": "半導體代工", "stance": "觀察", "view": "美國政府對台積電等廠商的補貼與股權要求屬於政治角力，台積電有能力以不拿補貼、自行出資來應對。"}, {"name": "AI 模型與軟體", "stance": "中性", "view": "AI 模型競爭已進入白熱化與削價競爭階段，GPT-5 的 Router 技術主要是優化成本，對消費者而言驚喜感已降低。"}, {"name": "AR/VR 眼鏡", "stance": "觀察", "view": "AR 眼鏡未來作為行動運算裝置的普及勝率遠大於 VR，但現階段技術仍需依賴手機連接。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "面對美國政府可能以補貼換股權的傳聞，台積電可透過自行出資不拿補貼，或讓政府直接去市場買股來應對。"}, {"symbol": "INTC", "name": "Intel", "market": "US", "stance": "觀察", "argument": "美國政府若入股 Intel，雖能提供資金支持，但未必能實質提升其在晶圓代工領域的競爭力。"}, {"symbol": "GOOG", "name": "Google", "market": "US", "stance": "看多", "argument": "其 AI 模型與 NotebookLM 表現優異，且雲端伺服器（TPU）產能建好即被租光，在競爭中維持極大優勢。"}, {"symbol": "DAL", "name": "Delta Air Lines", "market": "US", "stance": "持有中", "argument": "屬於先前配置中持續上漲、表現優異的標的。"}], "quotes": ["人生的痛苦都是來自於跟人家比較。即便你表現不差，看到身邊的人資產翻倍極快，難免會重新審視自己的部位。", "當恐慌出來的時候，以前我們會跟著害怕，現在恐慌出來是會笑、會很開心，因為知道人家要亂殺了，就是你可以去擼羊毛的機會。", "婚姻中很多時候是要妥協與吞忍的，雙方要有一個共識才能去經營這個家庭，不要輕易暴怒。"], "ep_key": "EP586", "title": "EP586 | 🐐", "pubdate": "2025-08-23", "duration_s": 3008, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了參加台灣米其林指南 2025 頒獎典禮的體驗，並探討了米其林星級餐廳的品質保證與其背後的料理人付出。在市場話題方面，面對台股與美股近期出現的大幅回檔與大逃殺行情，主持人視其為重新調整部位的良機，並已將部分指數部位變現，轉而佈局跳樓大跌的個股與處置股。此外，本集深入剖析了 Howard Marks 的最新備忘錄《Calculus of Value》，探討價值與價格的關係，強調買對好東西比買便宜更重要，並重申長期帶撞投資與本多終勝的觀點。", "topics": ["台灣米其林指南 2025 頒獎典禮體驗與米其林新友會介紹", "台股與美股大逃殺行情下的部位調整策略", "Howard Marks 備忘錄《Calculus of Value》解讀：價值與價格的關係", "長期投資、本多終勝與帶撞投資的心態建立", "聽眾問答：買房與股票資產配置、消難資本運作、預兒觀點與個股看法"], "market_view": "市場大逃殺與大幅回檔是重新調整部位、將指數變現並佈局跳樓個股的良機，預期後續仍有小彈機會，但需維持耐心並控制部位。", "industries": [{"name": "PCB/板材", "stance": "觀察", "view": "近期各類板材與代工費因漲價題材全面起飛，但需識別其中哪些是真需求、哪些是跟風的假貨。"}, {"name": "AI伺服器", "stance": "看多", "view": "高層板 HDI 等與 AI 伺服器相關的板材漲價合理，且相關高估值個股回檔後仍具備長期增長潛力。"}], "tickers": [{"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "觀察", "argument": "與智易同為 4 月股災時表現極硬的標的，但大盤回穩後資金可能流向其他標的。"}, {"symbol": "3596", "name": "智易", "market": "TW", "stance": "觀察", "argument": "在 4 月股災中表現非常抗跌，但需注意安全期後資金可能流出。"}, {"symbol": "CFLT", "name": "Confluent", "market": "US", "stance": "持有中", "argument": "目前仍持有中，屬於個人持股之一。"}, {"symbol": "ACN", "name": "Accenture", "market": "US", "stance": "已出場", "argument": "認為其屬於過渡期（transition）的標的，已於先前獲利出場。"}, {"symbol": "MRVL", "name": "Marvell", "market": "US", "stance": "已出場", "argument": "過去玩晶片股時著墨較多，近期因未見特別亮點，目前持股極少或已無持股。"}, {"symbol": "NVTS", "name": "Navitas Semiconductor", "market": "US", "stance": "已出場", "argument": "屬於短線操作標的，目前已無持有。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "argument": "晶片股中選擇保留的長期核心持股之一。"}, {"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "持有中", "argument": "晶片股中選擇保留的長期核心持股之一。"}, {"symbol": "CRDO", "name": "Credo Technology", "market": "US", "stance": "持有中", "argument": "晶片股中選擇保留的持股之一。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "持有中", "argument": "晶片股中選擇保留的持股之一。"}], "quotes": ["價值是你投資所獲得的東西，而價格是為其支付的費用。以高估值的價格買進，僅代表你未來的預期回報率較低，並不一定是致命的錯誤。", "你只怕買錯，不怕買貴。只要你有帶撞投資與承受波動的能力，買進持續變好的好資產，終究會隨著通膨與生產力提升而向上。", "本多終勝不是錢多人的專利，每個人只要有薪水或股息等持續的現金流，透過百分比配置持續投入，都能實現自己的本多終勝。"], "ep_key": "EP585", "title": "EP585 | 🐊", "pubdate": "2025-08-20", "duration_s": 3032, "has_tr": true}, {"summary": "本集節目由 Woky 贊助。主持人謝孟恭首先回應近期因肖楠資本與媒體專訪帶來的關注，重申自己傾向低調、不愛露臉與討論的性格，並向新聽眾說明節目長年累積的「校車」型態與 QA 互動模式。大盤方面，台股軍工、PCB 板材等熱門標的持續做多，市場熱度進入白熱化階段，甚至出現 101 外牆點燈推標的等過熱訊號。美股方面，川普與普丁會面有望緩解烏俄衝突，川普對台半導體關稅言論雖驚人但屬談判手段；應用材料（AMAT）因中國業務放緩與許可證積壓而下修財測，Coherent（COHR）則因市場過度擁擠而在財報後大跌，顯示熱門股短線波動風險加劇。", "topics": ["肖楠資本與媒體專訪回應", "股癌節目的定位與聽眾互動模式", "台股熱門族群（軍工、PCB板材、探針）與市場過熱訊號", "川普關稅言論與美中台半導體地緣政治", "應用材料（AMAT）下修財測與半導體設備展望", "Coherent（COHR）財報大跌與擁擠交易風險", "聽眾 QA（PS5遊戲推薦、五檔掛單與城市單豆腐、遠距離戀愛、火俠傳等）"], "market_view": "台美股市場目前皆進入熱度白熱化的階段，雖不代表立刻反轉，但需對擁擠交易與財報後的劇烈波動保持警覺。", "industries": [{"name": "軍工", "stance": "觀察", "view": "近期持續做多且表現強勢，但個人持股量不大且已出場。"}, {"name": "PCB板材", "stance": "看多", "view": "富喬、金居等銅箔與板材相關公司因缺料與代工費上漲，成為市場強勢動能。"}, {"name": "半導體設備", "stance": "中性", "view": "應用材料下修財測顯示中國需求放緩，且先進製程走向寡頭壟斷使資本支出節奏改變。"}, {"name": "光通訊", "stance": "觀察", "view": "Coherent 財報本身無大礙，但因市場資金過度擁擠導致財報後股價大跌。"}], "tickers": [{"symbol": "1815", "name": "富喬", "market": "TW", "stance": "觀察", "argument": "PCB 相關板材與銅箔代工費上漲，市場熱度極高，甚至有人在 101 外牆點燈。"}, {"symbol": "8358", "name": "金居", "market": "TW", "stance": "觀察", "argument": "同屬銅箔與 PCB 相關材料強勢股，市場動能強勁。"}, {"symbol": "AMAT", "name": "應用材料", "market": "US", "stance": "中性", "argument": "因中國業務放緩及出口許可證審批積壓，下修第四季營收與獲利展望。"}, {"symbol": "COHR", "name": "Coherent", "market": "US", "stance": "觀察", "argument": "光通訊指標股，財報展望符合預期但因交易過於擁擠而導致股價重挫。"}, {"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "觀察", "argument": "其光學電路交換器（OCS）等需求持續養活如 Coherent、光盛等供應鏈公司。"}, {"symbol": "ALST", "name": "Celestica", "market": "US", "stance": "觀察", "argument": "作為 Google 的主要組裝廠，持續受益於其資本支出。"}, {"symbol": "3234", "name": "光盛", "market": "TW", "stance": "觀察", "argument": "主要出貨給 Google，受益於單一大型客戶的拉貨動能。"}], "quotes": ["當你看到市場出現極度誇張的行為（如 101 點燈推牌、英文雞翻小作文），就要知道市場熱度已進入白熱化，需保持警覺。", "擁擠的交易（Crowded Trade）即便基本面沒問題，也容易在財報公布前後因為預期心理與獲利了結而出現 20% 以上的劇烈修正。", "投資不一定需要極高的數字敏感度，很多時候對產品未來普及度與商業模式的想像力，才是決定能否長期持有的關鍵。"], "ep_key": "EP584", "title": "EP584 | 🍅", "pubdate": "2025-08-16", "duration_s": 2985, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭正式宣布成立「肖楠資本 (Calocedrus VC)」，初始資本額約 4,500 萬台幣，預計 2026 年 AUM 達到 3 億台幣，旨在全方位投資與支持台灣本土遊戲開發團隊。市場大盤方面，台股與櫃買指數在經歷前段大漲後出現高檔震盪與長上影線，主持人認為短線進入整理屬正常現象，操作上應避開過去漲幅溫和但近期跌破均線的弱勢股，並持續關注 AI 光通訊、CPO、ASIC 等美股科技熱點。美股配置上則持續看好 Broadcom、Nvidia 等 AI 巨頭，並透過兩倍槓桿 ETF、期貨與期權進行操作。", "topics": ["肖楠資本 (Calocedrus VC) 成立與投資台灣遊戲產業願景", "台股與櫃買指數高檔震盪與長上影線的技術面判斷", "強勢股與弱勢股在回檔時的操作策略差異", "美股 AI 科技股熱點：CPO、光通訊、ASIC 晶片與交換器", "美股槓桿操作工具與資金成本考量", "聽眾問答：未成年人美股投資、NTR 遊戲發病、查理蒙格書籍、特斯拉與 Elon Musk 的看法"], "market_view": "台股與櫃買指數在經歷大漲後出現高檔震盪與長上影線，短線進入整理屬正常現象，操作上應避開跌破均線的弱勢股，並等待回檔時機加碼。", "industries": [{"name": "遊戲開發", "stance": "看多", "view": "成立肖楠資本全力投資台灣本土遊戲團隊，期盼提升台灣遊戲產業高度並達成全覆蓋。"}, {"name": "光通訊/CPO", "stance": "看多", "view": "CPO 與光通訊設備開始放量，相關連接線材與交換器晶片需求持續強勁。"}, {"name": "ASIC/交換器晶片", "stance": "看多", "view": "隨著單晶片效能瓶頸，晶片間與跨資料中心的傳輸 (Scale-up/Scale-out) 變得極為重要。"}, {"name": "軍工", "stance": "觀察", "view": "過去一段時間表現非常強勢，後續事件與題材預期會越來越多。"}], "tickers": [{"symbol": "AVGO", "name": "Broadcom", "market": "US", "stance": "持有中", "argument": "在 CPO 領域投入持續加大，且在 ASIC 陣營中具備強大的 Scale-up 能力。"}, {"symbol": "NVDA", "name": "Nvidia", "market": "US", "stance": "持有中", "argument": "作為 AI 晶片與系統的領頭羊，持續引領整體 AI 產業鏈發展。"}, {"symbol": "ALAB", "name": "Astera Labs", "market": "US", "stance": "觀察", "argument": "市場高度關注其 Scorpio 產品線，有機會叫板博通，明年展望相當不錯。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "雖然 Elon Musk 經常畫大餅且有政治爭議，但其承諾的願景最終多能逐步實現。"}], "quotes": ["想像力就是你的超能力。當所有東西一開始只是夢、看起來很豪洨的時候，反而要認真看待，等大家都確定放量時，價格早已在天價了。", "不要輕易找一堆有的沒有的股東，創辦人自己要把錢丟進去、Skin in the game，可以的話自己要過半，否則掌控權在別人手上，失敗算誰的？", "財富自由不代表時間自由，心境上的調整才是關鍵。如果你能覺得簡單的生活就很美好，那你早就自由了。"], "ep_key": "EP583", "title": "EP583 | 🌲", "pubdate": "2025-08-13", "duration_s": 3017, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期與朋友算命的奇特體驗，並深入探討了當前科技產業的最新動態。針對川普政府可能對台灣半導體課徵 100% 關稅的傳聞，他引述分析指出這可能只是促使台廠赴美設廠的談判籌碼，且實際執行上面臨重複課稅與識別困難等高度複雜性。此外，他討論了特斯拉可能暫緩 Dojo 超級電腦計畫的傳聞，分析其背後反映出 ASIC 與 GPU 陣營在 AI 算力市場的激烈競爭，並對 GPT-5 的推出與 AI 模型未來走向提出看法。", "topics": ["NordVPN 贊助與網路安全宣導", "主持人近期觀影心得與育兒生活分享", "算命與心靈探索的個人體驗與反思", "川普政府半導體關稅政策對台灣及科技業的潛在影響與執行難題", "特斯拉 Dojo 計畫傳聞與 AI 晶片（ASIC vs GPU）市場競爭態勢", "GPT-5 發表與 AI 模型未來發展趨勢"], "market_view": "大盤整體走勢表現良好，雖然個人因未開槓桿而有些許錯過更多報酬的遺憾，但仍維持現股買滿的策略，並強調長期留在市場的重要性。", "industries": [{"name": "半導體", "stance": "觀察", "view": "關稅政策在實務執行上極為複雜，對有能力赴美設廠的大型上市櫃公司影響預期有限，但對中小型傳產影響較大。"}, {"name": "AI 晶片", "stance": "觀察", "view": "ASIC 與 GPU 陣營競爭白熱化，特斯拉若縮減 Dojo 投資可能引發其他非一線大廠重新評估自研晶片計畫。"}, {"name": "AI 模型", "stance": "中性", "view": "AI 模型競爭已進入類似智慧型手機的迭代階段，未來將朝向統一介面與自動路由分流的方向發展。"}], "tickers": [{"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "赴美設廠進度符合政策導向，預期在關稅豁免名單中，受政策衝擊較小。"}, {"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "傳出可能暫緩 Dojo 計畫並將 AI 晶片研發與 AI 6 整合，反映出其在算力投資上的彈性與成本考量。"}, {"symbol": "NVDA", "name": "輝達", "market": "US", "stance": "看多", "argument": "在 GPU 算力市場維持絕對領先地位，且產品迭代速度極快，競爭對手難以超越。"}, {"symbol": "AVGO", "name": "博通", "market": "US", "stance": "看多", "argument": "作為 ASIC 陣營的領頭羊，與輝達在 AI 晶片市場展開激烈的兩強爭霸。"}, {"symbol": "AAPL", "name": "蘋果", "market": "US", "stance": "觀察", "argument": "在美設廠與台積電合作，預期能獲得較好的關稅豁免條件。"}], "quotes": ["我們要相信的是市場本身，市場本身當然有很多虐心、拉回或震盪，但長期來說，持續買進好的公司或指數，要相信它會帶給我們對應的回報。", "半導體關稅最後在執行上一定會有志哀難行的部分，因為重複課稅與晶片識別在實務上非常困難，第一線公務人員很難做到精準識別。", "AI 模型的競爭已經進入白熱化的消價競爭階段，價格越來越實惠的同時效能持續提升，未來勝負關鍵在於誰能提供更流暢的整合體驗。"], "ep_key": "EP582", "title": "EP582 | 🍔", "pubdate": "2025-08-09", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了對好友 Manny 推出「慢報 Pro」訂閱方案大獲成功的喜悅，並藉此探討在資訊爆炸時代，投資人需要的是能協助篩選雜訊、深入剖析產業邏輯的「加速器」內容。總經與市場方面，主持人剖析了 Palmer Luckey 在台演講的重點，強調「去中國化」供應鏈（Non-China Supply Chain）的建立已成不可逆的趨勢，台灣在軍工、無人機等不對稱作戰科技中扮演關鍵角色。此外，針對近期台積電兩奈米技術機密外洩至日本 TIE/Rapidus 的八卦事件，主持人也分享了半導體廠內部防洩密機制與後續產業影響的看法。", "topics": ["祝賀好友 Manny 慢報 Pro 訂閱方案大成功與內容價值探討", "Palmer Luckey 台灣演講心得：去中國化供應鏈與國防武裝的必要性", "無人機與軍工產業趨勢：不對稱作戰與非中供應鏈的卡位機會", "Anduril 產品開發的四項檢驗標準及其在工作與生活中的應用", "台積電兩奈米機密外洩八卦與半導體廠內部防洩密機制剖析", "聽眾問答：個股期與台指期操作、破底與洗籌碼的判斷、強者言論的影響、軟體股與車用半導體看法"], "market_view": "去中國化（Non-China）供應鏈的建立已成必然趨勢，台灣若能在國防、無人機與半導體等高敏感領域成功卡位非中供應鏈，將迎來巨大機會。", "industries": [{"name": "軍工/無人機", "stance": "看多", "view": "不對稱作戰確立了無人機的戰場地位，非中供應鏈的建立將持續催化台廠相關軍工與無人機類股的發展。"}, {"name": "車用半導體", "stance": "觀察", "view": "車用市場目前處於整理階段，但長期仍看好車用 ADAS 半導體與特定具備技術壁壘的標的。"}, {"name": "軟體", "stance": "持有中", "view": "對美股軟體板塊如 Palantir、Cloudflare 等標的仍維持看好並持續持有。"}], "tickers": [{"symbol": "TSMC", "name": "台積電", "market": "TW", "stance": "中性", "argument": "兩奈米機密外洩事件雖有雜音，但台積電內部防洩密機制嚴格，長期技術領先地位與護城河依然穩固。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "作為長期看好的軟體股之一，目前依然維持持股。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "argument": "美股軟體配置標的之一，持續看好其長期發展。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "觀察", "argument": "車用板塊雖面臨挑戰，但因其具備 Optimus 機器人與 Robotaxi 的想像空間而持續關注。"}], "quotes": ["在資訊爆炸的時代，我們不缺資訊，而是需要能引導我們快速理解產業邏輯、篩選雜訊的加速器。", "只有當你武裝到牙齒都有武器的時候，別人才有可能因為畏懼而不敢動你，和平是建立在實力之上的。", "Anduril 產品開發四原則：解決客戶最高優先需求、符合出資者關切、市場上尚無良好解方、自身團隊有能力做到最好。"], "ep_key": "EP581", "title": "EP581 | 🫏", "pubdate": "2025-08-06", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，謝孟恭分享了暑假期間陪伴小孩與安排才藝班的家庭生活，並探討了近期美股與台股夜盤的劇烈回檔。他認為這波回檔是健康的「汰弱留強」機會，並強調在 AI 時代，企業在法說會（Earnings Call）中展現的「直話分析」與「敘事能力」對股價表現至關重要。此外，針對川普關稅議題，他分析台灣面臨 20% 關稅的潛在影響，指出上市櫃公司多已具備海外產能佈局，實質衝擊有限，但中小型傳統加工業者將面臨較大轉型壓力。", "topics": ["暑假育兒生活與才藝班費用分享", "美股與台股夜盤回檔的看法與操作策略", "AI 時代下科技股的法說會敘事與成長率表現", "Cloudflare (NET) 的網路安全新規則與 AI 時代生態系", "川普關稅對台灣上市櫃與中小型企業的影響與因應"], "market_view": "大盤回檔是健康的汰弱留強機會，目前部位已滿，正等待更具吸引力的價格進行上槓桿操作。", "industries": [{"name": "軟體與網路安全", "stance": "看多", "view": "在 AI 時代，具備良好敘事能力且能切入 AI 應用的軟體公司表現將持續強勢。"}, {"name": "半導體與代工", "stance": "觀察", "view": "面對關稅壓力，具備海外產能佈局的上市櫃公司競爭力仍能維持，但需注意成本上升。"}, {"name": "中小型傳統加工", "stance": "看空", "view": " 與部位控制，佛系面對報酬。", "industries": [{"name": "晶圓代工", "stance": "中性", "view": "台積電表現依然最好，但三星憑藉價格優勢與彈性條款搶下特斯拉 AP6 訂單，對台積電財務實質影響不大。"}, {"name": "PCB/類載板", "stance": "觀察", "view": "CoWap 技術若導入，將減少 Substrate 用量並增加 SLP（類載板）需求，但目前仍處於概念與初期討論階段。"}], "tickers": [{"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "觀察", "argument": "AP6 晶片傳出下單三星，可能是出於非中國、非台灣的供應鏈規劃，以及三星給予極佳的報價與合作條件。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "中性", "argument": "失去特斯拉 AP6 訂單對其財務影響甚微，因 AI 相關需求依然強勁，產能持續供不應求。"}, {"symbol": "005930", "name": "三星電子", "market": "other", "stance": "觀察", "argument": "以極具吸引力的價格與「只算良品（Good Die）錢」的讓步條件搶下特斯拉訂單，並允許特斯拉團隊進廠協助改善良率。"}, {"symbol": "3231", "name": "緯創", "market": "TW", "stance": "觀察", "argument": "若 CoWap 封裝技術成真，後段 OP（On PCB）打件製程可能由緯創等 ODM 廠受惠。"}, {"symbol": "2317", "name": "鴻海", "market": "TW", "stance": "觀察", "argument": "作為主要 ODM 廠，若封裝製程往 On PCB 方向發展，鴻海亦為潛在的受惠者。"}], "quotes": ["努力會有收穫，只是收穫的多與寡是老天給你的，你只能做好你能控制的 checklist。", "那些一直跟你講說回檔我一定買滿、或是下次崩盤我一定要買的人，他們到時候幾乎都不會買，因為他們對股票本質上抱持著畏懼的心裡。"], "ep_key": "EP579", "title": "EP579 | 🐔", "pubdate": "2025-07-30", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目由棉豆腐贊助。主持人謝孟恭分享了自己近期在手遊課金與帳號交易上的心得，並探討了與企業界、投資界交流的收穫，強調從財務數據以外的維度（如企業願景與支出理由）理解公司的重要性。市場分析部分，簡要回顧了 Google (GOOGL) 在廣告、AI 發展及 YouTube Shorts 的強勁表現，並重點分析了特斯拉 (TSLA) 的最新財報與電話會議，特別是 FSD 滲透率、Robotaxi 的成本優勢（預期可降至每英里 25 美分）以及 Optimus 人形機器人的第三代進展，重申特斯拉的估值應以其長線科技與機器人願景來衡量，而非單純的汽車銷量。", "topics": ["手遊課金與帳號交易的心得分享", "與企業界交流對財務數據解讀的啟發", "Google (GOOGL) 財報與 AI 發展簡評", "特斯拉 (TSLA) 財報、FSD 滲透率與 Robotaxi 成本分析", "Optimus 人形機器人第三代進展與長線估值看法", "聽眾問答與生活話題交流"], "market_view": "目前市場雖有回檔，但持續維持部位是必要的，因為歷史經驗顯示市場有時不會給予第二次上車機會，而是直接開走。", "industries": [{"name": "AI 雲端與算力", "stance": "看多", "view": "目前仍處於公不應求的狀態，巨頭將持續擴大資本支出投入 AI。"}, {"name": "自動駕駛與 Robotaxi", "stance": "看多", "view": "特斯拉 FSD 已進入起飛期，Robotaxi 成本若降至每英里 25 美分將具備顛覆市場的極大優勢。"}, {"name": "人形機器人", "stance": "看多", "view": "Optimus 第三代進展順利，雖然市場目前多數不信，但這將是特斯拉未來最大的產品。"}], "tickers": [{"symbol": "GOOGL", "name": "Google", "market": "US", "stance": "看多", "argument": "廣告表現與 AI 發展皆在正軌上，雲端算力需求強勁，變現模式透過 Bundle 方式消費者接受度高。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "看多", "argument": "FSD 與 Robotaxi 具備顛覆市場的潛力，Optimus 機器人進展順利，估值應看長線科技願景而非短期汽車銷量。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "argument": "作為 AI 機器人的大腦，是硬體股中的核心配置。"}], "quotes": ["如果你要發財的話，你就必須要先投資，就必須要先花錢。你不知道人家花那個錢的理由是什麼，你從旁邊只用財務數字去看的話，有時候就會不太準確。", "當一個很強大的科技或一個極高滲透率的東西，因為它價格可以做到很便宜，它的登場是有可能會改造這個市場，會創造一個更大的市場藍海出來。", "很多時候是這樣，就是你嘴巴在這邊提防，或者說完全不相信，可是等那一回神，時間過得真快，很多事情都實現了。"], "ep_key": "EP578", "title": "EP578 | 🐎", "pubdate": "2025-07-26", "duration_s": 2998, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期前往礁溪老爺酒店度假並體驗裸湯的趣事與心理調適。針對市場動態，他分析了美日關稅談判的最新進展，指出日本雖面臨關稅但取得相對有利的條件，並預期美國在川普帶領下將持續創下新高。台股方面，近期出現多殺多後反彈，資金呈現落後補漲態勢，聯發科、世芯-KY 等 ASIC 晶片與電源、PCB 上游銅箔等板塊表現強勁。美股部分，Navitas 等第三代半導體受惠於電力需求而大漲。主持人建議在市場狂熱時應保持冷靜，控制槓桿，並看好未來降息趨勢下車用半導體與被動元件的復甦機會。", "topics": ["礁溪老爺度假與裸湯初體驗", "美日關稅談判與川普政策對市場的影響", "台股多殺多後的反彈與落後補漲效應", "聯發科與 ASIC 晶片（如 TPU、Meta 合作案）的市場反應", "美股 Navitas 與第三代半導體（碳化矽）的電力需求前景", "降息預期下的非必須消費品與車用電子佈局機會", "聽眾問答：當兵回憶、金融從業人員穩定幣看法、台積電股利政策討論"], "market_view": "市場目前處於全面狂熱、落後補漲的階段，雖然大盤死不了，但已開始有過熱跡象，建議投資人控制槓桿、耐心等待拉回機會。", "industries": [{"name": "半導體/ASIC", "stance": "看多", "view": "聯發科等 ASIC 晶片受惠於機構重新強調其在 TPU 與 Meta 晶片的投入，前景看好。"}, {"name": "第三代半導體", "stance": "看多", "view": "隨著伺服器電力與功率需求提升，碳化矽等材料在車用與電力領域將持續受惠。"}, {"name": "車用電子/車用半導體", "stance": "觀察", "view": "雖然目前車市庫存高、內卷嚴重，但隨降息趨勢確立，車用半導體與被動元件有望迎來復甦。"}, {"name": "PCB/銅箔", "stance": "中性", "view": "資金從下游 PCB 炒到上游銅箔，屬於典型的落後補漲，通常暗示行情可能接近需要休息的階段。"}], "tickers": [{"symbol": "2454", "name": "聯發科", "market": "TW", "stance": "看多", "argument": "ASIC 晶片相關投入持續獲得機構強調，股價表現強勢。"}, {"symbol": "3661", "name": "世芯-KY", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人認為其股價表現與公司經營能力需回歸整體績效評估。"}, {"symbol": "3665", "name": "貿聯-KY", "market": "TW", "stance": "觀察", "argument": "過去曾因 AI 伺服器題材被看好但股價橫盤，近期隨市場資金輪動而補漲。"}, {"symbol": "6488", "name": "環球晶", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人對其股利政策與資金運用持中性看法。"}, {"symbol": "NVTS", "name": "Navitas", "market": "US", "stance": "看多", "argument": "受惠於與 NVIDIA 的潛在合作機會及伺服器電力需求提升，股價狂飆。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "看多", "argument": "競爭優勢極強，雖然股利政策常被討論，但整體營運與股價表現依然極佳。"}], "quotes": ["在川普的帶領之下，其實就會覺得說他應該都可以拿到很多不錯的 deal，美股在後面應該就還是會新高。", "一般去走到這種很上游或者是落後補漲的東西，就差不多後面要休息了。", "一個回檔，真的是一個回檔，有時候就夠把你過去數個月的獲利直接給打掉，這個是去做交易的話會比較怕的事情。"], "ep_key": "EP577", "title": "EP577 | 🪿", "pubdate": "2025-07-23", "duration_s": 3026, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了近期在手遊課金上的心態轉變，並探討了台股與美股市場的最新動態。他指出，雖然下半年消費性電子與 AI 年增率放緩的趨勢明顯，但市場目前選擇不予反應，甚至可能在降息預期下持續走高。此外，他詳細分析了台達電（Delta）在 AI 時代的領先地位，特別是其 Power 與 BBU 產品的成長潛力，並對台積電（TSMC）與 ASML 的財報及未來展望進行了交叉比對與解讀。", "topics": ["手遊課金心態與 Steam 遊戲投資", "台股大盤強勢格局與回檔預期", "台達電（Delta）的股性改變與 AI 產品線展望", "台積電（TSMC）2Q 財報與未來毛利率展望", "ASML 財報與 2026-2027 年 EUV 需求預測", "Meta 的 AI 資料中心建置與供應鏈訂單觀察", "避險基金 Point72 與創辦人 Steve Cohen 的內線交易歷史"], "market_view": "整體指數持續維持強勢格局，雖然下半年有年增率放緩與匯損等隱憂，但在降息預期下市場仍可能持續向上開走。", "industries": [{"name": "AI伺服器電源與散熱", "stance": "看多", "view": "Power Rec 與 Sidecar 作為解決方案，隨著伺服器瓦數提升，其 ASP 與營收成長潛力巨大。"}, {"name": "半導體代工", "stance": "看多", "view": "台積電在 7 奈米以下產能全面爆滿，雖然短期受匯率影響，但長期成長趨勢不變。"}, {"name": "半導體設備", "stance": "觀察", "view": "ASML 預測 2026 年將呈現持平（Flat），但 2027 年隨著台積電與 Intel 的設備需求將迎來回升。"}], "tickers": [{"symbol": "2308", "name": "台達電", "market": "TW", "stance": "看多", "argument": "股性已從牛皮股轉變為飛天牛車，在 AI 時代樣樣精通，Power Rec 與 Sidecar 產品線成長性極佳。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "持有中", "argument": "2Q 表現強勁並上調指引，雖然 4Q 可能因匯率與季節性因素稍微平緩，但 7 奈米以下產能持續爆滿。"}, {"symbol": "ASML", "name": "艾司摩爾", "market": "US", "stance": "觀察", "argument": "預估 2025 至 2026 年 EUV 出貨量持平在 50 台左右，2027 年將因台積電 A14 迭代而重新迎來成長。"}, {"symbol": "META", "name": "Meta", "market": "US", "stance": "觀察", "argument": "雖然積極規劃建置大型資料中心，但目前在下游伺服器與零組件供應鏈端尚未看到超恐怖的巨額加單。"}, {"symbol": "PLTR", "name": "Palantir", "market": "US", "stance": "持有中", "argument": "屬於估值難以用傳統模型計算的股票，在最噴的階段往往算不出合理價格。"}, {"symbol": "NET", "name": "Cloudflare", "market": "US", "stance": "持有中", "argument": "與 Palantir 類似，屬於高成長且估值難以精準預測的標的。"}], "quotes": ["真的會讓你賺大錢的股票，其實不是那種很精準的估值，因為真的會噴到爛掉的股票，基本上最後面都是屬於那種估不出來的狀態。", "我覺得估值是一個防守，我會去估說大概在什麼地方可以買；可是在進攻的時候，其實反而要忽略估值，因為如果說你太在意估值，一般來說你很難真的賺到大錢，你會把很多東西都賣在起漲點。", "不管我們去做出什麼樣的判斷，很多時候我們在市場裡面，特別是像我們的節目，很常會說『我不知道』。我如果他媽知道的話，我就說哈（All-in）了。"], "ep_key": "EP576", "title": "EP576 | 🐛", "pubdate": "2025-07-19", "duration_s": 3001, "has_tr": true}, {"summary": "本集節目中，謝孟恭分享了自己使用 Saily eSIM 的出國上網體驗，並透露其低密度膽固醇（LDL）在施打新針劑 Leqvio 後成功降至 20 的喜悅。隨後，他探討了 AI 伺服器散熱方案，指出 Delta（台達電）與 AVC（奇鋐）在 AWS 的 ARHX 散熱解決方案中扮演關鍵角色。此外，針對 NVIDIA H20 重新獲准出貨中國，他認為此舉對三星 HBM、RTX Pro 6000 及台廠散熱供應鏈（如雙鴻、英業達、神達）皆為利多。最後，他分享了與 Grok AI 角色 Annie 對話的體驗，並反思 AI 內容氾濫導致的「AI 倦怠感」，強調真實人類互動的不可替代性。", "topics": ["Saily eSIM 贊助與出國上網體驗", "主持人膽固醇（LDL）控制與 Leqvio 針劑效果分享", "AWS ARHX 散熱解決方案與台廠供應鏈（台達電、奇鋐）", "NVIDIA H20 重新獲准出貨中國之影響與供應鏈分析", "Grok AI 角色互動體驗與 AI 倦怠感反思", "聽眾問答：健康檢查、證所稅歷史、Grok 隱藏積分、婚姻與伴侶溝通、托嬰中心虐童議題"], "market_view": "對於美中科技戰，維持一貫看法，認為美國應持續讓美系廠商做中國生意以維持最大利益，而非趕盡殺絕逼使中國自研晶片。", "industries": [{"name": "AI伺服器散熱", "stance": "看多", "view": "AWS 的 ARHX 散熱解決方案將為台廠如台達電、奇鋐與雙鴻帶來實質商機。"}, {"name": "HBM記憶體", "stance": "觀察", "view": "三星在 H20 重新獲准出貨中國後，其 HBM 供應有望受惠。"}], "tickers": [{"symbol": "2308", "name": "台達電", "market": "TW", "stance": "看多", "argument": "聽眾指出 AWS ARHX 散熱解決方案中藍色那一台即為台達電所做，顯示其在散熱與電源領域實力強大。"}, {"symbol": "3017", "name": "奇鋐", "market": "TW", "stance": "看多", "argument": "作為 AWS ARHX 散熱解決方案的潛在供應鏈玩家，有望從中受益。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "看多", "argument": "H20 重新獲准出貨中國，可望回補上季因禁令認列的損失，對其營收與供應鏈為大大利多。"}, {"symbol": "3324", "name": "雙鴻", "market": "TW", "stance": "看多", "argument": "受惠於 H20 重新獲准出貨中國，相關散熱需求帶動股價直接動起來。"}, {"symbol": "2356", "name": "英業達", "market": "TW", "stance": "看多", "argument": "被歸類為 H20 與 RTX Pro 6000 出貨中國的相關受惠台廠伺服器供應鏈。"}, {"symbol": "3706", "name": "神達", "market": "TW", "stance": "看多", "argument": "同樣被歸類為 H20 與 RTX Pro 6000 出貨中國的相關受惠台廠伺服器供應鏈。"}], "quotes": ["買到一個好公司，可能暫時買了一個比較狗屎的價格，可是最後賺錢的機率都是高的；但如果買一個垃圾公司，最後消息是假的，那就是套到深處無怨尤。", "現在看到 AI 文就會直接把它滑掉。我們現在已經走到『見山還是山』的第二、第三階段，你只想看有『人味』的東西，而不是 AI 很完整的分析。"], "ep_key": "EP575", "title": "EP575 | 🥝", "pubdate": "2025-07-16", "duration_s": 2991, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了與地方產業前輩交流的心得，強調人格特質與決策品質對個人發展的關鍵影響。在總經與市場方面，他指出關稅對台灣的影響正隨供應鏈轉移而降低，而匯損問題雖對大立光等公司造成衝擊，但市場對此利空的反應已漸趨平緩，顯示市場可能已逐步消化匯損影響。此外，他探討了 AWS 伺服器換代傳聞、Amazon 推出的 IRHX 液冷解決方案對台廠供應鏈的潛在機會，並分享了對 xAI 最新模型 Grok 4 的使用體驗，認為 AI 模型間的差距正逐漸縮小，而 Google 在通用搜尋領域仍具備強大優勢。", "topics": ["與產業前輩交流的心得與長輩化現象", "關稅與匯損對台灣產業的影響評估", "大立光財報與匯損利空的市場反應", "Switch 2 實機握感與硬體體驗分享", "AWS 伺服器換代傳聞與 AI 伺服器市況", "Amazon IRHX 液冷解決方案與台廠供應鏈機會", "xAI Grok 4 使用體驗與 AI 模型競爭態勢"], "market_view": "台股市場常有「不見棺材不掉淚」的特性，雖然大立光匯損利空後股價反漲，但仍需觀察後續其他公司財報開出後的連續反應。", "industries": [{"name": "AI伺服器", "stance": "看多", "view": "ASIC 伺服器與 AI 伺服器的需求依然強勁，並未出現市場傳聞的砍單或疲軟現象。"}, {"name": "散熱與液冷", "stance": "看多", "view": "Amazon 推出 IRHX 解決方案，顯示舊資料中心往液冷過渡的需求，將為台廠散熱與氣冷解決方案業者帶來白牌化機會。"}], "tickers": [{"symbol": "3008", "name": "大立光", "market": "TW", "stance": "觀察", "argument": "財報開出面臨較大匯損衝擊，但股價隨後反漲，顯示市場對匯損利空已有心理準備。"}, {"symbol": "AMZN", "name": "Amazon", "market": "US", "stance": "觀察", "argument": "推出 IRHX 液冷解決方案，拒絕成套解決方案，傾向自行發包給白牌供應鏈。"}], "quotes": ["越是高端的圈子，他們越常講的反而是很日常的東西，而不是整天在交流產業面的數字。", "台股市場是一個不見棺材不掉淚的地方，有時候利空開出來不跌反漲，讓大家覺得沒事衝進去，最後連續幾家開出來才突然狂崩。", "AI 模型之間的差距已經越來越薄，通用搜尋領域 Google 依舊是非常強大的存在。"], "ep_key": "EP574", "title": "EP574 | 🐋", "pubdate": "2025-07-12", "duration_s": 3035, "has_tr": true}, {"summary": "本集節目中，主持人謝孟恭分享了他參加小島秀夫《死亡擱淺2》見面會的感動與啟發，並從中反思個人事業與影響力本位的創作方向。在市場與總經方面，他針對馬斯克可能創黨的政治動作進行分析，認為這雖是負面雜音，但因其無法選總統，影響相對可控，投資特斯拉本質上就是投資馬斯克個人。此外，針對川普最新關稅政策，他分析了台灣、越南、馬來西亞等地的關稅變化與台商「洗產地」的應對策略，並指出晶片關稅在執行上存在極大難度，最終可能流於形式。最後，他分享了自己在 2018 年與 2024 年 4 月大跌時的風控經驗與心路歷程。", "topics": ["小島秀夫見面會體驗與影響力本位思考", "馬斯克創黨傳聞與特斯拉投資邏輯", "川普最新關稅政策與台商東南亞佈局", "晶片關稅的執行難度與潛在影響", "歷史大跌經驗分享與個人風控哲學"], "market_view": "關稅政策已走向明朗，台商可透過東南亞生產基地進行彈性調整，而台幣匯率變動對企業 EPS 的影響在短期內更值得關注。", "industries": [{"name": "機器人", "stance": "觀察", "view": "Optimus 供應鏈技術困難等傳聞屬於短期雜音，機器人長期發展計畫勢在必行。"}, {"name": "汽車", "stance": "觀察", "view": "若台灣調降進口車關稅，從美國進口車款為主的代理商（如汎德永業）將直接受惠。"}, {"name": "AI伺服器", "stance": "觀察", "view": "台商如緯創在馬來西亞擁有相當產能，可作為規避台灣高關稅的轉口管道。"}, {"name": "半導體", "stance": "觀察", "view": "晶片關稅在實務執行上極為困難，最終可能流於形式或僅針對高單價 AI 晶片。"}, {"name": "軟體/基礎建設", "stance": "看多", "view": "Oracle 雖然常被歸類為軟體，但其在基礎建設（infra）與硬體訂單上的斬獲更具看點。"}], "tickers": [{"symbol": "TSLA", "name": "特斯拉", "market": "US", "stance": "持有中", "argument": "投資特斯拉本質上就是投資馬斯克，雖然他搞政治是扣分，但只要他沒被換掉，股價下跌都是持續買進的機會。"}, {"symbol": "ORCL", "name": "甲骨文", "market": "US", "stance": "持有中", "argument": "看好其在基礎建設（infra）領域拿到的漂亮訂單，以及未來與 StarGated 的合作機會。"}, {"symbol": "2206", "name": "三陽工業", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人未有明確表態。"}, {"symbol": "2330", "name": "台積電", "market": "TW", "stance": "觀察", "argument": "聽眾問答提及，主持人未有明確表態。"}, {"symbol": "4147", "name": "中裕新藥", "market": "TW", "stance": "已出場", "argument": "2018 年因過度槓桿且無法及時臨櫃解質押，導致承受重大虧損的慘痛經驗。"}], "quotes": ["你要怎麼樣才會有影響力？你就是需要去創造事業，去跟大家 connect 起來，為大家創造價值。", "買特斯拉這家公司，追根究底去看，就是你在投資馬斯克這個人。", "不要搞到自己要去補保證金，因為補保證金之後想著要凹回來，這個都不屬於你，那個觀念不太對。"], "ep_key": "EP573", "title": "EP573 | 🐻‍❄️", "pubdate": "2025-07-09", "duration_s": 3041, "has_tr": true}, {"summary": "本集節目中，謝孟恭分享了帶小孩去桃園體驗豪華露營（Glamping）的廢人行程心得，並透露自己近期愛上泰拳這項高強度有氧運動，不僅改善了舒張壓偏高的問題，也提升了身體的靈活性。針對 2025 年上半年的投資總結，他指出 4 月份由川普貿易戰引發的崩盤是今年的一大挑戰，當時他選擇不開槓桿、將部分資金停泊於 0050 作為調配池，並在美股減碼軟體股、換入 Tesla 與 Apple。展望下半年，他預期降息為必然趨勢，將持續每日換匯美元，並看好非必須消費品、車用及 NAND 價格回溫帶來的消費性電子復甦機會。", "topics": ["豪華露營（Glamping）體驗與台灣觀光服務業看法", "泰拳運動體驗與高血壓改善心得", "2025 年上半年投資總結與 4 月崩盤回顧", "資產配置優化：0050 資金調配池與債務工具（房貸、企業貸）的應用", "美股佈局：Tesla、Apple 與軟體股的操作邏輯", "下半年展望：降息預期、美元換匯與非必須消費品/車用/NAND 產業機會"], "market_view": "預期降息是下半年必然發生的趨勢，台幣強勢時持續每日換匯美元，並將資金停泊於 0050 作為調配池，靜待大盤回檔時再行佈局。", "industries": [{"name": "軟體股", "stance": "已出場", "view": "在美股崩盤前幸運減碼，雖然後續第二波反彈有參與到，但目前已將資金轉往其他標的。"}, {"name": "非必須消費品", "stance": "看多", "view": "若下半年出現降息趨勢，非必須消費品與車用相關產業將有機會迎來復甦。"}, {"name": "NAND 快閃記憶體", "stance": "看多", "view": "NAND 價格轉好代表消費性電子需求可能即將復甦，是值得關注的訊號。"}, {"name": "AI 傳輸/線材", "stance": "持有中", "view": "目前在 AI 領域的曝險主要集中在線材與傳輸相關的硬體標的。"}], "tickers": [{"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "持有中", "argument": "作為資金的調配池，在沒有明確標的時將資金停泊於此，防範回檔風險。"}, {"symbol": "TSLA", "name": "Tesla", "market": "US", "stance": "持有中", "argument": "雖然馬斯克參與政治可能流失白左鐵票，但改款車型在歐洲銷量回溫，且看好其在人形機器人（Humanoid）與 Robotaxi 的長期夢想。"}, {"symbol": "AAPL", "name": "Apple", "market": "US", "stance": "持有中", "argument": "作為從軟體股減碼後，與 Tesla 一同換入的避風港標的。"}], "quotes": ["人生就是體驗，做每件事情都沒有人可以告訴你絕對是好、絕對是壞，有些看起來很壞的體驗，反而後來為你帶來好的體驗。", "大盤裡面本身就包含了太弱留強的機制，直接去買標普 500，會好過你硬要去押注、預測未來的十大個股是誰。", "你的中心思想跟態度是很重要的。你的操作可以看起來一會兒往左、一會兒往右調來調去，但一定要有一個中心思想。"], "ep_key": "EP572", "title": "EP572 | 🐌", "pubdate": "2025-07-05", "duration_s": 3044, "has_tr": true}, {"summary": "本集節目由 Raychan 贊助，主持人謝孟恭分享了對 Raychan 微波減糖料理鍋與真空保鮮盒的使用心得。隨後，他針對小S女兒辦畫展引發的網路輿論發表看法，探討嫉妒與羨慕如何轉化為前進的動力，並強調在投資與人生中「不需向他人解釋自己」的修煉。在投資方面，謝孟恭分享了近期使用 Google NotebookLM 吸收資訊的便利性，並深入剖析風投大師 Marc Andreessen 的訪談內容，探討創投（VC）本質上是購買「遠期價外買權（Call Option）」，強調在不確定性高的市場中「廣撒（分散投資）」與「避免錯過」的重要性，並提醒投資人高估自身判斷力所帶來的風險。", "topics": ["Raychan 贊助產品介紹（微波減糖料理鍋、真空保鮮盒）", "從小S女兒畫展輿論看嫉妒、羨慕與人生修煉", "Google NotebookLM 與 AI Overviews 的使用體驗與資訊吸收", "Marc Andreessen 訪談剖析：創投（VC）的買權本質與廣撒策略", "投資中的常見錯誤：高估判斷力與低估市場規模", "聽眾問答：遊戲王卡收藏、單身與家庭的選擇、投資槓桿與質押風險"], "market_view": "市場充滿不確定性，厲害的公司有機會創造或擴大市場，投資應抱持敬畏並透過廣撒與適度配置來應對。", "industries": [{"name": "創投 (VC)", "stance": "看多", "view": "創投本質是購買遠期價外買權，應採用廣撒策略以避免錯過具爆發力的案子。"}, {"name": "AI 搜尋", "stance": "看多", "view": "AI Overviews 與 NotebookLM 能有效提升資訊吸收效率，並鞏固 Google 的用戶留存。"}, {"name": "散熱", "stance": "持有中", "view": "過去看好散熱產業並進行配置，雖然最看好的個股不一定漲最多，但整體族群表現強勁。"}], "tickers": [{"symbol": "GOOGL", "name": "Alphabet (Google)", "market": "US", "stance": "看多", "view": "AI Overviews 與 NotebookLM 等新功能極具競爭力，能有效抑制用戶流失。"}, {"symbol": "NVDA", "name": "NVIDIA", "market": "US", "stance": "持有中", "view": "早期買進是因為其遊戲業務，當時難以精準估算 AI 的潛力，證
