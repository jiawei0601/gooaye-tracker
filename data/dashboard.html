<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>股癌 Podcast 追蹤器</title><style>
:root{--bg:#111418;--card:#1b2027;--fg:#e6e9ee;--dim:#8a93a3;--acc:#4da3ff;
--bull:#e05656;--bear:#39b56a;--flat:#8a93a3}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);
font:15px/1.6 "Noto Sans TC",system-ui,sans-serif}
header{padding:14px 20px;border-bottom:1px solid #2a303a;display:flex;gap:16px;
align-items:baseline;flex-wrap:wrap}
h1{font-size:18px;margin:0}#meta{color:var(--dim);font-size:12px}
nav button{background:none;border:1px solid #2a303a;color:var(--fg);padding:6px 14px;
border-radius:6px;cursor:pointer;font-size:14px}
nav button.on{background:var(--acc);border-color:var(--acc);color:#08131f}
main{max-width:1080px;margin:0 auto;padding:16px 20px}
input{width:100%;max-width:360px;background:var(--card);border:1px solid #2a303a;
color:var(--fg);padding:8px 12px;border-radius:6px;margin-bottom:12px}
.card{background:var(--card);border:1px solid #2a303a;border-radius:10px;
padding:14px 16px;margin-bottom:12px}
.card h3{margin:0 0 6px;font-size:16px}.dim{color:var(--dim);font-size:12px}
.tag{display:inline-block;padding:1px 8px;border-radius:10px;font-size:12px;
margin-right:6px;border:1px solid}
.看多,.持有中{color:var(--bull);border-color:var(--bull)}
.看空,.已出場{color:var(--bear);border-color:var(--bear)}
.中性,.觀察{color:var(--flat);border-color:var(--flat)}
details{margin-top:6px}summary{cursor:pointer;color:var(--acc);font-size:13px}
.tl{margin:6px 0 0;padding-left:0;list-style:none}
.tl li{padding:6px 0;border-top:1px dashed #2a303a;font-size:14px}
ul.plain{margin:6px 0;padding-left:18px}
.disc{color:var(--dim);font-size:11px;padding:20px;text-align:center}
</style></head><body>
<header><h1>🎙️ 股癌 Gooaye 追蹤器</h1>
<nav><button data-v="eps" class="on">每集摘要</button>
<button data-v="tk">標的追蹤</button><button data-v="ind">產業追蹤</button></nav>
<span id="meta"></span></header>
<main><input id="q" placeholder="搜尋 代號 / 公司 / 關鍵字…"><div id="view"></div></main>
<div class="disc">純資訊彙整、AI 生成摘要可能有誤，非投資建議。</div>
<script>
const EPS=[{"summary": "本集節目首先討論了颱風假對市場情緒的影響，以及主持人個人對生活與投資觀念的轉變，從追求市場效率轉向更注重健康與家庭。接著深入分析了AI產業的最新動態，特別是Meta在AI基礎設施上的大舉投入，預期將對算力定價和市場競爭格局產生深遠影響。主持人認為，隨著AI算力成本的下降，將刺激更多應用發展，但同時也可能導致部分高估值AI相關股票面臨現實的考驗。節目也更新了記憶體、被動元件、功率元件等關鍵零組件的漲價趨勢，指出供應鏈在某些環節仍存在瓶頸。最後，主持人分享了對光通訊產業內部輪動的觀察，以及個人對投資哲學、資訊篩選和信仰的看法，強調在市場中保持獨立思考與實踐的重要性。", "topics": ["颱風假與市場情緒轉變", "個人生活與投資觀念的演變", "AI產業發展與Meta的策略", "關鍵零組件（記憶體、被動元件、功率元件）漲價趨勢", "光通訊產業的內部輪動與技術路線", "投資哲學與資訊篩選", "信仰與人生觀", "咖啡入門與品味"], "market_view": "台股因颱風休市，但國際盤上漲，預期開盤後將有補漲行情，但整體市場氛圍仍偏向區間震盪。", "industries": [{"name": "AI基礎設施", "stance": "看多", "view": "Meta大舉投入AI基礎設施，將推動算力成本下降，刺激更多AI應用發展，對產業長期發展有利。"}, {"name": "記憶體", "stance": "看多", "view": "記憶體價格持續上漲，但漲幅有所收斂，產業巨頭採購力強勁，預期價格仍會向上。"}, {"name": "被動元件", "stance": "看多", "view": "大多數廠商成功漲價，預期未來1-2季將持續漲價，呈現「母雞帶小雞」效應。"}, {"name": "功率元件", "stance": "看多", "view": "全球範圍內普遍漲價，台灣廠商表現亮眼，部分環節存在顯著缺貨擴張。"}, {"name": "光通訊", "stance": "觀察", "view": "產業內部出現類股輪動，部分「慢而廣」的技術路線（如Vicsel）開始受到關注，而過去熱門的「窄而快」技術則相對疲軟。"}, {"name": "半導體封裝", "stance": "看多", "view": "封裝廠的營收年增率持平但獲利數字大幅增長，顯示產能利用率高且稼動率拉滿，進入漲價循環。"}, {"name": "導線架", "stance": "看多", "view": "導線架交期延長且價格上漲10-20%，部分精英廠商交期從3-4個月拉長至7-8個月，是供應鏈中非常緊缺的環節。"}], "tickers": [{"symbol": "NVDA", "name": "Nvidia", "market": "US", "stance": "看多", "argument": "股價再次攻上200美元，重新站上季線，走勢看好。"}, {"symbol": "META", "name": "Meta", "market": "US", "stance": "看多", "argument": "大舉投入AI基礎設施，出售閒置算力並非退出競爭，而是「滿倉殺進去」的積極策略，對其AI發展是極度看漲的訊號。"}, {"symbol": "CRDO", "name": "Credo", "market": "US", "stance": "持有中", "argument": "過去被市場看空，但現在股價已創新高，顯示市場對「光進銅退」的看法有所修正。"}, {"symbol": "ASTS", "name": "Astera Labs", "market": "US", "stance": "持有中", "argument": "過去被市場看空，但現在股價已創新高，顯示市場對「光進銅退」的看法有所修正。"}, {"symbol": "ADI", "name": "ADI", "market": "US", "stance": "看多", "argument": "作為全球大型類比IC廠商，已發出漲價通知，顯示功率元件產業的漲價趨勢。"}, {"symbol": "0050", "name": "元大台灣50", "market": "TW", "stance": "持有中", "argument": "今年報酬率已達50%以上，吸引更多人進入市場，改變了對颱風假等議題的看法。"}], "quotes": ["好的產品不一定會讓你覺得特別厲害，但會慢慢把一些原本很煩的流程拿掉。", "生命是無常的，你希望它可以長得好，可是呢，即便它不是颱風，有時候還是有機會可以把它整個弄到爆掉，所以我們就要放寬心。", "當大家都上車的時候呢，風向就變了。", "股票是在什麼時候最會漲？朦朧美的時候，大家算不到一個終局，大家不知道說它會紅多久，這種東西呢，你會注意到在市場裡面是特別噴的。", "資訊這種東西，你與其有所謂的100條線，然後這100條線都是雜訊，你不如有兩條超級純的，這兩條線就可以做股票，你根本不需要100個。"], "ep_key": "EP678", "title": "EP678 | 🎮", "pubdate": "2026-07-11", "duration_s": 3166}],TK={"NVDA": {"name": "Nvidia", "market": "US", "timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "argument": "股價再次攻上200美元，重新站上季線，走勢看好。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "META": {"name": "Meta", "market": "US", "timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "argument": "大舉投入AI基礎設施，出售閒置算力並非退出競爭，而是「滿倉殺進去」的積極策略，對其AI發展是極度看漲的訊號。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "CRDO": {"name": "Credo", "market": "US", "timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "持有中", "argument": "過去被市場看空，但現在股價已創新高，顯示市場對「光進銅退」的看法有所修正。"}], "mentions": 1, "latest_stance": "持有中", "latest_date": "2026-07-11"}, "ASTS": {"name": "Astera Labs", "market": "US", "timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "持有中", "argument": "過去被市場看空，但現在股價已創新高，顯示市場對「光進銅退」的看法有所修正。"}], "mentions": 1, "latest_stance": "持有中", "latest_date": "2026-07-11"}, "ADI": {"name": "ADI", "market": "US", "timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "argument": "作為全球大型類比IC廠商，已發出漲價通知，顯示功率元件產業的漲價趨勢。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "0050": {"name": "元大台灣50", "market": "TW", "timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "持有中", "argument": "今年報酬率已達50%以上，吸引更多人進入市場，改變了對颱風假等議題的看法。"}], "mentions": 1, "latest_stance": "持有中", "latest_date": "2026-07-11"}},IND={"AI基礎設施": {"timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "view": "Meta大舉投入AI基礎設施，將推動算力成本下降，刺激更多AI應用發展，對產業長期發展有利。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "記憶體": {"timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "view": "記憶體價格持續上漲，但漲幅有所收斂，產業巨頭採購力強勁，預期價格仍會向上。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "被動元件": {"timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "view": "大多數廠商成功漲價，預期未來1-2季將持續漲價，呈現「母雞帶小雞」效應。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "功率元件": {"timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "view": "全球範圍內普遍漲價，台灣廠商表現亮眼，部分環節存在顯著缺貨擴張。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "光通訊": {"timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "觀察", "view": "產業內部出現類股輪動，部分「慢而廣」的技術路線（如Vicsel）開始受到關注，而過去熱門的「窄而快」技術則相對疲軟。"}], "mentions": 1, "latest_stance": "觀察", "latest_date": "2026-07-11"}, "半導體封裝": {"timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "view": "封裝廠的營收年增率持平但獲利數字大幅增長，顯示產能利用率高且稼動率拉滿，進入漲價循環。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}, "導線架": {"timeline": [{"ep": "EP678", "date": "2026-07-11", "stance": "看多", "view": "導線架交期延長且價格上漲10-20%，部分精英廠商交期從3-4個月拉長至7-8個月，是供應鏈中非常緊缺的環節。"}], "mentions": 1, "latest_stance": "看多", "latest_date": "2026-07-11"}};
let cur="eps";
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const tag=s=>`<span class="tag ${esc(s)}">${esc(s)}</span>`;
function render(){
 const q=$("#q").value.trim().toLowerCase(),v=$("#view");let h="";
 if(cur==="eps"){
  for(const a of EPS){
   const txt=JSON.stringify(a).toLowerCase();
   if(q&&!txt.includes(q))continue;
   h+=`<div class="card"><h3>${esc(a.ep_key)} ｜ ${esc(a.title)}</h3>
   <div class="dim">${esc(a.pubdate)} · ${Math.round(a.duration_s/60)} 分鐘</div>
   <p>${esc(a.summary)}</p>
   ${a.market_view?`<p>📊 <b>大盤觀點：</b>${esc(a.market_view)}</p>`:""}
   <div>${(a.tickers||[]).map(t=>tag(t.stance)+esc(t.symbol)).join(" ")}</div>
   <details><summary>主題與論點</summary>
   <ul class="plain">${(a.topics||[]).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>
   <ul class="plain">${(a.quotes||[]).map(t=>`<li>💬 ${esc(t)}</li>`).join("")}</ul>
   <ul class="tl">${(a.tickers||[]).map(t=>`<li>${tag(t.stance)}<b>${esc(t.symbol)}</b> ${esc(t.name)} — ${esc(t.argument)}</li>`).join("")}</ul>
   </details></div>`;}
 }else{
  const src=cur==="tk"?TK:IND;
  const keys=Object.keys(src).sort((a,b)=>src[b].mentions-src[a].mentions);
  for(const k of keys){
   const r=src[k],txt=(k+JSON.stringify(r)).toLowerCase();
   if(q&&!txt.includes(q))continue;
   h+=`<div class="card"><h3>${esc(k)} ${r.name&&r.name!==k?esc(r.name):""}
   ${tag(r.latest_stance)}</h3>
   <div class="dim">提及 ${r.mentions} 次 · 最近 ${esc(r.latest_date)}</div>
   <details ${q?"open":""}><summary>立場時間軸</summary><ul class="tl">
   ${r.timeline.map(e=>`<li>${tag(e.stance)}<b>${esc(e.ep)}</b> <span class="dim">${esc(e.date)}</span> ${esc(e.argument||e.view)}</li>`).join("")}
   </ul></details></div>`;}
 }
 v.innerHTML=h||'<p class="dim">沒有符合的資料</p>';
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
 cur=b.dataset.v;document.querySelectorAll("nav button").forEach(x=>x.classList.toggle("on",x===b));render();});
$("#q").oninput=render;
$("#meta").textContent=`${EPS.length} 集 · ${Object.keys(TK).length} 檔標的 · ${Object.keys(IND).length} 個產業`;
render();
</script></body></html>
